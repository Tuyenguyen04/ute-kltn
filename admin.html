<script type="text/babel">
const {useState,useEffect,useCallback} = React;

const API_URL = 'https://script.google.com/macros/s/AKfycbyWtaGSLyGxea7E8lEtHzaeJ0yZQF8rYhi5_q5cdh-0hwGx7v16UUvPnXAE14RtCnu6/exec';
const SS_ID   = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEETS  = {
  SV:'Sinh viên đợt 1', GV:'Giảng viên phụ trách',
  DANGKY:'DangKy', KLTN:'DangKyKLTN',
  // [REMOVED] HOIDONG sheet reference — committee assignment feature removed
  NOTIF:'Notifications',
  // [ADDED v2.1] Post-defense revision management sheet
  SAUHOIDONG:'SauHoiDong',
};
// SESSION reads lazily so it reflects the actual stored value at render time,
// not a stale snapshot captured at module-load before login redirects settle.
const SESSION = {
  get email(){ return localStorage.getItem('ute_email')||''; },
  get role(){  return localStorage.getItem('ute_role') ||''; },
  get name(){  return localStorage.getItem('ute_name') ||'Admin'; },
};

async function apiPost(body){
  // Dùng GET thay POST để tránh CORS preflight với Apps Script
  const qs = new URLSearchParams(
    Object.fromEntries(Object.entries(body).map(([k,v])=>[k,String(v??'')]))
  ).toString();
  const r = await fetch(`${API_URL}?${qs}`, { redirect:'follow' });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('JSON parse error:', e, text.slice(0,300)); throw new Error('Response không phải JSON'); }
}
function parseCsv(line){
  // RFC 4180-compliant parser: handles escaped quotes ("") inside quoted fields.
  const cols=[];let cur='',inQ=false;
  for(let j=0;j<line.length;j++){
    const c=line[j];
    if(inQ){
      if(c==='"'){
        // Peek next char: if also '"' it's an escaped quote, consume both
        if(j+1<line.length&&line[j+1]==='"'){cur+='"';j++;}
        else{inQ=false;} // closing quote
      } else {cur+=c;}
    } else {
      if(c==='"'){inQ=true;}
      else if(c===','){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
  }
  cols.push(cur.trim());
  return cols;
}
async function fetchCSV(tab){
  const url=`https://docs.google.com/spreadsheets/d/${SS_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error('Lỗi tải: '+tab);
  const text=await res.text();
  return text.trim().split('\n').slice(1).map(parseCsv);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);
  return(
    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm anim-fade"
      style={{background:type==='error'?'#ba1a1a':type==='warn'?'#855300':'#005236',minWidth:'240px',justifyContent:'center'}}>
      <span className="material-symbols-outlined text-lg">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  const hide=useCallback(()=>setT(null),[]);
  return{toast:t,show,hide};
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function Av({name='',cls=''}){
  const parts=name.trim().split(' ').filter(Boolean);
  const ini=parts.length>=2?(parts[parts.length-2][0]+parts[parts.length-1][0]).toUpperCase():(parts[0]?.[0]||'?').toUpperCase();
  const cols=['from-blue-500 to-blue-700','from-emerald-500 to-teal-600','from-violet-500 to-purple-700','from-orange-400 to-red-500'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full bg-gradient-to-br ${cols[idx]} flex items-center justify-center text-white font-black text-sm flex-shrink-0 ${cls}`}>{ini}</div>;
}
function StatusBadge({status}){
  const map={pending:{l:'Chờ duyệt',c:'bg-secondary-fixed text-on-secondary-fixed'},approved:{l:'Đã duyệt',c:'bg-tertiary-fixed text-on-tertiary-fixed'},rejected:{l:'Từ chối',c:'bg-error-container text-on-error-container'},graded:{l:'Đã chấm',c:'bg-primary-fixed text-on-primary-fixed-variant'}};
  const m=map[status]||{l:status||'--',c:'bg-surface-container text-on-surface-variant'};
  return <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold ${m.c}`}>{m.l}</span>;
}
function Spinner(){return <div className="flex items-center justify-center py-24"><span className="material-symbols-outlined anim-spin text-3xl text-primary">refresh</span></div>;}
function SearchBar({value,onChange,placeholder='Tìm kiếm...'}){
  return(
    <div className="relative w-full md:w-72">
      <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">search</span>
      <input value={value} onChange={e=>onChange(e.target.value)}
        className="w-full pl-10 pr-4 py-2.5 bg-surface-container-low rounded-xl outline-none focus:ring-2 focus:ring-primary/20 text-sm"
        placeholder={placeholder}/>
    </div>
  );
}
function ConfirmModal({title,desc,body,confirmLabel='Xác nhận',danger,onConfirm,onClose}){
  const [loading,setLoading]=useState(false);
  async function go(){setLoading(true);await onConfirm();setLoading(false);}
  return(
    <div className="fixed inset-0 z-[400] flex items-center justify-center p-6 bg-on-surface/50 backdrop-blur-sm">
      <div className="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl anim-slide">
        <div className="flex items-center gap-3 mb-4">
          <div className={`w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${danger?'bg-error-container':'bg-primary-fixed'}`}>
            <span className={`material-symbols-outlined ${danger?'text-error':'text-primary'}`}>{danger?'warning':'info'}</span>
          </div>
          <div>
            <h2 className="font-headline font-extrabold text-lg text-on-surface">{title}</h2>
            <p className="text-xs text-on-surface-variant">{desc}</p>
          </div>
        </div>
        {body&&<div className="mb-4">{body}</div>}
        <div className="flex gap-3 mt-6">
          <button onClick={onClose} disabled={loading} className="flex-1 py-3 rounded-xl border-2 border-outline-variant font-bold text-sm hover:bg-surface-container transition-all disabled:opacity-50">Hủy</button>
          <button onClick={go} disabled={loading}
            className={`flex-1 py-3 rounded-xl font-bold text-sm text-white shadow-lg hover:opacity-90 transition-all disabled:opacity-50 flex items-center justify-center gap-2 ${danger?'bg-error':'bg-primary'}`}>
            {loading&&<span className="material-symbols-outlined anim-spin text-sm">refresh</span>}
            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

// TAB: TỔNG QUAN
// ════════════════════════════════════════════════════════════════
function TabOverview({toast}){
  const [stats,setStats]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    (async()=>{
      try{
        // [REMOVED] HoiDong fetch — committee assignment feature removed
        const [sv,gv,dk,kl]=await Promise.all([
          fetchCSV(SHEETS.SV).catch(()=>[]),
          fetchCSV(SHEETS.GV).catch(()=>[]),
          fetchCSV(SHEETS.DANGKY).catch(()=>[]),
          fetchCSV(SHEETS.KLTN).catch(()=>[]),
        ]);
        const dkV=dk.filter(r=>r[1]);const klV=kl.filter(r=>r[1]);
        setStats({
          sv:sv.filter(r=>r[1]).length, gv:gv.filter(r=>r[1]).length,
          dkTotal:dkV.length, dkPend:dkV.filter(r=>r[13]==='pending').length,
          dkAppr:dkV.filter(r=>r[13]==='approved'||r[13]==='graded').length,
          dkRej:dkV.filter(r=>r[13]==='rejected').length,
          klTotal:klV.length, klPend:klV.filter(r=>r[11]==='pending').length,
          klAppr:klV.filter(r=>r[11]==='approved').length,
        });
      }catch(e){toast.show('Không tải được thống kê','error');}
      setLoading(false);
    })();
  },[]);

  if(loading||!stats) return (<Spinner/>);
  const cards=[
    {label:'Sinh viên',value:stats.sv,icon:'groups',color:'from-blue-500 to-blue-700',sub:'Đăng ký trong hệ thống'},
    {label:'Giảng viên',value:stats.gv,icon:'school',color:'from-purple-500 to-purple-700',sub:'Đang hoạt động'},
    {label:'Đăng ký BCTT',value:stats.dkTotal,icon:'assignment',color:'from-orange-400 to-orange-600',sub:`${stats.dkPend} chờ · ${stats.dkAppr} duyệt · ${stats.dkRej} từ chối`},
    {label:'Đăng ký KLTN',value:stats.klTotal,icon:'menu_book',color:'from-teal-500 to-teal-700',sub:`${stats.klPend} chờ duyệt · ${stats.klAppr} đang thực hiện`},
  ];
  return(
    <div className="space-y-8 anim-fade">
      <div>
        <h2 className="text-3xl font-black text-on-surface">Chào mừng, {SESSION.name} 👋</h2>
        <p className="text-on-surface-variant mt-1">Bảng điều khiển toàn hệ thống UTE Hub.</p>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
        {cards.map((c,i)=>(
          <div key={i} className={`bg-gradient-to-br ${c.color} p-6 rounded-3xl text-white shadow-lg relative overflow-hidden`}>
            <span className="material-symbols-outlined text-6xl opacity-10 absolute -right-3 -bottom-3">{c.icon}</span>
            <div className="relative z-10">
              <p className="text-xs font-bold uppercase tracking-widest opacity-70 mb-2">{c.label}</p>
              <h3 className="text-4xl font-black mb-1">{c.value??'--'}</h3>
              <p className="text-xs opacity-60">{c.sub}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TabStudents({toast}){
  const [rows,setRows]=useState([]);const [loading,setLoading]=useState(true);const [search,setSearch]=useState('');
  useEffect(()=>{(async()=>{setLoading(true);try{const d=await fetchCSV(SHEETS.SV);setRows(d.filter(r=>r[1]));}catch{toast.show('Không tải được SV','error');}setLoading(false);})();},[]);
  const filtered=rows.filter(r=>r[1].toLowerCase().includes(search.toLowerCase())||r[2].includes(search)||r[3].toLowerCase().includes(search.toLowerCase()));
  return(
    <div className="space-y-6 anim-fade">
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-2xl font-black text-on-surface">Sinh viên</h2>
          <p className="text-on-surface-variant text-sm mt-1">Sheet <code className="bg-surface-container px-1.5 py-0.5 rounded text-xs font-mono">Sinh viên đợt 1</code> · {rows.length} bản ghi</p>
        </div>
        <SearchBar value={search} onChange={setSearch} placeholder="Tên, MSSV, email..."/>
      </div>
      {loading?<Spinner/>:(
        <div className="bg-surface-container-lowest rounded-2xl shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full border-collapse text-sm">
              <thead className="bg-surface-container-low"><tr>
                {['#','Họ và Tên','MSSV','Gmail','Ngành'].map(h=><th key={h} className="px-5 py-3 text-left text-xs font-bold text-on-surface-variant uppercase tracking-wider">{h}</th>)}
              </tr></thead>
              <tbody className="divide-y divide-outline-variant/10">
                {filtered.length===0?<tr><td colSpan="5" className="px-5 py-12 text-center text-on-surface-variant text-sm">Không tìm thấy</td></tr>
                :filtered.map((r,i)=>(
                  <tr key={i} className="hover:bg-surface-container-low/50 transition-colors">
                    <td className="px-5 py-3 text-xs text-on-surface-variant">{r[0]||i+1}</td>
                    <td className="px-5 py-3"><div className="flex items-center gap-2"><Av name={r[1]} cls="w-8 h-8 text-xs"/><span className="font-semibold">{r[1]}</span></div></td>
                    <td className="px-5 py-3 font-mono text-xs text-on-surface-variant">{r[2]}</td>
                    <td className="px-5 py-3 text-xs text-outline truncate max-w-[180px]">{r[3]}</td>
                    <td className="px-5 py-3"><span className="text-xs px-2 py-1 bg-primary-fixed text-on-primary-fixed-variant rounded-full font-semibold">{r[5]||'--'}</span></td>
                  </tr>
                ))}

            </table>
          </div>
          <div className="px-5 py-3 bg-surface-container-low border-t border-outline-variant/10 text-xs text-on-surface-variant">Hiển thị {filtered.length} / {rows.length}</div>
        </div>
      )}
    </div>
  );
}

  return(

// ── Sub-component: file link cell ─────────────────────────────
function FileLink({url,label}){
  if(!url||url==='--'||url.trim()==='') return <span className="text-outline text-[10px]">Chưa có</span>;
  return(
    <a href={url} target="_blank" rel="noopener noreferrer"
      className="inline-flex items-center gap-1 text-primary text-[10px] font-semibold hover:underline">
      <span className="material-symbols-outlined text-sm">open_in_new</span>{label||'Xem file'}
    </a>
  );
}

// ── Sub-component: Add/Edit Record Modal ──────────────────────
function SauHDModal({record,onClose,onSaved,toast}){
  // record=null → create new; record=object → edit existing (rowIndex required)
  const isEdit = !!record;
  const [form,setForm]=useState({
    hoTen:    record?.[1]||'',
    emailSV:  record?.[2]||'',
    emailGVHD:record?.[5]||'',
    emailCTHD:record?.[7]||'',
    diem:     record?.[9]||'',
    gvhdStatus: record?.[6]||'',
    cthdStatus: record?.[8]||'',
    urlGiaiTrinh: record?.[3]||'',
    urlFinal:     record?.[4]||'',
  });
  const [fileGT,setFileGT]=useState(null);   // Bản giải trình
  const [fileFinal,setFileFinal]=useState(null); // Bài final
  const [uploading,setUploading]=useState(false);
  const [saving,setSaving]=useState(false);

  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  // Upload a single file via Apps Script and return Drive URL
  async function uploadFile(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=async ev=>{
        try{
          const base64=ev.target.result.split(',')[1];
          const res=await apiPost({
            action:'sauHDUploadFile',
            fileName:file.name,
            mimeType:file.type,
            base64Data:base64,
          });
          if(res.success) resolve(res.url);
          else reject(new Error(res.message||'Upload thất bại'));
        }catch(e){reject(e);}
      };
      reader.onerror=()=>reject(new Error('Không đọc được file'));
      reader.readAsDataURL(file);
    });
  }

  async function handleSave(){
    if(!form.hoTen.trim()||!form.emailSV.trim()){
      toast.show('Vui lòng nhập Họ tên và Email sinh viên','warn'); return;
    }
    setSaving(true); setUploading(false);
    try{
      let urlGT=form.urlGiaiTrinh;
      let urlFin=form.urlFinal;
      // Upload new files if selected
      if(fileGT){setUploading(true); urlGT=await uploadFile(fileGT);}
      if(fileFinal){setUploading(true); urlFin=await uploadFile(fileFinal);}
      setUploading(false);

      const payload={
        action: isEdit?'sauHDUpdate':'sauHDCreate',
        hoTen:     form.hoTen.trim(),
        emailSV:   form.emailSV.trim(),
        urlGiaiTrinh: urlGT||'',
        urlFinal:     urlFin||'',
        emailGVHD: form.emailGVHD.trim(),
        gvhdStatus:form.gvhdStatus,
        emailCTHD: form.emailCTHD.trim(),
        cthdStatus:form.cthdStatus,
        diem:      form.diem,
      };
      if(isEdit) payload.rowIndex=record._rowIndex; // 1-based sheet row

      const res=await apiPost(payload);
      if(res.success){ toast.show(isEdit?'Đã cập nhật bản ghi':'Đã tạo bản ghi mới'); onSaved(); }
      else toast.show(res.message||'Thất bại','error');
    }catch(e){
      setUploading(false);
      toast.show('Lỗi: '+e.message,'error');
    }
    setSaving(false);
  }

  const inputCls="w-full px-3 py-2.5 bg-surface-container-low rounded-xl outline-none focus:ring-2 focus:ring-primary/20 text-sm";
  const labelCls="text-xs font-bold text-on-surface-variant mb-1 block";
  const selectCls=inputCls+" cursor-pointer";

  return(
    <div className="fixed inset-0 z-[400] flex items-start justify-center p-4 pt-10 bg-on-surface/50 backdrop-blur-sm overflow-y-auto">
      <div className="bg-white w-full max-w-lg rounded-[2rem] p-8 shadow-2xl anim-slide mb-10">
        {/* Header */}
        <div className="flex items-center gap-3 mb-6">
          <div className="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0">
            <span className="material-symbols-outlined text-primary">rate_review</span>
          </div>
          <div>
            <h2 className="font-headline font-extrabold text-lg text-on-surface">{isEdit?'Chỉnh sửa bản ghi':'Thêm bản ghi mới'}</h2>
            <p className="text-xs text-on-surface-variant">Sau hội đồng — chỉnh sửa sau bảo vệ</p>
          </div>
          <button onClick={onClose} className="ml-auto p-2 hover:bg-surface-container rounded-full transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>

        <div className="space-y-4">
          {/* Thông tin sinh viên */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>Họ và tên SV <span className="text-error">*</span></label>
              <input value={form.hoTen} onChange={set('hoTen')} className={inputCls} placeholder="Nguyễn Văn A"/>
            </div>
            <div>
              <label className={labelCls}>Email SV <span className="text-error">*</span></label>
              <input value={form.emailSV} onChange={set('emailSV')} className={inputCls} placeholder="sv@student.hcmute.edu.vn" type="email"/>
            </div>
          </div>

          {/* File uploads */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>Bản giải trình (PDF/Word)</label>
              {form.urlGiaiTrinh&&<FileLink url={form.urlGiaiTrinh} label="File hiện tại"/>}
              <input type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                onChange={e=>setFileGT(e.target.files[0]||null)}
                className="mt-1 w-full text-xs text-on-surface-variant file:mr-2 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-primary-fixed file:text-on-primary-fixed-variant hover:file:bg-primary-fixed-dim cursor-pointer"/>
            </div>
            <div>
              <label className={labelCls}>Bài final sau chỉnh sửa (PDF/Word)</label>
              {form.urlFinal&&<FileLink url={form.urlFinal} label="File hiện tại"/>}
              <input type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                onChange={e=>setFileFinal(e.target.files[0]||null)}
                className="mt-1 w-full text-xs text-on-surface-variant file:mr-2 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-primary-fixed file:text-on-primary-fixed-variant hover:file:bg-primary-fixed-dim cursor-pointer"/>
            </div>
          </div>

          {/* GVHD */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>Email GVHD</label>
              <input value={form.emailGVHD} onChange={set('emailGVHD')} className={inputCls} placeholder="gvhd@hcmute.edu.vn" type="email"/>
            </div>
            <div>
              <label className={labelCls}>GVHD duyệt bài sửa</label>
              <select value={form.gvhdStatus} onChange={set('gvhdStatus')} className={selectCls}>
                <option value="">Chờ duyệt</option>
                <option value="approved">✓ Đã duyệt</option>
                <option value="rejected">✗ Từ chối</option>
              </select>
            </div>
          </div>

          {/* CTHD */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label className={labelCls}>Email Chủ tịch HĐ (CTHD)</label>
              <input value={form.emailCTHD} onChange={set('emailCTHD')} className={inputCls} placeholder="cthd@hcmute.edu.vn" type="email"/>
            </div>
            <div>
              <label className={labelCls}>CTHD duyệt bài sửa</label>
              <select value={form.cthdStatus} onChange={set('cthdStatus')} className={selectCls}>
                <option value="">Chờ duyệt</option>
                <option value="approved">✓ Đã duyệt</option>
                <option value="rejected">✗ Từ chối</option>
              </select>
            </div>
          </div>

          {/* Điểm */}
          <div className="w-1/2">
            <label className={labelCls}>Điểm HĐ sau chỉnh sửa</label>
            <input value={form.diem} onChange={set('diem')} className={inputCls} placeholder="8.5" type="number" min="0" max="10" step="0.1"/>
          </div>
        </div>

        {/* Actions */}
        {uploading&&(
          <div className="mt-4 flex items-center gap-2 text-xs text-primary font-semibold">
            <span className="material-symbols-outlined anim-spin text-sm">cloud_upload</span>
            Đang tải file lên Drive...
          </div>
        )}
        <div className="flex gap-3 mt-6">
          <button onClick={onClose} disabled={saving} className="flex-1 py-3 rounded-xl border-2 border-outline-variant font-bold text-sm hover:bg-surface-container transition-all disabled:opacity-50">Hủy</button>
          <button onClick={handleSave} disabled={saving}
            className="flex-1 py-3 rounded-xl bg-primary text-white font-bold text-sm shadow-lg hover:opacity-90 transition-all disabled:opacity-50 flex items-center justify-center gap-2">
            {saving&&<span className="material-symbols-outlined anim-spin text-sm">refresh</span>}
            {isEdit?'Lưu thay đổi':'Tạo bản ghi'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main Tab Component ────────────────────────────────────────
function TabSauHoiDong({toast}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [fGVHD,setFGVHD]=useState('all');   // filter by GVHD status
  const [fCTHD,setFCTHD]=useState('all');   // filter by CTHD status
  const [modal,setModal]=useState(null);     // null | {record?} — null=closed

  // Load sheet data via public CSV (same pattern as other tabs)
  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const d=await fetchCSV(SHEETS.SAUHOIDONG);
      // Attach 1-based rowIndex so edits can target the correct sheet row
      // CSV slice(1) already removes header; first data row = sheet row 2
      setRows(d.filter(r=>r[1]).map((r,i)=>({...r,_rowIndex:i+2})));
    }catch{ toast.show('Lỗi tải dữ liệu Sau HĐ','error'); }
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  // Inline status toggle — calls backend then reloads
  async function toggleStatus(row,role){
    const key=role==='gvhd'?6:8; // column index in the row array
    const cur=row[key]||'';
    const next=cur==='approved'?'rejected':cur==='rejected'?'':'approved';
    try{
      const payload={
        action:'sauHDUpdateStatus',
        rowIndex:row._rowIndex,
        role,           // 'gvhd' | 'cthd'
        status:next,
      };
      const res=await apiPost(payload);
      if(res.success){ toast.show('Đã cập nhật trạng thái'); load(); }
      else toast.show(res.message||'Thất bại','error');
    }catch{ toast.show('Lỗi kết nối','error'); }
  }

  // Inline score edit — small inline form triggered by cell click
  const [editScore,setEditScore]=useState(null); // {rowIndex,val}
  async function saveScore(rowIndex,val){
    try{
      const res=await apiPost({action:'sauHDUpdateScore',rowIndex,diem:val});
      if(res.success){ toast.show('Đã lưu điểm'); setEditScore(null); load(); }
      else toast.show(res.message||'Thất bại','error');
    }catch{ toast.show('Lỗi kết nối','error'); }
  }

  // Filtered rows
  const filtered=rows.filter(r=>{
    const q=search.toLowerCase();
    const matchQ=!q||(r[1]||'').toLowerCase().includes(q)||(r[2]||'').toLowerCase().includes(q)||(r[5]||'').toLowerCase().includes(q);
    const matchGVHD=fGVHD==='all'||(r[6]||'')===(fGVHD==='pending'?'':fGVHD);
    const matchCTHD=fCTHD==='all'||(r[8]||'')===(fCTHD==='pending'?'':fCTHD);
    return matchQ&&matchGVHD&&matchCTHD;
  });

  // Status count helpers
  const cnt=(col,val)=>rows.filter(r=>(r[col]||'')===(val===''?'':val)).length;

  return(
    <div className="space-y-6 anim-fade">
      {/* Modal */}
      {modal!==null&&(
        <SauHDModal
          record={modal.record||null}
          toast={toast}
          onClose={()=>setModal(null)}
          onSaved={()=>{setModal(null);load();}}
        />
      )}

      {/* Page header */}
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-2xl font-black text-on-surface">Sau hội đồng</h2>
          <p className="text-on-surface-variant text-sm mt-1">
            Sheet <code className="bg-surface-container px-1.5 py-0.5 rounded text-xs font-mono">SauHoiDong</code>
            &nbsp;·&nbsp;{rows.length} bản ghi
          </p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={load} className="p-2 hover:bg-surface-container rounded-full transition-colors">
            <span className={`material-symbols-outlined text-on-surface-variant ${loading?'anim-spin':''}`}>refresh</span>
          </button>
          <SearchBar value={search} onChange={setSearch} placeholder="Tên, email SV, GVHD..."/>
          <button onClick={()=>setModal({record:null})}
            className="flex items-center gap-2 px-4 py-2.5 bg-primary text-white rounded-xl text-xs font-bold hover:opacity-90 transition-all shadow-sm flex-shrink-0">
            <span className="material-symbols-outlined text-sm">add</span>Thêm
          </button>
        </div>
      </div>

      {/* Status summary cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {[
          {label:'Tổng',     val:rows.length,                          color:'from-indigo-500 to-blue-600',    icon:'list_alt'},
          {label:'GVHD duyệt', val:cnt(6,'approved'),                 color:'from-emerald-500 to-teal-600',   icon:'check_circle'},
          {label:'CTHD duyệt', val:cnt(8,'approved'),                 color:'from-violet-500 to-purple-600',  icon:'verified'},
          {label:'Chờ duyệt',  val:rows.filter(r=>!r[6]||!r[8]).length, color:'from-orange-400 to-orange-600', icon:'pending_actions'},
        ].map((c,i)=>(
          <div key={i} className={`bg-gradient-to-br ${c.color} p-4 rounded-2xl text-white shadow-sm relative overflow-hidden`}>
            <span className="material-symbols-outlined text-5xl opacity-10 absolute -right-2 -bottom-2">{c.icon}</span>
            <p className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">{c.label}</p>
            <h3 className="text-3xl font-black">{c.val}</h3>
          </div>
        ))}
      </div>

      {/* Filter bar */}
      <div className="flex flex-wrap gap-2 items-center">
        <span className="text-xs font-bold text-on-surface-variant">GVHD:</span>
        {[{k:'all',l:'Tất cả'},{k:'pending',l:'Chờ'},{k:'approved',l:'Đã duyệt'},{k:'rejected',l:'Từ chối'}].map(f=>(
          <button key={f.k} onClick={()=>setFGVHD(f.k)}
            className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${fGVHD===f.k?'bg-primary text-white':'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}`}>
            {f.l}
          </button>
        ))}
        <span className="text-xs font-bold text-on-surface-variant ml-3">CTHD:</span>
        {[{k:'all',l:'Tất cả'},{k:'pending',l:'Chờ'},{k:'approved',l:'Đã duyệt'},{k:'rejected',l:'Từ chối'}].map(f=>(
          <button key={f.k} onClick={()=>setFCTHD(f.k)}
            className={`px-3 py-1.5 rounded-xl text-xs font-bold transition-all ${fCTHD===f.k?'bg-primary text-white':'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}`}>
            {f.l}
          </button>
        ))}
      </div>

      {/* Data table */}
      {loading?<Spinner/>:(
        <div className="bg-surface-container-lowest rounded-2xl shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full border-collapse text-sm" style={{minWidth:'1100px'}}>
              <thead className="bg-surface-container-low">
                <tr>
                  {['Ngày','Sinh viên','Bản giải trình','Bài final','GVHD','GVHD duyệt','CTHD','CTHD duyệt','Điểm',''].map(h=>(
                    <th key={h} className="px-4 py-3 text-left text-[10px] font-bold text-on-surface-variant uppercase tracking-wider whitespace-nowrap">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-outline-variant/10">
                {filtered.length===0?(
                  <tr><td colSpan="10" className="px-5 py-12 text-center text-on-surface-variant text-sm">
                    <span className="material-symbols-outlined text-4xl opacity-20 block mb-2">search_off</span>
                    Không có bản ghi nào
                  </td></tr>
                ):filtered.map((r,i)=>(
                  <tr key={i} className="hover:bg-surface-container-low/50 transition-colors group">
                    {/* Ngày */}
                    <td className="px-4 py-3 text-[10px] text-on-surface-variant whitespace-nowrap">{(r[0]||'').substring(0,10)||'--'}</td>
                    {/* Sinh viên */}
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2">
                        <Av name={r[1]} cls="w-7 h-7 text-[10px]"/>
                        <div>
                          <p className="font-semibold text-xs">{r[1]||'--'}</p>
                          <p className="text-[10px] text-outline">{r[2]||'--'}</p>
                        </div>
                      </div>
                    </td>
                    {/* Bản giải trình */}
                    <td className="px-4 py-3"><FileLink url={r[3]} label="Giải trình"/></td>
                    {/* Bài final */}
                    <td className="px-4 py-3"><FileLink url={r[4]} label="Bài final"/></td>
                    {/* GVHD email */}
                    <td className="px-4 py-3 text-[10px] text-on-surface-variant max-w-[120px] truncate">{r[5]||'--'}</td>
                    {/* GVHD duyệt — click to cycle */}
                    <td className="px-4 py-3">
                      <button onClick={()=>toggleStatus(r,'gvhd')} title="Nhấn để đổi trạng thái"
                        className="hover:opacity-80 transition-opacity">
                        <ApprovalBadge value={r[6]||''}/>
                      </button>
                    </td>
                    {/* CTHD email */}
                    <td className="px-4 py-3 text-[10px] text-on-surface-variant max-w-[120px] truncate">{r[7]||'--'}</td>
                    {/* CTHD duyệt — click to cycle */}
                    <td className="px-4 py-3">
                      <button onClick={()=>toggleStatus(r,'cthd')} title="Nhấn để đổi trạng thái"
                        className="hover:opacity-80 transition-opacity">
                        <ApprovalBadge value={r[8]||''}/>
                      </button>
                    </td>
                    {/* Điểm — inline edit */}
                    <td className="px-4 py-3">
                      {editScore&&editScore.rowIndex===r._rowIndex?(
                        <div className="flex items-center gap-1">
                          <input autoFocus type="number" min="0" max="10" step="0.1"
                            value={editScore.val}
                            onChange={e=>setEditScore(p=>({...p,val:e.target.value}))}
                            className="w-16 px-2 py-1 rounded-lg border-2 border-primary text-xs font-bold outline-none"/>
                          <button onClick={()=>saveScore(r._rowIndex,editScore.val)}
                            className="p-1 rounded-full bg-primary text-white hover:opacity-80">
                            <span className="material-symbols-outlined text-sm">check</span>
                          </button>
                          <button onClick={()=>setEditScore(null)}
                            className="p-1 rounded-full hover:bg-surface-container">
                            <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
                          </button>
                        </div>
                      ):(
                        <button onClick={()=>setEditScore({rowIndex:r._rowIndex,val:r[9]||''})}
                          className="font-black text-primary text-sm hover:underline min-w-[2.5rem] text-left group-hover:bg-primary-fixed/40 px-2 py-1 rounded-lg transition-colors">
                          {r[9]||'--'}
                        </button>
                      )}
                    </td>
                    {/* Edit action */}
                    <td className="px-4 py-3">
                      <button onClick={()=>setModal({record:r})}
                        className="p-1.5 rounded-full hover:bg-surface-container transition-colors opacity-0 group-hover:opacity-100">
                        <span className="material-symbols-outlined text-sm text-on-surface-variant">edit</span>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-5 py-3 bg-surface-container-low border-t border-outline-variant/10 text-xs text-on-surface-variant">
            Hiển thị {filtered.length} / {rows.length} bản ghi
          </div>
        </div>
      )}
    </div>
  );
}

// TAB: THÔNG BÁO

function TabNotif({toast}){
  const [rows,setRows]=useState([]);const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');const [fRead,setFRead]=useState('all');
  const load=async()=>{setLoading(true);try{const d=await fetchCSV(SHEETS.NOTIF);setRows(d.filter(r=>r[1]).reverse());}catch{toast.show('Lỗi tải Notifications','error');}setLoading(false);};
  useEffect(()=>{load();},[]);
  // Sheet lưu 'false' = chưa đọc, 'true' = đã đọc (Apps Script appendRow ghi string)
  const isUnread=r=>r[3]==='false'||r[3]===''||!r[3];
  const filtered=rows.filter(r=>(r[1].toLowerCase().includes(search.toLowerCase())||r[2].toLowerCase().includes(search.toLowerCase()))&&(fRead==='all'||(fRead==='unread'&&isUnread(r))||(fRead==='read'&&!isUnread(r))));
  return(
    <div className="space-y-6 anim-fade">
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-2xl font-black text-on-surface">Thông báo hệ thống</h2>
          <p className="text-on-surface-variant text-sm mt-1">Sheet <code className="bg-surface-container px-1.5 py-0.5 rounded text-xs font-mono">Notifications</code> · {rows.length} bản ghi</p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={load} className="p-2 hover:bg-surface-container rounded-full transition-colors"><span className={`material-symbols-outlined text-on-surface-variant ${loading?'anim-spin':''}`}>refresh</span></button>
          <SearchBar value={search} onChange={setSearch} placeholder="Email hoặc nội dung..."/>
        </div>
      </div>
      <div className="flex gap-2">
        {[{k:'all',l:'Tất cả'},{k:'unread',l:'Chưa đọc'},{k:'read',l:'Đã đọc'}].map(f=>(
          <button key={f.k} onClick={()=>setFRead(f.k)} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${fRead===f.k?'bg-primary text-white':'bg-surface-container text-on-surface-variant hover:bg-surface-container-high'}`}>{f.l}</button>
        ))}
      </div>
      {loading?<Spinner/>:(
        <div className="bg-surface-container-lowest rounded-2xl shadow-sm overflow-hidden divide-y divide-outline-variant/10">
          {filtered.length===0?(
            <div className="flex flex-col items-center justify-center py-16 gap-3 text-on-surface-variant">
              <span className="material-symbols-outlined text-5xl opacity-15">notifications_off</span>
              <p className="text-sm font-medium">Không có thông báo</p>
            </div>
          ):filtered.map((r,i)=>(
            <div key={i} className={`flex items-start gap-4 px-5 py-4 hover:bg-surface-container-low/50 transition-colors ${isUnread(r)?'bg-primary-fixed/20':''}`}>
              <div className={`w-2 h-2 rounded-full mt-2 flex-shrink-0 ${isUnread(r)?'bg-primary':'bg-outline-variant'}`}/>
              <div className="flex-1 min-w-0">
                <p className="text-xs text-outline font-mono mb-0.5">{r[1]}</p>
                <p className="text-sm text-on-surface font-medium">{r[2]}</p>
              </div>
              <div className="text-right flex-shrink-0">
                <p className="text-[10px] text-on-surface-variant">{(r[0]||'').substring(0,16)||'--'}</p>
                <span className={`text-[9px] px-2 py-0.5 rounded-full font-bold mt-1 inline-block ${isUnread(r)?'bg-primary text-white':'bg-surface-container text-on-surface-variant'}`}>{isUnread(r)?'Chưa đọc':'Đã đọc'}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// TAB: RESET DỮ LIỆU
// [MODIFIED v2.0]
//   - Removed 'hoidong' reset option (committee assignment removed)
//   - Reset options now clearly map to backend action names
//   - Added UI refresh signal after each successful reset
// ════════════════════════════════════════════════════════════════
function TabReset({toast}){
  const [confirm,setConfirm]=useState(null);
  const [log,setLog]=useState([]);

  // Each option maps directly to a backend action name.
  // [REMOVED] hoidong option — committee assignment feature removed
  const opts=[
    {
      id:'bctt',
      icon:'assignment',
      title:'Reset BCTT',
      desc:'Xoá toàn bộ DangKy. Slot GV được hoàn lại tự động. SV trở về trạng thái chưa đăng ký.',
      color:'from-orange-400 to-orange-600',
      danger:true,
      action:'adminResetBCTT',
    },
    {
      id:'kltn',
      icon:'menu_book',
      title:'Reset KLTN',
      desc:'Xoá toàn bộ DangKyKLTN. Slot GV KLTN được hoàn lại. SV trở về trạng thái chưa đăng ký.',
      color:'from-teal-500 to-teal-700',
      danger:true,
      action:'adminResetKLTN',
    },
    {
      id:'notif',
      icon:'notifications',
      title:'Xoá thông báo',
      desc:'Xoá toàn bộ Notifications. Chuông thông báo của mọi người sẽ trống.',
      color:'from-slate-500 to-slate-700',
      danger:false,
      action:'adminResetNotif',
    },
    {
      id:'gvslots',
      icon:'restore',
      title:'Reset slot GV',
      desc:'Đặt lại SL đăng ký = 0 và SL còn lại = số tối đa (cột E) cho tất cả GV BCTT và KLTN.',
      color:'from-blue-500 to-blue-700',
      danger:false,
      action:'adminResetGVSlots',
    },
    {
      id:'hoidong',
      icon:'gavel',
      title:'Reset Hội đồng',
      desc:'Xoá toàn bộ phân công hội đồng KLTN (GV phản biện, Trưởng HĐ, Thành viên, Thư ký). Sheet HoiDongKLTN giữ lại header. GV và SV sẽ không còn thấy thông tin hội đồng.',
      color:'from-violet-500 to-purple-700',
      danger:true,
      action:'adminResetHoiDong',
    },
  ];

  async function doReset(opt){
    try{
      const res=await apiPost({action:opt.action});
      const entry={time:new Date().toLocaleTimeString('vi-VN'),label:opt.title,ok:res.success,msg:res.message||''};
      setLog(p=>[entry,...p].slice(0,20));
      if(res.success){
        toast.show(`✅ ${opt.title} thành công!`,'success');
      } else {
        toast.show(res.message||'Thất bại','error');
      }
    }catch(e){
      toast.show('Lỗi kết nối Apps Script','error');
    }finally{
      setConfirm(null);
    }
  }

  return(
    <div className="space-y-8 anim-fade">
      {confirm&&(
        <ConfirmModal
          title={confirm.title}
          desc="Thao tác KHÔNG THỂ hoàn tác!"
          confirmLabel="Tôi hiểu, tiến hành reset"
          danger
          onConfirm={()=>doReset(confirm)}
          onClose={()=>setConfirm(null)}
          body={
            <div className="bg-error-container/30 rounded-xl p-4">
              <p className="font-bold text-on-error-container text-sm">⚠ {confirm.title}</p>
              <p className="text-xs text-on-error-container/80 mt-1">{confirm.desc}</p>
            </div>
          }
        />
      )}

      <div>
        <h2 className="text-2xl font-black text-on-surface">Reset dữ liệu</h2>
        <p className="text-on-surface-variant text-sm mt-1">Các thao tác này <strong>không thể hoàn tác</strong>. Nên export sheet trước khi thực hiện.</p>
      </div>

      <div className="bg-error-container rounded-2xl p-5 flex items-start gap-3 border border-error/20">
        <span className="material-symbols-outlined text-error text-2xl mt-0.5 flex-shrink-0">warning</span>
        <div>
          <p className="font-bold text-on-error-container text-sm">Cảnh báo</p>
          <p className="text-xs text-on-error-container/80 mt-1 leading-relaxed">
            Dữ liệu xoá trên Google Sheet <strong>không thể khôi phục</strong> qua hệ thống này.
            Mỗi lần reset là xoá vĩnh viễn toàn bộ dữ liệu trong sheet tương ứng (giữ lại dòng header).
            Slot GV sẽ được hoàn lại tự động khi reset BCTT hoặc KLTN.
          </p>
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-2 gap-5">
        {opts.map(opt=>(
          <div key={opt.id} className="bg-surface-container-lowest rounded-2xl shadow-sm p-6 flex flex-col gap-4">
            <div className={`w-12 h-12 bg-gradient-to-br ${opt.color} rounded-2xl flex items-center justify-center shadow-sm`}>
              <span className="material-symbols-outlined text-white text-xl">{opt.icon}</span>
            </div>
            <div className="flex-1">
              <h3 className="font-bold text-on-surface text-sm">{opt.title}</h3>
              <p className="text-xs text-on-surface-variant mt-1 leading-relaxed">{opt.desc}</p>
            </div>
            <button
              onClick={()=>setConfirm(opt)}
              className={`w-full py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2
                ${opt.danger
                  ?'bg-error text-white hover:opacity-90'
                  :'bg-surface-container text-on-surface hover:bg-surface-container-high'
                }`}>
              <span className="material-symbols-outlined text-sm">restart_alt</span>
              {opt.danger?'Reset ngay':'Thực hiện'}
            </button>
          </div>
        ))}
      </div>

      {/* Operation log — shows history for current session only */}
      {log.length>0&&(
        <div className="bg-surface-container-lowest rounded-2xl shadow-sm p-5">
          <h3 className="font-bold text-on-surface text-sm mb-3 flex items-center gap-2">
            <span className="material-symbols-outlined text-primary text-base">history</span>
            Lịch sử thao tác phiên này
          </h3>
          <div className="space-y-2">
            {log.map((r,i)=>(
              <div key={i} className={`flex items-center gap-3 px-4 py-2.5 rounded-xl text-xs
                ${r.ok?'bg-tertiary-fixed/30 text-on-tertiary-fixed':'bg-error-container/30 text-on-error-container'}`}>
                <span className="material-symbols-outlined text-sm">{r.ok?'check_circle':'error'}</span>
                <span className="font-mono text-[10px] opacity-60 flex-shrink-0">{r.time}</span>
                <span className="font-semibold">{r.label}</span>
                {r.msg&&<span className="opacity-60 truncate">{r.msg}</span>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  useEffect(()=>{
    const role=localStorage.getItem('ute_role');
    const email=localStorage.getItem('ute_email');
    if(!role||!email){window.location.href='login.html';return;}
    if(role==='giangvien'){window.location.href='giangvien.html';return;}
    if(role==='sinhvien'){window.location.href='trangchu.html';return;}
  },[]);

  const [tab,setTab]=useState('overview');
  const toast=useToast();

  return(
    <div className="min-h-screen bg-background">
      {toast.toast&&<Toast {...toast.toast} onClose={toast.hide}/>}
      <Sidebar tab={tab} setTab={setTab}/>
      <Header tab={tab}/>
      <main className="pt-24 pb-10 px-6 min-h-screen" style={{marginLeft:'18rem'}}>
        <div className="max-w-7xl mx-auto">
          {tab==='overview'    &&<TabOverview    toast={toast}/>}
          {tab==='students'    &&<TabStudents    toast={toast}/>}
          {tab==='instructors' &&<TabInstructors toast={toast}/>}
          {tab==='bctt'        &&<TabBCTT        toast={toast}/>}
          {tab==='kltn'        &&<TabKLTN        toast={toast}/>}
          {/* [REMOVED] hoidong tab — committee assignment feature removed */}
          {/* [ADDED v2.1] Post-defense revision management */}
          {tab==='sauhoidong'  &&<TabSauHoiDong  toast={toast}/>}
          {tab==='notif'       &&<TabNotif       toast={toast}/>}
          {tab==='reset'       &&<TabReset       toast={toast}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
