const {useState,useEffect,useCallback} = React;

const API_URL = 'https://script.google.com/macros/s/AKfycbxg3GY8JxBHaemzpUMe4mlE9hyf8IMCPTKZ2bEZW1Ni_36StC2EbyTuq_4QOG7ftMhi/exec';

const NGANH_LIST = ['QLCN','Kế toán','Thương mại điện tử','Kinh doanh quốc tế','Logistic'];
const SHEET_ID_GV    = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEET_GV_TAB   = 'Giảng viên phụ trách';
const SHEET_NOTIF_TAB = 'Notifications';

// Đọc thông báo dành cho SV này từ sheet Notifications (CSV)
// Sheet Notifications: A=Timestamp B=ForEmail C=Message D=Read
async function fetchSVNotifications(svEmail){
  try{
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID_GV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NOTIF_TAB)}`;
    const res = await fetch(url);
    if(!res.ok) return [];
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1); // bỏ header
    const email = svEmail.toLowerCase().trim();
    const results = [];
    for(const line of lines){
      const cols=[]; let cur='',inQ=false;
      for(let j=0;j<line.length;j++){
        const c=line[j];
        if(c==='"'){inQ=!inQ;}
        else if(c===','&&!inQ){cols.push(cur.replace(/^"|"$/g,'').trim());cur='';}
        else{cur+=c;}
      }
      cols.push(cur.replace(/^"|"$/g,'').trim());
      if((cols[1]||'').toLowerCase().trim()===email){
        results.push({ time: cols[0]||'', message: cols[2]||'' });
      }
    }
    // Trả 10 mới nhất (đảo ngược vì sheet append từ trên xuống)
    return results.slice(-10).reverse();
  }catch(e){ return []; }
}

// Đọc GV từ Google Sheet CSV (không cần Apps Script)
// Cột sheet GV: A=STT B=HọTên C=MãGV D=Gmail E=Role F=SLđăngkí G=SLcònlại H=Ngành
async function fetchGVFromCSV(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID_GV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_GV_TAB)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Không tải được sheet GV');
  const text = await res.text();
  const lines = text.trim().split('\n');
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const cols=[];let cur='',inQ=false;
    for(let j=0;j<lines[i].length;j++){
      const c=lines[i][j];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.replace(/"/g,'').trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.replace(/"/g,'').trim());
    if(cols[1]&&cols[3]){
      rows.push({
        name:cols[1]||'',
        code:cols[2]||'',
        email:cols[3]||'',
        slDangKi:parseInt(cols[5])||0,
        slConLai:parseInt(cols[6])||0,
        nganh:cols[7]||'',
      });
    }
  }
  return rows;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function letterGrade(g){
  if(g>=9.0) return 'A+'; if(g>=8.5) return 'A'; if(g>=8.0) return 'B+';
  if(g>=7.0) return 'B';  if(g>=6.5) return 'C+'; if(g>=5.5) return 'C';
  if(g>=5.0) return 'D+'; return 'F';
}
async function apiGet(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  return r.json();
}
async function apiPost(body){
  // GAS: dùng GET với redirect:follow để đọc được JSON response (tránh CORS)
  // doGet() trong GAS phải xử lý tất cả action
  const qs=new URLSearchParams(
    Object.fromEntries(Object.entries(body).map(([k,v])=>[k,String(v??'')]))
  ).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  const text=await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('JSON parse error:',e,text.slice(0,300)); throw new Error('Response không phải JSON'); }
}
// ── apiPost helper ────────────────────────────────────────────
// Gửi JSON qua POST với Content-Type: text/plain (simple request, không trigger CORS preflight)
async function _gasPost(body){
  const r=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=UTF-8'},
    body:JSON.stringify(body),
    redirect:'follow',
  });
  const text=await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('GAS parse error:',e,text.slice(0,200)); throw new Error('Response không phải JSON'); }
}

// ── Chunked file upload ───────────────────────────────────────
// Chia file thành các chunk nhỏ (4MB base64 ≈ 3MB binary) rồi gửi từng chunk.
// GAS ghép lại và trả driveUrl. Sau đó gọi action thật với driveUrl.
//
// Cách dùng:
//   const driveUrl = await uploadFileInChunks(file, 'BaoCaoTT_UTE', onProgress);
//   await apiPost({ action:'submitReport', ..., driveUrl });
//
const CHUNK_SIZE_BYTES = 3 * 1024 * 1024; // 3MB binary → ~4MB base64

async function uploadFileInChunks(file, folderName, onProgress, extraFinalizeParams){
  // Đọc toàn bộ file thành ArrayBuffer
  const buffer = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });

  const bytes = new Uint8Array(buffer);
  const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE_BYTES);
  const uploadId = Date.now() + '_' + Math.random().toString(36).slice(2,8);

  console.log(`📤 Bắt đầu upload: ${file.name} (${(bytes.length/1024/1024).toFixed(1)}MB, ${totalChunks} chunks)`);

  for(let i=0; i<totalChunks; i++){
    const start = i * CHUNK_SIZE_BYTES;
    const end   = Math.min(start + CHUNK_SIZE_BYTES, bytes.length);
    const chunk = bytes.slice(start, end);

    // Chuyển chunk sang base64
    let binary = '';
    chunk.forEach(b => binary += String.fromCharCode(b));
    const chunkBase64 = btoa(binary);

    let attempt = 0;
    let ok = false;
    while(attempt < 3 && !ok){
      try{
        const res = await _gasPost({
          action:'uploadChunk',
          uploadId, chunkIndex:i, totalChunks,
          chunkData:chunkBase64,
          fileName:file.name, mimeType:file.type||'application/octet-stream',
          folderName,
        });
        if(!res.success) throw new Error(res.message||'Chunk failed');
        ok = true;
      }catch(err){
        attempt++;
        console.warn(`Chunk ${i} thất bại lần ${attempt}:`, err.message);
        if(attempt>=3) throw new Error(`Upload thất bại chunk ${i}: ${err.message}`);
        await new Promise(r=>setTimeout(r, 1000 * attempt));
      }
    }

    if(onProgress) onProgress(Math.round(((i+1)/totalChunks)*100));
    console.log(`✅ Chunk ${i+1}/${totalChunks}`);
  }

  // Finalize: ghép và lưu file trên GAS
  // [v2.6] Truyền thêm nganh/gvName/gvEmail/subFolder để GAS lưu đúng folder cấu trúc
  const finalRes = await _gasPost({
    action:'finalizeUpload',
    uploadId, totalChunks,
    fileName:file.name, mimeType:file.type||'application/octet-stream',
    folderName,
    ...(extraFinalizeParams||{}),
  });
  if(!finalRes.success) throw new Error(finalRes.message||'Finalize thất bại');
  console.log('🎉 Upload hoàn tất:', finalRes.driveUrl);
  return finalRes.driveUrl;
}

// ── apiPostFile: tự động chọn direct hoặc chunked ────────────
// File ≤ 15MB: gửi base64 trực tiếp (nhanh, 1 request)
// File > 15MB: dùng chunked upload
const DIRECT_UPLOAD_LIMIT = 15 * 1024 * 1024; // 15MB

async function apiPostFile(body, onProgress){
  const { _file, folderName, nganh, gvName, gvEmail, subFolder, ...rest } = body;

  // Nếu body truyền _file object (File API) → dùng chunked logic
  if(_file && _file instanceof File){
    if(_file.size <= DIRECT_UPLOAD_LIMIT){
      // Direct: đọc base64 và gửi trong 1 request
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(_file);
      });
      if(onProgress) onProgress(50);
      const result = await _gasPost({ ...rest, folderName,
        fileBase64:b64, fileName:_file.name,
        mimeType:_file.type||'application/octet-stream',
        nganh, gvName, gvEmail, subFolder,
      });
      if(onProgress) onProgress(100);
      return result;
    } else {
      // Chunked upload
      // Chunked upload: truyền nganh/gvName/gvEmail/subFolder vào finalizeUpload để lưu đúng folder
      const extraFinalizeParams = {};
      if(nganh) extraFinalizeParams.nganh = nganh;
      if(gvName) extraFinalizeParams.gvName = gvName;
      if(gvEmail) extraFinalizeParams.gvEmail = gvEmail;
      if(subFolder) extraFinalizeParams.subFolder = subFolder;
      const driveUrl = await uploadFileInChunks(_file, folderName||'Upload_UTE', onProgress, extraFinalizeParams);
      // Gọi action chính với driveUrl (không có fileBase64)
      return await _gasPost({ ...rest, driveUrl,
        fileName:_file.name, mimeType:_file.type||'application/octet-stream',
      });
    }
  }

  // Legacy: body đã có fileBase64 (code cũ vẫn hoạt động)
  return await _gasPost(body);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);
  return(
    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm anim-fade"
      style={{background:type==='error'?'#ba1a1a':type==='warn'?'#855300':'#005236',minWidth:'240px',justifyContent:'center'}}>
      <span className="material-symbols-outlined text-lg">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

// ── AVATAR ────────────────────────────────────────────────────────────────────
function Av({name='',cls=''}){
  // Lấy 2 ký tự cuối của tên (họ + tên đệm)
  const parts=name.trim().split(' ').filter(Boolean);
  const ini=parts.length>=2
    ?( parts[parts.length-2][0]+parts[parts.length-1][0] ).toUpperCase()
    :( parts[0]?.[0]||'?' ).toUpperCase();
  const cols=['from-blue-500 to-blue-700','from-emerald-500 to-teal-600','from-violet-500 to-purple-700','from-orange-400 to-red-500'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full bg-gradient-to-br ${cols[idx]} flex items-center justify-center text-white font-black text-sm flex-shrink-0 ${cls}`}>{ini}</div>;
}

function Pill({status}){
  const m={
    pending:{l:'Đang chờ duyệt',bg:'bg-secondary-container',tx:'text-on-secondary-container',dot:'bg-secondary'},
    approved:{l:'Đã xác nhận',bg:'bg-tertiary-fixed-dim/20',tx:'text-on-tertiary-fixed',dot:'bg-tertiary-fixed-dim'},
    rejected:{l:'Bị từ chối',bg:'bg-error-container',tx:'text-on-error-container',dot:'bg-error'},

  const s=m[status]||m.pending;
  return <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-[11px] font-bold ${s.bg} ${s.tx}`}><span className={`w-1.5 h-1.5 rounded-full ${s.dot} inline-block`}/>{s.l}</span>;
}

function AvatarMenu(){
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    if(!open) return;
    const handler=(e)=>{
      if(!e.target.closest('#avatar-menu-wrap')) setOpen(false);
    };
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[open]);
  return(
    <div id="avatar-menu-wrap" className="relative">
      <button onClick={()=>setOpen(o=>!o)}
        className={`focus:outline-none rounded-full transition-all ${open?'ring-2 ring-primary/50':''} hover:ring-2 hover:ring-primary/30`}>

            <div className="flex items-center gap-3">

function Dashboard({dashData,loading,onRegister,onChangeTopic,onSubmitReport,onRegisterKLTN,onSubmitKLTN,toast,kltnUnlocked,bcttDisabled,onDecuSubmit}){
  const [filterLoai,setFilterLoai]=useState('all');

  if(loading) return <Spinner text="Đang tải dữ liệu..."/>;

  const reg    = dashData?.registered||false;
  const status = dashData?.status||null;        // null | pending | approved | rejected
  const topic  = dashData?.topic||'';
  const co     = dashData?.company||'';
  const instr  = dashData?.instructor||null;    // { name, id, email, term }
  const grade  = (dashData?.grade!==null&&dashData?.grade!==undefined) ? dashData.grade : null;
  const sem    = dashData?.semester||'';

  const pcts=[0,25,50,75,100];

    {l:'Bắt đầu',icon:'flag'},

    {l:'Kết thúc',icon:'flag'},
    {l:'Xác nhận',icon:'verified'},

  const passed = grade!==null && grade>=5;
  const failed  = grade!==null && grade<5;
  const reportSubmitted = dashData?.reportSubmitted||false; // SV đã nộp báo cáo

  // Nút "Đổi đề tài": chỉ active khi bị TỪ CHỐI hoặc điểm trượt+locked

  const canChange = reg && (status === 'rejected' || (failed && locked));

  // Nộp báo cáo: chỉ mở khi approved VÀ chưa nộp
  const canSubmitReport = reg && status==='approved' && !reportSubmitted && grade===null;

  // Đăng ký BCTT: khoá khi đã từng đăng ký, TRỪ trường hợp điểm trượt+locked (cần làm lại)
  const bcttAlreadyReg = reg && !(failed && locked);

  // Tiến độ: thêm bước "Nộp BC" sau approved
  // 0=Bắt đầu|1=Đăng ký|2=Thực hiện|3=Kết thúc|4=Xác nhận
  let curStep=0;
  if(reg){
    if(status==='pending'||status==='rejected') curStep=1;
    if(status==='approved')  curStep=2;
    if(reportSubmitted||grade!==null) curStep=3;
    if(locked)               curStep=4;

    status==='rejected'?'• Bị từ chối':
    status==='approved'&&!reportSubmitted?'• Đang thực hiện':

                <div className="flex items-center gap-1.5 px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed rounded-full text-[11px] font-black">
                  <span className="material-symbols-outlined text-sm">verified</span>
                  BCTT đã hoàn thành

                <span className="text-xs text-on-surface-variant">• Điểm đã được xác nhận</span>

                {displayed.map((row,i)=>(
                  <div key={i} className="flex items-start gap-4 px-6 py-5 hover:bg-surface-container-low/40 transition-colors">
                    {/* Icon */}
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${row.iconBg}`}>
                      <span className={`material-symbols-outlined text-lg ${row.iconTx}`}>{row.icon}</span>

                  </div>
                ))}
              </div>
            )}

            {/* Footer */}
            {hasMore&&(
              <div className="px-6 py-3 border-t border-outline-variant/10 flex items-center justify-between">

      :form.semester==='D1-HK2-2526'?'Đợt 1 - HK2 NH25-26'
      :'Đợt 2 - HK2 NH25-26';

    const params = new URLSearchParams({
      action         : 'submitRegistration',
      type           : 'bctt',
      email          : SESSION.email,
      name           : SESSION.name,
      maSo           : SESSION.maSo,
      nganh          : SESSION.nganh,
      topic          : form.topic,
      company        : form.company,
      instructorName : selGV.name,
      instructorEmail: selGV.email,
      instructorId   : selGV.id || selGV.code || '',
      term           : termLabel,
      note           : form.note || '',
      position       : form.position || '',
      internDuration : form.internDuration || '',
      semester       : form.semester || '',
    });

    // Chỉ lưu dữ liệu khi GAS xác nhận success:true (đã ghi sheet + đã gửi mail)
    // KHÔNG dùng no-cors fallback vì không đọc được response → không biết kết quả
    try {
      const r = await fetch(`${API_URL}?${params.toString()}`, { redirect: 'follow' });

      let res = null;
      try { res = await r.json(); } catch(_) {
        toast.show('❌ Lỗi không xác định từ server. Vui lòng thử lại.', 'error');
        setSubmitting(false);
        return;
      }

      if (res && res.success) {
        // ✅ GAS xác nhận: đã ghi sheet + đã gửi mail → mới cập nhật UI
        localStorage.setItem('ute_bctt_submittedAt', new Date().toLocaleString('vi-VN'));
        setShowConfirm(false);
        setShowSuccess(true);
      } else {
        // ❌ GAS trả lỗi rõ ràng → KHÔNG lưu gì, hiển thị đúng message
        const errMsg = (res && res.message) || 'Gửi thất bại. Vui lòng thử lại.';
        toast.show(`❌ ${errMsg}`, 'error');
        setSubmitting(false);
      }
    } catch(networkErr) {
      // Lỗi mạng (offline / timeout) → KHÔNG lưu gì
      toast.show('❌ Lỗi kết nối mạng. Kiểm tra internet và thử lại.', 'error');
      setSubmitting(false);
    }

                    {l:'Học kỳ',v:form.semester==='D1-HK1-2526'?'Đợt 1 - HK1 NH25-26':form.semester==='D2-HK1-2526'?'Đợt 2 - HK1 NH25-26':form.semester==='D1-HK2-2526'?'Đợt 1 - HK2 NH25-26':'Đợt 2 - HK2 NH25-26'},

                  ))}

              </div>
              {/* Giảng viên */}
              <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
                <div className="flex items-center gap-3 mb-6">
                  <div className="p-2 bg-secondary-fixed rounded-xl text-secondary"><span className="material-symbols-outlined fill-icon">person_check</span></div>

                {selGV&&(
                  <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                    <Av name={selGV.name} cls="w-16 h-16 rounded-2xl text-xl flex-shrink-0"/>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1">
                      {[{l:'Họ và tên',v:selGV.name},{l:'Mã GV',v:`GV${selGV.id||selGV.code}`},{l:'Email',v:selGV.email}].map((r,i)=>(
                        <div key={i}>
                          <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">{r.l}</label>
                          <p className={`font-bold text-on-surface text-sm ${i===2?'text-primary break-all':''}`}>{r.v}</p>
                        </div>
                      ))}

                  </div>
                )}
              </div>
              <div className="flex items-center justify-between pt-2">
                <button onClick={()=>setStep(2)} className="flex items-center gap-2 px-8 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all">
                  <span className="material-symbols-outlined">arrow_back</span>Quay lại
                </button>
                <button onClick={()=>setShowConfirm(true)} className="px-12 py-3 rounded-xl bg-primary text-white font-bold shadow-lg hover:scale-[1.02] transition-all flex items-center gap-2">
                  Xác nhận đăng ký <span className="material-symbols-outlined">send</span>
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SUBMIT REPORT MODAL ───────────────────────────────────────────────────────
function SubmitReportModal({dashData,onClose,onSuccess,toast}){
  const instr   = dashData?.instructor||null;
  const topic   = dashData?.topic||'';
  const sem     = dashData?.semester||'';
  const semLabel= sem==='D1-HK1-2526'?'Đợt 1 – HK1 NH25-26':sem==='D2-HK1-2526'?'Đợt 2 – HK1 NH25-26':sem==='D1-HK2-2526'?'Đợt 1 – HK2 NH25-26':sem==='D2-HK2-2526'?'Đợt 2 – HK2 NH25-26':'--';

  const [file,setFile]         = useState(null);
  const [fileXNTT,setFileXNTT] = useState(null);
  const [note,setNote]         = useState('');
  const [step,setStep]         = useState(1); // 1=chọn file | 2=confirm
  const [submitting,setSubmitting] = useState(false);
  const [progress,setProgress]     = useState(0);
  const [progressLabel,setProgressLabel] = useState('');
  const [done,setDone]         = useState(false);

  function pickFile(e){
    const f=e.target.files[0];
    if(!f) return;
    const ok=['application/pdf','application/vnd.openxmlformats-officedocument.wordprocessingml.document','application/msword','application/zip','application/x-zip-compressed'];
    if(!ok.some(t=>f.type===t)&&!f.name.match(/\.(pdf|docx?|zip)$/i)){
      toast.show('Chỉ chấp nhận file PDF, Word hoặc ZIP!','error'); return;
    }
    if(f.size>100*1024*1024){toast.show('File tối đa 100 MB!','error');return;}
    setFile(f);
  }

  function pickXNTT(e){
    const f=e.target.files[0];
    if(!f) return;
    const ok=['application/pdf','application/vnd.openxmlformats-officedocument.wordprocessingml.document','application/msword','application/zip','application/x-zip-compressed'];
    if(!ok.some(t=>f.type===t)&&!f.name.match(/\.(pdf|docx?|zip)$/i)){
      toast.show('Chỉ chấp nhận file PDF, Word hoặc ZIP!','error'); return;
    }
    if(f.size>50*1024*1024){toast.show('File tối đa 50 MB!','error');return;}
    setFileXNTT(f);
  }

  async function submit(){
    if(!file){toast.show('Vui lòng chọn file báo cáo!','error');return;}
    if(!fileXNTT){toast.show('Vui lòng chọn file Giấy xác nhận thực tập!','error');return;}
    setSubmitting(true); setProgress(0);
    try{
      // Bước 1: Upload Báo cáo
      setProgressLabel('Đang upload Báo cáo...');
      // [v2.6] Truyền nganh/gvName/gvEmail/subFolder để đúng folder Drive cấu trúc
      const nganh  = dashData?.nganh || SESSION.nganh || '';
      const gvName = instr?.name  || '';
      const gvMail = instr?.email || '';

      const res=await apiPostFile({
        action:'submitReport',
        email:SESSION.email,
        name:SESSION.name,
        maSo:SESSION.maSo,
        topic,
        semester:sem,
        instructorEmail:gvMail,
        instructorName:gvName,
        note:note.trim(),
        folderName:'BaoCaoTT_UTE',
        nganh, gvName, gvEmail:gvMail, subFolder:'BCTT',
        _file:file,
      }, pct=>setProgress(Math.round(pct*0.5)));

      if(!res?.success){toast.show(res?.message||'Gửi BC thất bại. Thử lại.','error');setSubmitting(false);return;}

      // Bước 2: Upload Giấy XNTT
      setProgressLabel('Đang upload Giấy xác nhận...');
      const resXNTT=await apiPostFile({
        action:'saveXNTT',
        email:SESSION.email,
        name:SESSION.name,
        maSo:SESSION.maSo,
        topic,
        semester:sem,
        instructorEmail:gvMail,
        instructorName:gvName,
        folderName:'GiayXNTT_UTE',
        nganh, gvName, gvEmail:gvMail, subFolder:'GiayXNTT',
        _file:fileXNTT,
      }, pct=>setProgress(50+Math.round(pct*0.5)));

      // [v2.6] Chỉ coi thành công khi GAS trả success:true rõ ràng
      if(resXNTT?.success){
        setDone(true);
      } else {
        // BC đã nộp thành công, XNTT thất bại → cảnh báo nhưng vẫn cho tiếp tục
        toast.show('Báo cáo đã nộp! Lỗi upload giấy XNTT: '+(resXNTT?.message||'Thử lại sau.'),'warn');
        setDone(true);
      }
    }catch(e){
      toast.show('Lỗi upload: '+e.message,'error');
      setSubmitting(false);
    }
  }

  function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}

  // ── Done screen ───────────────────────────────────────────────────────────
  if(done) return(
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-md">
      <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center anim-slide">
        <div className="w-24 h-24 bg-tertiary-fixed-dim text-on-tertiary-fixed rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg anim-pop">
          <span className="material-symbols-outlined fill-icon text-5xl">task_alt</span>
        </div>
        <h3 className="text-2xl font-headline font-black text-on-surface mb-3 leading-tight">Nộp hồ sơ thành công!</h3>
        <p className="text-on-surface-variant text-sm mb-2 leading-relaxed">
          GV <strong>{instr?.name}</strong> đã nhận được thông báo qua email.
        </p>
        <div className="p-3 bg-surface-container-low rounded-xl text-xs text-on-surface-variant mb-4 leading-relaxed text-left space-y-1">
          <p>✅ <strong>Báo cáo thực tập</strong> — đã nộp thành công</p>
          <p>✅ <strong>Giấy xác nhận thực tập</strong> — đã nộp thành công</p>
        </div>
        <div className="p-3 bg-surface-container-low rounded-xl text-xs text-on-surface-variant mb-8 leading-relaxed">
          📧 <strong>{instr?.email}</strong><br/>
          GV sẽ chấm điểm trong vòng <strong>2 tuần</strong> kể từ ngày kết thúc đợt thực tập <strong>{semLabel}</strong>.
        </div>
        <button onClick={onSuccess}
          className="w-full py-4 bg-primary text-white font-bold rounded-2xl hover:bg-primary-container transition-all shadow-lg shadow-primary/20">
          Về trang chủ
        </button>
      </div>
    </div>
  );

  return(
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-on-surface/50 backdrop-blur-sm">
      <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl anim-slide flex flex-col max-h-[90vh] overflow-hidden">

        {/* Header */}
        <div className="flex items-center justify-between px-8 pt-8 pb-4 border-b border-outline-variant/10 flex-shrink-0">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-primary-fixed flex items-center justify-center text-primary">
              <span className="material-symbols-outlined">upload_file</span>
            </div>
            <div>
              <h2 className="font-headline font-extrabold text-lg text-on-surface">Nộp Báo Cáo Thực Tập</h2>
              <p className="text-xs text-on-surface-variant">{semLabel}</p>
            </div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-surface-container rounded-full transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>

        <div className="flex-1 overflow-y-auto px-8 py-6 space-y-5">

          {/* Thông tin đề tài */}
          <div className="bg-surface-container-low rounded-2xl p-4 space-y-2">
            <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">Đề tài</p>
            <p className="font-bold text-on-surface text-sm">{topic}</p>
            <div className="flex items-center gap-2 pt-1">
              <Av name={instr?.name||''} cls="w-7 h-7 text-xs flex-shrink-0"/>
              <div>
                <p className="text-xs font-semibold text-on-surface">{instr?.name||'--'}</p>
                <p className="text-[10px] text-on-surface-variant">{instr?.email||'--'}</p>
              </div>
            </div>
          </div>

          {/* Upload zone — File báo cáo */}
          <div>
            <label className="text-sm font-semibold text-on-surface-variant block mb-2">
              File báo cáo <span className="text-error">*</span>
              <span className="text-xs font-normal ml-2 opacity-60">PDF / Word / ZIP · tối đa 100 MB</span>
            </label>
            {!file?(
              <label className="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-primary/30 rounded-2xl bg-primary-fixed/10 cursor-pointer hover:bg-primary-fixed/20 transition-colors group">
                <span className="material-symbols-outlined text-4xl text-primary/40 group-hover:text-primary/70 transition-colors mb-2">cloud_upload</span>
                <span className="text-sm font-medium text-primary/60 group-hover:text-primary transition-colors">Kéo thả hoặc bấm để chọn file</span>
                <input type="file" accept=".pdf,.doc,.docx,.zip" className="hidden" onChange={pickFile}/>
              </label>
            ):(
              <div className="flex items-center gap-4 p-4 bg-tertiary-fixed/20 border border-tertiary-fixed-dim/40 rounded-2xl">
                <div className="w-12 h-12 rounded-xl bg-tertiary-fixed-dim/40 flex items-center justify-center text-on-tertiary-fixed flex-shrink-0">
                  <span className="material-symbols-outlined">description</span>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="font-bold text-on-surface text-sm truncate">{file.name}</p>
                  <p className="text-xs text-on-surface-variant">{fmtSize(file.size)}</p>
                </div>
                <button onClick={()=>setFile(null)} className="p-1.5 hover:bg-error-container/30 rounded-full transition-colors">
                  <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
                </button>
              </div>
            )}
          </div>

          {/* Upload zone — Giấy xác nhận thực tập */}
          <div>
            <label className="text-sm font-semibold text-on-surface-variant block mb-2">
              Giấy xác nhận thực tập <span className="text-error">*</span>
              <span className="text-xs font-normal ml-2 opacity-60">PDF / Word / ZIP · tối đa 50 MB</span>
            </label>
            {!fileXNTT?(
              <label className="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-secondary/30 rounded-2xl bg-secondary-fixed/10 cursor-pointer hover:bg-secondary-fixed/20 transition-colors group">
                <span className="material-symbols-outlined text-4xl text-secondary/40 group-hover:text-secondary/70 transition-colors mb-2">verified</span>
                <span className="text-sm font-medium text-secondary/60 group-hover:text-secondary transition-colors">Kéo thả hoặc bấm để chọn file</span>
                <input type="file" accept=".pdf,.doc,.docx,.zip" className="hidden" onChange={pickXNTT}/>
              </label>
            ):(
              <div className="flex items-center gap-4 p-4 bg-secondary-fixed/20 border border-secondary-container/40 rounded-2xl">
                <div className="w-12 h-12 rounded-xl bg-secondary-container/30 flex items-center justify-center text-on-secondary-container flex-shrink-0">
                  <span className="material-symbols-outlined">verified</span>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="font-bold text-on-surface text-sm truncate">{fileXNTT.name}</p>
                  <p className="text-xs text-on-surface-variant">{fmtSize(fileXNTT.size)}</p>
                </div>
                <button onClick={()=>setFileXNTT(null)} className="p-1.5 hover:bg-error-container/30 rounded-full transition-colors">
                  <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
                </button>
              </div>
            )}
          </div>

          {/* Ghi chú */}
          <div>
            <label className="text-sm font-semibold text-on-surface-variant block mb-2">Ghi chú cho GV (tuỳ chọn)</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
              className="w-full bg-surface-container-low rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/50 resize-none text-sm"
              placeholder="VD: Em đã hoàn thành đầy đủ các nội dung theo yêu cầu..."/>
          </div>
        </div> {/* <--- ĐÂY LÀ THẺ DIV ĐÃ ĐƯỢC THÊM VÀO ĐỂ FIX LỖI */}

        {/* Footer */}
        <div className="flex flex-col gap-3 px-8 pb-8 pt-4 border-t border-outline-variant/10 flex-shrink-0">
          {submitting&&progress>0&&(
            <div className="w-full">
              <div className="flex justify-between text-xs text-on-surface-variant mb-1">
                <span>{progress<100?(progressLabel||'Đang upload file...'):'Đang xử lý...'}</span>
                <span>{progress}%</span>
              </div>
              <div className="w-full bg-surface-container rounded-full h-2">
                <div className="bg-primary h-2 rounded-full transition-all duration-300" style={{width:progress+'%'}}></div>
              </div>
            </div>
          )}
          <div className="flex items-center justify-between gap-3">
          <button onClick={onClose} disabled={submitting}
            className="px-6 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all text-sm disabled:opacity-50">
            Hủy bỏ
          </button>
          <button onClick={submit} disabled={!file||!fileXNTT||submitting}
            className="flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:scale-[1.02] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 text-sm">
            {submitting
              ?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang upload{progress>0?` ${progress}%`:''}...</>
              :<><span className="material-symbols-outlined text-sm">send</span>Xác nhận nộp</>}
          </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SubmitKLTNModal({dashData,onClose,onSuccess,toast}){
  const kltn    = dashData?.kltn||null;
  const instr   = kltn?.instructor||dashData?.instructor||null;
  const topic   = kltn?.topic||'';
  const sem     = kltn?.semester||dashData?.semester||'';

  const [note,setNote]    = useState('');
  const [submitting,setSubmitting] = useState(false);
  const [progress,setProgress] = useState(0);
  const [done,setDone]    = useState(false);
  const [doneUrl,setDoneUrl] = useState('');

  function pickFile(e){
    const f=e.target.files[0]; if(!f) return;
    if(f.size>100*1024*1024){toast.show('File tối đa 100 MB!','error');return;}

  function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}

        action:'updateKLTNStatus',

        status:'pending',
        topic,
        note:note.trim(),
        folderName:'KhoaLuanKLTN_UTE',

          </button>
        </div>

        <div className="flex-1 overflow-y-auto px-8 py-6 space-y-5">

            {!file?(
              <label className="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-primary/30 rounded-2xl bg-primary-fixed/10 cursor-pointer hover:bg-primary-fixed/20 transition-colors group">
                <span className="material-symbols-outlined text-4xl text-primary/40 group-hover:text-primary/70 transition-colors mb-2">cloud_upload</span>
                <span className="text-sm font-medium text-primary/60 group-hover:text-primary transition-colors">Kéo thả hoặc bấm để chọn file</span>
                <input type="file" accept=".pdf,.doc,.docx,.zip" className="hidden" onChange={pickFile}/>
              </label>
            ):(
              <div className="flex items-center gap-4 p-4 bg-primary-fixed/20 border border-primary-fixed-dim/40 rounded-2xl">
                <div className="w-12 h-12 rounded-xl bg-primary-fixed-dim/40 flex items-center justify-center text-primary flex-shrink-0">
                  <span className="material-symbols-outlined">description</span>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="font-bold text-on-surface text-sm truncate">{file.name}</p>
                  <p className="text-xs text-on-surface-variant">{fmtSize(file.size)}</p>
                </div>
                <button onClick={()=>setFile(null)} className="p-1.5 hover:bg-error-container/30 rounded-full transition-colors">
                  <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
                </button>
              </div>
            )}
          </div>

          <div>
            <label className="text-sm font-semibold text-on-surface-variant block mb-2">Ghi chú cho GV (tuỳ chọn)</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
              className="w-full bg-surface-container-low rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/50 resize-none text-sm"
              placeholder="VD: Em đã hoàn thành đầy đủ các chương theo yêu cầu của GV..."/>
          </div>

          <div className="flex items-start gap-3 bg-secondary-container/10 border border-secondary-container/20 rounded-2xl p-4">
            <span className="material-symbols-outlined text-secondary text-base mt-0.5">campaign</span>
            <p className="text-xs text-on-surface-variant leading-relaxed italic">
              Sau khi nộp, hệ thống sẽ gửi email thông báo đến GV hướng dẫn. GV sẽ chấm điểm KLTN theo lịch bảo vệ <strong>{semLabel}</strong>. Bạn chỉ được nộp <strong>một lần</strong>.
            </p>
          </div>
        </div>

        <div className="flex items-center justify-between gap-3 px-8 pb-8 pt-4 border-t border-outline-variant/10 flex-shrink-0">
          <button onClick={onClose} disabled={submitting}
            className="px-6 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all text-sm disabled:opacity-50">
            Hủy bỏ
          </button>
          <button onClick={submit} disabled={!file||submitting}
            className="flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:scale-[1.02] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 text-sm">
            {submitting
              ?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang gửi...</>
              :<><span className="material-symbols-outlined text-sm">send</span>Xác nhận nộp KLTN</>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── KLTN ACTION PANEL (hiển thị trong Dashboard khi kltnUnlocked) ────────────
// ══ FLOW KLTN ════════════════════════════════════════════════════════════════
// Chưa đăng ký                    : sidebar "Đăng ký KLTN" active, 2 nút đều khoá
// step=0, status=pending           : SV vừa đăng ký, chờ GV duyệt đề tài → 2 nút khoá
// step=0, status=rejected          : GV từ chối đề tài → [Đổi đề tài] active
// step=0, status=approved          : GV duyệt đề tài   → [Nộp KLTN] active
// step=1+                          : SV đã nộp KLTN    → 2 nút đều khoá (done)
// ═════════════════════════════════════════════════════════════════════════════
function KLTNActionPanel({dashData,onRegisterKLTN,onSubmitKLTN,toast,onDecuSubmit}){
  const kltn       = dashData?.kltn||null;
  const kltnReg    = kltn?.registered||false;
  const kltnTopic  = kltn?.topic||'';
  const kltnStatus = kltn?.status||null;
  const _ks = kltn?.step; const kltnStep = (_ks===''||_ks===null||_ks===undefined)?0:(isNaN(parseInt(_ks))?0:parseInt(_ks));

  // ── Điều kiện 2 nút ──────────────────────────────────────────────
  // Đổi đề tài: GV từ chối đề tài (step=0, rejected)
  const canChangeTopic = kltnReg && kltnStep===0 && kltnStatus==='rejected';
  // Nộp KLTN: GV duyệt đề tài (step=0, approved)
  const canSubmitKLTN  = kltnReg && kltnStep===0 && kltnStatus==='approved';

  // ── Badge trạng thái header ──────────────────────────────────────
  const stepBadgeMap = {
    notReg:   {l:'Chưa đăng ký',              bg:'bg-surface-container text-on-surface-variant'},
    wait0:    {l:'Chờ GV duyệt đề tài',       bg:'bg-secondary-container/30 text-on-secondary-container'},
    rej0:     {l:'Đề tài bị từ chối',          bg:'bg-error-container text-on-error-container'},
    approved0:{l:'Đề tài được duyệt — Nộp KLTN', bg:'bg-primary-fixed text-on-primary-fixed'},
    step1:    {l:'Chuẩn bị bảo vệ',           bg:'bg-tertiary-fixed text-on-tertiary-fixed'},
    step2:    {l:'Hoàn tất',                  bg:'bg-tertiary-fixed-dim text-on-tertiary-fixed'},
  };
  const badgeKey = !kltnReg?'notReg'
    :kltnStep===0&&kltnStatus==='pending'?'wait0'
    :kltnStep===0&&kltnStatus==='rejected'?'rej0'
    :kltnStep===0&&kltnStatus==='approved'?'approved0'
    :kltnStep===1?'step1':'step2';
  const stepBadge = stepBadgeMap[badgeKey]||stepBadgeMap.notReg;

  // Bước hiển thị 1-3 cho người dùng
  const displayStep = !kltnReg?0
    :kltnStep===0?1
    :kltnStep>=1?2:2;

  return(
    <div className="h-full p-6 bg-surface-container-lowest rounded-3xl shadow-sm border-l-4 border-primary anim-fade flex flex-col">
      {/* Header */}
      <div className="flex items-center gap-3 mb-5">
        <div className="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white flex-shrink-0">
          <span className="material-symbols-outlined">school</span>
        </div>
        <div className="flex-1 min-w-0">
          <h3 className="font-headline font-extrabold text-on-surface">Khóa Luận Tốt Nghiệp</h3>
          <p className="text-xs text-on-surface-variant truncate">
            {!kltnReg?'Bạn đủ điều kiện — hãy đăng ký KLTN qua thanh bên!':`Đề tài: ${kltnTopic}`}
          </p>
        </div>
        {kltnReg&&(
          <span className={`flex-shrink-0 px-3 py-1 rounded-full text-[10px] font-black leading-tight text-center ${stepBadge.bg}`}>
            Bước {displayStep}/2<br/>{stepBadge.l}
          </span>
        )}
      </div>

      {/* 3 nút hành động */}
      <div className="grid grid-cols-3 gap-3">

        {/* 1. Đăng ký KLTN — active khi chưa đăng ký */}
        <button onClick={!kltnReg?onRegisterKLTN:undefined} disabled={kltnReg}
          title={kltnReg?'Bạn đã đăng ký KLTN rồi':'Đăng ký đề tài KLTN mới'}
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all text-center
            ${!kltnReg
              ?'bg-primary-fixed text-on-primary-fixed hover:scale-[1.02] shadow-md cursor-pointer'
              :'bg-surface-container-highest text-on-surface/40 cursor-not-allowed opacity-50'}`}>
          <span className="material-symbols-outlined text-2xl">assignment_add</span>
          <span className="text-xs leading-tight">Đăng ký KLTN</span>
          {!kltnReg&&<span className="text-[9px] opacity-80">Nhấn để đăng ký</span>}
        </button>

        {/* 2. Đổi đề tài — active chỉ khi step=0 + rejected */}
        <button onClick={canChangeTopic?onRegisterKLTN:undefined} disabled={!canChangeTopic}
          title={
            !kltnReg?'Đăng ký KLTN trước':
            kltnStep===0&&kltnStatus==='pending'?'Chờ GV duyệt đề tài':
            kltnStep>=1?'Đề tài đã được chấp nhận, không thể đổi':
            canChangeTopic?'Đổi sang đề tài KLTN khác':'Không khả dụng'
          }
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all text-center
            ${canChangeTopic
              ?'bg-secondary-container text-on-secondary-container hover:scale-[1.02] shadow-md cursor-pointer'
              :'bg-surface-container-highest text-on-surface/40 cursor-not-allowed opacity-50'}`}>
          <span className="material-symbols-outlined text-2xl">sync_alt</span>
          <span className="text-xs leading-tight">Đổi đề tài</span>
          {canChangeTopic&&<span className="text-[9px] opacity-80">GV từ chối</span>}
        </button>

        {/* 3. Nộp KLTN — active khi step=0, approved (GV vừa duyệt đề tài) */}
        <button onClick={canSubmitKLTN?onSubmitKLTN:undefined} disabled={!canSubmitKLTN}
          title={
            !kltnReg?'Đăng ký KLTN trước':
            kltnStep===0&&kltnStatus==='pending'?'Chờ GV duyệt đề tài trước':
            kltnStep===0&&kltnStatus==='rejected'?'Đề tài bị từ chối — hãy đổi đề tài':
            kltnStep>=1?'Đã nộp khóa luận':'Nộp file khóa luận tốt nghiệp'
          }
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all relative text-center
            ${canSubmitKLTN
              ?'bg-gradient-to-br from-primary to-primary-container text-white shadow-lg hover:scale-[1.02] cursor-pointer'
              :kltnStep>=1
                ?'bg-tertiary-fixed/30 text-on-tertiary-fixed/50 cursor-not-allowed opacity-70'
                :'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-40'}`}>
          {canSubmitKLTN&&<span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-white/70 animate-pulse"/>}
          <span className="material-symbols-outlined text-2xl">{kltnStep>=1?'task_alt':'upload_file'}</span>
          <span className="text-xs leading-tight">{kltnStep>=1?'Đã nộp KLTN':'Nộp KLTN'}</span>
        </button>

      </div>
      {/* step=0, pending: chờ GV duyệt đề tài */}
      {kltnReg&&kltnStep===0&&kltnStatus==='pending'&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-secondary-container/20 border border-secondary-container/30 rounded-2xl text-on-secondary-container text-sm font-medium">
          <span className="material-symbols-outlined text-base">hourglass_top</span>
          Đăng ký KLTN đã được gửi. Đang chờ GV xét duyệt đề tài.
        </div>
      )}
      {/* step=0, rejected: GV từ chối đề tài */}
      {kltnReg&&kltnStep===0&&kltnStatus==='rejected'&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">
          <span className="material-symbols-outlined text-base">report</span>
          Đề tài KLTN bị từ chối. Nhấn <strong className="mx-1">"Đổi đề tài"</strong> để đăng ký lại.
          {kltn?.reason&&<span className="text-xs opacity-80 ml-1">({kltn.reason})</span>}
        </div>
      )}
      {/* step=0, approved: GV duyệt đề tài → SV cần nộp KLTN */}
      {kltnReg&&kltnStep===0&&kltnStatus==='approved'&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-primary-fixed/40 rounded-2xl text-on-primary-fixed text-sm font-medium">
          <span className="material-symbols-outlined text-base">check_circle</span>
          Đề tài đã được GV duyệt! Nhấn <strong className="mx-1">"Nộp KLTN"</strong> khi hoàn thành khóa luận.
        </div>
      )}
      {kltnStep===1&&(
        <div className="mt-4 flex flex-col gap-2 px-4 py-3 bg-tertiary-fixed/30 rounded-2xl text-on-tertiary-fixed text-sm font-medium">
          <div className="flex items-center gap-2">
            <span className="material-symbols-outlined">record_voice_over</span>
            Đang chuẩn bị bảo vệ khóa luận. Theo dõi lịch từ GV hướng dẫn.
          </div>
          {kltn?.kltnUrl&&(
            <a href={kltn.kltnUrl} target="_blank" rel="noopener noreferrer"
              className="flex items-center gap-2 px-3 py-2 bg-white/30 hover:bg-white/50 rounded-xl text-xs font-bold transition-all w-fit">
              <span className="material-symbols-outlined text-sm">open_in_new</span>
              Xem file KLTN đã nộp trên Drive
            </a>
          )}
        </div>
      )}
      {kltnStep>=2&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-tertiary-fixed/30 rounded-2xl text-on-tertiary-fixed text-sm font-medium">
          <span className="material-symbols-outlined fill-icon text-base">verified</span>
          Khóa luận đã hoàn tất! Xem điểm trong thẻ Kết quả KLTN.
        </div>
      )}
    </div>
  );
}

// ── KLTN REGISTRATION FLOW ───────────────────────────────────────────────────
// GV hướng dẫn KLTN = GV hướng dẫn BCTT, không được đổi.
// Chỉ 2 bước: (1) Nhập đề tài + chọn đợt → (2) Xác nhận + hiển thị GV cố định
function KLTNRegistration({onSuccess,dashData}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({topic:'',semester:'',startDate:'',note:''});
  const [showConfirm,setShowConfirm]=useState(false);
  const [showSuccess,setShowSuccess]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const toast=useToast();

  // GV cố định từ BCTT — không cho đổi
  const bcttInstr = dashData?.instructor||null;
  const gv = bcttInstr
    ? { name: bcttInstr.name||'', email: bcttInstr.email||'', id: bcttInstr.id||'' }
    : null;

  function setSem(v){setForm(f=>({...f,semester:v,startDate:SEM_DATE[v]||''}))}

  function next1(){
    if(!form.topic.trim()){toast.show('Vui lòng nhập tên đề tài KLTN!','error');return;}
    if(!form.semester){toast.show('Vui lòng chọn đợt / học kỳ!','error');return;}
    if(!gv){toast.show('Không tìm thấy thông tin giảng viên hướng dẫn BCTT!','error');return;}
    setStep(2);window.scrollTo(0,0);
  }

  const termLabel = form.semester==='D1-HK1-2526'?'Đợt 1 - HK1 NH25-26'
    :form.semester==='D2-HK1-2526'?'Đợt 2 - HK1 NH25-26'
    :form.semester==='D1-HK2-2526'?'Đợt 1 - HK2 NH25-26'
    :form.semester==='D2-HK2-2526'?'Đợt 2 - HK2 NH25-26':'';

  async function confirm(){
    if(!gv){toast.show('Không có thông tin giảng viên!','error');return;}
    setSubmitting(true);
    try{
      const res=await apiPost({
        action:'submitRegistration',
        type:'kltn',
        email:SESSION.email,
        name:SESSION.name,
        maSo:SESSION.maSo,
        nganh:SESSION.nganh||dashData?.nganh||'',
        topic:form.topic.trim(),
        instructorName:gv.name,
        instructorEmail:gv.email,
        instructorId:gv.id,
        term:termLabel,
        note:form.note.trim()||'',
      });
      if(res.success){
        setShowConfirm(false);
        setShowSuccess(true);
      } else {
        toast.show(res.message||'Gửi thất bại. Thử lại.','error');
        setSubmitting(false);
      }
    }catch(e){
      toast.show('Lỗi kết nối. Thử lại sau.','error');
      setSubmitting(false);
    }
  }

  const STEPS=['Thông tin KLTN','Xác nhận & Gửi'];
  const StepBar=()=>(
    <nav className="flex items-center gap-2 w-full mb-6">
      {STEPS.map((l,i)=>{
        const n=i+1,done=step>n,cur=step===n;
        return(
          <React.Fragment key={i}>
            <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
              <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all
                ${done?'bg-primary-fixed-dim text-on-primary-fixed':cur?'bg-primary text-white ring-4 ring-primary-fixed':'bg-surface-container-highest text-on-surface-variant'}`}>
                {done?<span className="material-symbols-outlined text-sm">check</span>:n}
              </div>
              <span className={`text-[10px] font-bold uppercase tracking-widest whitespace-nowrap ${cur?'text-primary':done?'text-on-surface':'text-on-surface-variant/60'}`}>{n}. {l}</span>
            </div>
            {i<STEPS.length-1&&<div className={`flex-1 h-[2px] mb-5 transition-all duration-500 ${step>n?'bg-primary':'bg-surface-container-highest'}`}/>}
          </React.Fragment>
        );
      })}
    </nav>
  );

  return(
    <div className="anim-fade">
      {toast.toast&&<Toast {...toast.toast} onClose={toast.hide}/>}

      {/* Confirm Modal */}
      {showConfirm&&(
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-on-surface/40 backdrop-blur-sm">
          <div className="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl flex flex-col items-center text-center anim-slide">
            <div className="w-20 h-20 rounded-full bg-primary-fixed mb-6 flex items-center justify-center text-primary">
              <span className="material-symbols-outlined text-4xl">school</span>
            </div>
            <h2 className="font-headline font-extrabold text-2xl text-on-surface mb-3">Xác nhận đăng ký KLTN?</h2>
            <p className="text-on-surface-variant mb-2 leading-relaxed text-sm">Hệ thống sẽ ghi nhận và gửi thông báo đến:</p>
            <div className="mb-6 px-4 py-3 bg-surface-container-low rounded-xl w-full text-sm">
              <p className="font-bold text-on-surface">{gv?.name}</p>
              <p className="text-on-surface-variant text-xs mt-1">📧 {gv?.email}</p>
            </div>
            <div className="flex flex-col w-full gap-3">
              <button onClick={confirm} disabled={submitting}
                className="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg hover:bg-primary-container transition-all flex items-center justify-center gap-2 disabled:opacity-70">
                {submitting
                  ?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang gửi...</>
                  :<><span className="material-symbols-outlined text-sm">send</span>Xác nhận & Gửi</>}
              </button>
              <button onClick={()=>setShowConfirm(false)} disabled={submitting}
                className="w-full py-4 text-on-surface font-bold rounded-2xl hover:bg-surface-container transition-all disabled:opacity-50">
                Hủy bỏ
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Success Modal */}
      {showSuccess&&(
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-md">
          <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center anim-slide">
            <div className="w-24 h-24 bg-primary-fixed text-primary rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg anim-pop">
              <span className="material-symbols-outlined fill-icon text-5xl">school</span>
            </div>
            <h3 className="text-2xl font-headline font-black text-on-surface mb-3 leading-tight">Đăng ký KLTN thành công!</h3>
            <p className="text-on-surface-variant text-sm mb-2 leading-relaxed">
              Yêu cầu đã được gửi đến giảng viên <strong>{gv?.name}</strong>.
            </p>
            <div className="p-3 bg-surface-container-low rounded-xl text-xs text-on-surface-variant mb-8">
              📧 Email thông báo đã gửi tới {gv?.email}
            </div>
            <button onClick={onSuccess} className="w-full py-4 bg-primary text-white font-bold rounded-2xl hover:bg-primary-container transition-all shadow-lg shadow-primary/20">
              Về trang chủ
            </button>
          </div>
        </div>
      )}

      <div className="w-full space-y-5">
        <div>
          <div className="flex items-center gap-3 mb-1">
            <span className="px-3 py-1 bg-primary-fixed text-on-primary-fixed text-[10px] font-black rounded-full tracking-wider">KLTN</span>
            <h2 className="text-3xl font-headline font-extrabold text-on-surface tracking-tight">Đăng ký Khóa Luận Tốt Nghiệp</h2>
          </div>
          <p className="text-on-surface-variant text-sm">Giảng viên hướng dẫn được giữ nguyên từ BCTT.</p>
        </div>
        <StepBar/>

        {/* STEP 1 — Thông tin KLTN */}
        {step===1&&(
          <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm anim-fade space-y-6">

            {/* Banner GV cố định */}
            {gv?(
              <div className="flex items-center gap-4 p-4 bg-primary-fixed/30 border border-primary-fixed-dim/40 rounded-2xl">
                <div className="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white flex-shrink-0">
                  <span className="material-symbols-outlined text-base fill-icon">person_check</span>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="text-xs font-bold text-on-primary-fixed uppercase tracking-wider mb-0.5">Giảng viên hướng dẫn KLTN (cố định từ BCTT)</p>
                  <p className="font-bold text-on-surface text-sm">{gv.name}</p>
                  <p className="text-xs text-on-surface-variant truncate">{gv.email}</p>
                </div>
                <span className="material-symbols-outlined text-primary flex-shrink-0" title="Không thể thay đổi">lock</span>
              </div>
            ):(
              <div className="flex items-center gap-3 p-4 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">
                <span className="material-symbols-outlined">error</span>

                    <option value="">Chọn đợt / học kỳ</option>

                    <option value="D2-HK1-2526">Đợt 2 - HK1 NH25-26</option>
                    <option value="D1-HK2-2526">Đợt 1 - HK2 NH25-26</option>
                    <option value="D2-HK2-2526">Đợt 2 - HK2 NH25-26</option>
                  </select>
                  <span className="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>

              {/* Thời gian bắt đầu (auto) */}
              <div className="space-y-2">
                <label className="text-sm font-semibold text-on-surface-variant">Thời gian bắt đầu</label>
                <div className="flex items-center gap-3 bg-surface-container border border-outline-variant/20 rounded-xl px-4 py-4 text-on-surface-variant cursor-not-allowed">
                  <span className="material-symbols-outlined text-sm">event</span>
                  <span className="text-sm">{form.startDate||'Tự động sau khi chọn đợt'}</span>
                </div>
              </div>
              {/* Ghi chú */}
              <div className="md:col-span-2 space-y-2">
                <label className="text-sm font-semibold text-on-surface-variant">Ghi chú cho GV (tùy chọn)</label>
                <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} rows={3}
                  className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 resize-none"
                  placeholder="Mô tả tóm tắt hướng nghiên cứu, lý do chọn đề tài..."/>
              </div>
            </div>

            <div className="flex justify-end pt-2 border-t border-outline-variant/10">
              <button onClick={next1} disabled={!gv}
                className="bg-gradient-to-br from-primary to-primary-container text-white px-10 py-4 rounded-xl font-bold text-sm shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
                Tiếp theo <span className="material-symbols-outlined text-sm">arrow_forward</span>
              </button>
            </div>
          </div>
        )}

        {/* STEP 2 — Xác nhận */}
        {step===2&&(
          <div className="anim-fade space-y-5">
            <div>
              <h3 className="text-2xl font-headline font-extrabold text-on-surface mb-1">Rà soát thông tin đăng ký KLTN</h3>
              <p className="text-on-surface-variant text-sm">Kiểm tra kỹ trước khi xác nhận gửi yêu cầu.</p>
            </div>

            {/* Phần 1: Thông tin đề tài */}
            <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
              <div className="flex items-center gap-3 mb-6">
                <div className="p-2 bg-primary-fixed rounded-xl text-primary"><span className="material-symbols-outlined fill-icon">school</span></div>
                <h4 className="font-headline font-bold text-lg">Phần 1: Thông tin KLTN</h4>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-10">
                {[
                  {l:'Tên đề tài KLTN', v:form.topic, wide:true},
                  {l:'Đợt / Học kỳ',   v:termLabel},
                  {l:'Thời gian bắt đầu', v:form.startDate||'--'},
                  {l:'Ghi chú',         v:form.note||'(không có)', wide:true},
                ].map((r,i)=>(
                  <div key={i} className={r.wide?'md:col-span-2':''}>
                    <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1 block">{r.l}</label>
                    <p className="text-on-surface font-semibold text-sm">{r.v}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Phần 2: GV cố định */}
            <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
              <div className="flex items-center gap-3 mb-6">
                <div className="p-2 bg-primary-fixed rounded-xl text-primary"><span className="material-symbols-outlined fill-icon">person_check</span></div>
                <h4 className="font-headline font-bold text-lg">Phần 2: Giảng viên hướng dẫn KLTN</h4>
                <span className="ml-auto flex items-center gap-1 text-[10px] font-bold text-on-surface-variant bg-surface-container px-2 py-1 rounded-full">
                  <span className="material-symbols-outlined text-xs">lock</span>Cố định từ BCTT
                </span>
              </div>
              {gv&&(
                <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                  <Av name={gv.name} cls="w-16 h-16 rounded-2xl text-xl flex-shrink-0"/>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1">
                    {[
                      {l:'Họ và tên', v:gv.name},
                      {l:'Mã GV',     v:gv.id?`GV${gv.id}`:'--'},
                      {l:'Email',     v:gv.email, primary:true},
                    ].map((r,i)=>(
                      <div key={i}>
                        <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">{r.l}</label>
                        <p className={`font-bold text-sm ${r.primary?'text-primary break-all':'text-on-surface'}`}>{r.v}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
