<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đăng nhập - HCM·UTE</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#e2e5ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}
.header{text-align:center;margin-bottom:24px}
.school-brand{font-size:16px;font-weight:800;color:#1a4fad;letter-spacing:3px;margin-bottom:8px}
.school-name{font-size:16px;font-weight:700;color:#1a3a7a;line-height:1.45;text-transform:uppercase;letter-spacing:.3px}
.card{background:#fff;border-radius:4px;padding:36px 36px 32px;width:100%;max-width:480px;box-shadow:0 2px 16px rgba(0,0,0,.10)}
.card-title{font-size:26px;font-weight:800;color:#1a4fad;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card-sub{font-size:13.5px;color:#6b7280;margin-bottom:26px}
.field{margin-bottom:16px}
.field input{width:100%;padding:14px 16px;border:1.5px solid #d1d5db;border-radius:4px;font-family:inherit;font-size:14px;color:#111;outline:none;transition:.2s;background:#fff}
.field input::placeholder{color:#9ca3af}
.field input:focus{border-color:#1a4fad;box-shadow:0 0 0 3px rgba(26,79,173,.1)}
.field-error{font-size:12px;color:#e53e3e;margin-top:5px;display:none}
.field.has-error .field-error{display:block}
.field.has-error input{border-color:#e53e3e}
.btn-login{width:100%;padding:14px;background:#1a4fad;color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.18s;margin-bottom:12px}
.btn-login:hover{background:#15408f}
.divider{display:flex;align-items:center;gap:12px;margin:4px 0 16px;font-size:12px;color:#9ca3af}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.google-btn-wrap{display:flex;justify-content:center;width:100%}
/* Overlay */
.overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .3s ease}
.overlay.show{display:flex}
.overlay.success{background:rgba(6,95,70,.93)}
.overlay.error{background:rgba(153,27,27,.93)}
.overlay-icon{font-size:72px;margin-bottom:16px;animation:popIn .4s ease}
.overlay-msg{font-size:24px;font-weight:700;color:#fff;text-align:center;padding:0 32px;line-height:1.5}
.overlay-sub{font-size:14px;color:rgba(255,255,255,.8);margin-top:10px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="overlay-icon" id="ov-icon"></div>
  <div class="overlay-msg" id="ov-msg"></div>
  <div class="overlay-sub" id="ov-sub"></div>
</div>

<div class="header">
  <div class="school-brand">HCM·UTE</div>
  <div class="school-name">Trường Đại Học Công Nghệ Kỹ Thuật<br>TP.HCM</div>
</div>

<div class="card">
  <div class="card-title">Đăng nhập</div>
  <div class="card-sub">Đăng ký đề tài KLTN</div>

  <!-- Form Admin -->
  <div class="field" id="fu">
    <input type="text" id="username" placeholder="Tên đăng nhập (Admin)" oninput="ce('fu')"/>
    <div class="field-error">Tên đăng nhập là bắt buộc</div>
  </div>
  <div class="field" id="fp">
    <input type="password" id="password" placeholder="Mật khẩu" oninput="ce('fp')" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="field-error">Mật khẩu là bắt buộc</div>
  </div>
  <button class="btn-login" onclick="doLogin()">Đăng nhập</button>

  <div class="divider"><span>hoặc</span></div>

  <!-- Nút Google Sign-In -->
  <div class="google-btn-wrap">
    <div id="g_id_onload"
         data-client_id="182980370571-okdedhnh98qnf86rg5n7kq508ljr4fne.apps.googleusercontent.com"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="signin_with"
         data-shape="rectangular"
         data-logo_alignment="left"
         data-width="408">
    </div>
  </div>
</div>

<script>
const ADMIN_USER = 'admin', ADMIN_PASS = 'ute2025';

// ── Cấu hình Google Sheet ─────────────────────────────────────────────────────
const SHEET_ID = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEET_SV = 'Sinh viên đợt 1';
const SHEET_GV = 'Giảng viên phụ trách';
const SHEET_TBM = 'Trưởng bộ môn'; // Quan trọng: Khai báo sheet TBM

// ── Helper UI ─────────────────────────────────────────────────────────────────
function ce(id){ document.getElementById(id).classList.remove('has-error'); }

function showOverlay(type, icon, msg, sub){
  const ov = document.getElementById('overlay');
  document.getElementById('ov-icon').textContent = icon;
  document.getElementById('ov-msg').textContent  = msg;
  document.getElementById('ov-sub').textContent  = sub || '';
  ov.className = 'overlay show ' + type;
}
function hideOverlay(){
  document.getElementById('overlay').className = 'overlay';
}

// ── Đọc CSV trực tiếp từ Google Sheet ────────────────────────────────────────
async function fetchSheetCSV(sheetName){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Không tải được sheet: ' + sheetName);
  return res.text();
}

function parseCSV(text){
  return text.trim().split('\n').map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for(let i = 0; i < line.length; i++){
      const c = line[i];
      if(c === '"'){ inQ = !inQ; }
      else if(c === ',' && !inQ){ cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// Tìm SV / GV (Cột F = Ngành)
function findEmailInRows(rows, email){
  for(let i = 1; i < rows.length; i++){
    const row = rows[i];
    if(!row || row.length < 4) continue;
    const rowEmail = (row[3] || '').replace(/"/g, '').trim().toLowerCase();
    if(rowEmail === email.toLowerCase()){
      return {
        name  : (row[1] || '').replace(/"/g, '').trim(),
        maSo  : (row[2] || '').replace(/"/g, '').trim(),
        role  : (row[4] || '').replace(/"/g, '').trim(),
        nganh : (row[5] || '').replace(/"/g, '').trim(),
      };
    }
  }
  return null;
}

// Tìm TBM (Cột H = Ngành)
function findTBMInRows(rows, email){
  for(let i = 1; i < rows.length; i++){
    const row = rows[i];
    if(!row || row.length < 4) continue;
    const rowEmail = (row[3] || '').replace(/"/g, '').trim().toLowerCase();
    if(rowEmail === email.toLowerCase()){
      return {
        name  : (row[1] || '').replace(/"/g, '').trim(),
        maSo  : (row[2] || '').replace(/"/g, '').trim(),
        nganh : (row[7] || '').replace(/"/g, '').trim(),
      };
    }
  }
  return null;
}

function doLogin(){
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  let ok = true;
  if(!u){ document.getElementById('fu').classList.add('has-error'); ok=false; }
  if(!p){ document.getElementById('fp').classList.add('has-error'); ok=false; }
  if(!ok) return;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    localStorage.setItem('ute_email', 'admin');
    localStorage.setItem('ute_role',  'admin');
    localStorage.setItem('ute_name',  'Administrator');
    localStorage.setItem('ute_maSo',  'ADMIN');
    showOverlay('success','✅','Đăng nhập thành công!','Đang chuyển hướng...');
    setTimeout(()=>{ window.location.href = 'admin.html'; }, 2000);
  } else {
    showOverlay('error','🚫','Tên đăng nhập hoặc mật khẩu không đúng.','');
    setTimeout(hideOverlay, 3000);
  }
}

// ── Callback từ Google Sign-In ────────────────────────────────────────────────
async function handleGoogleLogin(response){
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email   = payload.email.toLowerCase().trim();
    const nameGG  = payload.name || email.split('@')[0];

    // ========================================================
    // 🔴 ÉP QUYỀN TRƯỞNG BỘ MÔN (Dùng để bỏ qua lỗi Sheet)
    // ========================================================
    if(email === 'lalahehe464@gmail.com') {
        localStorage.clear();
        localStorage.setItem('ute_email', email);
        localStorage.setItem('ute_role',  'truongbomon'); // Ép quyền TBM
        localStorage.setItem('ute_name',  'PGS.TS. Trần P');
        localStorage.setItem('ute_maSo',  '534');
        localStorage.setItem('ute_nganh', 'Khoa học máy tính');
        
        showOverlay('success','🎉','Chào mừng Trưởng bộ môn!','Đang chuyển hướng...');
        setTimeout(()=>{ window.location.href = 'giangvien.html'; }, 1500);
        return; 
    }
    // ========================================================

    showOverlay('success','⏳','Đang kiểm tra quyền truy cập...','');

    localStorage.clear();
    const [csvSV, csvGV, csvTBM] = await Promise.all([
      fetchSheetCSV(SHEET_SV),
      fetchSheetCSV(SHEET_GV),
      fetchSheetCSV(SHEET_TBM)
    ]);

    const rowsSV = parseCSV(csvSV);
    const rowsGV = parseCSV(csvGV);
    const rowsTBM = parseCSV(csvTBM);

    // Kiểm tra TBM
    const tbm = findTBMInRows(rowsTBM, email);
    if(tbm){
      localStorage.setItem('ute_email', email);
      localStorage.setItem('ute_role',  'truongbomon');
      localStorage.setItem('ute_name',  tbm.name || nameGG);
      localStorage.setItem('ute_maSo',  tbm.maSo || '');
      localStorage.setItem('ute_nganh', tbm.nganh || '');
      showOverlay('success','🎉','Chào mừng Trưởng bộ môn!','Đang chuyển hướng...');
      setTimeout(()=>{ window.location.href = 'giangvien.html'; }, 2000);
      return;
    }

    // Kiểm tra GV
    const gv = findEmailInRows(rowsGV, email);
    if(gv){
      localStorage.setItem('ute_email', email);
      localStorage.setItem('ute_role',  'giangvien');
      localStorage.setItem('ute_name',  gv.name || nameGG);
      localStorage.setItem('ute_maSo',  gv.maSo || '');
      localStorage.setItem('ute_nganh', gv.nganh || '');
      showOverlay('success','🎉','Chào mừng Giảng viên!','Đang chuyển hướng...');
      setTimeout(()=>{ window.location.href = 'giangvien.html'; }, 2000);
      return;
    }

    // Kiểm tra SV
    const sv = findEmailInRows(rowsSV, email);
    if(sv){
      localStorage.setItem('ute_email', email);
      localStorage.setItem('ute_role',  'sinhvien');
      localStorage.setItem('ute_name',  sv.name || nameGG);
      localStorage.setItem('ute_maSo',  sv.maSo || '');
      localStorage.setItem('ute_nganh', sv.nganh || '');
      showOverlay('success','🎉','Chào mừng Sinh viên!','Đang chuyển hướng...');
      setTimeout(()=>{ window.location.href = 'trangchusinhvien.html'; }, 2000);
      return;
    }

    // Nếu không thuộc diện nào
    showOverlay('error','🚫','Bạn chưa đủ điều kiện để đăng nhập.','');
    setTimeout(hideOverlay, 3000);

  } catch(err){
    console.error(err);
    showOverlay('error','⚠️','Lỗi kết nối hoặc xử lý dữ liệu.','');
    setTimeout(hideOverlay, 3000);
  }
}
</script>
</body>
</html>
