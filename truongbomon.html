// SHEET CONFIG

const SS_ID_CSV   = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEET_DANGKY_TAB  = 'DangKy';
const SHEET_KLTN_TAB    = 'DangKyKLTN';
const SHEET_HOIDONG_TAB = 'HoiDongKLTN';
const SHEET_NOTIF_TAB   = 'Notifications';
const SHEET_USERS_TAB   = 'Users';
function parseCsvLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let j = 0; j < line.length; j++) {
    const c = line[j];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.replace(/^"|"$/g,'').trim());
  return cols;
}

async function fetchSheetCSV(sheetTab) {
  const url = `https://docs.google.com/spreadsheets/d/${SS_ID_CSV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetTab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Không tải được sheet: ' + sheetTab);
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(parseCsvLine);
}

async function fetchDangKyByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_DANGKY_TAB);
  const pendingList = [], approvedList = [];
  for (const r of rows) {
    if (!r[9] || r[9].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    const obj = {
      studentEmail    : r[1]  || '',
      studentName     : r[2]  || '',
      maSo            : r[3]  || '',
      nganh           : r[4]  || '',
      topic           : r[6]  || '',
      company         : r[7]  || '',
      term            : r[11] || '',
      note            : r[12] || '',
      status          : r[13] || 'pending',
      grade           : r[14] !== '' ? parseFloat(String(r[14]).replace(',', '.')) : null,
      position        : r[16] || '',
      internDuration  : r[17] || '',
      reportSubmitted : r[18]?.toString().toLowerCase() === 'true',
      reportDriveUrl  : r[19] || '',
      xnttDriveUrl    : r[20] || '',
    };
    if (obj.status === 'pending') pendingList.push(obj);
    else if (obj.status === 'approved' || obj.status === 'graded') approvedList.push(obj);
  }
  return { pendingList, approvedList };
}
async function fetchKLTNByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_KLTN_TAB);
  const pendingTopic = [];   // Đăng ký đề tài (chưa có đề cương)
  const pendingOutline = []; // Đã nộp đề cương chờ duyệt
  const activeList = [];     // Đang thực hiện

  for (const r of rows) {
    if (!r[7] || r[7].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    
    const step = (r[14] === '' || r[14] === null || r[14] === undefined) ? 0 : (parseInt(r[14]) || 0);
    const decuUrl = r[15] || '';
    
    const obj = {
      studentEmail : r[1]  || '',
      studentName  : r[2]  || '',
      maSo         : r[3]  || '',
      nganh        : r[4]  || '',
      topic        : r[5]  || '',
      term         : r[9]  || '',
      note         : r[10] || '',
      status       : r[11] || 'pending',
      grade        : r[12] !== '' ? parseFloat(String(r[12]).replace(',', '.')) : null,
      step, decuUrl,
      type         : 'kltn',
      
      // -- ĐÂY LÀ 4 DÒNG MỚI ĐỂ ĐỌC DỮ LIỆU BƯỚC 2 --
      kltnUrl      : r[16] || '', // Cột Q: Link KLTN SV nộp
      daoVanPct    : r[17] || '', // Cột R: % Đạo văn
      daoVanUrl    : r[18] || '', // Cột S: File check đạo văn
      nhanXet      : r[19] || ''  // Cột T: Nhận xét
    };

    // FIX: Ưu tiên step >= 1 TRƯỚC — SV đã nộp KLTN phải vào activeList
    // dù status trong sheet là gì (tránh bị hiện lại ở "chờ duyệt đề tài")
    if (step >= 1) {
      activeList.push(obj);
    } else if (obj.status === 'pending') {
      // Chưa nộp KLTN, đề tài chờ GV duyệt
      pendingTopic.push(obj);
    } else if (obj.status === 'approved') {
      // GV đã duyệt đề tài, SV chưa nộp KLTN → hiện trong bảng KLTN đang làm
      activeList.push(obj);
    }
  }
  
  return { pendingTopic, pendingOutline, activeList };
}
async function fetchHoiDongByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
  const email = gvEmail.toLowerCase().trim();
  return rows.filter(r =>
    (r[4]||'').toLowerCase().trim() === email ||
    (r[5]||'').toLowerCase().includes(email)  ||
    (r[6]||'').toLowerCase().includes(email)  ||
    (r[7]||'').toLowerCase().includes(email)  ||
    (r[8]||'').toLowerCase().includes(email)  || // Thêm check Thành viên 3 (Cột I)
    (r[9]||'').toLowerCase().includes(email)     // Thư ký bị đẩy sang Cột J (Index 9)
  ).map(r => ({
    studentEmail   : r[0] || '',
    maSo           : r[1] || '',
    studentName    : r[2] || '',
    gvPhanBienName : r[3] || '',
    gvPhanBienEmail: r[4] || '',
    truongHD       : r[5] || '',
    thanhVien1     : r[6] || '',
    thanhVien2     : r[7] || '',
    thanhVien3     : r[8] || '', // Thêm TV3
    thuKy          : r[9] || '', // Đổi index Thư ký thành 9
  }));
}

async function fetchGVNotifications(gvEmail) {
  try {
    const rows = await fetchSheetCSV(SHEET_NOTIF_TAB);
    const email = gvEmail.toLowerCase().trim();
    return rows
      .filter(r => (r[1]||'').toLowerCase().trim() === email)
      .slice(-10).reverse()
      .map(r => ({ time: r[0]||'', message: r[2]||'' }));
  } catch { return []; }
}

  );

    </div>
  );
}

function TabThongTinChung({toast, addGVNotification}) {
  const [pendingList,  setPendingList]  = React.useState([]);
  const [approvedList, setApprovedList] = React.useState([]);
  const [loading,      setLoading]      = React.useState(true);
  const [processingId, setProcessingId] = React.useState(null);
  const [rejectTarget, setRejectTarget] = React.useState(null);
  const [editTopicTarget, setEditTopicTarget] = React.useState(null); // Thêm state cho Chỉnh sửa

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      // Tải đồng thời dữ liệu BCTT và KLTN
      const [bcttData, kltnData] = await Promise.all([
        fetchDangKyByGV(SESSION.email),
        fetchKLTNByGV(SESSION.email)
      ]);
      
      const bcttPending = bcttData.pendingList.map(r => ({...r, type: 'bctt'}));
      // Gộp Đăng ký BCTT và Đăng ký Đề tài KLTN vào chung 1 mảng
      setPendingList([...bcttPending, ...kltnData.pendingTopic]);
      setApprovedList(bcttData.approvedList);
    } catch(e) {
      toast.show('Không tải được dữ liệu từ Sheet.', 'error');
    }
    setLoading(false);
  }

  async function handleApprove(req) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      // Phân nhánh API tùy theo KLTN hay BCTT
      if (req.type === 'kltn') {
        res = await apiPost({ action: 'approveKLTNTopic', studentEmail: req.studentEmail });
      } else {
        res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'approved' });
      }

      if (res.success) {
        toast.show(`✅ Đã duyệt đề tài của ${req.studentName}!`, 'success');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
        if (req.type === 'bctt') {
          setApprovedList(prev => [{ ...req, status: 'approved' }, ...prev]);
        }
      } else {
        toast.show(res.message || 'Duyệt thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setProcessingId(null);
  }

  async function handleReject(req, reason) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') {
        res = await apiPost({ action: 'rejectKLTNTopic', studentEmail: req.studentEmail, reason: reason });
      } else {
        res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'rejected', reason: reason });
      }

      if (res.success) {
        toast.show(`Đã từ chối đề tài của ${req.studentName}.`, 'warn');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
      } else {
        toast.show(res.message || 'Từ chối thất bại.', 'error');

    setProcessingId(null);
    setRejectTarget(null);

        studentEmail: req.studentEmail,

        setPendingList(prev => prev.map(r => r.studentEmail === req.studentEmail ? { ...r, topic: newTopic } : r));

                    className="w-full text-center bg-surface-container-lowest border-2 border-outline-variant/30 rounded-lg py-1.5 focus:border-primary focus:ring-0 outline-none font-bold" placeholder="0 - 1.5"/>

// ── TAB 2: SINH VIÊN HƯỚNG DẪN ───────────────────────────────────────────────
function TabSinhVienHuongDan({toast}) {
  const [search,   setSearch]   = React.useState('');
  const [students, setStudents] = React.useState([]);
  const [loading,  setLoading]  = React.useState(true);
  const [grades,   setGrades]   = React.useState({});
  const [saving,   setSaving]   = React.useState({});

  const [viewerFile, setViewerFile] = React.useState(null);

  const [kltnPending,  setKltnPending]  = React.useState([]);
  const [kltnInput, setKltnInput] = React.useState({});
  const [uploadingDaoVan, setUploadingDaoVan] = React.useState({});
  const [uploadingKLTN, setUploadingKLTN] = React.useState({}); // MỚI: State cho upload KLTN
  const [kltnActive,   setKltnActive]   = React.useState([]);
  const [kltnLoading,  setKltnLoading]  = React.useState(true);
  const [kltnProcessing, setKltnProcessing] = React.useState(null);
  const [rejectOutlineTarget, setRejectOutlineTarget] = React.useState(null);
  const [editOutlineTarget, setEditOutlineTarget] = React.useState(null);
  const [gradingKLTNTarget, setGradingKLTNTarget] = React.useState(null); 
  const [feedbackTarget, setFeedbackTarget] = React.useState(null); // MỚI: State cho Modal Chat

  async function handleEditOutlineTopic(sv, newTopic) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateTopic', type: 'kltn', studentEmail: sv.studentEmail, newTopic: newTopic });
      if (res.success) {
        toast.show(`Đã cập nhật tên đề tài thành công!`, 'success');
        setKltnPending(prev => prev.map(r => r.studentEmail === sv.studentEmail ? { ...r, topic: newTopic } : r));
      } else {
        toast.show(res.message || 'Cập nhật thất bại. Thử lại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setKltnProcessing(null);
    setEditOutlineTarget(null);
  }

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      setKltnLoading(true);
      try {
        const [{ approvedList }, { pendingTopic, activeList }] = await Promise.all([
          fetchDangKyByGV(SESSION.email),
          fetchKLTNByGV(SESSION.email),
        ]);
        setStudents(approvedList);
        const init = {};
        approvedList.forEach(sv => { init[sv.maSo] = sv.grade != null ? String(sv.grade) : ''; });
        setGrades(init);
        setKltnPending(pendingTopic); 
        setKltnActive(activeList);
      } catch(e) { toast.show('Không tải được danh sách sinh viên.', 'error'); }
      setLoading(false);
      setKltnLoading(false);
    })();
  }, []);

  async function handleSaveKLTNFromModal(totalGrade, nhanXetStr) {
    const sv = gradingKLTNTarget;
    setKltnProcessing(sv.studentEmail);
    try {
      const pct = kltnInput[sv.maSo]?.daoVanPct !== undefined ? kltnInput[sv.maSo].daoVanPct : sv.daoVanPct;
      let res = await apiPost({ action: 'saveKLTNGrade', studentEmail: sv.studentEmail, grade: totalGrade, nhanXet: nhanXetStr, daoVanPct: pct });
      if (!res.success && (res.message || '').toLowerCase().includes('unknown')) {
        res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'graded', note: nhanXetStr, grade: totalGrade });
      }
      if (res.success) {
        toast.show('Đã lưu điểm KLTN thành công!', 'success');
        setKltnActive(prev => prev.map(s => s.maSo === sv.maSo ? {...s, grade: parseFloat(totalGrade), nhanXet: nhanXetStr, status: 'graded'} : s ));
        setGradingKLTNTarget(null);
      } else { toast.show(res.message || 'Lưu điểm thất bại!', 'error'); }
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setKltnProcessing(null);
  }

  // MỚI: Hàm lưu nhận xét Chat
  async function handleSaveFeedback(text) {
    const sv = feedbackTarget;
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: text });
      if (res.success) {
        toast.show('Đã lưu nhận xét thành công!', 'success');
        setKltnActive(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXet: text} : s));
        setFeedbackTarget(null);
      } else { toast.show(res.message || 'Lỗi lưu nhận xét.', 'error'); }
    } catch(e) { toast.show('Lỗi kết nối mạng.', 'error'); }
    setKltnProcessing(null);
  }

  async function handleApproveOutline(sv) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'approved', step: 2 });
      if (res.success) {
        toast.show(`✅ Đã duyệt đề cương của ${sv.studentName}!`, 'success');
        setKltnPending(prev => prev.filter(r => r.studentEmail !== sv.studentEmail));
        setKltnActive(prev => [{ ...sv, step: 2, status: 'approved' }, ...prev]);
      } else { toast.show(res.message || 'Duyệt thất bại. Thử lại.', 'error'); }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setKltnProcessing(null);
  }

  async function handleRejectOutline(sv, reason) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'rejected', note: reason || '' });
      if (res.success) {
        toast.show(`Đã từ chối đề cương của ${sv.studentName}.`, 'warn');
        setKltnPending(prev => prev.filter(r => r.studentEmail !== sv.studentEmail));
      } else { toast.show(res.message || 'Từ chối thất bại. Thử lại.', 'error'); }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setKltnProcessing(null);
    setRejectOutlineTarget(null);
  }

  const filtered = students.filter(s => s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search));

  async function handleSaveGrade(maSo, studentEmail) {
    const g = grades[maSo];
    if (g === '' || g === undefined) { toast.show('Vui lòng nhập điểm!', 'warn'); return; }
    const num = parseFloat(g);
    if (isNaN(num) || num < 0 || num > 10) { toast.show('Điểm phải từ 0 đến 10!', 'error'); return; }
    setSaving(prev => ({ ...prev, [maSo]: true }));
    try {
      const res = await apiPost({ action:'updateStatus', studentEmail, status:'graded', grade: num });
      if (res.success) {
        toast.show(`Đã lưu điểm ${num.toFixed(1)} cho MSSV ${maSo}`, 'success');
        setStudents(prev => prev.map(sv => sv.maSo === maSo ? { ...sv, grade: num, status: 'graded' } : sv));
      } else { toast.show(res.message || 'Lưu điểm thất bại!', 'error'); }
    } catch(e) { toast.show('Lưu điểm thất bại!', 'error'); }
    setSaving(prev => ({ ...prev, [maSo]: false }));
  }

  const stats = [
    { label:'Tổng SV', value: students.length, icon:'groups' },
    { label:'Đã có điểm', value: students.filter(s => s.grade != null).length, icon:'check_circle' },
    { label:'Chưa có điểm', value: students.filter(s => s.grade == null).length, icon:'pending_actions' },
  ];

  if (loading) return (
    <div className="flex flex-col items-center justify-center py-32 gap-4 text-on-surface-variant">
      <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>
      <p className="text-sm font-medium">Đang tải danh sách sinh viên...</p>
    </div>
  );

  return (
    <div className="space-y-6 anim-fade">

      {rejectOutlineTarget && <RejectOutlineModal request={rejectOutlineTarget} onConfirm={handleRejectOutline} onClose={() => setRejectOutlineTarget(null)} />}
      {editOutlineTarget && <EditOutlineModal request={editOutlineTarget} onConfirm={handleEditOutlineTopic} onClose={() => setEditOutlineTarget(null)} />}
      {viewerFile && <FileViewerModal url={viewerFile.url} studentName={viewerFile.studentName} fileName={viewerFile.fileName} isPlagiarism={viewerFile.isPlagiarism} isXNTT={viewerFile.isXNTT} onClose={() => setViewerFile(null)} />}
      
      {gradingKLTNTarget && <KLTNGradingModal student={gradingKLTNTarget} processing={kltnProcessing === gradingKLTNTarget.studentEmail} onSave={handleSaveKLTNFromModal} onClose={() => setGradingKLTNTarget(null)} />}
      
      {/* MỚI: Gọi Feedback Modal */}
      {feedbackTarget && (
        <FeedbackModal
          student={feedbackTarget}
          processing={kltnProcessing === feedbackTarget.studentEmail}
          onSave={handleSaveFeedback}
          onClose={() => setFeedbackTarget(null)}
        />
      )}

      <div className="mb-6 pb-4 border-b border-border-color flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-2xl font-bold text-primary uppercase">Sinh viên hướng dẫn</h2>
          <p className="text-text-muted mt-1 text-sm">Quản lý BCTT và KLTN của sinh viên bạn đang hướng dẫn</p>
        </div>
        <div className="relative w-full md:w-80">
          <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
          <input value={search} onChange={e => setSearch(e.target.value)}
            className="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-surface-tint focus:bg-surface-container-lowest transition-all text-sm outline-none"
            placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-4">
        {stats.map((s, i) => (
          <div key={i} className="bg-surface-container-lowest p-5 bg-white border border-border-color rounded shadow-card shadow-sm flex items-center justify-between">
            <div>
              <p className="text-on-surface-variant text-sm font-medium">{s.label}</p>
              <h3 className="text-2xl font-bold mt-1">{s.value}</h3>
            </div>
            <div className="bg-primary-fixed p-3 rounded">
              <span className="material-symbols-outlined text-primary">{s.icon}</span>
            </div>
          </div>
        ))}
      </div>

      {kltnPending.length > 0 && (
        <section>
          <h3 className="text-lg font-bold text-on-surface flex items-center gap-2 mb-4">
            <span className="material-symbols-outlined text-secondary">pending_actions</span>
            KLTN chờ duyệt đề tài
            <span className="bg-error text-white text-[10px] font-black px-2 py-0.5 rounded">{kltnPending.length}</span>
          </h3>
          <div className="space-y-4">
            {kltnPending.map((sv, i) => (
              <div key={i} className="bg-surface-container-lowest p-5 bg-white border border-border-color rounded shadow-card shadow-sm border-l-4 hover:shadow-md transition-shadow" style={{borderColor:'#00593c'}}>
                <div className="flex justify-between items-start mb-3">
                  <div className="flex items-center gap-3 flex-1 min-w-0 pr-3">
                    <Av name={sv.studentName} cls="w-10 h-10 flex-shrink-0"/>
                    <div className="min-w-0">
                      <h4 className="font-bold text-on-surface text-sm leading-snug line-clamp-1">{sv.topic}</h4>
                      <p className="text-xs text-on-surface-variant mt-0.5">
                        <span className="font-semibold">{sv.studentName}</span> • MSSV: {sv.maSo}
                      </p>
                    </div>
                  </div>
                  <span className="text-[10px] px-2.5 py-1 rounded font-bold bg-tertiary-fixed text-on-tertiary-fixed flex-shrink-0">KLTN</span>
                </div>
                <div className="grid grid-cols-2 gap-x-4 gap-y-2 p-3 bg-surface-container-low rounded mb-4 text-xs">
                  <div>
                    <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">Ngành</p>
                    <p className="font-semibold text-on-surface mt-0.5">{sv.nganh || '--'}</p>
                  </div>
                  <div>
                    <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">Học kỳ</p>
                    <p className="font-semibold text-on-surface mt-0.5">{sv.term || '--'}</p>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={async () => {
                      setKltnProcessing(sv.studentEmail);
                      try {
                        const res = await apiPost({ action: 'approveKLTNTopic', studentEmail: sv.studentEmail });
                        if (res.success) {
                          toast.show('Đã duyệt đề tài của ' + sv.studentName + '!', 'success');
                          setKltnPending(prev => prev.filter(r => r.studentEmail !== sv.studentEmail));
                          setKltnActive(prev => [{ ...sv, status: 'approved', step: 0 }, ...prev]);
                        } else { toast.show(res.message || 'Duyệt thất bại.', 'error'); }
                      } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
                      setKltnProcessing(null);
                    }}
                    disabled={kltnProcessing === sv.studentEmail}
                    className="flex-1 py-2.5 rounded text-white text-xs font-bold hover:opacity-90 transition-opacity disabled:opacity-50 flex items-center justify-center gap-1.5 shadow-sm"
                    style={{background:'#00593c'}}>
                    {kltnProcessing === sv.studentEmail ? <span className="material-symbols-outlined anim-spin text-sm">refresh</span> : <span className="material-symbols-outlined text-sm">check_circle</span>}

        </section>

                <tr className="bg-surface-container-low text-on-surface-variant text-xs font-semibold uppercase tracking-wider">

                      <div className="flex items-center gap-3">

// ── TAB 3: SINH VIÊN PHẢN BIỆN ───────────────────────────────────────────────
function TabPhanBien({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading,  setLoading]  = React.useState(true);
  const [search,   setSearch]   = React.useState('');
  const [pbGrades, setPbGrades] = React.useState({});
  const [saving,   setSaving]   = React.useState({});

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const rows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
        const email = SESSION.email.toLowerCase().trim();
        const pbList = rows
          .filter(r => (r[4]||'').toLowerCase().trim() === email)
        .map(r => ({
            studentEmail : r[0] || '',
            maSo         : r[1] || '',
            studentName  : r[2] || '',
            gvPBName     : r[3] || '',
            truongHD     : r[5] || '',
            thanhVien1   : r[6] || '',
            thanhVien2   : r[7] || '',
            thanhVien3   : r[8] || '', // Thêm dòng này
            thuKy        : r[9] || '', // Đổi 8 thành 9
          }));
        setStudents(pbList);
        const init = {};
        pbList.forEach(sv => { init[sv.maSo] = ''; });
        setPbGrades(init);
      } catch(e) { toast.show('Không tải được dữ liệu hội đồng.', 'error'); }
      setLoading(false);
    })();
  }, []);

  const filtered = students.filter(s =>
    s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search)
  );

  async function handleSavePbGrade(maSo, studentEmail) {
    const g = pbGrades[maSo];
    if (!g) { toast.show('Vui lòng nhập điểm!', 'warn'); return; }
    const num = parseFloat(g);
    if (isNaN(num) || num < 0 || num > 10) { toast.show('Điểm phải từ 0 đến 10!', 'error'); return; }
    setSaving(prev => ({ ...prev, [maSo]: true }));
    try {
      const res = await apiPost({ action:'saveGrade', type:'pb', studentEmail, grade: num });
      if (res.success) {
        toast.show(`Đã lưu điểm phản biện ${num.toFixed(1)} cho MSSV ${maSo}`, 'success');
      } else {
        toast.show(res.message || 'Lưu điểm thất bại!', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setSaving(prev => ({ ...prev, [maSo]: false }));
  }

  if (loading) return (
    <div className="flex flex-col items-center justify-center py-32 gap-4 text-on-surface-variant">
      <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>
      <p className="text-sm font-medium">Đang tải từ sheet HoiDongKLTN...</p>
    </div>
  );

  return (
    <div className="space-y-6 anim-fade">
      <div className="mb-6 pb-4 border-b border-border-color flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-2xl font-bold text-primary uppercase">Danh sách Phản biện</h2>
          <p className="text-text-muted mt-1 text-sm">Sinh viên bạn được phân công phản biện (từ sheet HoiDongKLTN)</p>
        </div>
        <div className="relative w-full md:w-80">
          <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
          <input value={search} onChange={e => setSearch(e.target.value)}
            className="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary/20 text-sm outline-none"
            placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>

      {students.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-32 gap-5 bg-white border border-border-color rounded shadow-card">
          <span className="material-symbols-outlined text-7xl opacity-10">rate_review</span>
          <p className="text-base font-bold text-on-surface-variant">Chưa có sinh viên phản biện nào</p>
          <p className="text-sm text-on-surface-variant/60 text-center max-w-sm">
            Khi admin điền email GV vào cột "Email GV phản biện" trong sheet HoiDongKLTN, danh sách sẽ tự hiện ở đây.
          </p>
        </div>
      ) : (
        <div className="bg-white border border-border-color rounded shadow-card overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse" style={{minWidth:'800px'}}>
              <thead>
                <tr className="bg-surface-container-low">
                  {['Sinh viên','Thành phần hội đồng','Điểm phản biện','Thao tác'].map((h, i) => (
                    <th key={i} className={`px-6 py-4 text-[11px] font-black uppercase tracking-widest text-on-surface-variant ${i===2?'text-center':''}`}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-outline-variant/10">
                {filtered.length === 0 ? (
                  <tr><td colSpan="4" className="px-6 py-12 text-center text-sm text-on-surface-variant">Không tìm thấy</td></tr>
                ) : filtered.map(sv => (
                  <tr key={sv.maSo} className="hover:bg-surface-container-low/30 transition-colors">
                    <td className="px-6 py-5">
                      <div className="flex items-center gap-3">
                        <Av name={sv.studentName} cls="w-10 h-10 flex-shrink-0"/>
                        <div>
                          <p className="font-bold text-sm text-on-surface">{sv.studentName}</p>
                          <p className="text-xs text-on-surface-variant">{sv.maSo} • {sv.studentEmail}</p>
                        </div>
                      </div>
                    </td>
                    <td className="px-6 py-5">
                      <div className="space-y-1 text-xs">
                        {sv.truongHD    && <p><span className="font-bold text-primary">Chủ tịch:</span> {sv.truongHD}</p>}
                        {sv.thanhVien1  && <p><span className="text-on-surface-variant">TV1:</span> {sv.thanhVien1}</p>}
                        {sv.thanhVien2  && <p><span className="text-on-surface-variant">TV2:</span> {sv.thanhVien2}</p>}
                        {sv.thanhVien3  && <p><span className="text-on-surface-variant">TV3:</span> {sv.thanhVien3}</p>}
                        {sv.thuKy       && <p><span className="text-on-surface-variant">Thư ký:</span> {sv.thuKy}</p>}
                      </div>
                    </td>
                    <td className="px-4 py-5">
                      <div className="flex justify-center items-center gap-2">
                        <input type="number" min="0" max="10" step="0.1" placeholder="0.0"
                          value={pbGrades[sv.maSo] || ''}
                          onChange={e => setPbGrades(prev => ({ ...prev, [sv.maSo]: e.target.value }))}
                          className="w-16 h-10 text-center bg-surface-container border-none rounded-lg font-bold text-primary focus:ring-2 focus:ring-primary/40 outline-none"/>
                        <button onClick={() => handleSavePbGrade(sv.maSo, sv.studentEmail)}
                          disabled={!!saving[sv.maSo]}
                          className="p-1.5 bg-primary text-white rounded-lg hover:opacity-90 disabled:opacity-50 transition-opacity">
                          {saving[sv.maSo]
                            ? <span className="material-symbols-outlined text-[16px] anim-spin">refresh</span>
                            : <span className="material-symbols-outlined text-[16px]">save</span>}
                        </button>
                      </div>
                    </td>
                    <td className="px-6 py-5">
                      <button onClick={() => toast.show('Tính năng đang phát triển!', 'warn')}
                        className="p-2 text-on-surface-variant hover:text-primary hover:bg-primary/10 rounded-lg transition-all">
                        <span className="material-symbols-outlined">edit_square</span>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-6 py-3 bg-surface-container-low border-t border-outline-variant/10">
            <p className="text-xs text-on-surface-variant">Hiển thị {filtered.length} / {students.length} sinh viên phản biện</p>
          </div>
        </div>
      )}
    </div>
  );
}

function TabHoiDong({toast}) {

  const [hdGrades, setHdGrades] = React.useState({});
  const [saving,   setSaving]   = React.useState({});

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const list = await fetchHoiDongByGV(SESSION.email);
        setHdList(list);
        const init = {};
        list.forEach(sv => { init[sv.maSo] = ''; });
        setHdGrades(init);
      } catch(e) { toast.show('Không tải được dữ liệu hội đồng.', 'error'); }
      setLoading(false);
    })();
  }, []);

  const filtered = hdList.filter(s =>
    s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search)
  );

  function getRoleLabel(sv) {
    const email = SESSION.email.toLowerCase().trim();
    const name  = SESSION.name.toLowerCase().trim();
    if ((sv.gvPhanBienEmail||'').toLowerCase().trim() === email) return { label:'Phản biện', color:'bg-secondary-container text-on-secondary-container' };
    if ((sv.truongHD||'').toLowerCase().includes(name))         return { label:'Trưởng HĐ', color:'bg-primary text-white' };
    if ((sv.thuKy||'').toLowerCase().includes(name))            return { label:'Thư ký',    color:'bg-tertiary-fixed text-on-tertiary-fixed' };
    return { label:'Thành viên', color:'bg-surface-container-highest text-on-surface-variant' };
  }

  async function handleSaveHdGrade(maSo) {
    const g = hdGrades[maSo];
    if (!g) { toast.show('Vui lòng nhập điểm!', 'warn'); return; }
    const num = parseFloat(g);
    if (isNaN(num) || num < 0 || num > 10) { toast.show('Điểm phải từ 0 đến 10!', 'error'); return; }
    const sv = hdList.find(s => s.maSo === maSo);
    if (!sv) return;
    setSaving(prev => ({ ...prev, [maSo]: true }));
    try {
      const res = await apiPost({ action:'saveGrade', type:'hd', studentEmail: sv.studentEmail, grade: num });
      if (res.success) {
        toast.show(`Đã lưu điểm hội đồng ${num.toFixed(1)} cho MSSV ${maSo}`, 'success');
      } else {
        toast.show(res.message || 'Lưu điểm thất bại!', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setSaving(prev => ({ ...prev, [maSo]: false }));
  }

  if (loading) return (
    <div className="flex flex-col items-center justify-center py-32 gap-4 text-on-surface-variant">
      <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>
      <p className="text-sm font-medium">Đang tải từ sheet HoiDongKLTN...</p>
    </div>
  );

  return (
    <div className="space-y-6 anim-fade">
      <div className="mb-6 pb-4 border-b border-border-color flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-2xl font-bold text-primary uppercase">Hội đồng KLTN</h2>
          <p className="text-text-muted mt-1 text-sm">Danh sách sinh viên bạn tham gia hội đồng (đọc từ sheet HoiDongKLTN)</p>
        </div>
        <div className="relative w-full md:w-80">
          <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
          <input value={search} onChange={e => setSearch(e.target.value)}
            className="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded focus:ring-2 focus:ring-primary/20 text-sm outline-none"
            placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>

      {hdList.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-32 gap-5 bg-white border border-border-color rounded shadow-card">
          <span className="material-symbols-outlined text-7xl opacity-10">gavel</span>
          <p className="text-base font-bold text-on-surface-variant">Chưa có dữ liệu hội đồng</p>
          <p className="text-sm text-on-surface-variant/60 text-center max-w-sm">
            Admin điền thông tin vào sheet HoiDongKLTN (cột Trưởng HĐ / TV / Thư ký) là sẽ hiện ở đây.
          </p>
        </div>
      ) : (
        <div className="bg-white border border-border-color rounded shadow-card overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full border-collapse" style={{minWidth:'900px'}}>
              <thead>
                <tr className="bg-surface-container-low">
                  {['Sinh viên','Vai trò của bạn','Thành phần hội đồng','Điểm HĐ'].map((h, i) => (
                    <th key={i} className={`px-8 py-4 text-left text-xs font-bold text-on-surface-variant/60 uppercase tracking-wider ${i===3?'text-center':''}`}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-outline-variant/15">
                {filtered.map(sv => {
                  const role = getRoleLabel(sv);
                  return (
                    <tr key={sv.maSo} className="hover:bg-surface-container-low/50 transition-colors">
                      <td className="px-8 py-5">
                        <div className="flex items-center gap-3">
                          <Av name={sv.studentName} cls="w-10 h-10 flex-shrink-0"/>
                          <div>

                            <p className="text-xs text-on-surface-variant">{sv.maSo} • {sv.studentEmail}</p>
                          </div>
                        </div>
                      </td>
                      <td className="px-8 py-5">
                        <span className={`px-3 py-1.5 rounded text-xs font-bold ${role.color}`}>{role.label}</span>
                      </td>
                      <td className="px-6 py-5">
                        <div className="space-y-1 text-xs">
                          {sv.truongHD   && <p><span className="font-bold text-primary">Chủ tịch:</span> {sv.truongHD}</p>}
                          {sv.thanhVien1 && <p><span className="text-on-surface-variant">TV1:</span> {sv.thanhVien1}</p>}
                          {sv.thanhVien2 && <p><span className="text-on-surface-variant">TV2:</span> {sv.thanhVien2}</p>}
                          {sv.thanhVien3 && <p><span className="text-on-surface-variant">TV3:</span> {sv.thanhVien3}</p>}
                          {sv.thuKy      && <p><span className="text-on-surface-variant">Thư ký:</span> {sv.thuKy}</p>}

                        </div>
                      </td>
                      <td className="px-6 py-5">
                        <div className="flex flex-col items-center gap-1">
                          <div className="flex items-center gap-2">

          <div className="px-8 py-4 bg-surface-container-low border-t border-outline-variant/10">
            <p className="text-xs text-on-surface-variant">Hiển thị {filtered.length} / {hdList.length} sinh viên trong hội đồng</p>

    </div>
  );
}

function TabQuanLySlot({toast}) {
  const [data, setData] = React.useState({ bctt: [], kltn: [] });
  const [loading, setLoading] = React.useState(true);
  const [activeTab, setActiveTab] = React.useState('kltn'); 
  const [saving, setSaving] = React.useState({});

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const res = await apiPost({ action: 'getGVSlots' });
      if (res.success) setData(res.data);
      else toast.show('Lỗi tải danh sách slot', 'error');
    } catch(e) { toast.show('Lỗi mạng!', 'error'); }
    setLoading(false);
  }

  async function handleSaveQuota(gvEmail, newQuota) {
    setSaving(prev => ({...prev, [gvEmail]: true}));
    try {
      const res = await apiPost({ action: 'updateGVSlot', type: activeTab, email: gvEmail, quota: newQuota });
      if (res.success) {
        toast.show('Cập nhật chỉ tiêu thành công!', 'success');
        setData(prev => ({
          ...prev, 
          [activeTab]: prev[activeTab].map(gv => gv.email === gvEmail ? {...gv, quota: newQuota, isOpen: newQuota > 0} : gv)
        }));
      } else toast.show(res.message, 'error');
    } catch(e) { toast.show('Lỗi lưu slot', 'error'); }
    setSaving(prev => ({...prev, [gvEmail]: false}));
  }

  return (
    <div className="anim-fade">
      {/* Tiêu đề trang */}
      <div className="mb-6 pb-4 border-b border-border-color flex justify-between items-end">

            </h3>
          </div>
          
          <table className="academic-table">
            <thead>
              <tr>
                <th style={{width:'50px'}}>STT</th>

                <th style={{textAlign:'center'}}>Đã nhận</th>
                <th style={{textAlign:'center', width:'150px'}}>Chỉ tiêu tối đa</th>
                <th style={{textAlign:'center'}}>Trạng thái</th>
                <th style={{textAlign:'center', width:'120px'}}>Thao tác</th>

                  <td><span className="font-semibold text-text-main">{gv.name}</span></td>

        </div>
      )}

  );
}
// ── TAB 5: PHÂN CÔNG PHẢN BIỆN (TBM) ──────────────────────────────────────────
function TabPhanCongPhanBien({toast}) {
  const [students, setStudents] = React.useState([]);
  const [initialStudents, setInitialStudents] = React.useState([]); // Dùng để so sánh xem dòng nào có thay đổi
  const [teachers, setTeachers] = React.useState([]);
  const [loading, setLoading]   = React.useState(true);
  const [isBatchSaving, setIsBatchSaving] = React.useState(false);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      // Tải DS Sinh viên KLTN đã duyệt
      const kltnRows = await fetchSheetCSV(SHEET_KLTN_TAB);
      const kltnList = kltnRows
        .filter(r => r[11] === 'approved' || parseInt(r[14]) >= 1)
        .map(r => ({
        studentEmail: r[1], studentName: r[2], maSo: r[3], topic: r[5], gvhd: r[6], term: r[9] || 'Kỳ 2 - 24/25'
      }));

      // Tải DS phân công hiện tại từ Hội Đồng
      let hdMap = {};
      try {
        const hdRows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
        hdRows.forEach(r => { hdMap[r[0]] = { gvPhanBienEmail: r[4], gvPhanBienName: r[3] }; });
      } catch(e) {}

      // Gộp data
      const formattedData = kltnList.map(sv => ({
        ...sv,
        pbEmail: hdMap[sv.studentEmail]?.gvPhanBienEmail || '',
        pbName: hdMap[sv.studentEmail]?.gvPhanBienName || ''
      }));

      setStudents(formattedData);
      setInitialStudents(JSON.parse(JSON.stringify(formattedData))); // Lưu bản sao để so sánh

// Tải DS Giảng viên từ sheet "GV KLTN" (Chính xác & an toàn hơn)
      try {
        const gvRows = await fetchSheetCSV('GV KLTN');
        // Lấy cột B (index 1) là Tên, cột D (index 3) là Email
        const gvList = gvRows
          .filter(r => r[1] && r[3]) 
          .map(r => ({
            name: (r[1] || '').trim(),
            email: (r[3] || '').toLowerCase().trim()
          }));
        
        // Lọc bỏ các dòng trùng lặp email (nếu có)
        const uniqueTeachers = Array.from(new Map(gvList.map(item => [item.email, item])).values());
        setTeachers(uniqueTeachers);
      } catch(err) {
        // Backup: Nếu không có sheet GV KLTN, lấy từ sheet Users với bộ lọc linh hoạt hơn
        const userRows = await fetchSheetCSV(SHEET_USERS_TAB);
        const gvList = userRows
          .filter(r => {
            const role = (r[2] || '').toLowerCase().trim();
            return role.includes('giangvien') || role.includes('truongbomon');
          })
          .map(r => ({ email: (r[0] || '').trim(), name: (r[3] || '').trim() }));
        setTeachers(gvList);
      }
    } catch(e) { toast.show('Lỗi tải dữ liệu!', 'error'); }
    setLoading(false);
  }

  // Hàm Lưu Hàng Loạt (Chỉ lưu những sinh viên có thay đổi GV Phản biện)
  async function handleBatchSave() {
    const changes = students.filter(s => {
      const init = initialStudents.find(i => i.maSo === s.maSo);
      return init && init.pbEmail !== s.pbEmail && s.pbEmail !== '';
    });

    if (changes.length === 0) {
      toast.show('Không có sự thay đổi nào cần lưu!', 'warn');
      return;
    }

    setIsBatchSaving(true);
    let successCount = 0;
    let errorCount = 0;

    // Gửi API lần lượt để không làm nghẽn Google Apps Script
    for (const sv of changes) {
      try {
        const pbName = teachers.find(t => t.email === sv.pbEmail)?.name || '';
        const res = await apiPost({
          action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName,
          gvPhanBienEmail: sv.pbEmail, gvPhanBienName: pbName
        });
        if (res.success) successCount++;
        else errorCount++;
      } catch (e) { errorCount++; }
    }

    setIsBatchSaving(false);

    if (successCount > 0) {
      toast.show(`✅ Đã phân công thành công cho ${successCount} sinh viên!`, 'success');
      setInitialStudents(JSON.parse(JSON.stringify(students))); // Cập nhật lại mốc so sánh
    }
    if (errorCount > 0) {
      toast.show(`❌ Có ${errorCount} sinh viên phân công thất bại.`, 'error');
    }
  }

  // Tính toán số liệu thống kê
  const totalStudents = students.length;
  const assignedStudents = students.filter(s => s.pbEmail).length;
  const pendingStudents = totalStudents - assignedStudents;
  const progressPercent = totalStudents > 0 ? Math.round((assignedStudents / totalStudents) * 100) : 0;
  const dashOffset = 220 - (220 * progressPercent) / 100;

  return (
    <div className="space-y-6 anim-fade max-w-6xl mx-auto">
      
      {/* Header Section */}
      <div className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h1 className="text-3xl font-extrabold text-on-surface tracking-tight mb-2">Phân công Phản biện</h1>
          <p className="text-on-surface-variant text-sm flex items-center gap-2">
            <span className="material-symbols-outlined text-sm">location_on</span>
            Hệ thống phân phối giảng viên đánh giá độc lập
          </p>
        </div>
        <div className="flex flex-wrap gap-3">
          <div className="bg-surface-container-lowest px-4 py-2 rounded shadow-sm flex items-center gap-3 border border-outline-variant/15">
            <span className="material-symbols-outlined text-secondary">filter_list</span>
            <select className="bg-transparent text-sm font-medium focus:outline-none border-none p-0 pr-8">
              <option>Tất cả các đợt</option>
              <option>Học kỳ 1 - 2024-2025</option>
              <option>Học kỳ 2 - 2024-2025</option>
            </select>
          </div>
          
          {/* Nút Xác nhận phân công dùng để lưu hàng loạt */}
          <button 
            onClick={handleBatchSave} 
            disabled={isBatchSaving}
            className="bg-gradient-to-br from-primary to-primary-container text-white px-6 py-2.5 rounded font-bold text-sm shadow-lg hover:shadow-primary/20 transition-all active:scale-95 flex items-center gap-2 disabled:opacity-50">
            {isBatchSaving ? (
              <span className="material-symbols-outlined text-[18px] anim-spin">refresh</span>
            ) : (
              <span className="material-symbols-outlined text-[18px]">task_alt</span>
            )}
            {isBatchSaving ? 'Đang lưu...' : 'Xác nhận phân công'}
          </button>
        </div>
      </div>

      {loading ? <Spinner text="Đang tải dữ liệu sinh viên và giảng viên..."/> : (
        <>
          {/* Stats Overview - Trải ngang toàn màn hình (Đã xóa cột Deadline) */}
          <div className="mb-8 bg-surface-container-lowest p-6 md:px-12 rounded-3xl shadow-sm border border-outline-variant/10 flex items-center justify-between">
            <div className="flex gap-6 md:gap-16 overflow-x-auto w-full justify-start items-center">
              <div>
                <p className="text-on-surface-variant text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">Tổng sinh viên</p>
                <p className="text-3xl md:text-4xl font-black text-primary">{totalStudents}</p>
              </div>
              <div className="w-px h-16 bg-surface-container hidden sm:block"></div>
              <div>
                <p className="text-on-surface-variant text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">Đã phân công</p>
                <p className="text-3xl md:text-4xl font-black text-tertiary-fixed-dim">{assignedStudents}</p>
              </div>
              <div className="w-px h-16 bg-surface-container hidden sm:block"></div>
              <div>
                <p className="text-on-surface-variant text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">Chờ xử lý</p>
                <p className="text-3xl md:text-4xl font-black text-secondary">{pendingStudents}</p>
              </div>
            </div>
            
            <div className="hidden lg:flex items-center gap-5 flex-shrink-0 ml-8 pl-8 border-l border-outline-variant/10">
              <div className="text-right">
                <p className="text-sm font-bold text-on-surface">Tiến độ đợt này</p>
                <p className="text-xs text-on-surface-variant mt-0.5">Tự động cập nhật</p>
              </div>
              <div className="relative h-20 w-20">
                <svg className="h-20 w-20 -rotate-90">
                  <circle cx="40" cy="40" fill="transparent" r="35" stroke="#ededf6" strokeWidth="8"></circle>
                  <circle cx="40" cy="40" fill="transparent" r="35" stroke="#4edea3" strokeDasharray="220" strokeDashoffset={dashOffset} strokeLinecap="round" strokeWidth="8" style={{transition: 'stroke-dashoffset 1s ease-in-out'}}></circle>
                </svg>
                <div className="absolute inset-0 flex items-center justify-center text-sm font-black text-primary">{progressPercent}%</div>
              </div>
            </div>
          </div>

          {/* Assignment Table Area - Giao diện sạch sẽ không có nút lưu rườm rà */}
          <div className="bg-white border border-border-color rounded shadow-card border border-outline-variant/10 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="academic-table" style={{minWidth:'900px'}}>
                <thead>
                  <tr className="bg-surface-container-low border-b border-outline-variant/10">
                    <th className="px-6 py-5 text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">Sinh viên</th>
                    <th className="px-6 py-5 text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">Mã số</th>
                    <th className="px-6 py-5 text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">Tên đề tài</th>
                    <th className="px-6 py-5 text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">Đợt</th>
                    <th className="px-6 py-5 text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">GV Hướng dẫn</th>
                    <th className="px-6 py-5 text-[11px] font-bold text-on-surface-variant uppercase tracking-wider min-w-[280px]">Giảng viên Phản biện</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-surface-container">
                  {students.length === 0 ? (

// ── TAB 6: PHÂN CÔNG HỘI ĐỒNG (TBM) ──────────────────────────────────────────
function TabPhanCongHoiDong({toast}) {
  const [students, setStudents] = React.useState([]);
  const [initialStudents, setInitialStudents] = React.useState([]);
  const [teachers, setTeachers] = React.useState([]);
  const [loading, setLoading]   = React.useState(true);
  const [saving, setSaving]     = React.useState({});
  const [isBatchSaving, setIsBatchSaving] = React.useState(false);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const kltnRows = await fetchSheetCSV(SHEET_KLTN_TAB);
      const kltnList = kltnRows.filter(r => r[11] === 'approved' || r[11] === 'graded').map(r => ({
        studentEmail: r[1], studentName: r[2], maSo: r[3], topic: r[5], gvhd: r[6],
        grade: r[12] !== '' ? parseFloat(r[12]) : null
      }));

      let hdMap = {};
      try {
        const hdRows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
        // THÊM THÀNH VIÊN 3 TỪ CỘT I (INDEX 8) VÀ DỊCH THƯ KÝ SANG CỘT J (INDEX 9)
        hdRows.forEach(r => { hdMap[r[0]] = { truongHD: r[5], thanhVien1: r[6], thanhVien2: r[7], thanhVien3: r[8], thuKy: r[9] }; });
      } catch(e) {}

      const formattedData = kltnList.map(sv => ({
        ...sv,
        truongHD: hdMap[sv.studentEmail]?.truongHD || '',
        thanhVien1: hdMap[sv.studentEmail]?.thanhVien1 || '',
        thanhVien2: hdMap[sv.studentEmail]?.thanhVien2 || '',
        thanhVien3: hdMap[sv.studentEmail]?.thanhVien3 || '', // THÊM DỮ LIỆU THÀNH VIÊN 3
        thuKy: hdMap[sv.studentEmail]?.thuKy || ''
      }));

      setStudents(formattedData);
      setInitialStudents(JSON.parse(JSON.stringify(formattedData)));

      // Fetch Danh sách GV an toàn từ GV KLTN
      try {
        const gvRows = await fetchSheetCSV('GV KLTN');
        const gvList = gvRows.filter(r => r[1] && r[3]).map(r => ({
          name: (r[1] || '').trim(), email: (r[3] || '').toLowerCase().trim()
        }));
        const uniqueTeachers = Array.from(new Map(gvList.map(item => [item.email, item])).values());
        setTeachers(uniqueTeachers);
      } catch(err) {
        const userRows = await fetchSheetCSV(SHEET_USERS_TAB);
        const gvList = userRows.filter(r => {
          const role = (r[2] || '').toLowerCase().trim();
          return role.includes('giangvien') || role.includes('truongbomon');
        }).map(r => ({ email: (r[0] || '').trim(), name: (r[3] || '').trim() }));
        setTeachers(gvList);
      }

    } catch(e) { toast.show('Lỗi tải dữ liệu!', 'error'); }
    setLoading(false);
  }

  // Lưu 1 dòng
  async function handleSingleSave(sv) {
    setSaving(prev => ({...prev, [sv.maSo]: true}));
    try {
      const res = await apiPost({
        action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName,
        truongHD: sv.truongHD, thanhVien1: sv.thanhVien1, thanhVien2: sv.thanhVien2, thanhVien3: sv.thanhVien3, thuKy: sv.thuKy // UPDATE PAYLOAD
      });
      if(res.success) {
        toast.show('Đã cập nhật Hội đồng!', 'success');
        setInitialStudents(prev => prev.map(i => i.maSo === sv.maSo ? {...sv} : i));
      }
      else toast.show('Cập nhật thất bại', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setSaving(prev => ({...prev, [sv.maSo]: false}));
  }

  // Lưu hàng loạt
  async function handleBatchSave() {
    const changes = students.filter(s => {
      const init = initialStudents.find(i => i.maSo === s.maSo);
      // KIỂM TRA THAY ĐỔI CẢ THÀNH VIÊN 3
      return init && (init.truongHD !== s.truongHD || init.thuKy !== s.thuKy || init.thanhVien1 !== s.thanhVien1 || init.thanhVien2 !== s.thanhVien2 || init.thanhVien3 !== s.thanhVien3);
    });

    if (changes.length === 0) {
      toast.show('Không có sự thay đổi nào cần lưu!', 'warn');
      return;
    }

    setIsBatchSaving(true);
    let successCount = 0;
    for (const sv of changes) {
      try {
        const res = await apiPost({
          action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName,
          truongHD: sv.truongHD, thanhVien1: sv.thanhVien1, thanhVien2: sv.thanhVien2, thanhVien3: sv.thanhVien3, thuKy: sv.thuKy
        });
        if (res.success) successCount++;
      } catch (e) {}
    }
    setIsBatchSaving(false);

    if (successCount > 0) {
      toast.show(`✅ Đã lưu Hội đồng cho ${successCount} sinh viên!`, 'success');
      setInitialStudents(JSON.parse(JSON.stringify(students)));
    } else {
      toast.show('Lưu thất bại, vui lòng thử lại!', 'error');
    }
  }

  const updateField = (maSo, field, val) => {
    setStudents(prev => prev.map(s => s.maSo === maSo ? {...s, [field]: val} : s));
  };

  // Tính toán khối lượng hội đồng của từng giảng viên để hiển thị Card
  const getTeacherWorkload = () => {
    const workload = {};
    teachers.forEach(t => workload[t.name] = { count: 0, roles: { truongHD: 0, thuKy: 0, tv: 0 } });
    
    students.forEach(sv => {
      if (sv.truongHD && workload[sv.truongHD]) { workload[sv.truongHD].count++; workload[sv.truongHD].roles.truongHD++; }
      if (sv.thuKy && workload[sv.thuKy]) { workload[sv.thuKy].count++; workload[sv.thuKy].roles.thuKy++; }
      if (sv.thanhVien1 && workload[sv.thanhVien1]) { workload[sv.thanhVien1].count++; workload[sv.thanhVien1].roles.tv++; }
      if (sv.thanhVien2 && workload[sv.thanhVien2]) { workload[sv.thanhVien2].count++; workload[sv.thanhVien2].roles.tv++; }
      if (sv.thanhVien3 && workload[sv.thanhVien3]) { workload[sv.thanhVien3].count++; workload[sv.thanhVien3].roles.tv++; } // THÊM UV 3
    });

    return Object.entries(workload)
      .filter(([_, data]) => data.count > 0)
      .sort((a, b) => b[1].count - a[1].count)
      .slice(0, 3);
  };

  const topTeachers = getTeacherWorkload();
  // KIỂM TRA FULLY ASSIGNED (THÊM UV 3)
  const fullyAssigned = students.filter(s => s.truongHD && s.thuKy && s.thanhVien1 && s.thanhVien2 && s.thanhVien3).length;

  return (
    <div className="space-y-8 anim-fade max-w-[1400px] mx-auto">
      <div className="mb-6 pb-4 border-b border-border-color flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h1 className="text-2xl font-bold text-primary uppercase">Phân công Hội đồng</h1>
          <p className="text-text-muted mt-1 text-sm">
            <span className="material-symbols-outlined text-sm">groups</span>
            Thiết lập Chủ tịch, Thư ký, Ủy viên cho sinh viên bảo vệ KLTN
          </p>
        </div>
        <div className="flex items-center gap-3">
          <button 
            onClick={handleBatchSave} 
            disabled={isBatchSaving}
            className="bg-gradient-to-br from-primary to-primary-container text-white px-6 py-2.5 rounded font-bold text-sm shadow-lg hover:shadow-primary/20 transition-all active:scale-95 flex items-center gap-2 disabled:opacity-50">
            {isBatchSaving ? <span className="material-symbols-outlined text-[18px] anim-spin">refresh</span> : <span className="material-symbols-outlined text-[18px]">task_alt</span>}
            {isBatchSaving ? 'Đang lưu...' : 'Xác nhận phân công'}
          </button>
        </div>
      </div>

      {loading ? <Spinner text="Đang tải dữ liệu hội đồng..."/> : (
        <>
          {topTeachers.length > 0 && (
            <section>
              <h2 className="text-lg font-extrabold text-on-surface mb-4 flex items-center gap-2">
                <span className="material-symbols-outlined text-primary">analytics</span>
                Giảng viên tham gia nhiều Hội đồng nhất
              </h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {topTeachers.map(([name, data], idx) => (
                  <div key={idx} className="bg-surface-container-lowest p-5 bg-white border border-border-color rounded shadow-card flex flex-col gap-4 border border-outline-variant/15 hover:shadow-md transition-shadow">
                    <div className="flex items-center gap-3">
                      <Av name={name} cls="w-12 h-12 !rounded text-lg shadow-sm" />
                      <div>
                        <h3 className="font-bold text-on-surface text-sm line-clamp-1">{name}</h3>
                        <p className="text-xs text-on-surface-variant">Thành viên Bộ môn</p>
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center bg-surface-container-low p-3 rounded">
                      <div>
                        <p className="text-[10px] font-bold uppercase text-primary">Chủ tịch</p>
                        <p className="font-black text-on-surface">{data.roles.truongHD}</p>
                      </div>
                      <div className="border-x border-outline-variant/10">
                        <p className="text-[10px] font-bold uppercase text-secondary">Thư ký</p>
                        <p className="font-black text-on-surface">{data.roles.thuKy}</p>
                      </div>
                      <div>
                        <p className="text-[10px] font-bold uppercase text-tertiary-fixed-dim">Ủy viên</p>
                        <p className="font-black text-on-surface">{data.roles.tv}</p>
                      </div>
                    </div>
                    <div className="pt-1 flex justify-between items-center">
                      <span className="text-xs font-semibold text-on-surface-variant flex items-center gap-1">
                        <span className="material-symbols-outlined text-[16px]">schedule</span> Tổng tham gia: {data.count}
                      </span>
                      {data.count > 5 && (
                        <span className="text-[10px] font-bold bg-error-container text-on-error-container px-2 py-0.5 rounded">Cao</span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </section>
          )}

          <section className="space-y-4">
            <div className="flex justify-between items-center">
              <h2 className="text-lg font-extrabold text-on-surface flex items-center gap-2">
                <span className="material-symbols-outlined text-primary">assignment_ind</span>
                Phân bổ Sinh viên
                <span className="ml-2 text-xs font-medium text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded">
                  Đã hoàn tất {fullyAssigned}/{students.length}
                </span>
              </h2>
            </div>
            
            <div className="bg-white border border-border-color rounded shadow-card border border-outline-variant/15 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse" style={{minWidth:'1000px'}}>
                  <thead>
                    <tr className="bg-surface-container-low border-b border-outline-variant/10">
                      <th className="px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-on-surface-variant w-1/4">Sinh viên & Đề tài</th>
                      <th className="px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-on-surface-variant w-1/4">Hướng dẫn / Phản biện</th>
                      <th className="px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-on-surface-variant w-2/4">Thành phần Hội đồng</th>
                      <th className="px-4 py-4 w-16"></th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-surface-container">
                    {students.map(sv => {
                      const initSv = initialStudents.find(i => i.maSo === sv.maSo);
                      // KIỂM TRA THAY ĐỔI UV3 ĐỂ ĐỔI MÀU NÚT LƯU
                      const isChanged = initSv && (initSv.truongHD !== sv.truongHD || initSv.thuKy !== sv.thuKy || initSv.thanhVien1 !== sv.thanhVien1 || initSv.thanhVien2 !== sv.thanhVien2 || initSv.thanhVien3 !== sv.thanhVien3);
                      // KIỂM TRA FULL UV3 ĐỂ ĐÁNH DẤU CHECK
                      const isComplete = sv.truongHD && sv.thuKy && sv.thanhVien1 && sv.thanhVien2 && sv.thanhVien3;

                      return (
                        <tr key={sv.maSo} className="hover:bg-surface-container-low/30 transition-colors">

                              <span className="text-xs text-on-surface-variant line-clamp-2 leading-relaxed" title={sv.topic}>{sv.topic}</span>

                                <div className="flex items-center gap-2">
                                  <span className="w-2 h-2 rounded bg-primary-container"></span>
                                  <span className="text-on-surface-variant font-medium">HD: {sv.gvhd || 'Chưa rõ'}</span>
                                </div>
                                {sv.grade != null ? (

                                                : <span className="ml-4 text-[9px] font-bold text-error">❌ No Pass (Điểm: {sv.grade})</span>
                                ) : <span className="ml-4 text-[9px] font-medium text-secondary">⏳ GVHD chưa chấm</span>}
                              </div>
                              <div className="flex items-center gap-2 mt-1">
                                <span className="w-2 h-2 rounded bg-secondary"></span>
                                <span className="text-on-surface-variant font-medium">PB: {sv.pbName || 'Chưa phân công'}</span>
                              </div>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            {/* Grid Dropdowns cho Hội Đồng ĐÃ THÊM UV 3 */}
                            <div className="grid grid-cols-2 gap-x-4 gap-y-3 relative">
                              {[ 
                                {label:'Chủ tịch HĐ', key:'truongHD', color:'text-primary'}, 
                                {label:'Thư ký', key:'thuKy', color:'text-secondary'},
                                {label:'Ủy viên 1', key:'thanhVien1', color:'text-tertiary-fixed-dim'}, 
                                {label:'Ủy viên 2', key:'thanhVien2', color:'text-tertiary-fixed-dim'},

                              ].map(field => (
                                <div key={field.key} className="flex flex-col gap-1 relative">
                                  <span className={`text-[9px] font-black uppercase tracking-wider ${field.color}`}>{field.label}</span>
                                  <select 
  value={sv[field.key]} 
  onChange={(e) => updateField(sv.maSo, field.key, e.target.value)}
  className={`w-full text-xs font-semibold bg-surface-container-low border rounded-lg py-2 px-2 outline-none focus:bg-white focus:ring-2 focus:ring-primary/20 appearance-none transition-colors cursor-pointer ${isChanged && sv[field.key] !== initSv[field.key] ? 'border-secondary text-secondary' : 'border-transparent text-on-surface hover:border-outline-variant/50'}`}
  style={{ backgroundImage: `url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%23434653' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E")`, backgroundSize: '16px 16px', backgroundPosition: 'right 4px center', backgroundRepeat: 'no-repeat' }}>

    .filter(t => t.name !== sv.gvhd) // BƯỚC 1: LỌC BỎ GIẢNG VIÊN HƯỚNG DẪN
    .map(t => {
      // BƯỚC 2: KIỂM TRA XEM GV ĐÃ ĐƯỢC CHỌN Ở VỊ TRÍ KHÁC TRONG HỘI ĐỒNG CHƯA
      const isSelectedElsewhere = ['truongHD', 'thuKy', 'thanhVien1', 'thanhVien2', 'thanhVien3']
        .filter(k => k !== field.key)
        .some(k => sv[k] === t.name);

      return (
        <option key={t.email} value={t.name} disabled={isSelectedElsewhere}>
          {t.name} {isSelectedElsewhere ? '(Đã chọn)' : ''}
        </option>
      );
  })}
</select>
                                </div>
                              ))}
                              {isChanged && <span className="absolute -left-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded bg-secondary"></span>}
                            </div>
                          </td>
                          <td className="px-4 py-5 align-middle text-center">
                            <button 
                              onClick={() => handleSingleSave(sv)} 
                              disabled={saving[sv.maSo]}
                              title="Lưu dòng này"
                              className={`w-9 h-9 rounded flex items-center justify-center transition-all ${saving[sv.maSo] ? 'bg-surface-container text-on-surface-variant' : isComplete && !isChanged ? 'bg-tertiary-fixed text-tertiary hover:bg-tertiary-fixed-dim' : 'bg-primary-container text-white hover:bg-primary shadow-sm'}`}>
                              {saving[sv.maSo] ? <span className="material-symbols-outlined text-[18px] anim-spin">refresh</span> : 
                               isComplete && !isChanged ? <span className="material-symbols-outlined text-[18px]" style={{fontVariationSettings: "'FILL' 1"}}>check</span> :
                               <span className="material-symbols-outlined text-[18px]">save</span>}
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="px-6 py-4 bg-surface-container-low border-t border-outline-variant/10 flex justify-between items-center">
                <p className="text-xs text-on-surface-variant font-medium">Đang hiển thị {students.length} sinh viên</p>
              </div>
            </div>
          </section>

        </>
      )}
    </div>
  );
}
// ── TAB 7: THỐNG KÊ CHI TIẾT (TBM) ──────────────────────────────────────────
function TabThongKe({toast}) {
  const [data, setData] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [search, setSearch] = React.useState('');

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      // Đọc trực tiếp từ sheet để lấy đúng dữ liệu realtime
      const [kltnRows, hdRows] = await Promise.all([
        fetchSheetCSV(SHEET_KLTN_TAB),
        fetchSheetCSV(SHEET_HOIDONG_TAB)
      ]);

      // Map HoiDongKLTN theo studentEmail
      const hdMap = {};
      hdRows.forEach(r => {
        const sEmail = (r[0] || '').toLowerCase().trim();
        hdMap[sEmail] = {
          diemPB            : r[10] !== '' && !isNaN(parseFloat(String(r[10]).replace(',','.'))) ? parseFloat(String(r[10]).replace(',','.')) : '',
          diemHD            : r[11] !== '' && !isNaN(parseFloat(String(r[11]).replace(',','.'))) ? parseFloat(String(r[11]).replace(',','.')) : '',
        };
      });

      // Lấy tất cả SV KLTN đã có GVHD duyệt đề tài (approved hoặc step >= 1)
      const merged = kltnRows
        .filter(r => r[11] === 'approved' || parseInt(r[14]) >= 1)
        .map(r => {
          const sEmail = (r[1] || '').toLowerCase().trim();
          const hd = hdMap[sEmail] || {};
          return {
            name             : r[2] || '',
            maSo             : r[3] || '',
            term             : r[9] || '',
            gvhd             : r[6] || '', // tên GVHD ở cột G
            gradeGVHD        : r[12] !== '' && !isNaN(parseFloat(String(r[12]).replace(',','.'))) ? parseFloat(String(r[12]).replace(',','.')) : '',
            diemPB           : hd.diemPB,
            diemHD           : hd.diemHD,
            // X(23) và Y(24) đọc từ DangKyKLTN
            gvhdDuyetSauBv      : r[23] || '',  // Cột X
            chuTichDuyetSauBv   : r[24] || '',  // Cột Y
            bienBanGiaiTrinhUrl : r[21] || '',  // Cột V — Biên bản giải trình ← THÊM
            baiChinhSuaUrl      : r[22] || '',  // Cột W — KLTN sau chỉnh sửa ← THÊM
          };
        });

      setData(merged);
    } catch(e) { toast.show('Lỗi tải dữ liệu thống kê', 'error'); }
    setLoading(false);
  }

  const filtered = data.filter(s =>
    (s.name || '').toLowerCase().includes(search.toLowerCase()) ||
    (s.maSo || '').includes(search)
  );

  // Helper render ô duyệt: Yes = tick xanh, No = X đỏ, '' = chưa xác nhận
  function renderDuyetCell(val) {
    if (val === 'Yes') return (
      <span className="inline-flex items-center gap-1 text-[#00593c]">
        <span className="material-symbols-outlined text-xl" style={{fontVariationSettings:"'FILL' 1"}}>check_circle</span>
      </span>
    );
    if (val === 'No') return (
      <span className="inline-flex items-center gap-1 text-error">
        <span className="material-symbols-outlined text-xl" style={{fontVariationSettings:"'FILL' 1"}}>cancel</span>
      </span>
    );
    return <span className="text-[10px] text-on-surface-variant/50 italic">Chưa xác nhận</span>;
  }

  return (
  <div className="anim-fade">
    {/* BƯỚC 1: SỬA TIÊU ĐỀ */}
    <div className="mb-6 pb-4 border-b border-border-color flex flex-col md:flex-row md:items-end justify-between gap-4">
      <div>
        <h2 className="text-2xl font-bold text-primary uppercase">Thống kê KLTN</h2>
        <p className="text-text-muted mt-1 text-sm">Bảng điểm và trạng thái duyệt sửa chữa sau bảo vệ của toàn bộ sinh viên</p>
      </div>
      <div className="flex items-center gap-3">
        <button onClick={loadData} className="px-3 py-1.5 border border-gray-300 rounded text-sm hover:bg-gray-50 flex items-center gap-1">
          <span className={`material-symbols-outlined text-[18px] ${loading?'anim-spin':''}`}>refresh</span> Làm mới
        </button>
        <div className="relative w-full md:w-80">
          <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">search</span>
          {/* BƯỚC 4: SỬA INPUT */}
          <input value={search} onChange={e => setSearch(e.target.value)}
            className="w-full pl-10 pr-3 py-1.5 border border-gray-300 rounded text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none"
            placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>
    </div>

    {loading ? <Spinner text="Đang tổng hợp dữ liệu thống kê..."/> : (
      /* BƯỚC 2: SỬA KHUNG CHỨA (CARD) */
      <div className="bg-white border border-border-color rounded shadow-card overflow-hidden">
        <div className="overflow-x-auto">
          
          {/* BƯỚC 3: SỬA BẢNG VỚI .academic-table VÀ XÓA CLASS THỪA */}
          <table className="academic-table" style={{minWidth:'1100px'}}>
            <thead>
              <tr>
                <th>Sinh viên</th>
                <th>GV Hướng dẫn</th>
                <th style={{textAlign: 'center'}}>Điểm GVHD</th>
                <th style={{textAlign: 'center'}}>Điểm Phản Biện</th>
                <th style={{textAlign: 'center'}}>Điểm Hội Đồng</th>
                <th style={{textAlign: 'center'}}>Sau HĐ: GVHD Duyệt</th>
                <th style={{textAlign: 'center'}}>Sau HĐ: CTHĐ Duyệt</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan="7" className="text-center py-6 text-text-muted">Không có dữ liệu</td></tr>
              ) : filtered.map((sv, i) => (
                <tr key={i}>
                  <td>
                    <p className="font-semibold text-text-main">{sv.name}</p>
                    <p className="text-sm text-text-muted">{sv.maSo} • {sv.term || 'Kỳ này'}</p>
                  </td>
                  <td className="text-sm text-text-muted">{sv.gvhd || '--'}</td>
                  <td className="text-center font-bold text-primary">{sv.gradeGVHD !== '' ? Number(sv.gradeGVHD).toFixed(1) : '--'}</td>
                  <td className="text-center font-bold text-text-main">{sv.diemPB !== '' && sv.diemPB !== undefined ? Number(sv.diemPB).toFixed(1) : '--'}</td>
                  <td className="text-center font-bold text-secondary">{sv.diemHD !== '' && sv.diemHD !== undefined ? Number(sv.diemHD).toFixed(1) : '--'}</td>
                  <td className="text-center">
                    {renderDuyetCell(sv.gvhdDuyetSauBv)}
                  </td>
                  <td className="text-center">
                    {renderDuyetCell(sv.chuTichDuyetSauBv)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

        </div>
        <div className="px-4 py-3 bg-gray-50 border-t border-border-color">
          <p className="text-sm text-text-muted font-medium">Tổng cộng: <span className="font-bold text-primary">{filtered.length}</span> sinh viên</p>
        </div>
      </div>
    )}
  </div>
);
// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
React.useEffect(() => {
    const role  = localStorage.getItem('ute_role');
    const email = localStorage.getItem('ute_email');
    
    // Nếu chưa đăng nhập -> đuổi ra login
    if (!role || !email) { window.location.href = 'login.html'; return; }
    // Nếu là sinh viên -> đuổi về trang sinh viên
    if (role === 'sinhvien') { window.location.href = 'trangchusinhvien.html'; return; } 
    // Nếu là giảng viên thường -> đuổi về trang giảng viên (chặn GV vào trang của TBM)
    if (role === 'giangvien') { window.location.href = 'giangvien.html'; return; } 
  }, []);
  const [tab,  setTab]  = React.useState('dashboard');
  const toast            = useToast();

  const [notifications, setNotifications] = React.useState([]);

  React.useEffect(() => {
    (async () => {
      const notis = await fetchGVNotifications(SESSION.email);
      if (notis.length > 0) setNotifications(notis);
    })();
  }, []);

  function addGVNotification(noti) {
    setNotifications(prev => [noti, ...prev].slice(0, 20));
  }

  const baseNavMobile = [
    {id:'dashboard', icon:'dashboard',   l:'Tổng quan'},
    {id:'sinhvien',  icon:'group',        l:'Hướng dẫn'},
    {id:'phanbien',  icon:'rate_review',  l:'Phản biện'},
    {id:'hoidong',   icon:'gavel',        l:'Hội đồng'},
  ];
const tbmNavMobile = [
    {id:'quanly_slot', icon:'format_list_numbered', l:'Slot GV'}, // <-- THÊM MỚI
    {id:'phancong_pb', icon:'assignment_ind',  l:'PC.PB'},
    {id:'phancong_hd', icon:'manage_accounts', l:'PC.HĐ'},
    {id:'thongke',     icon:'bar_chart',       l:'Thống kê'},
  ];
  const navMobile = SESSION.role === 'truongbomon' ? [...baseNavMobile, ...tbmNavMobile] : baseNavMobile;

  return (
    <div className="min-h-screen bg-background">
      {toast.toast && <Toast {...toast.toast} onClose={toast.hide}/>}

      <Sidebar tab={tab} setTab={setTab} role={SESSION.role}
        logout={() => { localStorage.clear(); window.location.href = 'login.html'; }}/>

      <Header notifications={notifications}/>

      <main className="pt-20 pb-10 px-8 min-h-screen" style={{marginLeft:'16rem'}}>
        <div className="max-w-screen-xl mx-auto">
          {tab === 'dashboard'   && <TabThongTinChung toast={toast} addGVNotification={addGVNotification}/>}
          {tab === 'sinhvien'    && <TabSinhVienHuongDan toast={toast}/>}
          {tab === 'phanbien'    && <TabPhanBien toast={toast}/>}
          {tab === 'hoidong'     && <TabHoiDong toast={toast}/>}
         {SESSION.role === 'truongbomon' && tab === 'quanly_slot' && <TabQuanLySlot toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'phancong_pb' && <TabPhanCongPhanBien toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'phancong_hd' && <TabPhanCongHoiDong toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'thongke'     && <TabThongKe toast={toast}/>}
        </div>
      </main>

      <nav className="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-start sm:justify-around items-center px-2 pb-4 pt-2 bg-white/90 backdrop-blur-lg rounded-t-3xl shadow-2xl overflow-x-auto" style={{ scrollbarWidth: 'none' }}>
        {navMobile.map(it => (
          <button key={it.id} onClick={() => setTab(it.id)}
            className={`flex flex-col items-center justify-center min-w-[70px] px-2 py-2 bg-white border border-border-color rounded shadow-card transition-all ${tab===it.id?'bg-blue-50 text-blue-800':'text-slate-400'}`}>
            <span className="material-symbols-outlined text-2xl">{it.icon}</span>
            <span className="text-[10px] font-semibold mt-1 whitespace-nowrap">{it.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
