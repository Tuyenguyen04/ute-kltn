// ── KLTN ACTION PANEL (hiển thị trong Dashboard khi kltnUnlocked) ────────────
function KLTNActionPanel({dashData,onRegisterKLTN,onSubmitKLTN,toast}){
  // GAS getKLTNData trả: { registered, topic, instructor:{name,email,id,term},
  //   status, kltnGrade, kltnGradeLocked, step(0-4), stepLabel, gvPhanBien, hoiDong }
  // Tất cả nằm trong dashData.kltn
  const kltn         = dashData?.kltn||null;
  const kltnReg      = kltn?.registered||false;
  const kltnTopic    = kltn?.topic||'';
  const kltnStatus   = kltn?.status||null;           // pending|approved|rejected
  const kltnStep     = parseInt(kltn?.step)||0;
  // step: 0=chưa đk | 1=đã đk chờ duyệt đcương | 2=đcương ok, đang làm | 3=chuẩn bị bv | 4=hoàn tất
  const kltnInstr    = kltn?.instructor||null;

  // Logic nút:
  const canRegKLTN   = !kltnReg;                             // 1. chỉ mở khi chưa đk
  const canChangeKLTN= kltnReg&&kltnStatus==='pending'&&kltnStep===1; // 2. pending step1
  const canEditDecu  = kltnReg&&kltnStep===1&&kltnStatus==='rejected'; // 3. rejected step1
  const canSubmitKLTN= kltnReg&&kltnStep===2;                // 4. step2 = đề cương ok

  const [showUploadDecu,setShowUploadDecu]=useState(false);
  const [decuFile,setDecuFile]=useState(null);
  const [decuNote,setDecuNote]=useState('');
  const [uploadingDecu,setUploadingDecu]=useState(false);

  function pickDecu(e){
    const f=e.target.files[0]; if(!f) return;
    if(f.size>100*1024*1024){toast.show('File tối đa 100 MB!','error');return;}
    setDecuFile(f);
  }
  function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}
  const [decuProgress,setDecuProgress]=useState(0);

  async function submitDecu(){
    if(!decuFile){toast.show('Vui lòng chọn file đề cương!','error');return;}
    setUploadingDecu(true); setDecuProgress(0);
    try{
      const result=await apiPostFile({
        action:'updateKLTNStatus',
        studentEmail:SESSION.email,
        status:'pending',
        step:1,
        topic:kltnTopic,
        note:decuNote.trim(),
        folderName:'DeCuongKLTN_UTE',
        _file:decuFile,
      }, pct=>setDecuProgress(pct));
      if(result?.success){
        toast.show('Nộp đề cương chỉnh sửa thành công! GV sẽ xem xét.','success');
        setShowUploadDecu(false); setDecuFile(null); setDecuNote(''); setDecuProgress(0);
      } else {
        toast.show(result?.message||'Gửi thất bại. Thử lại.','error');
      }
    }catch(e){ toast.show('Lỗi upload: '+e.message,'error'); }
    setUploadingDecu(false);
  }

  const stepBadge=[
    {l:'Chưa đăng ký',bg:'bg-surface-container text-on-surface-variant'},
    {l:'Chờ duyệt đề cương',bg:'bg-secondary-container/30 text-on-secondary-container'},
    {l:'Đang thực hiện',bg:'bg-primary-fixed text-on-primary-fixed'},
    {l:'Chuẩn bị bảo vệ',bg:'bg-tertiary-fixed text-on-tertiary-fixed'},
    {l:'Hoàn tất',bg:'bg-tertiary-fixed-dim text-on-tertiary-fixed'},
  ][kltnStep]||{l:'',bg:''};

  return(
    <div className="p-6 bg-surface-container-lowest rounded-3xl shadow-sm border-l-4 border-primary anim-fade">
      {/* Header */}
      <div className="flex items-center gap-3 mb-5">
        <div className="w-10 h-10 rounded-xl bg-primary flex items-center justify-center text-white flex-shrink-0">
          <span className="material-symbols-outlined">school</span>
        </div>
        <div className="flex-1 min-w-0">
          <h3 className="font-headline font-extrabold text-on-surface">Khóa Luận Tốt Nghiệp</h3>
          <p className="text-xs text-on-surface-variant truncate">
            {!kltnReg?'Bạn đủ điều kiện — hãy đăng ký KLTN ngay!':`Đề tài: ${kltnTopic}`}
          </p>
        </div>
        {kltnReg&&(
          <span className={`flex-shrink-0 px-3 py-1 rounded-full text-[10px] font-black ${stepBadge.bg}`}>
            Bước {kltnStep}/4 · {stepBadge.l}
          </span>
        )}
      </div>

      {/* 4 nút */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {/* 1. Đăng ký KLTN */}
        <button onClick={canRegKLTN?onRegisterKLTN:undefined} disabled={!canRegKLTN}
          title={kltnReg?'Bạn đã đăng ký KLTN rồi':'Đăng ký đề tài Khóa Luận Tốt Nghiệp'}
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all relative text-center
            ${canRegKLTN
              ?'bg-gradient-to-br from-primary to-primary-container text-white shadow-lg hover:scale-[1.02]'
              :'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-50'}`}>
          {canRegKLTN&&<span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-white/70 animate-pulse"/>}
          <span className="material-symbols-outlined text-2xl">how_to_reg</span>
          <span className="text-xs leading-tight">Đăng ký KLTN</span>
          {kltnReg&&<span className="text-[9px] font-normal opacity-60">Đã đăng ký</span>}
        </button>

        {/* 2. Đổi đề tài — chỉ khi pending step=1 */}
        <button onClick={canChangeKLTN?onRegisterKLTN:undefined} disabled={!canChangeKLTN}
          title={
            !kltnReg?'Đăng ký KLTN trước':
            kltnStep>=2?'Đề cương đã duyệt, không thể đổi đề tài':
            kltnStatus==='rejected'?'GV từ chối — hãy chỉnh sửa đề cương thay vì đổi đề tài':
            'Đổi sang đề tài KLTN khác'
          }
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all text-center
            ${canChangeKLTN
              ?'bg-secondary-container text-on-secondary-container hover:scale-[1.02] shadow-md'
              :'bg-surface-container-highest text-on-surface/40 cursor-not-allowed opacity-50'}`}>
          <span className="material-symbols-outlined text-2xl">sync_alt</span>
          <span className="text-xs leading-tight">Đổi đề tài</span>
        </button>

        {/* 3. Chỉnh sửa đề cương — active khi rejected step=1 */}
        <button
          onClick={canEditDecu?()=>setShowUploadDecu(v=>!v):undefined}
          disabled={!canEditDecu}
          title={
            !kltnReg?'Đăng ký KLTN trước':
            kltnStep>=2?'Đề cương đã được duyệt':
            kltnStep===1&&kltnStatus==='pending'?'Đợi GV xem xét đề cương':
            canEditDecu?'Upload lại đề cương đã chỉnh sửa':'Không khả dụng'
          }
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all text-center
            ${canEditDecu
              ?'bg-gradient-to-br from-secondary to-secondary-container text-white shadow-lg hover:scale-[1.02]'
              :'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-40'}`}>
          <span className="material-symbols-outlined text-2xl">edit_document</span>
          <span className="text-xs leading-tight">Chỉnh sửa đề cương</span>
          {kltnStep>=2&&<span className="text-[9px] opacity-60">Đã duyệt</span>}
          {canEditDecu&&<span className="text-[9px] opacity-90">Cần chỉnh sửa</span>}
        </button>

        {/* 4. Nộp KLTN — mở khi step=2 */}
        <button onClick={canSubmitKLTN?onSubmitKLTN:undefined} disabled={!canSubmitKLTN}
          title={
            !kltnReg?'Đăng ký KLTN trước':
            kltnStep<2?'Cần đề cương được duyệt (bước 2) trước':
            kltnStep>2?'Đã nộp khóa luận':'Nộp file khóa luận tốt nghiệp'
          }
          className={`p-5 rounded-2xl font-bold flex flex-col items-center justify-center gap-2.5 transition-all relative text-center
            ${canSubmitKLTN
              ?'bg-gradient-to-br from-tertiary-container to-tertiary text-white shadow-lg hover:scale-[1.02]'
              :kltnStep>2
                ?'bg-tertiary-fixed/30 text-on-tertiary-fixed/50 cursor-not-allowed opacity-70'
                :'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-40'}`}>
          {canSubmitKLTN&&<span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-white/70 animate-pulse"/>}
          <span className="material-symbols-outlined text-2xl">{kltnStep>2?'task_alt':'upload_file'}</span>
          <span className="text-xs leading-tight">{kltnStep>2?'Đã nộp KLTN':'Nộp KLTN'}</span>
        </button>
      </div>

      {/* Upload đề cương panel */}
      {showUploadDecu&&canEditDecu&&(
        <div className="mt-4 p-5 bg-surface-container-low rounded-2xl border border-outline-variant/20 anim-fade space-y-4">
          <div className="flex items-center justify-between">
            <p className="font-bold text-sm text-on-surface flex items-center gap-2">
              <span className="material-symbols-outlined text-base text-primary">edit_document</span>
              Upload đề cương đã chỉnh sửa
            </p>
            <button onClick={()=>{setShowUploadDecu(false);setDecuFile(null);setDecuNote('');}}
              className="p-1 hover:bg-surface-container rounded-full transition-colors">
              <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
            </button>
          </div>
          {kltn?.reason&&(
            <div className="flex items-start gap-3 p-3 bg-error-container/30 rounded-xl text-xs text-on-error-container leading-relaxed">
              <span className="material-symbols-outlined text-sm flex-shrink-0 mt-0.5">report</span>
              <span><strong>Lý do từ chối:</strong> {kltn.reason}</span>
            </div>
          )}
          {!decuFile?(
            <label className="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-primary/30 rounded-2xl bg-primary-fixed/10 cursor-pointer hover:bg-primary-fixed/20 transition-colors group">
              <span className="material-symbols-outlined text-3xl text-primary/40 group-hover:text-primary/70 transition-colors mb-1">cloud_upload</span>
              <span className="text-sm font-medium text-primary/60 group-hover:text-primary transition-colors">Kéo thả hoặc bấm chọn file</span>
              <span className="text-xs text-on-surface-variant/50 mt-0.5">PDF / Word / ZIP · tối đa 30 MB</span>
              <input type="file" accept=".pdf,.doc,.docx,.zip" className="hidden" onChange={pickDecu}/>
            </label>
          ):(
            <div className="flex items-center gap-3 p-3 bg-tertiary-fixed/20 border border-tertiary-fixed-dim/40 rounded-xl">
              <span className="material-symbols-outlined text-on-tertiary-fixed">description</span>
              <div className="flex-1 min-w-0">
                <p className="font-bold text-on-surface text-sm truncate">{decuFile.name}</p>
                <p className="text-xs text-on-surface-variant">{fmtSize(decuFile.size)}</p>
              </div>
              <button onClick={()=>setDecuFile(null)} className="p-1 hover:bg-error-container/30 rounded-full">
                <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
              </button>
            </div>
          )}
          <textarea value={decuNote} onChange={e=>setDecuNote(e.target.value)} rows={2}
            className="w-full bg-surface-container rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/50 resize-none text-sm"
            placeholder="Ghi chú cho GV về những gì đã chỉnh sửa (tuỳ chọn)..."/>
          <div className="flex justify-end gap-3">
            <button onClick={()=>{setShowUploadDecu(false);setDecuFile(null);setDecuNote('');}}
              disabled={uploadingDecu}
              className="px-5 py-2.5 rounded-xl border border-outline-variant text-on-surface font-bold text-sm hover:bg-surface-container transition-all disabled:opacity-50">Hủy</button>
            <button onClick={submitDecu} disabled={!decuFile||uploadingDecu}
              className="flex items-center gap-2 px-6 py-2.5 rounded-xl bg-primary text-white font-bold text-sm shadow-lg hover:scale-[1.02] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
              {uploadingDecu
                ?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang gửi...</>
                :<><span className="material-symbols-outlined text-sm">send</span>Gửi đề cương</>}
            </button>
          </div>
        </div>
      )}

      {/* Banners */}
      {kltnReg&&kltnStep===1&&kltnStatus==='pending'&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-secondary-container/20 border border-secondary-container/30 rounded-2xl text-on-secondary-container text-sm font-medium">
          <span className="material-symbols-outlined text-base">hourglass_top</span>
          Đề cương KLTN đang chờ GV duyệt.
        </div>
      )}
      {canEditDecu&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">
          <span className="material-symbols-outlined text-base">report</span>
          Đề cương bị từ chối. Nhấn <strong className="mx-1">"Chỉnh sửa đề cương"</strong> để upload lại.
        </div>
      )}
      {kltnStep===2&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-primary-fixed/40 rounded-2xl text-on-primary-fixed text-sm font-medium">
          <span className="material-symbols-outlined text-base">check_circle</span>
          Đề cương đã được duyệt! Hãy <strong className="mx-1">"Nộp KLTN"</strong> khi hoàn thành khóa luận.
        </div>
      )}
      {kltnStep===3&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-tertiary-fixed/30 rounded-2xl text-on-tertiary-fixed text-sm font-medium">
          <span className="material-symbols-outlined text-base">record_voice_over</span>
          Đang chuẩn bị bảo vệ khóa luận. Theo dõi lịch từ GV hướng dẫn.
        </div>
      )}
      {kltnStep>=4&&(
        <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-tertiary-fixed/30 rounded-2xl text-on-tertiary-fixed text-sm font-medium">
          <span className="material-symbols-outlined fill-icon text-base">verified</span>
          Khóa luận đã hoàn tất! Xem điểm trong thẻ Kết quả KLTN.
        </div>
      )}
    </div>
  );
}

// ── KLTN REGISTRATION FLOW ───────────────────────────────────────────────────
function KLTNRegistration({onSuccess,instructorList,loadingGV,dashData}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({topic:'',category:'',semester:'',startDate:'',note:''});
  const [selGV,setSelGV]=useState(null);
  const [showConfirm,setShowConfirm]=useState(false);
  const [showSuccess,setShowSuccess]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const toast=useToast();

  // Lấy GV hướng dẫn BCTT làm gợi ý mặc định (SV có thể chọn lại)
  const bcttInstr = dashData?.instructor||null;

  function setSem(v){setForm(f=>({...f,semester:v,startDate:SEM_DATE[v]||''}))}

  function next1(){
    if(!form.topic.trim()){toast.show('Vui lòng nhập tên đề tài KLTN!','error');return;}
    if(!form.category){toast.show('Vui lòng chọn ngành!','error');return;}
    if(!form.semester){toast.show('Vui lòng chọn học kỳ!','error');return;}
    setStep(2);window.scrollTo(0,0);
  }
  function next2(){
    if(!selGV){toast.show('Vui lòng chọn giảng viên hướng dẫn!','error');return;}
    setStep(3);window.scrollTo(0,0);
  }

  async function confirm(){
    setSubmitting(true);
    try{
      const termLabel = form.semester==='D1-HK1-2526'?'Đợt 1 - HK1 NH25-26'
        :form.semester==='D2-HK1-2526'?'Đợt 2 - HK1 NH25-26'
        :form.semester==='D1-HK2-2526'?'Đợt 1 - HK2 NH25-26'
        :'Đợt 2 - HK2 NH25-26';
      // GAS: action='submitKLTN' ghi vào sheet DangKyKLTN (không phải submitRegistration)
      const res=await apiPost({
        action:'submitKLTN',
        email:SESSION.email,
        name:SESSION.name,
        maSo:SESSION.maSo,
        nganh:SESSION.nganh||form.category,
        topic:form.topic,
        instructorName:selGV.name,
        instructorEmail:selGV.email,
        instructorId:selGV.id||selGV.code,
        term:termLabel,
        note:form.note||'',
      });
      if(res.success){
        setShowConfirm(false);
        setShowSuccess(true);
      } else {
        toast.show(res.message||'Gửi thất bại. Thử lại.','error');
        setSubmitting(false);
      }
    }catch(e){
      toast.show('Lỗi kết nối. Thử lại sau.','error');
      setSubmitting(false);
    }
  }

  const STEPS=['Thông tin KLTN','Chọn Giảng viên','Hoàn tất'];
  const StepBar=()=>(
    <nav className="flex items-center gap-2 w-full mb-6">
      {STEPS.map((l,i)=>{
        const n=i+1,done=step>n,cur=step===n;
        return(
          <React.Fragment key={i}>
            <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
              <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all
                ${done?'bg-primary-fixed-dim text-on-primary-fixed':cur?'bg-primary text-white ring-4 ring-primary-fixed':'bg-surface-container-highest text-on-surface-variant'}`}>
                {done?<span className="material-symbols-outlined text-sm">check</span>:n}
              </div>
              <span className={`text-[10px] font-bold uppercase tracking-widest whitespace-nowrap ${cur?'text-primary':done?'text-on-surface':'text-on-surface-variant/60'}`}>{n}. {l}</span>
            </div>
            {i<STEPS.length-1&&<div className={`flex-1 h-[2px] mb-5 transition-all duration-500 ${step>n?'bg-primary':'bg-surface-container-highest'}`}/>}
          </React.Fragment>
        );
      })}
    </nav>
  );

  const RightPanel=()=>(
    <div className="space-y-5">
      <div className="bg-surface-container-lowest rounded-3xl p-6 shadow-sm">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary"><span className="material-symbols-outlined">info</span></div>
          <h3 className="font-headline font-extrabold text-on-surface">Lưu ý đăng ký KLTN</h3>
        </div>
        <ul className="space-y-4">
          {[
            'Đề tài KLTN phải phù hợp với ngành đào tạo và có tính ứng dụng thực tiễn.',
            'Mỗi sinh viên chỉ được đăng ký 1 giảng viên hướng dẫn KLTN.',
            'Bạn có thể giữ lại GV hướng dẫn BCTT hoặc chọn GV mới cho KLTN.',
          ].map((n,i)=>(
            <li key={i} className="flex gap-3 text-sm text-on-surface-variant leading-relaxed">
              <span className="w-1.5 h-1.5 rounded-full bg-primary mt-1.5 flex-shrink-0"/>{n}
            </li>
          ))}
        </ul>
      </div>
      {/* Nhắc BCTT đã pass */}
      <div className="bg-primary-fixed/40 border border-primary-fixed-dim/30 rounded-3xl p-6">
        <div className="flex items-center gap-2 mb-3">
          <span className="material-symbols-outlined text-primary">verified</span>
          <span className="font-bold text-on-primary-fixed text-sm">Điều kiện đã đạt</span>
        </div>
        <p className="text-xs text-on-primary-fixed/80 leading-relaxed">
          Bạn đã hoàn thành BCTT với điểm đạt yêu cầu. Bây giờ bạn có thể đăng ký Khóa Luận Tốt Nghiệp.
        </p>
      </div>
    </div>
  );

  return(
    <div className="anim-fade">
      {toast.toast&&<Toast {...toast.toast} onClose={toast.hide}/>}

      {/* Confirm Modal */}
      {showConfirm&&(
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-on-surface/40 backdrop-blur-sm">
          <div className="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl flex flex-col items-center text-center anim-slide">
            <div className="w-20 h-20 rounded-full bg-primary-fixed mb-6 flex items-center justify-center text-primary">
              <span className="material-symbols-outlined text-4xl">school</span>
            </div>
            <h2 className="font-headline font-extrabold text-2xl text-on-surface mb-3">Xác nhận đăng ký KLTN?</h2>
            <p className="text-on-surface-variant mb-2 leading-relaxed">Hệ thống sẽ ghi nhận và gửi thông báo đến:</p>
            <div className="mb-6 px-4 py-3 bg-surface-container-low rounded-xl w-full text-sm">
              <p className="font-bold text-on-surface">{selGV?.name}</p>
              <p className="text-on-surface-variant text-xs mt-1">📧 {selGV?.email}</p>
            </div>
            <div className="flex flex-col w-full gap-3">
              <button onClick={confirm} disabled={submitting}
                className="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg hover:bg-primary-container transition-all flex items-center justify-center gap-2 disabled:opacity-70">
                {submitting?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang gửi...</>:'Xác nhận & Gửi'}
              </button>
              <button onClick={()=>setShowConfirm(false)} className="w-full py-4 text-on-surface font-bold rounded-2xl hover:bg-surface-container transition-all">Hủy bỏ</button>
            </div>
          </div>
        </div>
      )}

      {/* Success Modal */}
      {showSuccess&&(
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-md">
          <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center anim-slide">
            <div className="w-24 h-24 bg-primary-fixed text-primary rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg anim-pop">
              <span className="material-symbols-outlined fill-icon text-5xl">school</span>
            </div>
            <h3 className="text-2xl font-headline font-black text-on-surface mb-3 leading-tight">Đăng ký KLTN thành công!</h3>
            <p className="text-on-surface-variant text-sm mb-2 leading-relaxed">
              Yêu cầu đã được gửi đến giảng viên <strong>{selGV?.name}</strong>.
            </p>
            <div className="p-3 bg-surface-container-low rounded-xl text-xs text-on-surface-variant mb-8">
              📧 Email thông báo đã gửi tới {selGV?.email}
            </div>
            <button onClick={onSuccess} className="w-full py-4 bg-primary text-white font-bold rounded-2xl hover:bg-primary-container transition-all shadow-lg shadow-primary/20">
              Về trang chủ
            </button>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div className="lg:col-span-8 space-y-5">
          <div>
            <div className="flex items-center gap-3 mb-1">
              <span className="px-3 py-1 bg-primary-fixed text-on-primary-fixed text-[10px] font-black rounded-full tracking-wider">KLTN</span>
              <h2 className="text-3xl font-headline font-extrabold text-on-surface tracking-tight">Đăng ký Khóa Luận Tốt Nghiệp</h2>
            </div>
            <p className="text-on-surface-variant text-sm">Vui lòng cung cấp đầy đủ thông tin đề tài và giảng viên hướng dẫn.</p>
          </div>
          <StepBar/>

          {/* STEP 1 — Thông tin KLTN */}
          {step===1&&(
            <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm anim-fade">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="md:col-span-2 space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Tên đề tài KLTN <span className="text-error">*</span></label>
                  <input value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))}
                    className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60"
                    placeholder="Nhập tên đề tài khóa luận tốt nghiệp..."/>
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Ngành <span className="text-error">*</span></label>
                  <div className="relative">
                    <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                      className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 appearance-none text-on-surface">
                      <option value="">Chọn ngành</option>
                      {NGANH_LIST.map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                    <span className="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
                  </div>
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Đợt - Học kỳ <span className="text-error">*</span></label>
                  <div className="relative">
                    <select value={form.semester} onChange={e=>setSem(e.target.value)}
                      className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 appearance-none text-on-surface">
                      <option value="">Chọn học kỳ</option>
                      <option value="D1-HK1-2526">Đợt 1 - HK1 NH25-26</option>
                      <option value="D2-HK1-2526">Đợt 2 - HK1 NH25-26</option>
                      <option value="D1-HK2-2526">Đợt 1 - HK2 NH25-26</option>
                      <option value="D2-HK2-2526">Đợt 2 - HK2 NH25-26</option>
                    </select>
                    <span className="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
                  </div>
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Thời gian bắt đầu</label>
                  <div className="flex items-center gap-3 bg-surface-container border border-outline-variant/20 rounded-xl px-4 py-4 text-on-surface-variant cursor-not-allowed">
                    <span className="material-symbols-outlined text-sm">lock</span>
                    <span>{form.startDate||'Tự động sau khi chọn học kỳ'}</span>
                  </div>
                </div>
                <div className="md:col-span-2 space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Ghi chú (tùy chọn)</label>
                  <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} rows={3}
                    className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 resize-none"
                    placeholder="Mô tả tóm tắt đề tài, hướng nghiên cứu..."/>
                </div>
              </div>
              <div className="flex justify-end pt-6 border-t border-outline-variant/10 mt-6">
                <button onClick={next1}
                  className="bg-gradient-to-br from-primary to-primary-container text-white px-10 py-4 rounded-xl font-headline font-bold text-sm shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2">
                  Tiếp theo <span className="material-symbols-outlined text-sm">arrow_forward</span>
                </button>
              </div>
            </div>
          )}

          {/* STEP 2 — Chọn Giảng viên */}
          {step===2&&(
            <div className="anim-fade space-y-4">
              {/* Gợi ý GV BCTT cũ */}
              {bcttInstr&&bcttInstr.name&&(
                <div className="flex items-center gap-4 p-4 bg-primary-fixed/20 border border-primary-fixed-dim/30 rounded-2xl">
                  <span className="material-symbols-outlined text-primary text-xl">tips_and_updates</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-bold text-on-surface">Gợi ý: GV hướng dẫn BCTT của bạn</p>
                    <p className="text-xs text-on-surface-variant truncate">{bcttInstr.name} — {bcttInstr.email}</p>
                  </div>
                  <button onClick={()=>{
                    // Tìm GV này trong instructorList để set đúng object
                    const found=instructorList.find(iv=>iv.email===bcttInstr.email);
                    if(found)setSelGV(found);
                    else setSelGV({name:bcttInstr.name,email:bcttInstr.email,id:bcttInstr.id,code:bcttInstr.id,nganh:SESSION.nganh,slConLai:1,slDangKi:0});
                  }}
                    className="px-4 py-2 bg-primary text-white text-xs font-bold rounded-xl hover:bg-primary-container transition-all flex-shrink-0">
                    Chọn GV này
                  </button>
                </div>
              )}

              {loadingGV?(
                <Spinner text="Đang tải danh sách giảng viên..."/>
              ):(
                <div className="bg-surface-container-lowest rounded-3xl overflow-hidden shadow-sm">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left">
                      <thead>
                        <tr className="bg-surface-container-low text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">
                          <th className="px-6 py-4">Giảng viên</th>
                          <th className="px-5 py-4">Mã / Email</th>
                          <th className="px-5 py-4">Ngành</th>
                          <th className="px-5 py-4">Còn nhận</th>
                          <th className="px-5 py-4 text-right">Chọn</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-outline-variant/10">
                        {instructorList.filter(iv=>!form.category||iv.nganh===form.category).length===0?(
                          <tr><td colSpan={5} className="px-6 py-12 text-center text-sm text-on-surface-variant">Không có dữ liệu giảng viên</td></tr>
                        ):instructorList.filter(iv=>!form.category||iv.nganh===form.category).map((iv,idx)=>{
                          const rem=typeof iv.slConLai==='number'?iv.slConLai:parseInt(iv.slConLai)||0;
                          const full=rem<=0;
                          const total=rem+((typeof iv.slDangKi==='number'?iv.slDangKi:0)||0);
                          const pct=total>0?Math.min(100,Math.round(((total-rem)/total)*100)):full?100:0;
                          const ini=iv.name.trim().split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
                          const sel=selGV?.email===iv.email;
                          return(
                            <tr key={idx} onClick={()=>!full&&setSelGV(iv)}
                              className={`transition-colors ${full?'opacity-50 bg-surface-container-low/40 cursor-not-allowed':sel?'bg-blue-50':'hover:bg-blue-50/30 cursor-pointer'}`}>
                              <td className="px-6 py-4">
                                <div className="flex items-center gap-3">
                                  <div className="h-10 w-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold text-xs flex-shrink-0">{ini}</div>
                                  <div>
                                    <p className={`font-bold text-sm ${sel?'text-primary':'text-on-surface'}`}>{iv.name}</p>
                                    <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold ${full?'bg-error-container text-on-error-container':'bg-primary-fixed text-on-primary-fixed'}`}>
                                      {full?'Đã đầy':'Còn chỗ'}
                                    </span>
                                  </div>
                                </div>
                              </td>
                              <td className="px-5 py-4">
                                <p className="text-sm font-medium text-on-surface">GV{iv.id||iv.code}</p>
                                <p className="text-xs text-on-surface-variant truncate max-w-[140px]">{iv.email}</p>
                              </td>
                              <td className="px-5 py-4"><span className="px-2 py-1 rounded-lg bg-surface-container text-xs font-semibold">{iv.nganh}</span></td>
                              <td className="px-5 py-4">
                                <div className="w-20 bg-surface-container-highest h-1.5 rounded-full overflow-hidden mb-1">
                                  <div className={`h-full rounded-full ${full?'bg-error':pct>=70?'bg-secondary-container':'bg-primary'}`} style={{width:`${pct}%`}}/>
                                </div>
                                <p className="text-xs font-bold text-on-surface-variant">
                                  <span className={full?'text-error':'text-primary'}>{rem}</span> còn lại
                                </p>
                              </td>
                              <td className="px-5 py-4 text-right">
                                <input type="radio" name="gv_kltn" disabled={full} checked={sel}
                                  onChange={()=>!full&&setSelGV(iv)}
                                  className="h-5 w-5 text-primary border-outline-variant focus:ring-primary cursor-pointer disabled:cursor-not-allowed"/>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
              <div className="flex items-center justify-between">
                <button onClick={()=>setStep(1)} className="flex items-center gap-2 px-6 py-3 rounded-xl border border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-colors">
                  <span className="material-symbols-outlined">arrow_back</span>Quay lại
                </button>
                <button onClick={next2} className="flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:scale-[1.02] transition-all">
                  Tiếp theo <span className="material-symbols-outlined">arrow_forward</span>
                </button>
              </div>
            </div>
          )}

          {/* STEP 3 — Rà soát */}
          {step===3&&(
            <div className="anim-fade space-y-5">
              <div>
                <h3 className="text-2xl font-headline font-extrabold text-on-surface mb-1">Rà soát thông tin đăng ký KLTN</h3>
                <p className="text-on-surface-variant text-sm">Kiểm tra kỹ trước khi xác nhận gửi yêu cầu.</p>
              </div>
              <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
                <div className="flex items-center gap-3 mb-6">
                  <div className="p-2 bg-primary-fixed rounded-xl text-primary"><span className="material-symbols-outlined fill-icon">school</span></div>
                  <h4 className="font-headline font-bold text-lg">Phần 1: Thông tin KLTN</h4>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-10">
                  {[
                    {l:'Tên đề tài KLTN',v:form.topic},
                    {l:'Ngành',v:form.category},
                    {l:'Thời gian bắt đầu',v:form.startDate},
                    {l:'Học kỳ',v:form.semester==='D1-HK1-2526'?'Đợt 1 - HK1 NH25-26':form.semester==='D2-HK1-2526'?'Đợt 2 - HK1 NH25-26':form.semester==='D1-HK2-2526'?'Đợt 1 - HK2 NH25-26':'Đợt 2 - HK2 NH25-26'},
                    {l:'Ghi chú',v:form.note||'(không có)'},
                  ].map((r,i)=>(
                    <div key={i} className={r.l.includes('đề tài')?'md:col-span-2':''}>
                      <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1 block">{r.l}</label>
                      <p className="text-on-surface font-semibold">{r.v}</p>
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
                <div className="flex items-center gap-3 mb-6">
                  <div className="p-2 bg-primary-fixed rounded-xl text-primary"><span className="material-symbols-outlined fill-icon">person_check</span></div>
                  <h4 className="font-headline font-bold text-lg">Phần 2: Giảng viên hướng dẫn KLTN</h4>
                </div>
                {selGV&&(
                  <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                    <Av name={selGV.name} cls="w-16 h-16 rounded-2xl text-xl flex-shrink-0"/>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1">
                      {[{l:'Họ và tên',v:selGV.name},{l:'Mã GV',v:`GV${selGV.id||selGV.code}`},{l:'Email',v:selGV.email}].map((r,i)=>(
                        <div key={i}>
                          <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">{r.l}</label>
                          <p className={`font-bold text-on-surface text-sm ${i===2?'text-primary break-all':''}`}>{r.v}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              <div className="bg-surface-container p-5 rounded-2xl border-l-4 border-primary flex gap-4 items-start">
                <span className="material-symbols-outlined text-primary">campaign</span>
                <p className="text-sm text-on-surface-variant italic leading-relaxed">
                  Sau khi xác nhận, hệ thống sẽ gửi email thông báo đến <strong>{selGV?.email}</strong>. Giảng viên sẽ duyệt hoặc từ chối đề tài KLTN.
                </p>
              </div>
              <div className="flex items-center justify-between pt-2">
                <button onClick={()=>setStep(2)} className="flex items-center gap-2 px-8 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all">
                  <span className="material-symbols-outlined">arrow_back</span>Quay lại
                </button>
                <button onClick={()=>setShowConfirm(true)} className="px-12 py-3 rounded-xl bg-primary text-white font-bold shadow-lg hover:scale-[1.02] transition-all flex items-center gap-2">
                  Xác nhận đăng ký <span className="material-symbols-outlined">send</span>
                </button>
              </div>
            </div>
          )}
        </div>
        <div className="lg:col-span-4"><RightPanel/></div>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  // ── Auth guard + role routing ──────────────────────────────────
  useEffect(()=>{
    const role=localStorage.getItem('ute_role');
    const email=localStorage.getItem('ute_email');
    if(!role||!email){
      window.location.href='login.html';
      return;
    }
    // Giảng viên → chuyển sang giangvien.html
    if(role==='giangvien'){
      window.location.href='giangvien.html';
      return;
    }
    // Admin → chuyển sang trangchu (hoặc admin.html nếu có)
  },[]);

  const [tab,setTab]=useState('dashboard');
  const [dashData,setDashData]=useState(null);
  const [loadingDash,setLoadingDash]=useState(true);
  const [instructorList,setInstructorList]=useState([]);
  const [loadingGV,setLoadingGV]=useState(false);
  const [notifications,setNotifications]=useState([]);
  const [showSubmitReport,setShowSubmitReport]=useState(false);
  const [showSubmitKLTN,setShowSubmitKLTN]=useState(false);
  const [kltnInstructorList,setKltnInstructorList]=useState([]);
  const [loadingKltnGV,setLoadingKltnGV]=useState(false);
  const toast=useToast();

  // ── Tính unlock/disable trạng thái KLTN ────────────────────────
  const grade=dashData?.grade;
  const locked=dashData?.gradeLocked||false;
  // KLTN mở khi: điểm >= 5 VÀ GV đã khoá điểm (xác nhận chính thức)
  const kltnUnlocked = grade!==null && grade!==undefined && grade>=5 && locked;
  // BCTT disabled khi KLTN mở
  const bcttDisabled = kltnUnlocked;

  // ── Load dashboard data từ API GAS ─────────────────────────────
  const loadDash=useCallback(async()=>{
    if(!SESSION.email) return;
    setLoadingDash(true);
    try{
      // Load song song: dashboard data + thông báo từ sheet
      const [data, sheetNotis] = await Promise.all([
        apiGet({action:'getStudentDashboardData',email:SESSION.email}),
        fetchSVNotifications(SESSION.email),
      ]);
      setDashData(data);

      // Thông báo từ sheet Notifications (do GV ghi khi duyệt/từ chối)
      const notes = [...sheetNotis];

      // Thêm thông báo dựa trên trạng thái hiện tại (nếu chưa có trong sheet)
      if(data?.status==='approved'&&!data?.reportSubmitted
         && !notes.some(n=>n.message.includes('đã duyệt đề tài')))
        notes.unshift({message:`✅ Đề tài "${data.topic}" đã được GV duyệt! Hãy thực hiện và nộp báo cáo.`,time:'Vừa cập nhật'});
      if(data?.status==='rejected'
         && !notes.some(n=>n.message.includes('từ chối đề tài')))
        notes.unshift({message:`❌ Đề tài "${data.topic}" bị từ chối. Vui lòng đổi đề tài.`,time:'Vừa cập nhật'});
      if(data?.reportSubmitted&&data?.grade===null)
        notes.push({message:`📄 Báo cáo đã được nộp. GV đang chấm điểm trong 2 tuần.`,time:'Vừa cập nhật'});
      if(data?.grade!==null&&data?.grade!==undefined)
        notes.push({message:`📊 Điểm thực tập của bạn: ${data.grade} — ${data.grade>=5?'Đạt ✓':'Không đạt ✗'}`,time:'Vừa cập nhật'});
      if(data?.grade>=5&&data?.gradeLocked)
        notes.push({message:`🎓 Bạn đủ điều kiện đăng ký Khóa Luận Tốt Nghiệp!`,time:'Vừa cập nhật'});

      if(notes.length>0) setNotifications(notes);

    }catch(e){console.error('Dashboard load error:',e);}
    setLoadingDash(false);
  },[]);

  useEffect(()=>{loadDash();},[loadDash]);

  // ── Load danh sách GV khi vào tab registration ─────────────────
  useEffect(()=>{
    if(tab==='registration'&&instructorList.length===0){
      setLoadingGV(true);
      fetchGVFromCSV()
        .then(rows=>setInstructorList(rows))
        .catch(()=>console.warn('Không tải được GV từ Sheet'))
        .finally(()=>setLoadingGV(false));
    }
    // Load GV cho tab kltn
    if(tab==='kltn'&&kltnInstructorList.length===0){
      setLoadingKltnGV(true);
      fetchGVFromCSV()
        .then(rows=>setKltnInstructorList(rows))
        .catch(()=>console.warn('Không tải được GV từ Sheet'))
        .finally(()=>setLoadingKltnGV(false));
    }
  },[tab]);

  function handleRegSuccess(){
    setTab('dashboard');
    setDashData(null);
    loadDash();
    toast.show('Đăng ký thành công! Đang chờ giảng viên xác nhận.','success');
  }

  function handleChangeTopic(){
    // Reset instructor list để tải lại từ API
    setInstructorList([]);
    setTab('registration');
  }

  function handleSubmitReportSuccess(){
    setShowSubmitReport(false);
    setDashData(null);
    loadDash();
    toast.show('Nộp báo cáo thành công! GV sẽ chấm điểm trong 2 tuần.','success');
  }

  function handleSubmitKLTNSuccess(){
    setShowSubmitKLTN(false);
    setDashData(null);
    loadDash();
    toast.show('Nộp khóa luận thành công! GV sẽ chấm điểm theo lịch bảo vệ.','success');
  }

  function handleKltnRegSuccess(){
    setTab('dashboard');
    setDashData(null);
    loadDash();
    toast.show('Đăng ký KLTN thành công! Đang chờ giảng viên xác nhận.','success');
  }

  return(
    <div className="min-h-screen bg-background">
      {toast.toast&&<Toast {...toast.toast} onClose={toast.hide}/>}

      {showSubmitReport&&(
        <SubmitReportModal
          dashData={dashData}
          onClose={()=>setShowSubmitReport(false)}
          onSuccess={handleSubmitReportSuccess}
          toast={toast}
        />
      )}

      {showSubmitKLTN&&(
        <SubmitKLTNModal
          dashData={dashData}
          onClose={()=>setShowSubmitKLTN(false)}
          onSuccess={handleSubmitKLTNSuccess}
          toast={toast}
        />
      )}

      <Sidebar
        tab={tab} setTab={setTab}
        kltnUnlocked={kltnUnlocked}
        bcttDisabled={bcttDisabled}
        logout={()=>{localStorage.clear();window.location.href='login.html';}}
        notifCount={notifications.length}
      />

      <Header notifications={notifications}/>

      <main className="pt-24 pb-10 px-6 min-h-screen" style={{marginLeft:'18rem'}}>
        <div className="max-w-7xl mx-auto">
          {tab==='dashboard'&&(
            <Dashboard
              dashData={dashData}
              loading={loadingDash}
              onRegister={()=>setTab('registration')}
              onChangeTopic={handleChangeTopic}
              onSubmitReport={()=>setShowSubmitReport(true)}
              onRegisterKLTN={()=>setTab('kltn')}
              onSubmitKLTN={()=>setShowSubmitKLTN(true)}
              toast={toast}
              kltnUnlocked={kltnUnlocked}
              bcttDisabled={bcttDisabled}
            />
          )}
          {tab==='registration'&&(
            <Registration
              onSuccess={handleRegSuccess}
              instructorList={instructorList}
              loadingGV={loadingGV}
            />
          )}
          {tab==='kltn'&&(
            <KLTNRegistration
              onSuccess={handleKltnRegSuccess}
              instructorList={kltnInstructorList}
              loadingGV={loadingKltnGV}
              dashData={dashData}
            />
          )}
        </div>
      </main>

      {/* Mobile bottom nav */}
      <nav className="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-white/90 backdrop-blur-lg rounded-t-3xl shadow-2xl">
        {[
          {id:'dashboard',icon:'home',l:'Trang chủ'},
          {id:'registration',icon:'assignment_turned_in',l:'Đăng ký'},
        ].map(it=>(
          <button key={it.id} onClick={()=>!bcttDisabled&&setTab(it.id)||it.id==='dashboard'&&setTab('dashboard')}
            className={`flex flex-col items-center justify-center px-4 py-2 rounded-2xl transition-all ${tab===it.id?'bg-blue-50 text-blue-800':'text-slate-400'}`}>
            <span className="material-symbols-outlined text-2xl">{it.icon}</span>
            <span className="text-[10px] font-semibold mt-1">{it.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
