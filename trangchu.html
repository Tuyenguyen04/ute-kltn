const SHEET_ID_GV    = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEET_GV_TAB   = 'Giảng viên phụ trách';
const SHEET_NOTIF_TAB = 'Notifications';

// Đọc thông báo dành cho SV này từ sheet Notifications (CSV)
// Sheet Notifications: A=Timestamp B=ForEmail C=Message D=Read
async function fetchSVNotifications(svEmail){
  try{
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID_GV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NOTIF_TAB)}`;
    const res = await fetch(url);
    if(!res.ok) return [];
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1); // bỏ header
    const email = svEmail.toLowerCase().trim();
    const results = [];
    for(const line of lines){
      const cols=[]; let cur='',inQ=false;
      for(let j=0;j<line.length;j++){
        const c=line[j];
        if(c==='"'){inQ=!inQ;}
        else if(c===','&&!inQ){cols.push(cur.replace(/^"|"$/g,'').trim());cur='';}
        else{cur+=c;}
      }
      cols.push(cur.replace(/^"|"$/g,'').trim());
      if((cols[1]||'').toLowerCase().trim()===email){
        results.push({ time: cols[0]||'', message: cols[2]||'' });
      }
    }
    // Trả 10 mới nhất (đảo ngược vì sheet append từ trên xuống)
    return results.slice(-10).reverse();
  }catch(e){ return []; }
}

// Đọc GV từ Google Sheet CSV (không cần Apps Script)
// Cột sheet GV: A=STT B=HọTên C=MãGV D=Gmail E=Role F=SLđăngkí G=SLcònlại H=Ngành
async function fetchGVFromCSV(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID_GV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_GV_TAB)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Không tải được sheet GV');
  const text = await res.text();
  const lines = text.trim().split('\n');
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const cols=[];let cur='',inQ=false;
    for(let j=0;j<lines[i].length;j++){
      const c=lines[i][j];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.replace(/"/g,'').trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.replace(/"/g,'').trim());
    if(cols[1]&&cols[3]){
      rows.push({
        name:cols[1]||'',
        code:cols[2]||'',
        email:cols[3]||'',
        slDangKi:parseInt(cols[5])||0,
        slConLai:parseInt(cols[6])||0,
        nganh:cols[7]||'',
      });
    }
  }
  return rows;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function letterGrade(g){
  if(g>=9.0) return 'A+'; if(g>=8.5) return 'A'; if(g>=8.0) return 'B+';
  if(g>=7.0) return 'B';  if(g>=6.5) return 'C+'; if(g>=5.5) return 'C';
  if(g>=5.0) return 'D+'; return 'F';
}
async function apiGet(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  return r.json();
}
async function apiPost(body){
  // GAS: dùng GET với redirect:follow để đọc được JSON response (tránh CORS)
  // doGet() trong GAS phải xử lý tất cả action
  const qs=new URLSearchParams(
    Object.fromEntries(Object.entries(body).map(([k,v])=>[k,String(v??'')]))
  ).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  const text=await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('JSON parse error:',e,text.slice(0,300)); throw new Error('Response không phải JSON'); }
}
// ── apiPost helper ────────────────────────────────────────────
// Gửi JSON qua POST với Content-Type: text/plain (simple request, không trigger CORS preflight)
async function _gasPost(body){
  const r=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=UTF-8'},
    body:JSON.stringify(body),
    redirect:'follow',
  });
  const text=await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('GAS parse error:',e,text.slice(0,200)); throw new Error('Response không phải JSON'); }
}

// ── Chunked file upload ───────────────────────────────────────
// Chia file thành các chunk nhỏ (4MB base64 ≈ 3MB binary) rồi gửi từng chunk.
// GAS ghép lại và trả driveUrl. Sau đó gọi action thật với driveUrl.
//
// Cách dùng:
//   const driveUrl = await uploadFileInChunks(file, 'BaoCaoTT_UTE', onProgress);
//   await apiPost({ action:'submitReport', ..., driveUrl });
//
const CHUNK_SIZE_BYTES = 3 * 1024 * 1024; // 3MB binary → ~4MB base64

async function uploadFileInChunks(file, folderName, onProgress){
  // Đọc toàn bộ file thành ArrayBuffer
  const buffer = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });

  const bytes = new Uint8Array(buffer);
  const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE_BYTES);
  const uploadId = Date.now() + '_' + Math.random().toString(36).slice(2,8);

  console.log(`📤 Bắt đầu upload: ${file.name} (${(bytes.length/1024/1024).toFixed(1)}MB, ${totalChunks} chunks)`);

  for(let i=0; i<totalChunks; i++){
    const start = i * CHUNK_SIZE_BYTES;
    const end   = Math.min(start + CHUNK_SIZE_BYTES, bytes.length);
    const chunk = bytes.slice(start, end);

    // Chuyển chunk sang base64
    let binary = '';
    chunk.forEach(b => binary += String.fromCharCode(b));
    const chunkBase64 = btoa(binary);

    let attempt = 0;
    let ok = false;
    while(attempt < 3 && !ok){
      try{
        const res = await _gasPost({
          action:'uploadChunk',
          uploadId, chunkIndex:i, totalChunks,
          chunkData:chunkBase64,
          fileName:file.name, mimeType:file.type||'application/octet-stream',
          folderName,
        });
        if(!res.success) throw new Error(res.message||'Chunk failed');
        ok = true;
      }catch(err){
        attempt++;
        console.warn(`Chunk ${i} thất bại lần ${attempt}:`, err.message);
        if(attempt>=3) throw new Error(`Upload thất bại chunk ${i}: ${err.message}`);
        await new Promise(r=>setTimeout(r, 1000 * attempt));
      }
    }

    if(onProgress) onProgress(Math.round(((i+1)/totalChunks)*100));
    console.log(`✅ Chunk ${i+1}/${totalChunks}`);
  }

  // Finalize: ghép và lưu file trên GAS
  const finalRes = await _gasPost({
    action:'finalizeUpload',
    uploadId, totalChunks,
    fileName:file.name, mimeType:file.type||'application/octet-stream',
    folderName,
  });
  if(!finalRes.success) throw new Error(finalRes.message||'Finalize thất bại');
  console.log('🎉 Upload hoàn tất:', finalRes.driveUrl);
  return finalRes.driveUrl;
}

// ── apiPostFile: tự động chọn direct hoặc chunked ────────────
// File ≤ 15MB: gửi base64 trực tiếp (nhanh, 1 request)
// File > 15MB: dùng chunked upload
const DIRECT_UPLOAD_LIMIT = 15 * 1024 * 1024; // 15MB

async function apiPostFile(body, onProgress){
  const { _file, folderName, ...rest } = body;

  // Nếu body truyền _file object (File API) → dùng chunked logic
  if(_file && _file instanceof File){
    if(_file.size <= DIRECT_UPLOAD_LIMIT){
      // Direct: đọc base64 và gửi trong 1 request
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(_file);
      });
      if(onProgress) onProgress(50);
      const result = await _gasPost({ ...rest, folderName,
        fileBase64:b64, fileName:_file.name,
        mimeType:_file.type||'application/octet-stream',
      });
      if(onProgress) onProgress(100);
      return result;
    } else {
      // Chunked upload
      const driveUrl = await uploadFileInChunks(_file, folderName||'Upload_UTE', onProgress);
      // Gọi action chính với driveUrl (không có fileBase64)
      return await _gasPost({ ...rest, driveUrl,
        fileName:_file.name, mimeType:_file.type||'application/octet-stream',
      });
    }
  }

  // Legacy: body đã có fileBase64 (code cũ vẫn hoạt động)
  return await _gasPost(body);
}

function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);
  return(
    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm anim-fade"
      style={{background:type==='error'?'#ba1a1a':type==='warn'?'#855300':'#005236',minWidth:'240px',justifyContent:'center'}}>
      <span className="material-symbols-outlined text-lg">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

// ── AVATAR ────────────────────────────────────────────────────────────────────
function Av({name='',cls=''}){
  // Lấy 2 ký tự cuối của tên (họ + tên đệm)
  const parts=name.trim().split(' ').filter(Boolean);
  const ini=parts.length>=2
    ?( parts[parts.length-2][0]+parts[parts.length-1][0] ).toUpperCase()
    :( parts[0]?.[0]||'?' ).toUpperCase();
  const cols=['from-blue-500 to-blue-700','from-emerald-500 to-teal-600','from-violet-500 to-purple-700','from-orange-400 to-red-500'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full bg-gradient-to-br ${cols[idx]} flex items-center justify-center text-white font-black text-sm flex-shrink-0 ${cls}`}>{ini}</div>;
}

        <div className="relative">
          <button onClick={()=>setShowNoti(v=>!v)} className="relative p-2 hover:bg-surface-container rounded-full transition-colors">

            {notifications.length>0&&(
              <span className="absolute top-1 right-1 bg-error text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full border-2 border-white">
                {notifications.length>9?'9+':notifications.length}

          {showNoti&&(

                <h4 className="font-bold text-sm">Thông báo</h4>

              </div>
              {notifications.length===0?(
                <div className="p-6 text-center text-sm text-on-surface-variant">Không có thông báo mới</div>
              ):(
                <div className="max-h-72 overflow-y-auto divide-y divide-outline-variant/10">
                  {notifications.map((n,i)=>(
                    <div key={i} className="p-4 hover:bg-surface-container-low transition-colors">
                      <p className="text-sm font-medium text-on-surface">{n.message}</p>

              )}

        </div>
        <div className="flex items-center gap-2 px-3 py-1.5 bg-surface-container-low rounded-full">
          <svg width="20" height="14" viewBox="0 0 20 14" style={{borderRadius:'2px',flexShrink:0}}>
            <rect width="20" height="14" fill="#DA251D"/>
            <polygon points="10,2.5 11.18,6.36 15.24,6.36 12.03,8.64 13.21,12.5 10,10.22 6.79,12.5 7.97,8.64 4.76,6.36 8.82,6.36" fill="#FFFF00"/>
          </svg>
          <span className="text-xs font-bold text-on-surface">VN</span>
        </div>
        {/* Avatar — bấm để đăng xuất */}
        <AvatarMenu/>

}

function AvatarMenu(){
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    if(!open) return;
    const handler=(e)=>{
      if(!e.target.closest('#avatar-menu-wrap')) setOpen(false);
    };
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[open]);
  return(
    <div id="avatar-menu-wrap" className="relative">
      <button onClick={()=>setOpen(o=>!o)}
        className={`focus:outline-none rounded-full transition-all ${open?'ring-2 ring-primary/50':''} hover:ring-2 hover:ring-primary/30`}>
        <Av name={SESSION.name} cls="w-9 h-9 cursor-pointer"/>
      </button>
      {open&&(
        <div className="absolute right-0 top-full mt-2 w-56 bg-white rounded-2xl shadow-2xl border border-outline-variant/20 z-50 overflow-hidden anim-slide">
          {/* Thông tin tài khoản */}
          <div className="px-4 py-3 bg-surface-container-low border-b border-outline-variant/10">
            <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-2">Tài khoản</p>
            <div className="flex items-center gap-3">
              <Av name={SESSION.name} cls="w-9 h-9 text-sm flex-shrink-0"/>
              <div className="min-w-0">
                <p className="text-sm font-bold text-on-surface truncate">{SESSION.name||'Sinh viên'}</p>
                <p className="text-xs text-on-surface-variant truncate">{SESSION.maSo}</p>
              </div>
            </div>
          </div>
          {/* Đăng xuất */}
          <button onClick={()=>{localStorage.clear();window.location.href='login.html';}}
            className="w-full flex items-center gap-3 px-4 py-3 text-error font-semibold hover:bg-error-container/20 transition-colors text-sm">
            <span className="material-symbols-outlined text-base">logout</span>
            Đăng xuất
          </button>
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD VIEW ────────────────────────────────────────────────────────────
function Dashboard({dashData,loading,onRegister,onChangeTopic,onSubmitReport,onRegisterKLTN,onSubmitKLTN,toast,kltnUnlocked,bcttDisabled}){
  if(loading) return <Spinner text="Đang tải dữ liệu..."/>;

  const reg    = dashData?.registered||false;
  const status = dashData?.status||null;        // null | pending | approved | rejected
  const topic  = dashData?.topic||'';
  const co     = dashData?.company||'';
  const instr  = dashData?.instructor||null;    // { name, id, email, term }
  const grade  = (dashData?.grade!==null&&dashData?.grade!==undefined) ? dashData.grade : null;
  const sem    = dashData?.semester||'';
  const locked = dashData?.gradeLocked||false;  // GV đã khoá điểm

  const pcts=[0,25,50,75,100];
  const stepDefs=[
    {l:'Bắt đầu',icon:'flag'},
    {l:'Đăng ký',icon:'check_circle'},
    {l:'Thực hiện',icon:'potted_plant'},
    {l:'Kết thúc',icon:'flag'},
    {l:'Xác nhận',icon:'verified'},
  ];

  const passed = grade!==null && grade>=5;
  const failed  = grade!==null && grade<5;
  const reportSubmitted = dashData?.reportSubmitted||false; // SV đã nộp báo cáo

  // Nút "Đổi đề tài": chỉ active khi pending HOẶC bị từ chối HOẶC điểm trượt+locked
  // Khi approved → KHÔNG cho đổi nữa
  const canChange = reg&&(status==='rejected'||(status==='pending')||( failed&&locked));

  // Nộp báo cáo: chỉ mở khi approved VÀ chưa nộp
  const canSubmitReport = reg && status==='approved' && !reportSubmitted && grade===null;

  // Đăng ký BCTT: chỉ mở khi chưa đăng ký lần nào (kể cả rejected vẫn block)
  const bcttAlreadyReg = reg; // đã từng đăng ký → khoá vĩnh viễn

  // Tiến độ: thêm bước "Nộp BC" sau approved
  // 0=Bắt đầu|1=Đăng ký|2=Thực hiện|3=Kết thúc|4=Xác nhận
  let curStep=0;
  if(reg){
    if(status==='pending'||status==='rejected') curStep=1;
    if(status==='approved')  curStep=2;
    if(reportSubmitted||grade!==null) curStep=3;
    if(locked)               curStep=4;
  }

  const stepLabel=!reg?'• Chưa đăng ký':
    status==='pending'?'• Chờ GV duyệt':
    status==='rejected'?'• Bị từ chối':
    status==='approved'&&!reportSubmitted?'• Đang thực hiện':
    reportSubmitted&&grade===null?'• Đã nộp BC — Chờ chấm điểm':
    grade!==null&&!locked?'• Chờ xác nhận điểm':
    locked?'• Hoàn tất':'';

  return(
    <div className="space-y-6 anim-fade">

      {/* ── Row 1: Actions + Grade BCTT + Grade KLTN ──────────── */}
      <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
        {/* Action buttons */}
        <div className="md:col-span-8 p-6 bg-surface-container-lowest rounded-3xl shadow-sm">
          <div className="grid grid-cols-3 gap-4">

            {/* 1. Đăng ký BCTT — chỉ mở khi chưa từng đăng ký */}
            <button onClick={!bcttAlreadyReg&&!bcttDisabled?onRegister:undefined}
              disabled={bcttAlreadyReg||bcttDisabled}
              title={bcttAlreadyReg?'Bạn chỉ được Đăng Ký BCTT 1 lần':bcttDisabled?'Không khả dụng':'Đăng ký đề tài mới'}
              className={`p-6 rounded-2xl font-bold flex flex-col items-center justify-center gap-3 transition-all
                ${(bcttAlreadyReg||bcttDisabled)
                  ?'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-40'
                  :'bg-gradient-to-br from-primary to-primary-container text-white shadow-lg shadow-primary/20 hover:scale-[1.02]'}`}>
              <span className="material-symbols-outlined text-2xl">add_circle</span>
              <span className="text-sm text-center leading-tight">Đăng ký BCTT</span>
              {bcttAlreadyReg&&<span className="text-[9px] font-normal opacity-70 text-center leading-tight">Chỉ 1 lần</span>}
            </button>

            {/* 2. Nộp báo cáo — mở khi approved, đóng khi pending/rejected/đã nộp */}
            <button onClick={canSubmitReport?onSubmitReport:undefined}
              disabled={!canSubmitReport}
              title={
                !reg?'Đăng ký BCTT trước':
                status==='pending'?'Chờ GV duyệt đề tài':
                status==='rejected'?'Đề tài bị từ chối':
                reportSubmitted?'Bạn đã nộp báo cáo':
                grade!==null?'GV đang chấm điểm':
                canSubmitReport?'Nộp file báo cáo thực tập':'Không khả dụng'
              }
              className={`p-6 rounded-2xl font-bold flex flex-col items-center justify-center gap-3 transition-all relative
                ${canSubmitReport
                  ?'bg-gradient-to-br from-tertiary-container to-tertiary text-white shadow-lg hover:scale-[1.02]'
                  :reportSubmitted
                    ?'bg-tertiary-fixed/30 text-on-tertiary-fixed/50 cursor-not-allowed opacity-70'
                    :'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-40'}`}>
              <span className="material-symbols-outlined text-2xl">
                {reportSubmitted?'task_alt':'upload_file'}
              </span>
              <span className="text-sm text-center leading-tight">
                {reportSubmitted?'Đã nộp BC':'Nộp báo cáo'}
              </span>
              {canSubmitReport&&<span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-white/80 animate-pulse"/>}
            </button>

            {/* 3. Đổi đề tài — mở khi pending hoặc rejected, đóng khi approved */}
            <button onClick={canChange?onChangeTopic:undefined} disabled={!canChange}
              title={
                status==='approved'?'Đề tài đã được duyệt, không thể đổi':
                canChange?'Đổi sang đề tài / GV khác':'Không khả dụng'
              }
              className={`p-6 rounded-2xl font-bold flex flex-col items-center justify-center gap-3 transition-all
                ${canChange
                  ?'bg-secondary-container text-on-secondary-container hover:scale-[1.02] cursor-pointer shadow-md'
                  :'bg-surface-container-highest text-on-surface/40 cursor-not-allowed opacity-50'}`}>
              <span className="material-symbols-outlined text-2xl">sync_alt</span>
              <span className="text-sm text-center leading-tight">Đổi đề tài</span>
            </button>
          </div>

          {/* ── Banners thông báo trạng thái ── */}
          {status==='pending'&&!reportSubmitted&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-secondary-container/20 border border-secondary-container/30 rounded-2xl text-on-secondary-container text-sm font-medium">
              <span className="material-symbols-outlined text-base">hourglass_top</span>
              Đề tài đang chờ GV duyệt. Bạn có thể <strong className="mx-1">Đổi đề tài</strong> nếu muốn.
            </div>
          )}
          {status==='rejected'&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">
              <span className="material-symbols-outlined text-base">report</span>
              Đề tài bị từ chối. Nhấn <strong className="mx-1">"Đổi đề tài"</strong> để đăng ký lại.
            </div>
          )}
          {status==='approved'&&!reportSubmitted&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-primary-fixed/40 rounded-2xl text-on-primary-fixed text-sm font-medium">
              <span className="material-symbols-outlined text-base">check_circle</span>
              GV đã duyệt đề tài! Hãy <strong className="mx-1">"Nộp báo cáo"</strong> sau khi hoàn thành thực tập.
            </div>
          )}
          {reportSubmitted&&grade===null&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-tertiary-fixed/30 rounded-2xl text-on-tertiary-fixed text-sm font-medium">
              <span className="material-symbols-outlined text-base">mark_email_read</span>
              Báo cáo đã nộp! GV đang chấm điểm trong vòng <strong className="mx-1">2 tuần</strong>.
            </div>
          )}
          {failed&&locked&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">
              <span className="material-symbols-outlined text-base">report</span>
              Điểm dưới 5.0 — cần làm lại BCTT. Nhấn <strong className="mx-1">"Đổi đề tài"</strong> để bắt đầu lại.
            </div>
          )}
          {kltnUnlocked&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-tertiary-fixed rounded-2xl text-on-tertiary-fixed text-sm font-medium">
              <span className="material-symbols-outlined text-base">school</span>
              Bạn đủ điều kiện đăng ký KLTN! Chọn <strong className="mx-1">"Đăng ký KLTN"</strong> ở menu trái.
            </div>
          )}
        </div>

        {/* ── KLTN Action Panel — hiện khi đủ điều kiện ─────────── */}
        {kltnUnlocked&&(
          <KLTNActionPanel
            dashData={dashData}
            onRegisterKLTN={onRegisterKLTN}
            onSubmitKLTN={onSubmitKLTN}
            toast={toast}
          />
        )}

        {/* Grade BCTT card */}
        <div className={`md:col-span-2 p-6 rounded-3xl flex flex-col items-center justify-center text-center space-y-2 shadow-sm transition-all duration-500
          ${failed&&locked?'bg-red-100':passed?'bg-tertiary-fixed':'bg-tertiary-fixed'}`}>
          <span className="text-[10px] font-bold uppercase tracking-widest opacity-70">Kết quả thực tập</span>

          {/* Có điểm */}
          {grade!==null?(
            <>
              <div className="flex items-baseline gap-2">
                <span className={`text-5xl font-headline font-black ${failed?'text-error':'text-on-tertiary-fixed'}`}>
                  {grade.toFixed(1)}
                </span>
                <span className={`text-2xl font-headline font-bold ${failed?'text-error/70':'text-tertiary-fixed-dim'}`}>
                  {letterGrade(grade)}
                </span>
              </div>
              <p className={`text-xs font-medium ${failed?'text-error':'text-on-tertiary-fixed'}`}>
                {failed?'Không đạt — cần làm lại BCTT':passed?`Đạt • ${sem}`:''}
              </p>
              {!locked&&(
                <div className="mt-1 px-3 py-1 bg-secondary-container/30 rounded-full text-[10px] font-bold text-on-secondary-container">
                  ⏳ Còn 7 ngày phúc khảo
                </div>
              )}
              {locked&&<div className="mt-1 px-3 py-1 bg-white/30 rounded-full text-[10px] font-bold text-on-tertiary-fixed">✓ Điểm đã xác nhận</div>}
            </>
          ):(
            <>
              <div className="flex items-baseline gap-2">
                <span className="text-5xl font-headline font-black text-on-tertiary-fixed/30">--</span>
              </div>
              <p className="text-xs font-medium text-on-tertiary-fixed/50">Chưa có kết quả</p>
            </>
          )}
        </div>

        {/* Grade KLTN card */}
        {(()=>{
          // GAS trả kltnGrade, kltnGradeLocked bên trong dashData.kltn
          const kltnObj   = dashData?.kltn||null;
          const kltnGrade = (kltnObj?.kltnGrade!==null&&kltnObj?.kltnGrade!==undefined) ? parseFloat(kltnObj.kltnGrade) : null;
          const kltnLocked= kltnObj?.kltnGradeLocked||false;
          const kltnPassed = kltnGrade!==null && kltnGrade>=5;
          const kltnFailed = kltnGrade!==null && kltnGrade<5;
          return(
            <div className={`md:col-span-2 p-6 rounded-3xl flex flex-col items-center justify-center text-center space-y-2 shadow-sm transition-all duration-500
              ${kltnFailed&&kltnLocked?'bg-red-100':kltnPassed?'bg-primary-fixed':'bg-primary-fixed'}`}>
              <span className="text-[10px] font-bold uppercase tracking-widest opacity-70 text-on-primary-fixed">Kết quả KLTN</span>

              {kltnGrade!==null?(
                <>
                  <div className="flex items-baseline gap-2">
                    <span className={`text-5xl font-headline font-black ${kltnFailed?'text-error':'text-on-primary-fixed'}`}>
                      {kltnGrade.toFixed(1)}
                    </span>
                    <span className={`text-2xl font-headline font-bold ${kltnFailed?'text-error/70':'text-primary-fixed-dim'}`}>
                      {letterGrade(kltnGrade)}
                    </span>
                  </div>
                  <p className={`text-xs font-medium ${kltnFailed?'text-error':'text-on-primary-fixed'}`}>
                    {kltnFailed?'Không đạt':kltnPassed?'Đạt':''}
                  </p>
                  {!kltnLocked&&(
                    <div className="mt-1 px-3 py-1 bg-primary-fixed-dim/30 rounded-full text-[10px] font-bold text-on-primary-fixed">
                      ⏳ Chờ xác nhận
                    </div>
                  )}
                  {kltnLocked&&<div className="mt-1 px-3 py-1 bg-white/30 rounded-full text-[10px] font-bold text-on-primary-fixed">✓ Điểm đã xác nhận</div>}
                </>
              ):(
                <>
                  <div className="flex items-baseline gap-2">
                    <span className="text-5xl font-headline font-black text-on-primary-fixed/30">--</span>
                  </div>
                  <p className="text-xs font-medium text-on-primary-fixed/50">Chưa có kết quả</p>
                  {!kltnUnlocked&&(
                    <div className="mt-1 px-2 py-1 bg-primary-fixed-dim/20 rounded-full text-[10px] font-medium text-on-primary-fixed/60">
                      🔒 Hoàn thành BCTT trước
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })()}
      </div>

      {/* ── Row 2: GV Info + Stepper ───────────────────────────── */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

        {/* GV Card — chỉ hiện dữ liệu thật từ sheet sau khi đăng ký */}
        <div className="p-6 bg-surface-container-lowest rounded-3xl shadow-sm flex flex-col justify-between">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-on-surface">Thông tin Giảng viên</h3>
            <span className="material-symbols-outlined text-primary">contact_page</span>
          </div>

          {instr&&instr.name?(
            /* Có GV sau khi đăng ký */
            <>
              <div className="flex items-center gap-4 p-4 bg-surface-container-low rounded-2xl mb-4">
                <Av name={instr.name} cls="w-16 h-16 rounded-2xl text-xl"/>
                <div>
                  <p className="font-bold text-on-surface">{instr.name}</p>
                  <p className="text-xs text-on-surface-variant">GV.{instr.id}</p>
                </div>
              </div>
              <div className="space-y-3 mb-4">
                <div className="flex items-center gap-3 text-sm text-on-surface-variant">
                  <span className="material-symbols-outlined text-base">mail</span>
                  <span className="truncate">{instr.email}</span>
                </div>
                <div className="flex items-center gap-3 text-sm text-on-surface-variant">
                  <span className="material-symbols-outlined text-base">calendar_today</span>
                  <span>{instr.term||'--'}</span>
                </div>
              </div>
              <button onClick={()=>toast.show('Hệ thống tin nhắn đang được bảo trì!','warn')}
                className="w-full py-3 bg-surface-container-highest text-primary font-bold rounded-xl text-sm hover:bg-primary/5 transition-colors">
                Gửi tin nhắn cho GV
              </button>
            </>
          ):(
            /* Chưa đăng ký — placeholder trống */
            <div className="flex-1 flex flex-col items-center justify-center gap-3 py-8 text-on-surface-variant">
              <span className="material-symbols-outlined text-5xl opacity-15">person_off</span>
              <p className="text-sm font-medium">Chưa có giảng viên hướng dẫn</p>
              <p className="text-xs text-center opacity-60 max-w-[200px]">Đăng ký đề tài BCTT để được phân công GVHD</p>
            </div>
          )}
        </div>

        {/* Stepper */}
        <section className="p-8 bg-surface-container-lowest rounded-3xl shadow-sm flex flex-col justify-center">
          <h3 className="text-lg font-bold mb-8 text-center">Hành trình thực tập</h3>
          <div className="relative flex justify-between">
            <div className="absolute top-5 left-0 w-full h-[2px] bg-outline-variant/20"/>
            <div className="absolute top-5 left-0 h-[2px] bg-tertiary-fixed-dim transition-all duration-700" style={{width:`${pcts[curStep]}%`}}/>
            {stepDefs.map((s,i)=>(
              <div key={i} className="relative z-10 flex flex-col items-center gap-3">
                <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all duration-500
                  ${i<curStep?'bg-tertiary-fixed-dim text-on-tertiary-fixed':
                    i===curStep?'bg-primary border-4 border-primary-fixed-dim text-white ring-4 ring-white':
                    'bg-surface-dim text-on-surface-variant'}`}>
                  <span className="material-symbols-outlined text-sm">{i<curStep?'check_circle':s.icon}</span>
                </div>
                <span className={`text-[10px] font-bold ${i===curStep?'text-primary':i<curStep?'text-on-surface':'text-on-surface-variant font-medium'}`}>{s.l}</span>
              </div>
            ))}
          </div>
          <div className="mt-8 flex flex-col md:flex-row items-center gap-4 w-full">
            <div className="flex-1 w-full bg-surface-container-highest rounded-full h-3 overflow-hidden">
              <div className="bg-primary h-full rounded-full transition-all duration-700" style={{width:`${pcts[curStep]}%`}}/>
            </div>
            <div className="flex items-center gap-2 whitespace-nowrap">
              <span className="text-xs font-bold text-primary">{pcts[curStep]}%</span>
              <span className="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">{stepLabel}</span>
            </div>
          </div>
        </section>
      </div>

      {/* ── Row 3: GV Phản biện & Hội đồng + Hành trình KLTN ─── */}
      {(()=>{
        const kltnData    = dashData?.kltn||null;
        const gvPB        = kltnData?.gvPhanBien||null;       // { name, email }
        const hoiDong     = kltnData?.hoiDong||null;          // { truong, tv1, tv2, thuKy }

          {l:'Đăng ký',    icon:'how_to_reg'},
          {l:'Đề cương',   icon:'description'},
          {l:'Thực hiện',  icon:'potted_plant'},
          {l:'Bảo vệ',     icon:'record_voice_over'},
          {l:'Kết thúc',   icon:'verified'},
        ];
        const kltnPcts=[0,25,50,75,100];
        return(
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

            {/* GV Phản biện & Hội đồng */}
            <div className="p-6 bg-surface-container-lowest rounded-3xl shadow-sm flex flex-col gap-4">
              <div className="flex items-center justify-between">
                <h3 className="font-bold text-on-surface">Hội đồng & Phản biện KLTN</h3>

                <>
                  {/* GV Phản biện */}

                        <span className="ml-auto px-2 py-0.5 bg-secondary-container text-on-secondary-container text-[10px] font-black rounded-full flex-shrink-0">PB</span>
                      </div>
                    ):(

                  {/* Hội đồng */}
                  <div>
                    <p className="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant mb-2">Hội đồng chấm</p>
                    <div className="space-y-2">
                      {[
                        {role:'Trưởng HĐ', data:hoiDong?.truong,   badge:'bg-primary text-white',          icon:'workspace_premium'},
                        {role:'Thành viên',data:hoiDong?.tv1,       badge:'bg-surface-container-highest text-on-surface-variant', icon:'person'},
                        {role:'Thành viên',data:hoiDong?.tv2,       badge:'bg-surface-container-highest text-on-surface-variant', icon:'person'},
                        {role:'Thư ký',    data:hoiDong?.thuKy,     badge:'bg-tertiary-fixed text-on-tertiary-fixed', icon:'edit_note'},
                      ].map((m,i)=>(

              ):(

                  <p className="text-sm font-medium">Chưa mở</p>

      {/* ── Row 4: Lịch sử hoạt động ──────────────────────────── */}
      {(()=>{
        // ── Build lịch sử đầy đủ ──────────────────────────────
        const submittedAt = localStorage.getItem('ute_bctt_submittedAt')||'';
        const allHistory = [];

        if(reg&&topic){
          // Sự kiện 1: SV nộp đăng ký
          allHistory.push({
            loai:'BCTT',
            icon:'assignment_turned_in',
            iconBg:'bg-primary-fixed',
            iconTx:'text-primary',
            action:'Nộp đơn đăng ký BCTT',
            topic,
            detail:`GV: ${instr?.name||'--'} • ${instr?.term||'--'}`,
            sub:`${co||'--'} ${dashData?.position?'· '+dashData.position:''}`,
            time: submittedAt || instr?.term || '--',
            status:status||'pending',
          });

          // Sự kiện 2: GV duyệt / từ chối (chỉ hiện khi có kết quả)
          if(status==='approved'){
            allHistory.push({
              loai:'BCTT',
              icon:'check_circle',
              iconBg:'bg-tertiary-fixed/30',
              iconTx:'text-on-tertiary-fixed',
              action:'GV duyệt đề tài',
              topic,
              detail:`GV ${instr?.name||'--'} đã xác nhận hướng dẫn`,
              sub:'Yêu cầu đã được chấp thuận',
              time:'--',
              status:'approved',
            });
          }
          if(status==='rejected'){
            allHistory.push({
              loai:'BCTT',
              icon:'cancel',
              iconBg:'bg-error-container',
              iconTx:'text-on-error-container',
              action:'GV từ chối đề tài',
              topic,
              detail:`GV ${instr?.name||'--'} đã từ chối`,
              sub:'Bạn có thể đổi đề tài để đăng ký lại',
              time:'--',
              status:'rejected',
            });
          }

          // Sự kiện 3: Nộp báo cáo
          if(dashData?.reportSubmitted){
            allHistory.push({
              loai:'BCTT',
              icon:'upload_file',
              iconBg:'bg-secondary-container/20',
              iconTx:'text-secondary',
              action:'Nộp báo cáo thực tập',
              topic,
              detail:`GV ${instr?.name||'--'} đang chấm điểm`,
              sub:'Thời gian chấm: tối đa 2 tuần',
              time:'--',
              status:'pending',
            });
          }

          // Sự kiện 4: Có điểm
          if(grade!==null){
            const passed = grade>=5;
            allHistory.push({
              loai:'BCTT',
              icon: passed?'grade':'report',
              iconBg: passed?'bg-tertiary-fixed/40':'bg-error-container',
              iconTx: passed?'text-on-tertiary-fixed':'text-on-error-container',
              action: passed?`Điểm thực tập: ${grade.toFixed(1)} — Đạt ✓`:`Điểm thực tập: ${grade.toFixed(1)} — Không đạt ✗`,
              topic,
              detail: locked?'Điểm đã được khoá chính thức':'Đang trong thời gian phúc khảo (7 ngày)',
              sub: passed&&locked?'🎓 Đủ điều kiện đăng ký KLTN':'',
              time:'--',
              status: passed?'approved':'rejected',
            });
          }
        }

        // KLTN history
        const kltnData=dashData?.kltn||null;
        if(kltnData?.registered&&kltnData?.topic){
          allHistory.push({
            loai:'KLTN',
            icon:'school',
            iconBg:'bg-primary-fixed',
            iconTx:'text-primary',
            action:'Nộp đơn đăng ký KLTN',
            topic:kltnData.topic,
            detail:`GV: ${kltnData.instructor?.name||'--'} • ${kltnData.instructor?.term||'--'}`,
            sub:'',
            time:'--',
            status:kltnData.status||'pending',
          });
          if(kltnData.status==='approved'){
            allHistory.push({
              loai:'KLTN',
              icon:'check_circle',
              iconBg:'bg-tertiary-fixed/30',
              iconTx:'text-on-tertiary-fixed',
              action:'GV duyệt đề tài KLTN',
              topic:kltnData.topic,
              detail:`GV ${kltnData.instructor?.name||'--'} đã xác nhận`,
              sub:'',
              time:'--',
              status:'approved',
            });
          }
          if(kltnData.kltnGrade!==null&&kltnData.kltnGrade!==undefined){
            const kp=kltnData.kltnGrade>=5;
            allHistory.push({
              loai:'KLTN',
              icon:kp?'verified':'report',
              iconBg:kp?'bg-primary-fixed/60':'bg-error-container',
              iconTx:kp?'text-on-primary-fixed':'text-on-error-container',
              action:`Điểm KLTN: ${parseFloat(kltnData.kltnGrade).toFixed(1)} — ${kp?'Đạt ✓':'Không đạt ✗'}`,
              topic:kltnData.topic,
              detail:kltnData.kltnGradeLocked?'Điểm đã khoá chính thức':'Chờ khoá điểm',
              sub:'',
              time:'--',
              status:kp?'approved':'rejected',
            });
          }
        }

        const [filterLoai,setFilterLoai]=useState('all');
        const [showAll,setShowAll]=useState(false);

        // Đảo ngược để sự kiện mới nhất lên đầu
        const reversed=[...allHistory].reverse();
        const filtered=reversed.filter(r=>filterLoai==='all'||r.loai===filterLoai);
        const displayed=showAll?filtered:filtered.slice(0,5);
        const hasMore=filtered.length>5;

        const TypeBadge=({loai})=>(
          <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-black tracking-wider flex-shrink-0
            ${loai==='BCTT'?'bg-primary-fixed text-on-primary-fixed':'bg-tertiary-fixed text-on-tertiary-fixed'}`}>
            {loai}
          </span>
        );

        return(
          <div className="bg-surface-container-lowest rounded-3xl overflow-hidden shadow-sm">
            {/* Header */}
            <div className="p-6 flex flex-wrap items-center justify-between gap-3 border-b border-outline-variant/10">
              <div className="flex items-center gap-3">
                <span className="material-symbols-outlined text-primary">history</span>
                <h3 className="font-bold text-on-surface">Lịch sử hoạt động</h3>
                {filtered.length>0&&(
                  <span className="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed text-[10px] font-black rounded-full">
                    {filtered.length}
                  </span>
                )}
              </div>
              <div className="flex items-center gap-1.5 p-1 bg-surface-container rounded-full">
                {[{v:'all',l:'Tất cả'},{v:'BCTT',l:'BCTT'},{v:'KLTN',l:'KLTN'}].map(opt=>(
                  <button key={opt.v} onClick={()=>{setFilterLoai(opt.v);setShowAll(false);}}
                    className={`px-3 py-1 rounded-full text-xs font-bold transition-all
                      ${filterLoai===opt.v?'bg-primary text-white shadow-sm':'text-on-surface-variant hover:text-on-surface'}`}>
                    {opt.l}
                  </button>
                ))}
              </div>
            </div>

            {filtered.length===0?(
              /* Empty state */
              <div className="px-6 py-16 flex flex-col items-center text-center gap-3">
                <div className="w-16 h-16 rounded-2xl bg-surface-container flex items-center justify-center">
                  <span className="material-symbols-outlined text-3xl text-on-surface-variant/30">inbox</span>
                </div>
                <p className="text-sm font-semibold text-on-surface-variant">
                  {filterLoai==='all'?'Chưa có hoạt động nào':'Chưa có lịch sử '+filterLoai}
                </p>
                <p className="text-xs text-on-surface-variant/60 max-w-xs">
                  {filterLoai==='KLTN'?'Hoàn thành BCTT với điểm đạt để mở đăng ký KLTN':'Đăng ký BCTT để bắt đầu hành trình của bạn'}
                </p>
              </div>
            ):(
              /* Timeline */
              <div className="divide-y divide-outline-variant/10">
                {displayed.map((row,i)=>(
                  <div key={i} className="flex items-start gap-4 px-6 py-5 hover:bg-surface-container-low/40 transition-colors">
                    {/* Icon */}
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${row.iconBg}`}>
                      <span className={`material-symbols-outlined text-lg ${row.iconTx}`}>{row.icon}</span>
                    </div>
                    {/* Content */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap mb-1">
                        <TypeBadge loai={row.loai}/>
                        <p className="text-sm font-bold text-on-surface">{row.action}</p>
                      </div>
                      <p className="text-xs text-on-surface-variant font-medium truncate">{row.topic}</p>
                      {row.detail&&<p className="text-xs text-on-surface-variant/70 mt-0.5">{row.detail}</p>}
                      {row.sub&&<p className="text-xs text-primary/80 font-medium mt-0.5">{row.sub}</p>}
                    </div>
                    {/* Right: time + status */}
                    <div className="flex flex-col items-end gap-2 flex-shrink-0">
                      <Pill status={row.status}/>
                      {row.time&&row.time!=='--'&&(
                        <span className="text-[10px] text-on-surface-variant/60">{row.time}</span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Footer */}
            {hasMore&&(
              <div className="px-6 py-3 border-t border-outline-variant/10 flex items-center justify-between">
                <p className="text-[11px] text-on-surface-variant">
                  Hiển thị <span className="font-bold text-on-surface">{displayed.length}</span> / <span className="font-bold text-on-surface">{filtered.length}</span> sự kiện
                </p>
                <button onClick={()=>setShowAll(v=>!v)}
                  className="flex items-center gap-1 text-[11px] font-bold text-primary hover:underline">
                  {showAll?'Thu gọn':'Xem tất cả'}
                  <span className="material-symbols-outlined text-xs">{showAll?'expand_less':'expand_more'}</span>
                </button>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ── REGISTRATION FLOW ─────────────────────────────────────────────────────────
function Registration({onSuccess,instructorList,loadingGV}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({topic:'',category:'',company:'',semester:'',startDate:'',position:'',internDuration:'',note:''});
  const [selGV,setSelGV]=useState(null);
  const [showConfirm,setShowConfirm]=useState(false);
  const [showSuccess,setShowSuccess]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const toast=useToast();

  function setSem(v){setForm(f=>({...f,semester:v,startDate:SEM_DATE[v]||''}))}

  function next1(){
    if(!form.topic.trim()){toast.show('Vui lòng nhập tên đề tài!','error');return;}
    if(!form.category){toast.show('Vui lòng chọn mảng đề tài!','error');return;}
    if(!form.company.trim()){toast.show('Vui lòng nhập đơn vị thực tập!','error');return;}
    if(!form.semester){toast.show('Vui lòng chọn học kỳ!','error');return;}
    if(!form.position.trim()){toast.show('Vui lòng nhập vị trí thực tập!','error');return;}
    if(!form.internDuration.trim()){toast.show('Vui lòng nhập thời gian thực tập!','error');return;}
    setStep(2);window.scrollTo(0,0);
  }
  function next2(){
    if(!selGV){toast.show('Vui lòng chọn giảng viên hướng dẫn!','error');return;}
    setStep(3);window.scrollTo(0,0);
  }

  async function confirm(){
    setSubmitting(true);
    const termLabel = form.semester==='D1-HK1-2526'?'Đợt 1 - HK1 NH25-26'
      :form.semester==='D2-HK1-2526'?'Đợt 2 - HK1 NH25-26'
      :form.semester==='D1-HK2-2526'?'Đợt 1 - HK2 NH25-26'
      :'Đợt 2 - HK2 NH25-26';

    const params = new URLSearchParams({
      action         : 'submitRegistration',
      type           : 'bctt',
      email          : SESSION.email,
      name           : SESSION.name,
      maSo           : SESSION.maSo,
      nganh          : SESSION.nganh,
      topic          : form.topic,
      company        : form.company,
      instructorName : selGV.name,
      instructorEmail: selGV.email,
      instructorId   : selGV.id || selGV.code || '',
      term           : termLabel,
      note           : form.note || '',
      position       : form.position || '',
      internDuration : form.internDuration || '',
      semester       : form.semester || '',
    });

    // Chỉ lưu dữ liệu khi GAS xác nhận success:true (đã ghi sheet + đã gửi mail)
    // KHÔNG dùng no-cors fallback vì không đọc được response → không biết kết quả
    try {
      const r = await fetch(`${API_URL}?${params.toString()}`, { redirect: 'follow' });

      let res = null;
      try { res = await r.json(); } catch(_) {
        toast.show('❌ Lỗi không xác định từ server. Vui lòng thử lại.', 'error');
        setSubmitting(false);
        return;
      }

      if (res && res.success) {
        // ✅ GAS xác nhận: đã ghi sheet + đã gửi mail → mới cập nhật UI
        localStorage.setItem('ute_bctt_submittedAt', new Date().toLocaleString('vi-VN'));
        setShowConfirm(false);
        setShowSuccess(true);
      } else {
        // ❌ GAS trả lỗi rõ ràng → KHÔNG lưu gì, hiển thị đúng message
        const errMsg = (res && res.message) || 'Gửi thất bại. Vui lòng thử lại.';
        toast.show(`❌ ${errMsg}`, 'error');
        setSubmitting(false);
      }
    } catch(networkErr) {
      // Lỗi mạng (offline / timeout) → KHÔNG lưu gì
      toast.show('❌ Lỗi kết nối mạng. Kiểm tra internet và thử lại.', 'error');
      setSubmitting(false);
    }
  }

  // ── Step bar ───────────────────────────────────────────────────
  const STEPS=['Thông tin cơ bản','Chọn Giảng viên','Hoàn tất'];
  const StepBar=()=>(
    <nav className="flex items-center gap-2 w-full mb-6">
      {STEPS.map((l,i)=>{
        const n=i+1,done=step>n,cur=step===n;
        return(
          <React.Fragment key={i}>
            <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
              <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all
                ${done?'bg-tertiary-fixed-dim text-on-tertiary-fixed':cur?'bg-primary text-white ring-4 ring-primary-fixed':'bg-surface-container-highest text-on-surface-variant'}`}>
                {done?<span className="material-symbols-outlined text-sm">check</span>:n}
              </div>
              <span className={`text-[10px] font-bold uppercase tracking-widest whitespace-nowrap ${cur?'text-primary':done?'text-on-surface':'text-on-surface-variant/60'}`}>{n}. {l}</span>
            </div>
            {i<STEPS.length-1&&<div className={`flex-1 h-[2px] mb-5 transition-all duration-500 ${step>n?'bg-primary':'bg-surface-container-highest'}`}/>}
          </React.Fragment>
        );
      })}
    </nav>
  );

  // ── Right info panel ───────────────────────────────────────────
  const RightPanel=()=>(
    <div className="space-y-5">
      <div className="bg-surface-container-lowest rounded-3xl p-6 shadow-sm">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary"><span className="material-symbols-outlined">info</span></div>
          <h3 className="font-headline font-extrabold text-on-surface">Lưu ý đăng ký</h3>
        </div>
        <ul className="space-y-4">
          {[
            'Thời hạn chỉnh sửa thông tin cơ bản là 05 ngày sau khi đợt đăng ký kết thúc.',
            'Vui lòng đọc kỹ các thông tin để tránh những sai sót không đáng có.',
            'Mỗi sinh viên chỉ được chọn 1 giảng viên hướng dẫn.',
          ].map((n,i)=>(
            <li key={i} className="flex gap-3 text-sm text-on-surface-variant leading-relaxed">
              <span className="w-1.5 h-1.5 rounded-full bg-primary mt-1.5 flex-shrink-0"/>{n}
            </li>

  const [progress,setProgress] = useState(0);
  const [done,setDone]   = useState(false);

  function pickFile(e){
    const f=e.target.files[0];
    if(!f) return;
    const ok=['application/pdf','application/vnd.openxmlformats-officedocument.wordprocessingml.document','application/msword','application/zip','application/x-zip-compressed'];
    if(!ok.some(t=>f.type===t)&&!f.name.match(/\.(pdf|docx?|zip)$/i)){
      toast.show('Chỉ chấp nhận file PDF, Word hoặc ZIP!','error'); return;
    }
    if(f.size>100*1024*1024){toast.show('File tối đa 100 MB!','error');return;}
    setFile(f);
  }

  async function submit(){
    if(!file){toast.show('Vui lòng chọn file báo cáo!','error');return;}
    setSubmitting(true); setProgress(0);
    try{
      const res=await apiPostFile({
        action:'submitReport',
        email:SESSION.email,
        name:SESSION.name,
        maSo:SESSION.maSo,
        topic,
        semester:sem,
        instructorEmail:instr?.email||'',
        instructorName:instr?.name||'',
        note:note.trim(),
        folderName:'BaoCaoTT_UTE',
        _file:file,
      }, pct=>setProgress(pct));
      if(res?.success){setDone(true);}
      else{toast.show(res?.message||'Gửi thất bại. Thử lại.','error');setSubmitting(false);}
    }catch(e){
      toast.show('Lỗi upload: '+e.message,'error');
      setSubmitting(false);
    }
  }

  function fmtSize(b){return b>1024*1024?(b/1024/1024).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';}

  // ── Done screen ───────────────────────────────────────────────────────────
  if(done) return(
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-md">
      <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center anim-slide">
        <div className="w-24 h-24 bg-tertiary-fixed-dim text-on-tertiary-fixed rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg anim-pop">
          <span className="material-symbols-outlined fill-icon text-5xl">task_alt</span>
        </div>
        <h3 className="text-2xl font-headline font-black text-on-surface mb-3 leading-tight">Nộp báo cáo thành công!</h3>
        <p className="text-on-surface-variant text-sm mb-2 leading-relaxed">
          GV <strong>{instr?.name}</strong> đã nhận được thông báo qua email.
        </p>
        <div className="p-3 bg-surface-container-low rounded-xl text-xs text-on-surface-variant mb-8 leading-relaxed">
          📧 <strong>{instr?.email}</strong><br/>
          GV sẽ chấm điểm trong vòng <strong>2 tuần</strong> kể từ ngày kết thúc đợt thực tập <strong>{semLabel}</strong>.
        </div>
        <button onClick={onSuccess}
          className="w-full py-4 bg-primary text-white font-bold rounded-2xl hover:bg-primary-container transition-all shadow-lg shadow-primary/20">
          Về trang chủ
        </button>
      </div>
    </div>
  );

  return(
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-on-surface/50 backdrop-blur-sm">
      <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl anim-slide flex flex-col max-h-[90vh] overflow-hidden">

        {/* Header */}
        <div className="flex items-center justify-between px-8 pt-8 pb-4 border-b border-outline-variant/10 flex-shrink-0">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-primary-fixed flex items-center justify-center text-primary">
              <span className="material-symbols-outlined">upload_file</span>
            </div>
            <div>
              <h2 className="font-headline font-extrabold text-lg text-on-surface">Nộp Báo Cáo Thực Tập</h2>
              <p className="text-xs text-on-surface-variant">{semLabel}</p>
            </div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-surface-container rounded-full transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>

        <div className="flex-1 overflow-y-auto px-8 py-6 space-y-5">

          {/* Thông tin đề tài */}
          <div className="bg-surface-container-low rounded-2xl p-4 space-y-2">
            <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">Đề tài</p>
            <p className="font-bold text-on-surface text-sm">{topic}</p>
            <div className="flex items-center gap-2 pt-1">
              <Av name={instr?.name||''} cls="w-7 h-7 text-xs flex-shrink-0"/>

                <p className="text-xs font-semibold text-on-surface">{instr?.name||'--'}</p>

          {/* Upload zone */}
          <div>

              File báo cáo <span className="text-error">*</span>
              <span className="text-xs font-normal ml-2 opacity-60">PDF / Word / ZIP · tối đa 100 MB</span>
            </label>
            {!file?(
              <label className="flex flex-col items-center justify-center w-full h-36 border-2 border-dashed border-primary/30 rounded-2xl bg-primary-fixed/10 cursor-pointer hover:bg-primary-fixed/20 transition-colors group">
                <span className="material-symbols-outlined text-4xl text-primary/40 group-hover:text-primary/70 transition-colors mb-2">cloud_upload</span>
                <span className="text-sm font-medium text-primary/60 group-hover:text-primary transition-colors">Kéo thả hoặc bấm để chọn file</span>
                <input type="file" accept=".pdf,.doc,.docx,.zip" className="hidden" onChange={pickFile}/>

                  <span className="material-symbols-outlined">description</span>

                <div className="flex-1 min-w-0">

                <button onClick={()=>setFile(null)} className="p-1.5 hover:bg-error-container/30 rounded-full transition-colors">
                  <span className="material-symbols-outlined text-sm text-on-surface-variant">close</span>
                </button>
              </div>
            )}
          </div>

          {/* Ghi chú */}
          <div>
            <label className="text-sm font-semibold text-on-surface-variant block mb-2">Ghi chú cho GV (tuỳ chọn)</label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}

          </div>

          {/* Lưu ý */}
          <div className="flex items-start gap-3 bg-secondary-container/10 border border-secondary-container/20 rounded-2xl p-4">
            <span className="material-symbols-outlined text-secondary text-base mt-0.5">campaign</span>
            <p className="text-xs text-on-surface-variant leading-relaxed italic">

            </p>
          </div>
        </div>

        {/* Footer */}
        <div className="flex flex-col gap-3 px-8 pb-8 pt-4 border-t border-outline-variant/10 flex-shrink-0">
          {submitting&&progress>0&&(
            <div className="w-full">
              <div className="flex justify-between text-xs text-on-surface-variant mb-1">
                <span>{progress<100?'Đang upload file...':'Đang xử lý...'}</span>
                <span>{progress}%</span>
              </div>
              <div className="w-full bg-surface-container rounded-full h-2">
                <div className="bg-primary h-2 rounded-full transition-all duration-300" style={{width:progress+'%'}}></div>
              </div>
            </div>
          )}
          <div className="flex items-center justify-between gap-3">
          <button onClick={onClose} disabled={submitting}
            className="px-6 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all text-sm disabled:opacity-50">
            Hủy bỏ
          </button>
          <button onClick={submit} disabled={!file||submitting}
            className="flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:scale-[1.02] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 text-sm">
            {submitting
              ?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang upload{progress>0?` ${progress}%`:''}...</>
              :<><span className="material-symbols-outlined text-sm">send</span>Xác nhận nộp</>}
          </button>
          </div>
        </div>
        </div>
      </div>
    </div>
  );
}
