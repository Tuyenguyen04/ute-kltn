<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbzptXTukZzho3esHy5efvLJqqo62LYzmVrNrdxy2Ev3fDstmNdVkIeo6NqWw6QhvTO2/exec';

// 5 ngành khớp đúng cột Ngành trong sheet GV
const NGANH_LIST = ['QLCN','Kế toán','Thương mại điện tử','Kinh doanh quốc tế','Logistic'];
const SHEET_ID_GV = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEET_GV_TAB = 'Giảng viên phụ trách';

// Đọc GV từ Google Sheet CSV (không cần Apps Script)
// Cột sheet GV: A=STT B=HọTên C=MãGV D=Gmail E=Role F=SLđăngkí G=SLcònlại H=Ngành
async function fetchGVFromCSV(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID_GV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_GV_TAB)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('Không tải được sheet GV');
  const text = await res.text();
  const lines = text.trim().split('\n');
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const cols=[];let cur='',inQ=false;
    for(let j=0;j<lines[i].length;j++){
      const c=lines[i][j];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.replace(/"/g,'').trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.replace(/"/g,'').trim());
    if(cols[1]&&cols[3]){
      rows.push({
        name:cols[1]||'',
        code:cols[2]||'',
        email:cols[3]||'',
        slDangKi:parseInt(cols[5])||0,
        slConLai:parseInt(cols[6])||0,
        nganh:cols[7]||'',
      });
    }
  }
  return rows;
}

// Đọc session — tên + maSo đã được lưu ĐÚNG từ login.html (đọc từ sheet)
const SESSION = {
  email: sessionStorage.getItem('ute_email') || '',
  role:  sessionStorage.getItem('ute_role')  || '',
  name:  sessionStorage.getItem('ute_name')  || '',   // Họ và Tên từ sheet, VD: "Nguyễn Thị Tuyết"
  maSo:  sessionStorage.getItem('ute_maSo')  || '',   // MSSV từ sheet, VD: "23124153"
  nganh: sessionStorage.getItem('ute_nganh') || '',
};

const SEM_DATE = {
  'HK1-2024':'15/09/2024',
  'HK2-2024':'15/01/2025',
  'HKHe-2024':'15/06/2024',
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function letterGrade(g){
  if(g>=9.0) return 'A+'; if(g>=8.5) return 'A'; if(g>=8.0) return 'B+';
  if(g>=7.0) return 'B';  if(g>=6.5) return 'C+'; if(g>=5.5) return 'C';
  if(g>=5.0) return 'D+'; return 'F';
}
async function apiGet(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${API_URL}?${qs}`);
  return r.json();
}
async function apiPost(body){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);
  return(
    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm anim-fade"
      style={{background:type==='error'?'#ba1a1a':type==='warn'?'#855300':'#005236',minWidth:'240px',justifyContent:'center'}}>
      <span className="material-symbols-outlined text-lg">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

// ── AVATAR ────────────────────────────────────────────────────────────────────
function Av({name='',cls=''}){
  // Lấy 2 ký tự cuối của tên (họ + tên đệm)
  const parts=name.trim().split(' ').filter(Boolean);
  const ini=parts.length>=2
    ?( parts[parts.length-2][0]+parts[parts.length-1][0] ).toUpperCase()
    :( parts[0]?.[0]||'?' ).toUpperCase();
  const cols=['from-blue-500 to-blue-700','from-emerald-500 to-teal-600','from-violet-500 to-purple-700','from-orange-400 to-red-500'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full bg-gradient-to-br ${cols[idx]} flex items-center justify-center text-white font-black text-sm flex-shrink-0 ${cls}`}>{ini}</div>;
}

// ── STATUS PILL ───────────────────────────────────────────────────────────────
function Pill({status}){
  const m={
    pending:{l:'Đang chờ duyệt',bg:'bg-secondary-container',tx:'text-on-secondary-container',dot:'bg-secondary'},
    approved:{l:'Đã xác nhận',bg:'bg-tertiary-fixed-dim/20',tx:'text-on-tertiary-fixed',dot:'bg-tertiary-fixed-dim'},
    rejected:{l:'Bị từ chối',bg:'bg-error-container',tx:'text-on-error-container',dot:'bg-error'},
  };
  const s=m[status]||m.pending;
  return <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-[11px] font-bold ${s.bg} ${s.tx}`}><span className={`w-1.5 h-1.5 rounded-full ${s.dot} inline-block`}/>{s.l}</span>;
}

// ── SPINNER ───────────────────────────────────────────────────────────────────
function Spinner({text='Đang tải...'}){
  return(
    <div className="flex flex-col items-center justify-center py-20 gap-4 text-on-surface-variant">
      <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>
      <p className="text-sm font-medium">{text}</p>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
// ── HỒ SƠ CÁ NHÂN MENU ───────────────────────────────────────────────────────
function HoSoMenu({logout}){

        <span className="material-symbols-outlined">person</span>
        <span className="flex-1">Hồ sơ cá nhân</span>
        <span className="material-symbols-outlined text-sm transition-transform" style={{transform:open?'rotate(180deg)':'rotate(0deg)'}}>expand_more</span>
      </button>

      {open&&(
        <div className="mt-1 mx-2 bg-white rounded-xl shadow-lg border border-outline-variant/20 overflow-hidden">
          {/* Thông tin tài khoản */}
          <div className="px-4 py-3 border-b border-outline-variant/10">
            <p className="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Tài khoản</p>
            <div className="flex items-center gap-3">
              <Av name={SESSION.name} cls="w-10 h-10 text-sm flex-shrink-0"/>
              <div className="min-w-0">
                <p className="text-sm font-bold text-on-surface truncate">{SESSION.name}</p>
                <p className="text-xs text-on-surface-variant truncate">{SESSION.email}</p>
                <p className="text-xs text-on-surface-variant">MSSV: {SESSION.maSo}</p>
              </div>
            </div>
          </div>

          {/* Đăng xuất */}
          <button onClick={()=>{setOpen(false);logout();}}
            className="w-full flex items-center gap-3 px-4 py-3 text-error font-medium hover:bg-error-container/20 transition-colors text-sm">
            <span className="material-symbols-outlined text-sm">logout</span>

          </button>
        </div>
      )}

  );
}

function Sidebar({tab,setTab,kltnUnlocked,bcttDisabled,logout,notifCount}){

      {/* Logo */}
      <div className="mb-6 px-4 flex items-center gap-3">
        <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-primary/20">U</div>
        <span className="text-2xl font-black text-blue-900 tracking-tight">UTE Hub</span>
      </div>

      {/* Profile — hiển thị TÊN THẬT từ sheet (SESSION.name = "Nguyễn Thị Tuyết") */}
      <div className="mb-6 p-4 bg-surface-container rounded-2xl">
        <div className="flex flex-col items-start gap-2">
          <Av name={SESSION.name} cls="w-12 h-12"/>

            <h4 className="font-bold text-on-surface text-sm truncate">{SESSION.name||'Sinh viên'}</h4>

      </div>

      {/* Nav */}
      <nav className="flex-1 space-y-1">

        {/* Đăng ký BCTT — disabled khi đã qua điểm */}

        {/* Đăng ký KLTN — mở khi đủ điều kiện */}

// ── HEADER ────────────────────────────────────────────────────────────────────
function Header({notifications}){
  const [showNoti,setShowNoti]=useState(false);
  return(
    <header className="fixed top-0 z-40 bg-white/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 shadow-sm" style={{left:'18rem',right:0}}>

      <div className="flex items-center gap-4">
        <div className="relative">
          <button onClick={()=>setShowNoti(v=>!v)} className="relative p-2 hover:bg-surface-container rounded-full transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">notifications</span>

              <span className="absolute top-1 right-1 bg-error text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full border-2 border-white">

// ── DASHBOARD VIEW ────────────────────────────────────────────────────────────
function Dashboard({dashData,loading,onRegister,onChangeTopic,toast,kltnUnlocked,bcttDisabled}){
  if(loading) return <Spinner text="Đang tải dữ liệu..."/>;

  const reg    = dashData?.registered||false;
  const status = dashData?.status||null;        // null | pending | approved | rejected
  const topic  = dashData?.topic||'';
  const co     = dashData?.company||'';
  const instr  = dashData?.instructor||null;    // { name, id, email, term }
  const grade  = (dashData?.grade!==null&&dashData?.grade!==undefined) ? dashData.grade : null;
  const sem    = dashData?.semester||'';
  const locked = dashData?.gradeLocked||false;  // GV đã khoá điểm

  // ── Tính step tiến độ ─────────────────────────────────────────
  // 0=Bắt đầu | 1=Đăng ký | 2=Thực hiện | 3=Kết thúc | 4=Xác nhận
  let curStep=0;
  if(reg){
    if(status==='pending')   curStep=1;
    if(status==='approved')  curStep=2;
    if(grade!==null)         curStep=3;
    if(locked)               curStep=4;
  }
  const pcts=[0,25,50,75,100];
  const stepDefs=[
    {l:'Bắt đầu',icon:'flag'},
    {l:'Đăng ký',icon:'check_circle'},
    {l:'Thực hiện',icon:'potted_plant'},
    {l:'Kết thúc',icon:'flag'},
    {l:'Xác nhận',icon:'verified'},
  ];

  const passed = grade!==null && grade>=5;
  const failed  = grade!==null && grade<5;
  // Nút "Đổi đề tài" chỉ active khi bị từ chối HOẶC điểm trượt
  const canChange = reg&&(status==='rejected'||(failed&&locked));

  const stepLabel=!reg?'• Chưa đăng ký':status==='pending'?'• Chờ GV duyệt':status==='approved'?'• Đang thực hiện':status==='rejected'?'• Bị từ chối':locked?'• Hoàn tất':'';

  return(
    <div className="space-y-6 anim-fade">

      {/* ── Row 1: Actions + Grade ─────────────────────────────── */}
      <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
        {/* Action buttons */}
        <div className="md:col-span-8 p-6 bg-surface-container-lowest rounded-3xl shadow-sm">
          <div className="grid grid-cols-2 gap-4">
            {/* Tạo báo cáo / Đăng ký mới */}
            <button onClick={onRegister} disabled={bcttDisabled||reg}
              title={reg?'Bạn đã có đề tài đang xử lý':'Đăng ký đề tài mới'}
              className={`p-6 rounded-2xl font-bold flex flex-col items-center justify-center gap-3 transition-all
                ${(bcttDisabled||reg)
                  ?'bg-surface-container-highest text-on-surface/30 cursor-not-allowed opacity-40'
                  :'bg-gradient-to-br from-primary to-primary-container text-white shadow-lg shadow-primary/20 hover:scale-[1.02]'}`}>
              <span className="material-symbols-outlined text-2xl">add</span>
              <span className="text-sm">Đăng ký BCTT</span>
            </button>

            {/* Đổi đề tài */}
            <button onClick={canChange?onChangeTopic:undefined} disabled={!canChange}
              title={canChange?'Đăng ký đề tài mới':'Không thể đổi lúc này'}
              className={`p-6 rounded-2xl font-bold flex flex-col items-center justify-center gap-3 transition-all
                ${canChange
                  ?'bg-secondary-container text-on-secondary-container hover:scale-[1.02] cursor-pointer shadow-md'
                  :'bg-surface-container-highest text-on-surface/40 cursor-not-allowed opacity-50'}`}>
              <span className="material-symbols-outlined text-2xl">sync_alt</span>
              <span className="text-sm">Đổi đề tài</span>
            </button>
          </div>

          {/* Banner thông báo trạng thái */}
          {status==='rejected'&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">
              <span className="material-symbols-outlined text-base">report</span>
              Đề tài bị từ chối. Nhấn <strong className="mx-1">"Đổi đề tài"</strong> để đăng ký lại.
            </div>
          )}
          {failed&&locked&&(
            <div className="mt-4 flex items-center gap-2 px-4 py-3 bg-error-container rounded-2xl text-on-error-container text-sm font-medium">

          {instr&&instr.name?(

                  <span className="truncate">{instr.email}</span>
                </div>
                <div className="flex items-center gap-3 text-sm text-on-surface-variant">
                  <span className="material-symbols-outlined text-base">calendar_today</span>
                  <span>{instr.term||'--'}</span>

// ── REGISTRATION FLOW ─────────────────────────────────────────────────────────
function Registration({onSuccess,instructorList,loadingGV}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({topic:'',category:'',company:'',semester:'',startDate:'',note:''});
  const [selGV,setSelGV]=useState(null);
  const [showConfirm,setShowConfirm]=useState(false);
  const [showSuccess,setShowSuccess]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const toast=useToast();

  function setSem(v){setForm(f=>({...f,semester:v,startDate:SEM_DATE[v]||''}))}

  function next1(){
    if(!form.topic.trim()){toast.show('Vui lòng nhập tên đề tài!','error');return;}
    if(!form.category){toast.show('Vui lòng chọn mảng đề tài!','error');return;}
    if(!form.company.trim()){toast.show('Vui lòng nhập đơn vị thực tập!','error');return;}
    if(!form.semester){toast.show('Vui lòng chọn học kỳ!','error');return;}
    setStep(2);window.scrollTo(0,0);
  }
  function next2(){
    if(!selGV){toast.show('Vui lòng chọn giảng viên hướng dẫn!','error');return;}
    setStep(3);window.scrollTo(0,0);
  }

  async function confirm(){
    setSubmitting(true);
    try{
      const res=await apiPost({
        action:'submitRegistration',type:'bctt',
        email:SESSION.email,
        name:SESSION.name,      // Tên thật "Nguyễn Thị Tuyết"
        maSo:SESSION.maSo,      // MSSV "23124153"
        nganh:SESSION.nganh,
        topic:form.topic,
        company:form.company,
        instructorName:selGV.name,
        instructorEmail:selGV.email,
        instructorId:selGV.id||selGV.code,
        term:`Đợt 1 - ${form.semester==='HK1-2024'?'HK1 2024-2025':form.semester==='HK2-2024'?'HK2 2024-2025':'HK Hè 2024'}`,
        note:form.note||'',
      });
      if(res.success){
        setShowConfirm(false);
        setShowSuccess(true);
      } else {
        toast.show(res.message||'Gửi thất bại. Thử lại.','error');
        setSubmitting(false);
      }
    }catch(e){
      toast.show('Lỗi kết nối. Thử lại sau.','error');
      setSubmitting(false);
    }
  }

  // ── Step bar ───────────────────────────────────────────────────
  const STEPS=['Thông tin cơ bản','Chọn Giảng viên','Hoàn tất'];
  const StepBar=()=>(
    <nav className="flex items-center gap-2 w-full mb-6">
      {STEPS.map((l,i)=>{
        const n=i+1,done=step>n,cur=step===n;
        return(
          <React.Fragment key={i}>
            <div className="flex flex-col items-center gap-1.5 flex-shrink-0">
              <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all
                ${done?'bg-tertiary-fixed-dim text-on-tertiary-fixed':cur?'bg-primary text-white ring-4 ring-primary-fixed':'bg-surface-container-highest text-on-surface-variant'}`}>
                {done?<span className="material-symbols-outlined text-sm">check</span>:n}
              </div>
              <span className={`text-[10px] font-bold uppercase tracking-widest whitespace-nowrap ${cur?'text-primary':done?'text-on-surface':'text-on-surface-variant/60'}`}>{n}. {l}</span>
            </div>
            {i<STEPS.length-1&&<div className={`flex-1 h-[2px] mb-5 transition-all duration-500 ${step>n?'bg-primary':'bg-surface-container-highest'}`}/>}
          </React.Fragment>
        );
      })}
    </nav>
  );

  // ── Right info panel ───────────────────────────────────────────
  const RightPanel=()=>(
    <div className="space-y-5">
      <div className="bg-surface-container-lowest rounded-3xl p-6 shadow-sm">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary"><span className="material-symbols-outlined">info</span></div>
          <h3 className="font-headline font-extrabold text-on-surface">Lưu ý đăng ký</h3>
        </div>
        <ul className="space-y-4">
          {[
            'Thời hạn chỉnh sửa thông tin cơ bản là 05 ngày sau khi đợt đăng ký kết thúc.',
            'Vui lòng đọc kỹ các thông tin để tránh những sai sót không đáng có.',
            'Mỗi sinh viên chỉ được chọn 1 giảng viên hướng dẫn.',
          ].map((n,i)=>(
            <li key={i} className="flex gap-3 text-sm text-on-surface-variant leading-relaxed">
              <span className="w-1.5 h-1.5 rounded-full bg-primary mt-1.5 flex-shrink-0"/>{n}
            </li>
          ))}
        </ul>
      </div>
      <div className="bg-secondary-container/20 border border-secondary-container/30 rounded-3xl p-6">
        <div className="flex items-center justify-between mb-3">
          <span className="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-[10px] font-bold uppercase">Sắp hết hạn</span>
          <span className="material-symbols-outlined text-secondary-container">alarm</span>
        </div>
        <p className="font-headline font-bold text-on-secondary-container text-base mb-3">Đợt 1 kết thúc trong 3 ngày</p>
        <div className="w-full bg-secondary-container/20 h-2 rounded-full overflow-hidden">
          <div className="bg-secondary-container h-full rounded-full" style={{width:'80%'}}/>
        </div>
      </div>
    </div>
  );

  return(
    <div className="anim-fade">
      {toast.toast&&<Toast {...toast.toast} onClose={toast.hide}/>}

      {/* ── Confirm Modal ─────────────────────────────────────── */}
      {showConfirm&&(
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-on-surface/40 backdrop-blur-sm">
          <div className="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl flex flex-col items-center text-center anim-slide">
            <div className="w-20 h-20 rounded-full bg-primary-fixed mb-6 flex items-center justify-center text-primary">
              <span className="material-symbols-outlined text-4xl">help</span>
            </div>
            <h2 className="font-headline font-extrabold text-2xl text-on-surface mb-3">Bạn đã chắc chắn chưa?</h2>
            <p className="text-on-surface-variant mb-2 leading-relaxed">Hệ thống sẽ ghi nhận và gửi thông báo đến:</p>
            <div className="mb-6 px-4 py-3 bg-surface-container-low rounded-xl w-full text-sm">
              <p className="font-bold text-on-surface">{selGV?.name}</p>
              <p className="text-on-surface-variant text-xs mt-1">📧 {selGV?.email}</p>
            </div>
            <div className="flex flex-col w-full gap-3">
              <button onClick={confirm} disabled={submitting}
                className="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg hover:bg-primary-container transition-all flex items-center justify-center gap-2 disabled:opacity-70">
                {submitting?<><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang gửi...</>:'Xác nhận & Gửi'}
              </button>
              <button onClick={()=>setShowConfirm(false)} className="w-full py-4 text-on-surface font-bold rounded-2xl hover:bg-surface-container transition-all">Hủy bỏ</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Success Modal ─────────────────────────────────────── */}
      {showSuccess&&(
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-on-surface/60 backdrop-blur-md">
          <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center anim-slide">
            <div className="w-24 h-24 bg-tertiary-fixed-dim text-on-tertiary-fixed rounded-full flex items-center justify-center mx-auto mb-8 shadow-lg anim-pop">
              <span className="material-symbols-outlined fill-icon text-5xl">check_circle</span>
            </div>
            <h3 className="text-2xl font-headline font-black text-on-surface mb-3 leading-tight">Đăng ký thành công!</h3>
            <p className="text-on-surface-variant text-sm mb-2 leading-relaxed">
              Yêu cầu đã được gửi đến giảng viên <strong>{selGV?.name}</strong>.
            </p>
            <div className="p-3 bg-surface-container-low rounded-xl text-xs text-on-surface-variant mb-8">
              📧 Email thông báo đã gửi tới {selGV?.email}
            </div>
            <button onClick={onSuccess} className="w-full py-4 bg-primary text-white font-bold rounded-2xl hover:bg-primary-container transition-all shadow-lg shadow-primary/20">
              Về trang chủ
            </button>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div className="lg:col-span-8 space-y-5">
          <div>
            <h2 className="text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-1">Đăng ký Báo Cáo Thực Tập</h2>
            <p className="text-on-surface-variant text-sm">Vui lòng cung cấp đầy đủ thông tin để bộ phận quản lý phê duyệt.</p>
          </div>
          <StepBar/>

          {/* STEP 1 — Thông tin cơ bản */}
          {step===1&&(
            <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm anim-fade">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="md:col-span-2 space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Tên đề tài <span className="text-error">*</span></label>
                  <input value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))}
                    className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60"
                    placeholder="Nhập tên đề tài nghiên cứu..."/>
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Mảng đề tài <span className="text-error">*</span></label>
                  <div className="relative">
                    <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                      className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 appearance-none text-on-surface">
                      <option value="">Chọn mảng đề tài</option>
                      {NGANH_LIST.map(n=><option key={n} value={n}>{n}</option>)}
                    </select>
                    <span className="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>

                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Đợt - Học kỳ <span className="text-error">*</span></label>
                  <div className="relative">
                    <select value={form.semester} onChange={e=>setSem(e.target.value)}

                      <option value="HK1-2024">Học kỳ 1 - 2024-2025</option>

                  </div>
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Đơn vị thực tập <span className="text-error">*</span></label>
                  <input value={form.company} onChange={e=>setForm(f=>({...f,company:e.target.value}))}
                    className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60"
                    placeholder="VD: FPT Software, VNG..."/>
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Thời gian bắt đầu</label>
                  <div className="flex items-center gap-3 bg-surface-container border border-outline-variant/20 rounded-xl px-4 py-4 text-on-surface-variant cursor-not-allowed">
                    <span className="material-symbols-outlined text-sm">lock</span>
                    <span>{form.startDate||'Tự động sau khi chọn học kỳ'}</span>
                  </div>
                </div>
                <div className="md:col-span-2 space-y-2">
                  <label className="text-sm font-semibold text-on-surface-variant">Ghi chú (tùy chọn)</label>
                  <textarea value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} rows={3}
                    className="w-full bg-surface-container-low rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline/60 resize-none"
                    placeholder="Mô tả thêm về kế hoạch thực tập..."/>

              </div>
              <div className="flex justify-end pt-6 border-t border-outline-variant/10 mt-6">

                    <table className="w-full text-left">
                      <thead>
                        <tr className="bg-surface-container-low text-[11px] font-bold text-on-surface-variant uppercase tracking-wider">
                          <th className="px-6 py-4">Giảng viên</th>
                          <th className="px-5 py-4">Mã / Email</th>
                          <th className="px-5 py-4">Ngành</th>
                          <th className="px-5 py-4">Còn nhận</th>
                          <th className="px-5 py-4 text-right">Chọn</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-outline-variant/10">
                        {instructorList.filter(iv=>!form.category||iv.nganh===form.category).length===0?(
                          <tr><td colSpan={5} className="px-6 py-12 text-center text-sm text-on-surface-variant">Không có dữ liệu giảng viên</td></tr>
                        ):instructorList.filter(iv=>!form.category||iv.nganh===form.category).map((iv,idx)=>{
                          const rem=typeof iv.slConLai==='number'?iv.slConLai:parseInt(iv.slConLai)||0;
                          const full=rem<=0;
                          const total=rem+((typeof iv.slDangKi==='number'?iv.slDangKi:0)||0);
                          const pct=total>0?Math.min(100,Math.round(((total-rem)/total)*100)):full?100:0;
                          const ini=iv.name.trim().split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
                          const sel=selGV?.email===iv.email;
                          return(
                            <tr key={idx} onClick={()=>!full&&setSelGV(iv)}
                              className={`transition-colors ${full?'opacity-50 bg-surface-container-low/40 cursor-not-allowed':sel?'bg-blue-50':'hover:bg-blue-50/30 cursor-pointer'}`}>
                              <td className="px-6 py-4">
                                <div className="flex items-center gap-3">
                                  <div className="h-10 w-10 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-bold text-xs flex-shrink-0">{ini}</div>
                                  <div>
                                    <p className={`font-bold text-sm ${sel?'text-primary':'text-on-surface'}`}>{iv.name}</p>
                                    <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold ${full?'bg-error-container text-on-error-container':'bg-tertiary-fixed text-on-tertiary-fixed'}`}>
                                      {full?'Đã đầy':'Còn chỗ'}
                                    </span>
                                  </div>
                                </div>
                              </td>
                              <td className="px-5 py-4">
                                <p className="text-sm font-medium text-on-surface">GV{iv.id||iv.code}</p>
                                <p className="text-xs text-on-surface-variant truncate max-w-[140px]">{iv.email}</p>
                              </td>
                              <td className="px-5 py-4"><span className="px-2 py-1 rounded-lg bg-surface-container text-xs font-semibold">{iv.nganh}</span></td>
                              <td className="px-5 py-4">
                                <div className="w-20 bg-surface-container-highest h-1.5 rounded-full overflow-hidden mb-1">
                                  <div className={`h-full rounded-full ${full?'bg-error':pct>=70?'bg-secondary-container':'bg-primary'}`} style={{width:`${pct}%`}}/>
                                </div>
                                <p className="text-xs font-bold text-on-surface-variant">
                                  <span className={full?'text-error':'text-primary'}>{rem}</span> còn lại
                                </p>
                              </td>
                              <td className="px-5 py-4 text-right">
                                <input type="radio" name="gv" disabled={full} checked={sel}
                                  onChange={()=>!full&&setSelGV(iv)}
                                  className="h-5 w-5 text-primary border-outline-variant focus:ring-primary cursor-pointer disabled:cursor-not-allowed"/>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
              <div className="flex items-center justify-between">
                <button onClick={()=>setStep(1)} className="flex items-center gap-2 px-6 py-3 rounded-xl border border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-colors">
                  <span className="material-symbols-outlined">arrow_back</span>Quay lại
                </button>
                <button onClick={next2} className="flex items-center gap-2 px-8 py-3 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold shadow-lg hover:scale-[1.02] transition-all">
                  Tiếp theo <span className="material-symbols-outlined">arrow_forward</span>
                </button>
              </div>
            </div>
          )}

          {/* STEP 3 — Rà soát + Xác nhận */}
          {step===3&&(
            <div className="anim-fade space-y-5">
              <div>
                <h3 className="text-2xl font-headline font-extrabold text-on-surface mb-1">Rà soát thông tin đăng ký</h3>
                <p className="text-on-surface-variant text-sm">Kiểm tra kỹ trước khi xác nhận gửi yêu cầu.</p>
              </div>
              {/* Thông tin cơ bản */}
              <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
                <div className="flex items-center gap-3 mb-6">
                  <div className="p-2 bg-primary-fixed rounded-xl text-primary"><span className="material-symbols-outlined fill-icon">description</span></div>
                  <h4 className="font-headline font-bold text-lg">Phần 1: Thông tin cơ bản</h4>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-10">
                  {[
                    {l:'Tên đề tài',v:form.topic},
                    {l:'Mảng đề tài',v:form.category},
                    {l:'Đơn vị thực tập',v:form.company},
                    {l:'Thời gian bắt đầu',v:form.startDate},
                    {l:'Học kỳ',v:form.semester==='HK1-2024'?'HK1 - 2024-2025':form.semester==='HK2-2024'?'HK2 - 2024-2025':'HK Hè - 2024'},
                    {l:'Ghi chú',v:form.note||'(không có)'},
                  ].map((r,i)=>(
                    <div key={i}>
                      <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider mb-1 block">{r.l}</label>
                      <p className="text-on-surface font-semibold">{r.v}</p>
                    </div>
                  ))}
                </div>
              </div>
              {/* Giảng viên */}
              <div className="bg-surface-container-lowest rounded-3xl p-8 shadow-sm border border-outline-variant/10">
                <div className="flex items-center gap-3 mb-6">
                  <div className="p-2 bg-secondary-fixed rounded-xl text-secondary"><span className="material-symbols-outlined fill-icon">person_check</span></div>
                  <h4 className="font-headline font-bold text-lg">Phần 2: Giảng viên hướng dẫn</h4>
                </div>
                {selGV&&(
                  <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                    <Av name={selGV.name} cls="w-16 h-16 rounded-2xl text-xl flex-shrink-0"/>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1">
                      {[{l:'Họ và tên',v:selGV.name},{l:'Mã GV',v:`GV${selGV.id||selGV.code}`},{l:'Email',v:selGV.email}].map((r,i)=>(
                        <div key={i}>
                          <label className="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider block mb-1">{r.l}</label>
                          <p className={`font-bold text-on-surface text-sm ${i===2?'text-primary break-all':''}`}>{r.v}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              {/* Lưu ý */}
              <div className="bg-surface-container p-5 rounded-2xl border-l-4 border-primary flex gap-4 items-start">
                <span className="material-symbols-outlined text-primary">campaign</span>
                <p className="text-sm text-on-surface-variant italic leading-relaxed">
                  Sau khi xác nhận, hệ thống sẽ gửi email thông báo đến <strong>{selGV?.email}</strong>. Giảng viên sẽ duyệt hoặc từ chối đề tài.
                </p>
              </div>
              <div className="flex items-center justify-between pt-2">
                <button onClick={()=>setStep(2)} className="flex items-center gap-2 px-8 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all">
                  <span className="material-symbols-outlined">arrow_back</span>Quay lại
                </button>
                <button onClick={()=>setShowConfirm(true)} className="px-12 py-3 rounded-xl bg-primary text-white font-bold shadow-lg hover:scale-[1.02] transition-all flex items-center gap-2">
                  Xác nhận đăng ký <span className="material-symbols-outlined">send</span>
                </button>
              </div>
            </div>
          )}
        </div>
        <div className="lg:col-span-4"><RightPanel/></div>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  // ── Auth guard + role routing ──────────────────────────────────
  useEffect(()=>{
    const role=sessionStorage.getItem('ute_role');
    const email=sessionStorage.getItem('ute_email');
    if(!role||!email){
      window.location.href='login.html';
      return;
    }
    // Giảng viên → chuyển sang giangvien.html
    if(role==='giangvien'){
      window.location.href='giangvien.html';
      return;
    }
    // Admin → chuyển sang trangchu (hoặc admin.html nếu có)
  },[]);

  const [tab,setTab]=useState('dashboard');
  const [dashData,setDashData]=useState(null);
  const [loadingDash,setLoadingDash]=useState(true);
  const [instructorList,setInstructorList]=useState([]);
  const [loadingGV,setLoadingGV]=useState(false);
  const [notifications,setNotifications]=useState([]);
  const toast=useToast();

  // ── Tính unlock/disable trạng thái KLTN ────────────────────────
  const grade=dashData?.grade;
  const locked=dashData?.gradeLocked||false;
  // KLTN mở khi: điểm >= 5 VÀ GV đã khoá điểm (xác nhận chính thức)
  const kltnUnlocked = grade!==null && grade!==undefined && grade>=5 && locked;
  // BCTT disabled khi KLTN mở
  const bcttDisabled = kltnUnlocked;

  // ── Load dashboard data từ API GAS ─────────────────────────────
  const loadDash=useCallback(async()=>{
    if(!SESSION.email) return;
    setLoadingDash(true);
    try{
      const data=await apiGet({action:'getStudentDashboardData',email:SESSION.email});
      setDashData(data);

      // Push notifications theo trạng thái
      const notes=[];
      if(data?.status==='approved') notes.push({message:`✅ Đề tài "${data.topic}" đã được GV duyệt!`,time:'Vừa cập nhật'});
      if(data?.status==='rejected') notes.push({message:`❌ Đề tài "${data.topic}" bị từ chối. Vui lòng đổi đề tài.`,time:'Vừa cập nhật'});
      if(data?.grade!==null&&data?.grade!==undefined){
        notes.push({message:`📊 Điểm thực tập của bạn: ${data.grade} — ${data.grade>=5?'Đạt ✓':'Không đạt ✗'}`,time:'Vừa cập nhật'});
      }
      if(data?.grade>=5&&data?.gradeLocked){
        notes.push({message:`🎓 Bạn đủ điều kiện đăng ký Khóa Luận Tốt Nghiệp!`,time:'Vừa cập nhật'});
      }
      if(notes.length>0) setNotifications(notes);

    }catch(e){console.error('Dashboard load error:',e);}
    setLoadingDash(false);
  },[]);

  useEffect(()=>{loadDash();},[loadDash]);

  // ── Load danh sách GV khi vào tab registration ─────────────────
  useEffect(()=>{
    if(tab==='registration'&&instructorList.length===0){
      setLoadingGV(true);
      fetchGVFromCSV()
        .then(rows=>setInstructorList(rows))
        .catch(()=>console.warn('Không tải được GV từ Sheet'))
        .finally(()=>setLoadingGV(false));
    }
  },[tab]);

  function handleRegSuccess(){
    setTab('dashboard');
    setDashData(null);
    loadDash();
    toast.show('Đăng ký thành công! Đang chờ giảng viên xác nhận.','success');
  }

  function handleChangeTopic(){
    // Reset instructor list để tải lại từ API
    setInstructorList([]);
    setTab('registration');
  }

  return(
    <div className="min-h-screen bg-background">
      {toast.toast&&<Toast {...toast.toast} onClose={toast.hide}/>}

      <Sidebar
        tab={tab} setTab={setTab}
        kltnUnlocked={kltnUnlocked}
        bcttDisabled={bcttDisabled}
        logout={()=>{sessionStorage.clear();window.location.href='login.html';}}
        notifCount={notifications.length}
      />

      <Header notifications={notifications}/>

      <main className="pt-24 pb-10 px-6 min-h-screen" style={{marginLeft:'18rem'}}>
        <div className="max-w-7xl mx-auto">
          {tab==='dashboard'&&(
            <Dashboard
              dashData={dashData}
              loading={loadingDash}
              onRegister={()=>setTab('registration')}
              onChangeTopic={handleChangeTopic}
              toast={toast}
              kltnUnlocked={kltnUnlocked}
              bcttDisabled={bcttDisabled}
            />
          )}
          {tab==='registration'&&(
            <Registration
              onSuccess={handleRegSuccess}
              instructorList={instructorList}
              loadingGV={loadingGV}
            />
          )}
          {tab==='kltn'&&(
            <div className="anim-fade flex flex-col items-center justify-center py-24 gap-6">
              <span className="material-symbols-outlined text-7xl text-primary opacity-20">school</span>
              <h2 className="text-2xl font-headline font-black text-on-surface">Đăng ký Khóa Luận Tốt Nghiệp</h2>
              <p className="text-on-surface-variant">Giao diện đang được xây dựng. Vui lòng quay lại sau.</p>
              <div className="px-6 py-4 bg-tertiary-fixed rounded-2xl text-on-tertiary-fixed text-sm font-medium">
                🎓 Bạn đã đủ điều kiện đăng ký KLTN!
              </div>
            </div>
          )}
        </div>
      </main>

      {/* Mobile bottom nav */}
      <nav className="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-white/90 backdrop-blur-lg rounded-t-3xl shadow-2xl">
        {[
          {id:'dashboard',icon:'home',l:'Trang chủ'},
          {id:'registration',icon:'assignment_turned_in',l:'Đăng ký'},
        ].map(it=>(
          <button key={it.id} onClick={()=>!bcttDisabled&&setTab(it.id)||it.id==='dashboard'&&setTab('dashboard')}
            className={`flex flex-col items-center justify-center px-4 py-2 rounded-2xl transition-all ${tab===it.id?'bg-blue-50 text-blue-800':'text-slate-400'}`}>
            <span className="material-symbols-outlined text-2xl">{it.icon}</span>
            <span className="text-[10px] font-semibold mt-1">{it.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
