// ── HELPERS ───────────────────────────────────────────────────────────────────
async function apiGet(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  return r.json();
}
async function apiPost(body){
  const qs = new URLSearchParams(
    Object.fromEntries(Object.entries(body).map(([k,v])=>[k,String(v??'')]))
  ).toString();
  const r = await fetch(`${API_URL}?${qs}`, { method:'GET', redirect:'follow' });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('JSON parse error:', e); throw new Error('Response không phải JSON'); }
}
async function _gasPost(body){
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('GAS parse error:', e); throw new Error('Response không phải JSON'); }
}

// ── Chunked file upload ───────────────────────────────────────
const CHUNK_SIZE_BYTES = 3 * 1024 * 1024;

async function uploadFileInChunks(file, folderName, onProgress){
  const buffer = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });

  const bytes = new Uint8Array(buffer);
  const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE_BYTES);
  const uploadId = Date.now() + '_' + Math.random().toString(36).slice(2,8);

  for(let i=0; i<totalChunks; i++){
    const start = i * CHUNK_SIZE_BYTES;
    const end   = Math.min(start + CHUNK_SIZE_BYTES, bytes.length);
    const chunk = bytes.slice(start, end);
    let binary = '';
    chunk.forEach(b => binary += String.fromCharCode(b));
    const chunkBase64 = btoa(binary);

    let attempt = 0, ok = false;
    while(attempt < 3 && !ok){
      try{
        const res = await _gasPost({
          action:'uploadChunk',
          uploadId, chunkIndex:i, totalChunks,
          chunkData:chunkBase64,
          fileName:file.name, mimeType:file.type||'application/octet-stream',
          folderName,
        });
        if(!res.success) throw new Error(res.message||'Chunk failed');
        ok = true;
      }catch(err){
        attempt++;
        if(attempt>=3) throw new Error(`Upload thất bại chunk ${i}: ${err.message}`);
        await new Promise(r=>setTimeout(r, 1000*attempt));
      }
    }
    if(onProgress) onProgress(Math.round(((i+1)/totalChunks)*100));
  }

  const finalRes = await _gasPost({
    action:'finalizeUpload',
    uploadId, totalChunks,
    fileName:file.name, mimeType:file.type||'application/octet-stream',
    folderName,
  });
  if(!finalRes.success) throw new Error(finalRes.message||'Finalize thất bại');
  return finalRes.driveUrl;
}

const DIRECT_UPLOAD_LIMIT = 15 * 1024 * 1024;

async function apiPostFile(body, onProgress){
  const { _file, folderName, ...rest } = body;

  if(_file && _file instanceof File){
    if(_file.size <= DIRECT_UPLOAD_LIMIT){
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(_file);
      });
      if(onProgress) onProgress(50);
      const result = await _gasPost({ ...rest, folderName,
        fileBase64:b64, fileName:_file.name,
        mimeType:_file.type||'application/octet-stream',
      });
      if(onProgress) onProgress(100);
      return result;
    } else {
      const driveUrl = await uploadFileInChunks(_file, folderName||'Upload_UTE', onProgress);
      return await _gasPost({ ...rest, folderName, driveUrl,
        fileName:_file.name, mimeType:_file.type||'application/octet-stream',
      });
    }
  }

  return await _gasPost(body);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t)},[]);
  const bgColor = type==='error'?'#c41e3a':type==='warn'?'#e8a800':'#2e8b57';
  return(
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-5 py-3 rounded-lg shadow-lg text-white font-medium text-sm anim-slide"
      style={{background:bgColor,minWidth:'280px',justifyContent:'center'}}>
      <span className="material-symbols-outlined text-base">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

function Av({name='',cls=''}){

  const ini=parts.length>=2
    ?( parts[parts.length-2][0]+parts[parts.length-1][0] ).toUpperCase()
    :( parts[0]?.[0]||'?' ).toUpperCase();
  const cols=['#1a3a5c','#5c3a1a','#1a5c3a','#8c5a2a'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full flex items-center justify-center text-white font-semibold text-sm flex-shrink-0 ${cls}`} style={{background:cols[idx]}}>{ini}</div>;
}

const SS_ID_CSV   = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';

const SHEET_KLTN_TAB    = 'DangKyKLTN';

function parseCsvLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let j = 0; j < line.length; j++) {
    const c = line[j];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.replace(/^"|"$/g,'').trim());
  return cols;
}

async function fetchSheetCSV(sheetTab) {
  const url = `https://docs.google.com/spreadsheets/d/${SS_ID_CSV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetTab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Không tải được sheet: ' + sheetTab);
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(parseCsvLine);
}

async function fetchDangKyByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_DANGKY_TAB);
  const pendingList = [], approvedList = [];
  for (const r of rows) {
    if (!r[9] || r[9].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    const obj = {
      studentEmail    : r[1]  || '',
      studentName     : r[2]  || '',
      maSo            : r[3]  || '',
      nganh           : r[4]  || '',
      topic           : r[6]  || '',
      company         : r[7]  || '',
      term            : r[11] || '',
      note            : r[12] || '',
      status          : r[13] || 'pending',
      grade           : r[14] !== '' ? parseFloat(String(r[14]).replace(',', '.')) : null,
      position        : r[16] || '',
      internDuration  : r[17] || '',
      reportSubmitted : r[18]?.toString().toLowerCase() === 'true',
      reportDriveUrl  : r[19] || '',
      xnttDriveUrl    : r[20] || '',
    };
    if (obj.status === 'pending') pendingList.push(obj);
    else if (obj.status === 'approved' || obj.status === 'graded') approvedList.push(obj);
  }
  return { pendingList, approvedList };
}

async function fetchKLTNByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_KLTN_TAB);
  const pendingTopic = [];
  const activeList = [];

  for (const r of rows) {
    if (!r[7] || r[7].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    
    const step = (r[14] === '' || r[14] === null || r[14] === undefined) ? 0 : (parseInt(r[14]) || 0);
    
    const obj = {
      studentEmail : r[1]  || '',
      studentName  : r[2]  || '',
      maSo         : r[3]  || '',
      nganh        : r[4]  || '',
      topic        : r[5]  || '',
      term         : r[9]  || '',
      note         : r[10] || '',
      status       : r[11] || 'pending',
      grade        : r[12] !== '' ? parseFloat(String(r[12]).replace(',', '.')) : null,
      step, decuUrl: r[15] || '',
      type         : 'kltn',
      kltnUrl      : r[16] || '',
      daoVanUrl    : r[17] || '',
      daoVanPct    : r[18] || '',
      nhanXet      : r[19] || '',
    };

    if (step >= 1) {
      activeList.push(obj);
    } else if (obj.status === 'pending') {
      pendingTopic.push(obj);
    } else if (obj.status === 'approved') {
      activeList.push(obj);
    }
  }
  
  return { pendingTopic, pendingOutline: [], activeList };
}

async function fetchHoiDongByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
  const email = gvEmail.toLowerCase().trim();
  return rows.filter(r =>
    (r[4]||'').toLowerCase().trim() === email ||
    (r[5]||'').toLowerCase().includes(email)  ||
    (r[6]||'').toLowerCase().includes(email)  ||
    (r[7]||'').toLowerCase().includes(email)  ||
    (r[9]||'').toLowerCase().includes(email)
  ).map(r => ({

    maSo           : r[1] || '',
    studentName    : r[2] || '',
    gvPhanBienName : r[3] || '',
    gvPhanBienEmail: r[4] || '',
    truongHD       : r[5] || '',
    thanhVien1     : r[6] || '',
    thanhVien2     : r[7] || '',
    thuKy          : r[9] || '',

}

async function fetchGVNotifications(gvEmail) {
  try {
    const rows = await fetchSheetCSV(SHEET_NOTIF_TAB);
    const email = gvEmail.toLowerCase().trim();
    return rows
      .filter(r => (r[1]||'').toLowerCase().trim() === email)
      .slice(-10).reverse()
      .map(r => ({ time: r[0]||'', message: r[2]||'' }));
  } catch { return []; }
}

function FeedbackModal({ student, onSave, onClose, processing }) {
  let initYeuCau = '';
  let initCauHoi = '';
  const pbMatch = (student.nhanXet || '').match(/\[GV PHẢN BIỆN\]\n([\s\S]*?)(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[HỘI ĐỒNG\]|$)/);
  const pbText = pbMatch ? pbMatch[1] : '';

  if (pbText) {
    if (pbText.includes('[CÂU HỎI]')) {
      const parts = pbText.split('[CÂU HỎI]');
      initYeuCau = parts[0].replace('[YÊU CẦU CHỈNH SỬA]\n', '').trim();
      initCauHoi = parts[1] ? parts[1].trim() : '';
    } else {
      initYeuCau = pbText;
    }
  }

  const [yeuCau, setYeuCau] = React.useState(initYeuCau);
  const [cauHoi, setCauHoi] = React.useState(initCauHoi);

  const handleSave = () => {
    const pbCombined = `[GV PHẢN BIỆN]\n[YÊU CẦU CHỈNH SỬA]\n${yeuCau.trim()}\n\n[CÂU HỎI]\n${cauHoi.trim()}`;
    let full = student.nhanXet || '';
    if (full.includes('[GV PHẢN BIỆN]')) {
       full = full.replace(/\[GV PHẢN BIỆN\]\n([\s\S]*?)(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[HỘI ĐỒNG\]|$)/, pbCombined);
    } else {
       full = full ? `${full.trim()}\n\n${pbCombined}` : pbCombined;
    }
    onSave(full);
  };

  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
      <div className="bg-white w-full max-w-2xl rounded-xl shadow-xl anim-slide flex flex-col max-h-[95vh]">

              <h2 className="font-display font-bold text-lg">Yêu cầu chỉnh sửa & Câu hỏi</h2>

// ── TAB 1: THÔNG TIN CHUNG ────────────────────────────────────────────────────
function TabThongTinChung({toast}) {
  const [pendingList,  setPendingList]  = React.useState([]);
  const [approvedList, setApprovedList] = React.useState([]);
  const [loading,      setLoading]      = React.useState(true);
  const [processingId, setProcessingId] = React.useState(null);
  const [rejectTarget, setRejectTarget] = React.useState(null);
  const [editTopicTarget, setEditTopicTarget] = React.useState(null);

  // Thêm State cho tính năng Duyệt hàng loạt
  const [selectedPending, setSelectedPending] = React.useState([]);
  const [isBatchApproving, setIsBatchApproving] = React.useState(false);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const [bcttData, kltnData] = await Promise.all([
        fetchDangKyByGV(SESSION.email),
        fetchKLTNByGV(SESSION.email)
      ]);
      const bcttPending = bcttData.pendingList.map(r => ({...r, type: 'bctt'}));
      setPendingList([...bcttPending, ...kltnData.pendingTopic]);
      setApprovedList(bcttData.approvedList);
      setSelectedPending([]); // Reset lựa chọn khi tải lại
    } catch(e) { toast.show('Không tải được dữ liệu.', 'error'); }
    setLoading(false);
  }

  // Hàm duyệt 1 sinh viên (Cũ)
  async function handleApprove(req) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') res = await apiPost({ action: 'approveKLTNTopic', studentEmail: req.studentEmail });
      else res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'approved' });
      
      if (res.success) {
        toast.show(`Đã duyệt đề tài của ${req.studentName}!`, 'success');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
        if (req.type === 'bctt') setApprovedList(prev => [{ ...req, status: 'approved' }, ...prev]);
        // Xóa khỏi danh sách đang chọn nếu có
        setSelectedPending(prev => prev.filter(email => email !== req.studentEmail));
      } else toast.show(res.message || 'Duyệt thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
  }

  // THÊM MỚI: Hàm duyệt hàng loạt
  async function handleBatchApprove() {
    if (selectedPending.length === 0) return;
    setIsBatchApproving(true);
    
    let successCount = 0;
    let failCount = 0;
    
    // Lấy chi tiết các sinh viên đã chọn
    const itemsToApprove = pendingList.filter(r => selectedPending.includes(r.studentEmail));

    // Gọi API tuần tự cho từng sinh viên
    for (const req of itemsToApprove) {
      try {
        let res;
        if (req.type === 'kltn') res = await apiPost({ action: 'approveKLTNTopic', studentEmail: req.studentEmail });
        else res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'approved' });
        
        if (res.success) successCount++;
        else failCount++;
      } catch(e) { failCount++; }
    }

    setIsBatchApproving(false);
    
    // Thông báo kết quả
    if (successCount > 0) {
      toast.show(`✅ Đã duyệt thành công ${successCount} đề tài!`, 'success');
    }
    if (failCount > 0) {
      toast.show(`❌ Có ${failCount} đề tài duyệt thất bại.`, 'error');
    }

    // Load lại data để đồng bộ với Sheet
    loadData();
  }

  // Hàm xử lý Checkbox "Chọn tất cả"
  const isAllSelected = pendingList.length > 0 && selectedPending.length === pendingList.length;
  function handleSelectAll() {
    if (isAllSelected) setSelectedPending([]);
    else setSelectedPending(pendingList.map(r => r.studentEmail));
  }

  // Hàm xử lý Checkbox từng dòng
  function handleSelectOne(email) {
    if (selectedPending.includes(email)) {
      setSelectedPending(prev => prev.filter(e => e !== email));
    } else {
      setSelectedPending(prev => [...prev, email]);
    }
  }

  async function handleReject(req, reason) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') res = await apiPost({ action: 'rejectKLTNTopic', studentEmail: req.studentEmail, reason });
      else res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'rejected', reason });
      if (res.success) {
        toast.show(`Đã từ chối đề tài của ${req.studentName}.`, 'warn');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
        setSelectedPending(prev => prev.filter(email => email !== req.studentEmail));
      } else toast.show(res.message || 'Từ chối thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null); setRejectTarget(null);
  }

  async function handleEditTopic(req, newTopic) {
    setProcessingId(req.studentEmail);
    try {
      const res = await apiPost({ action: 'updateTopic', type: req.type, studentEmail: req.studentEmail, newTopic });
      if (res.success) {
        toast.show('Đã cập nhật tên đề tài!', 'success');
        setPendingList(prev => prev.map(r => r.studentEmail === req.studentEmail ? {...r, topic: newTopic} : r));
      } else toast.show(res.message || 'Cập nhật thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null); setEditTopicTarget(null);
  }

  const stats = [
    { label:'Sinh viên hướng dẫn', value: approvedList.length, icon:'school', color:'#1a3a5c' },
    { label:'Chờ duyệt', value: pendingList.length, icon:'pending_actions', color:'#e8a800' },
  ];

  return (
    <div className="space-y-6 anim-fade">
      {rejectTarget && <RejectModal request={rejectTarget} onConfirm={handleReject} onClose={() => setRejectTarget(null)}/>}
      {editTopicTarget && <EditTopicModal request={editTopicTarget} onConfirm={handleEditTopic} onClose={() => setEditTopicTarget(null)}/>}

      <div className="card p-6 flex flex-col md:flex-row gap-6 items-center">
        <div className="w-20 h-20 rounded-xl bg-primary flex items-center justify-center text-white font-bold text-3xl">
          {SESSION.name.trim().split(' ').filter(Boolean).slice(-1)[0]?.[0]?.toUpperCase() || 'G'}
        </div>
        <div className="flex-1 text-center md:text-left">
          <div className="flex flex-col md:flex-row md:items-end gap-2 mb-1">
            <h2 className="text-xl font-display font-bold">{SESSION.name}</h2>
            <span className="badge bg-primary/10 text-primary">Giảng viên</span>
          </div>
          <p className="text-text-muted text-sm mb-3 flex items-center justify-center md:justify-start gap-2">
            <span className="material-symbols-outlined text-base">school</span>
            {SESSION.nganh || 'Khoa học máy tính'} • {SESSION.maGV}
          </p>
          <div className="flex flex-wrap gap-2 justify-center md:justify-start">
            <span className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-surface-alt rounded-md text-sm"><span className="material-symbols-outlined text-base text-primary">calendar_today</span>HK2 - 2024-2025</span>

// ── TAB 2: SINH VIÊN HƯỚNG DẪN ───────────────────────────────────────────────
function TabSinhVienHuongDan({toast}) {
  const [search, setSearch] = React.useState('');
  const [students, setStudents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [grades, setGrades] = React.useState({});
  const [saving, setSaving] = React.useState({});
  const [viewerFile, setViewerFile] = React.useState(null);
  const [kltnPending, setKltnPending] = React.useState([]);
  const [kltnActive, setKltnActive] = React.useState([]);
  const [kltnProcessing, setKltnProcessing] = React.useState(null);
  const [rejectOutlineTarget, setRejectOutlineTarget] = React.useState(null);
  const [editOutlineTarget, setEditOutlineTarget] = React.useState(null);
  const [gradingKLTNTarget, setGradingKLTNTarget] = React.useState(null);
  const [feedbackTarget, setFeedbackTarget] = React.useState(null);
  const [uploadingDaoVan, setUploadingDaoVan] = React.useState({});
  const [uploadingKLTN, setUploadingKLTN] = React.useState({});
  const [kltnInput, setKltnInput] = React.useState({});

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [{ approvedList }, { pendingTopic, activeList }] = await Promise.all([fetchDangKyByGV(SESSION.email), fetchKLTNByGV(SESSION.email)]);
        setStudents(approvedList);
        const init = {};
        approvedList.forEach(sv => { init[sv.maSo] = sv.grade != null ? String(sv.grade) : ''; });
        setGrades(init);
        setKltnPending(pendingTopic);
        setKltnActive(activeList);
      } catch(e) { toast.show('Không tải được danh sách.', 'error'); }
      setLoading(false);
    })();
  }, []);

  async function handleEditOutlineTopic(sv, newTopic) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateTopic', type: 'kltn', studentEmail: sv.studentEmail, newTopic });
      if (res.success) { toast.show('Đã cập nhật!', 'success'); setKltnPending(prev => prev.map(r => r.studentEmail === sv.studentEmail ? {...r, topic: newTopic} : r)); }
      else toast.show(res.message || 'Cập nhật thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setKltnProcessing(null); setEditOutlineTarget(null);
  }

  async function handleSaveKLTNFromModal(totalGrade, nhanXetStr) {
    const sv = gradingKLTNTarget;
    setKltnProcessing(sv.studentEmail);
    try {
      const pct = kltnInput[sv.maSo]?.daoVanPct !== undefined ? kltnInput[sv.maSo].daoVanPct : sv.daoVanPct;
      let res = await apiPost({ action: 'saveKLTNGrade', studentEmail: sv.studentEmail, grade: totalGrade, nhanXet: nhanXetStr, daoVanPct: pct });
      if (!res.success && (res.message || '').toLowerCase().includes('unknown')) res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'graded', note: nhanXetStr, grade: totalGrade });
      if (res.success) { toast.show('Đã lưu điểm!', 'success'); setKltnActive(prev => prev.map(s => s.maSo === sv.maSo ? {...s, grade: parseFloat(totalGrade), nhanXet: nhanXetStr, status: 'graded', daoVanPct: pct} : s)); setGradingKLTNTarget(null); }
      else toast.show(res.message || 'Lưu điểm thất bại!', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setKltnProcessing(null);
  }

  async function handleSaveFeedback(text) {
    const sv = feedbackTarget;
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: text });
      if (res.success) { toast.show('Đã lưu nhận xét!', 'success'); setKltnActive(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXet: text} : s)); setFeedbackTarget(null); }
      else toast.show(res.message || 'Lỗi', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setKltnProcessing(null);
  }

  async function handleApproveOutline(sv) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'approved', step: 2 });
      if (res.success) { toast.show(`Đã duyệt đề cương!`, 'success'); setKltnPending(prev => prev.filter(r => r.studentEmail !== sv.studentEmail)); setKltnActive(prev => [{ ...sv, step: 2, status: 'approved' }, ...prev]); }
      else toast.show(res.message || 'Duyệt thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setKltnProcessing(null);
  }

  async function handleRejectOutline(sv, reason) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'rejected', note: reason || '' });
      if (res.success) { toast.show(`Đã từ chối!`, 'warn'); setKltnPending(prev => prev.filter(r => r.studentEmail !== sv.studentEmail)); }
      else toast.show(res.message || 'Từ chối thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setKltnProcessing(null); setRejectOutlineTarget(null);
  }

  async function handleSaveGrade(maSo, studentEmail) {
    const g = grades[maSo];
    if (g === '' || g === undefined) { toast.show('Vui lòng nhập điểm!', 'warn'); return; }
    const num = parseFloat(g);
    if (isNaN(num) || num < 0 || num > 10) { toast.show('Điểm phải từ 0 đến 10!', 'error'); return; }
    setSaving(prev => ({...prev, [maSo]: true}));
    try {
      const res = await apiPost({ action:'updateStatus', studentEmail, status:'graded', grade: num });
      if (res.success) { toast.show(`Đã lưu điểm ${num.toFixed(1)}!`, 'success'); setStudents(prev => prev.map(sv => sv.maSo === maSo ? {...sv, grade: num, status: 'graded'} : sv)); }
      else toast.show(res.message || 'Lưu điểm thất bại!', 'error');
    } catch(e) { toast.show('Lỗi!', 'error'); }
    setSaving(prev => ({...prev, [maSo]: false}));
  }

  const filtered = students.filter(s => s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search));

  if (loading) return <Spinner text="Đang tải danh sách sinh viên..."/>;

  return (
    <div className="space-y-6 anim-fade">
      {rejectOutlineTarget && <RejectOutlineModal request={rejectOutlineTarget} onConfirm={handleRejectOutline} onClose={() => setRejectOutlineTarget(null)}/>}
      {editOutlineTarget && <EditTopicModal request={editOutlineTarget} onConfirm={handleEditOutlineTopic} onClose={() => setEditOutlineTarget(null)}/>}
      {viewerFile && <FileViewerModal {...viewerFile} onClose={() => setViewerFile(null)}/>}
      {gradingKLTNTarget && <KLTNGradingModal student={gradingKLTNTarget} processing={kltnProcessing === gradingKLTNTarget.studentEmail} onSave={handleSaveKLTNFromModal} onClose={() => setGradingKLTNTarget(null)}/>}
      {feedbackTarget && <GVHDFeedbackModal student={feedbackTarget} processing={kltnProcessing === feedbackTarget.studentEmail} onSave={handleSaveFeedback} onClose={() => setFeedbackTarget(null)}/>}

      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div><h2 className="text-2xl font-display font-bold">Sinh viên hướng dẫn</h2><p className="text-text-muted mt-1">Quản lý BCTT và KLTN</p></div>
        <div className="relative w-full md:w-80">
          <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">search</span>
          <input value={search} onChange={e => setSearch(e.target.value)} className="form-input pl-10" placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>

      {kltnPending.length > 0 && (
        <section>
          <h3 className="font-display font-semibold text-lg flex items-center gap-2 mb-4"><span className="material-symbols-outlined text-warning">pending_actions</span>KLTN chờ duyệt đề tài<span className="badge bg-warning/10 text-warning">{kltnPending.length}</span></h3>
          <div className="space-y-3">
            {kltnPending.map(sv => (
              <div key={sv.maSo} className="card p-5">
                <div className="flex items-start gap-3 mb-3"><Av name={sv.studentName} cls="w-10 h-10"/><div className="flex-1"><h4 className="font-semibold line-clamp-1">{sv.topic}</h4><p className="text-sm text-text-muted"><span className="font-medium">{sv.studentName}</span> • MSSV: {sv.maSo}</p></div><span className="badge bg-accent/10 text-accent">KLTN</span></div>
                <div className="grid grid-cols-2 gap-3 p-3 bg-surface-alt rounded-lg mb-3 text-sm"><div><p className="text-xs text-text-muted">Ngành</p><p>{sv.nganh||'--'}</p></div><div><p className="text-xs text-text-muted">Học kỳ</p><p>{sv.term||'--'}</p></div></div>
                <div className="flex gap-2">
                  <button onClick={() => handleApproveOutline(sv)} disabled={kltnProcessing === sv.studentEmail} className="flex-1 btn btn-success">{kltnProcessing === sv.studentEmail ? <span className="material-symbols-outlined anim-spin text-sm">refresh</span> : 'Duyệt đề tài'}</button>
                  <button onClick={() => setRejectOutlineTarget(sv)} disabled={kltnProcessing === sv.studentEmail} className="flex-1 btn btn-outline text-error border-error">Từ chối</button>
                </div>
              </div>
            ))}
          </div>
        </section>
      )}

      {kltnActive.length > 0 && (
        <section>
          <h3 className="font-display font-semibold text-lg flex items-center gap-2 mb-4"><span className="material-symbols-outlined text-accent">school</span>Khóa luận tốt nghiệp</h3>
          <div className="card overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead className="table-header"><tr><th className="px-4 py-3 text-xs">Sinh viên</th><th className="px-4 py-3 text-xs">Đề tài</th><th className="px-4 py-3 text-xs text-center">KLTN</th><th className="px-4 py-3 text-xs text-center">Đạo văn</th><th className="px-4 py-3 text-xs text-center">Điểm</th><th className="px-2 py-3"></th></tr></thead>
                <tbody>
                  {kltnActive.map(sv => {
                    const id = sv.maSo;
                    return (
                      <tr key={id} className="table-row">
                        <td className="px-4 py-3"><div className="flex items-center gap-2"><Av name={sv.studentName} cls="w-8 h-8"/><div><p className="font-medium text-sm">{sv.studentName}</p><p className="text-xs text-text-muted">{sv.maSo}</p></div></div></td>
                        <td className="px-4 py-3"><p className="text-sm line-clamp-2 max-w-[200px]">{sv.topic}</p></td>
                        <td className="px-4 py-3 text-center">{sv.kltnUrl ? <button onClick={() => setViewerFile({url:sv.kltnUrl, studentName:sv.studentName, fileName:'Khóa Luận'})} className="text-primary text-xs font-medium">Xem</button> : <span className="text-text-muted text-xs">Chưa nộp</span>}</td>
                        <td className="px-4 py-3 text-center">{sv.daoVanUrl ? <button onClick={() => setViewerFile({url:sv.daoVanUrl, studentName:sv.studentName, fileName:'Đạo văn', isPlagiarism:true})} className="text-accent text-xs font-medium">Xem</button> : <span className="text-text-muted text-xs">Chưa có</span>}</td>
                        <td className="px-4 py-3 text-center">
                          {sv.status === 'graded' ? <span className="font-bold text-primary">{Number(sv.grade).toFixed(1)}</span> :
                            <div className="flex flex-col gap-1"><button onClick={() => setGradingKLTNTarget(sv)} className="text-xs btn btn-outline py-1">{sv.grade != null ? 'Sửa' : 'Chấm'}</button></div>}
                        </td>
                        <td className="px-2 py-3"><button onClick={() => setFeedbackTarget(sv)} className="p-2 hover:bg-surface-alt rounded-md"><span className="material-symbols-outlined text-text-muted">chat_bubble</span></button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </section>
      )}

      <section>
        <h3 className="font-display font-semibold text-lg flex items-center gap-2 mb-4"><span className="material-symbols-outlined text-primary">assignment</span>Báo cáo thực tập (BCTT)</h3>
        {students.length === 0 ? <div className="card p-8 text-center text-text-muted">Chưa có sinh viên nào</div> : (
          <div className="card overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead className="table-header"><tr><th className="px-4 py-3 text-xs">Sinh viên</th><th className="px-4 py-3 text-xs">Đề tài</th><th className="px-4 py-3 text-xs">Đơn vị</th><th className="px-4 py-3 text-xs text-center">File BC</th><th className="px-4 py-3 text-xs text-center">Điểm</th></tr></thead>
                <tbody>{filtered.map(sv => <tr key={sv.maSo} className="table-row"><td className="px-4 py-3"><div className="flex items-center gap-2"><Av name={sv.studentName} cls="w-8 h-8"/><div><p className="font-medium text-sm">{sv.studentName}</p><p className="text-xs text-text-muted">{sv.maSo}</p></div></div></td><td className="px-4 py-3"><p className="text-sm line-clamp-2 max-w-[200px]">{sv.topic}</p></td><td className="px-4 py-3 text-sm text-text-muted">{sv.company||'--'}</td><td className="px-4 py-3 text-center">{sv.reportSubmitted && sv.reportDriveUrl ? <button onClick={() => setViewerFile({url:sv.reportDriveUrl, studentName:sv.studentName})} className="text-primary text-xs">Xem</button> : <span className="text-text-muted text-xs">Chưa nộp</span>}</td><td className="px-4 py-3 text-center">{sv.grade != null ? <span className="font-bold text-primary">{sv.grade.toFixed(1)}</span> : sv.reportSubmitted ? <div className="flex gap-1"><input type="number" min="0" max="10" step="0.1" value={grades[sv.maSo]??''} onChange={e => setGrades(prev=>({...prev,[sv.maSo]:e.target.value}))} className="form-input w-16 text-center text-sm py-1"/><button onClick={() => handleSaveGrade(sv.maSo, sv.studentEmail)} disabled={saving[sv.maSo]} className="btn btn-primary text-xs py-1">Lưu</button></div> : <span className="text-text-muted text-xs">Chờ nộp</span>}</td></tr>)}</tbody>

// ── TAB 3: SINH VIÊN PHẢN BIỆN ───────────────────────────────────────────────
function TabPhanBien({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [search, setSearch] = React.useState('');
  const [viewerFile, setViewerFile] = React.useState(null);
  const [feedbackTarget, setFeedbackTarget] = React.useState(null);
  const [pbProcessing, setPbProcessing] = React.useState(null);
  const [gradingPBTarget, setGradingPBTarget] = React.useState(null);

  async function handleSavePbFromModal(totalGrade, nhanXetStr) {
    const sv = gradingPBTarget;
    setPbProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action:'saveGrade', type:'pb', studentEmail: sv.studentEmail, grade: totalGrade });
      if (nhanXetStr) await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: nhanXetStr });
      if (res.success) { toast.show('Đã cập nhật điểm!', 'success'); setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, diemPB: totalGrade, nhanXet: nhanXetStr} : s)); setGradingPBTarget(null); }
      else toast.show(res.message || 'Lưu điểm thất bại!', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setPbProcessing(null);
  }

  async function handleSaveFeedback(text) {
    const sv = feedbackTarget;
    setPbProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: text });
      if (res.success) { toast.show('Đã lưu nhận xét!', 'success'); setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXet: text} : s)); setFeedbackTarget(null); }
      else toast.show(res.message || 'Lỗi', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setPbProcessing(null);
  }

  React.useEffect(() => {
    (async () => {

function TabHoiDong({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [search, setSearch] = React.useState('');
  const [viewerFile, setViewerFile] = React.useState(null);
  const [feedbackTarget, setFeedbackTarget] = React.useState(null);
  const [hdProcessing, setHdProcessing] = React.useState(null);
  const [gradingHDTarget, setGradingHDTarget] = React.useState(null);

  async function handleSaveHdFromModal(totalGrade) {
    const sv = gradingHDTarget;
    setHdProcessing(sv.studentEmail);
    try {
      const gvName = SESSION.name.toLowerCase().trim();
      let roleType = 'tv1';
      if ((sv.truongHD||'').toLowerCase().includes(gvName)) roleType = 'ct';
      else if ((sv.thanhVien2||'').toLowerCase().includes(gvName)) roleType = 'tv2';
      const res = await apiPost({ action:'saveGrade', type: roleType, studentEmail: sv.studentEmail, grade: totalGrade });
      if (res.success) { toast.show('Đã lưu điểm!', 'success'); setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, diemHD: totalGrade} : s)); setGradingHDTarget(null); }
      else toast.show(res.message || 'Lưu điểm thất bại!', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setHdProcessing(null);
  }

  async function handleSaveFeedback(text) {
    const sv = feedbackTarget;
    setHdProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: text });
      if (res.success) { toast.show('Đã lưu nhận xét!', 'success'); setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXet: text} : s)); setFeedbackTarget(null); }
      else toast.show(res.message || 'Lỗi', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setHdProcessing(null);
  }

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [hdRows, kltnRows] = await Promise.all([fetchSheetCSV(SHEET_HOIDONG_TAB), fetchSheetCSV(SHEET_KLTN_TAB)]);
        const kltnMap = {};
        kltnRows.forEach(r => { kltnMap[r[3]] = { topic: r[5] || '', kltnUrl: r[16] || '', daoVanUrl: r[17] || '', nhanXet: r[19] || '', diemGVHD: r[12] !== '' ? parseFloat(String(r[12]).replace(',', '.')) : null }; });
        const email = SESSION.email.toLowerCase().trim();
        const gvName = SESSION.name.toLowerCase().trim();
        const hdList = hdRows.filter(r => (r[4]||'').toLowerCase().trim() === email || (r[5]||'').toLowerCase().includes(gvName) || (r[6]||'').toLowerCase().includes(gvName) || (r[7]||'').toLowerCase().includes(gvName) || (r[9]||'').toLowerCase().includes(gvName)).map(r => {
          const maSo = r[1] || '';
          const kData = kltnMap[maSo] || {};
          return { studentEmail: r[0] || '', maSo, studentName: r[2] || '', gvPhanBienName: r[3] || '', gvPhanBienEmail: r[4] || '', truongHD: r[5] || '', thanhVien1: r[6] || '', thanhVien2: r[7] || '', thuKy: r[9] || '', diemPB: (r[10]!==''&&!isNaN(parseFloat(String(r[10]).replace(',','.'))))?parseFloat(String(r[10]).replace(',','.')):null, diemCTHD: (r[11]!==''&&!isNaN(parseFloat(String(r[11]).replace(',','.'))))?parseFloat(String(r[11]).replace(',','.')):null, diemTV1: (r[12]!==''&&!isNaN(parseFloat(String(r[12]).replace(',','.'))))?parseFloat(String(r[12]).replace(',','.')):null, diemTV2: (r[13]!==''&&!isNaN(parseFloat(String(r[13]).replace(',','.'))))?parseFloat(String(r[13]).replace(',','.')):null, diemHD: (r[15]!==''&&!isNaN(parseFloat(String(r[15]).replace(',','.'))))?parseFloat(String(r[15]).replace(',','.')):null, phongBaoVe: r[16]||'', ngayBaoVe: r[17]||'', gioBaoVe: r[18]||'', nhanXetHD: r[19]||'', bienBanUrl: r[20]||'', ...kData };
        });
        setStudents(hdList);
      } catch(e) { toast.show('Không tải được dữ liệu.', 'error'); }
      setLoading(false);
    })();
  }, []);

  const filtered = students.filter(s => s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search));

  function getRoleInfo(sv) {
    const email = SESSION.email.toLowerCase().trim();
    const gvName = SESSION.name.toLowerCase().trim();
    let badges = [], isCouncilMember = false;
    if ((sv.gvPhanBienEmail||'').toLowerCase().trim() === email) badges.push({ label:'Phản biện', color:'bg-secondary/10 text-secondary' });
    if ((sv.truongHD||'').toLowerCase().includes(gvName)) { badges.push({ label:'Chủ tịch', color:'bg-primary text-white' }); isCouncilMember = true; }
    if ((sv.thuKy||'').toLowerCase().includes(gvName)) { badges.push({ label:'Thư ký', color:'bg-accent/10 text-accent' }); isCouncilMember = true; }
    if ((sv.thanhVien1||'').toLowerCase().includes(gvName)) { badges.push({ label:'Ủy viên 1', color:'bg-surface-alt text-text-secondary' }); isCouncilMember = true; }
    if ((sv.thanhVien2||'').toLowerCase().includes(gvName)) { badges.push({ label:'Ủy viên 2', color:'bg-surface-alt text-text-secondary' }); isCouncilMember = true; }
    return { badges, isCouncilMember };
  }

  if (loading) return <Spinner text="Đang tải danh sách Hội đồng..."/>;

  return (

      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">

        <div className="relative w-full md:w-80"><span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">search</span><input value={search} onChange={e => setSearch(e.target.value)} className="form-input pl-10" placeholder="Tìm tên hoặc MSSV..."/></div>
      </div>

      {students.length === 0 ? <div className="card p-8 text-center text-text-muted">Chưa có sinh viên bảo vệ</div> : (
        <div className="card overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-left">
              <thead className="table-header"><tr><th className="px-4 py-3 text-xs">Sinh viên & Đề tài</th><th className="px-4 py-3 text-xs">Hội đồng & Lịch</th><th className="px-4 py-3 text-xs text-center">KLTN</th><th className="px-4 py-3 text-xs text-center">Đạo văn</th><th className="px-4 py-3 text-xs text-center">Điểm HĐ</th><th className="px-2 py-3"></th></tr></thead>
              <tbody>{filtered.map(sv => {
                const { badges, isCouncilMember } = getRoleInfo(sv);
                return (
                  <tr key={sv.maSo} className="table-row">
                    <td className="px-4 py-3"><div className="flex gap-2"><Av name={sv.studentName} cls="w-8 h-8"/><div><p className="font-medium text-sm">{sv.studentName}</p><p className="text-xs text-text-muted">{sv.maSo}</p><div className="flex gap-1 mt-1 flex-wrap">{badges.map((b,i)=><span key={i} className={`badge ${b.color}`}>{b.label}</span>)}</div><p className="text-xs text-text-muted mt-1 line-clamp-2">{sv.topic||'--'}</p></div></div></td>
                    <td className="px-4 py-3 text-xs">{(sv.ngayBaoVe||sv.gioBaoVe||sv.phongBaoVe) && <div className="mb-2 p-2 bg-surface-alt rounded"><p className="font-medium">{sv.ngayBaoVe||'Chưa xếp lịch'}</p><p className="text-text-muted">{sv.gioBaoVe||'--'} • Phòng {sv.phongBaoVe||'--'}</p></div>}{sv.truongHD&&<p><span className="font-medium">CT:</span> {sv.truongHD}</p>}{sv.thanhVien1&&<p>TV1: {sv.thanhVien1}</p>}{sv.thanhVien2&&<p>TV2: {sv.thanhVien2}</p>}{sv.thuKy&&<p>TK: {sv.thuKy}</p>}</td>
                    <td className="px-4 py-3 text-center">{sv.kltnUrl ? <button onClick={() => setViewerFile({url:sv.kltnUrl, studentName:sv.studentName})} className="text-primary text-xs">Xem</button> : <span className="text-text-muted text-xs">Chưa nộp</span>}</td>

                      ) : <span className="text-text-muted text-xs">—</span>}

// ── TAB 5: SAU BẢO VỆ ────────────────────────────────────────────────────────
function TabSauBaoVe({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [search, setSearch] = React.useState('');
  const [processing, setProcessing] = React.useState(null);
  const [viewerFile, setViewerFile] = React.useState(null);
  const [approveTarget, setApproveTarget] = React.useState(null);

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [kltnRows, hdRows] = await Promise.all([fetchSheetCSV(SHEET_KLTN_TAB), fetchSheetCSV(SHEET_HOIDONG_TAB)]);
        const email = SESSION.email.toLowerCase().trim();
        const gvName = SESSION.name.toLowerCase().trim();
        const hdMap = {};
        hdRows.forEach(r => { const sEmail = (r[0]||'').toLowerCase().trim(); hdMap[sEmail] = { truongHD: r[5] || '' }; });
        const kltnMap = {};
        kltnRows.forEach(r => { const sEmail = (r[1]||'').toLowerCase().trim(); kltnMap[sEmail] = { bienBanUrl: r[20]||'', bienBanGiaiTrinhUrl: r[21]||'', baiChinhSuaUrl: r[22]||'', gvhdDuyetSauBv: r[23]||'', chuTichDuyetSauBv: r[24]||'' }; });
        const list = kltnRows.filter(r => { const gvhdEmail = (r[7]||'').toLowerCase().trim(); const sEmail = (r[1]||'').toLowerCase().trim(); const truongHDName = (hdMap[sEmail]?.truongHD||'').toLowerCase(); return gvhdEmail === email || truongHDName.includes(gvName); }).map(r => {
          const sEmail = (r[1]||'').toLowerCase().trim();
          const kl = kltnMap[sEmail] || {};
          const truongHDName = (hdMap[sEmail]?.truongHD) || '';
          const isGVHD = (r[7]||'').toLowerCase().trim() === email;
          const isChuTich = truongHDName.toLowerCase().includes(gvName);
          return { studentEmail: r[1]||'', maSo: r[3]||'', studentName: r[2]||'', topic: r[5]||'', isGVHD, isChuTich, truongHD: truongHDName, ...kl };
        });
        setStudents(list);
      } catch(e) { toast.show('Không tải được dữ liệu.', 'error'); }
      setLoading(false);
    })();
  }, []);

  async function handleGVHDDuyet(sv, isApproved, note) {
    setProcessing(sv.studentEmail);
    const status = isApproved ? 'Yes' : 'No';
    try {
      const res = await apiPost({ action: 'gvhdApprovePostDefense', studentEmail: sv.studentEmail, gvhdDuyetSauBv: status, ...(note ? { note } : {}) });
      if (res.success) { toast.show(`Đã ${isApproved ? 'đồng ý' : 'không đồng ý'}!`, isApproved ? 'success' : 'warn'); setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, gvhdDuyetSauBv: status} : s)); }
      else toast.show(res.message || 'Lỗi', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setProcessing(null); setApproveTarget(null);
  }

  async function handleChuTichDuyet(sv, isApproved) {
    if (!sv.isChuTich) { toast.show('Không có quyền!', 'error'); return; }
    if (sv.gvhdDuyetSauBv !== 'Yes') { toast.show('GVHD phải đồng ý trước!', 'warn'); return; }
    setProcessing(sv.studentEmail);
    const status = isApproved ? 'Yes' : 'No';
    try {
      const res = await apiPost({ action: 'presidentApprovePostDefense', studentEmail: sv.studentEmail, chuTichDuyetSauBv: status });
      if (res.success) { toast.show(`Chủ tịch đã ${isApproved ? 'duyệt' : 'từ chối'}!`, isApproved ? 'success' : 'warn'); setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, chuTichDuyetSauBv: status} : s)); }
      else toast.show(res.message || 'Lỗi', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setProcessing(null);
  }

  const filtered = students.filter(s => s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search));

  if (loading) return <Spinner text="Đang tải dữ liệu..."/>;

  return (
    <div className="space-y-6 anim-fade">
      {viewerFile && <FileViewerModal {...viewerFile} onClose={() => setViewerFile(null)}/>}
      {approveTarget && <GVHDApproveModal student={approveTarget} onConfirm={handleGVHDDuyet} onClose={() => setApproveTarget(null)}/>}

      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div><h2 className="text-2xl font-display font-bold">Sau Bảo Vệ</h2><p className="text-text-muted mt-1">Duyệt bản chỉnh sửa sau bảo vệ</p></div>
        <div className="relative w-full md:w-80"><span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted">search</span><input value={search} onChange={e => setSearch(e.target.value)} className="form-input pl-10" placeholder="Tìm tên hoặc MSSV..."/></div>
      </div>

      {filtered.length === 0 ? <div className="card p-8 text-center text-text-muted">Chưa có sinh viên cần duyệt</div> : (
        <div className="card overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-left">
              <thead className="table-header"><tr><th className="px-4 py-3 text-xs">Sinh viên</th><th className="px-4 py-3 text-xs text-center">Biên bản HĐ</th><th className="px-4 py-3 text-xs text-center">Bài chỉnh sửa</th><th className="px-4 py-3 text-xs text-center">GVHD duyệt</th><th className="px-4 py-3 text-xs text-center">CTHĐ duyệt</th><th className="px-4 py-3 text-xs text-center">Trạng thái</th></tr></thead>
              <tbody>{filtered.map(sv => {
                const gvhdOk = sv.gvhdDuyetSauBv === 'Yes';
                const ctOk = sv.chuTichDuyetSauBv === 'Yes';
                let status = ctOk ? { label:'Hoàn thành', color:'bg-success/10 text-success' } : gvhdOk ? { label:'Chờ CT duyệt', color:'bg-warning/10 text-warning' } : { label:'Chờ GVHD duyệt', color:'bg-surface-alt text-text-muted' };
                return (
                  <tr key={sv.maSo} className="table-row">
                    <td className="px-4 py-3"><div className="flex gap-2"><Av name={sv.studentName} cls="w-8 h-8"/><div><p className="font-medium text-sm">{sv.studentName}</p><p className="text-xs text-text-muted">{sv.maSo}</p><div className="flex gap-1 mt-1">{sv.isGVHD && <span className="badge bg-primary/10 text-primary">GVHD</span>}{sv.isChuTich && <span className="badge bg-secondary/10 text-secondary">CTHĐ</span>}</div></div></div></td>
                    <td className="px-4 py-3 text-center">{sv.bienBanUrl ? <button onClick={() => setViewerFile({url:sv.bienBanUrl, studentName:sv.studentName})} className="text-primary text-xs">Xem</button> : <span className="text-text-muted text-xs">—</span>}</td>
                    <td className="px-4 py-3 text-center">{sv.baiChinhSuaUrl ? <button onClick={() => setViewerFile({url:sv.baiChinhSuaUrl, studentName:sv.studentName})} className="text-primary text-xs">Xem</button> : <span className="text-text-muted text-xs">Chưa nộp</span>}</td>
                    <td className="px-4 py-3 text-center">{gvhdOk ? <span className="badge bg-success/10 text-success">Đã đồng ý</span> : sv.gvhdDuyetSauBv === 'No' ? <span className="badge bg-error/10 text-error">Từ chối</span> : sv.isGVHD && sv.baiChinhSuaUrl ? <button onClick={() => setApproveTarget(sv)} className="btn btn-outline text-xs py-1">Xét duyệt</button> : <span className="text-text-muted text-xs">—</span>}</td>
                    <td className="px-4 py-3 text-center">{ctOk ? <span className="badge bg-success/10 text-success">Đã duyệt</span> : sv.chuTichDuyetSauBv === 'No' ? <span className="badge bg-error/10 text-error">Từ chối</span> : !gvhdOk ? <span className="text-text-muted text-xs">Chờ GVHD</span> : sv.isChuTich ? <div className="flex gap-1 justify-center"><button onClick={() => handleChuTichDuyet(sv, true)} className="btn btn-success text-xs py-1">Duyệt</button><button onClick={() => handleChuTichDuyet(sv, false)} className="btn btn-error text-xs py-1">Từ chối</button></div> : <span className="text-text-muted text-xs">—</span>}</td>
                    <td className="px-4 py-3 text-center"><span className={`badge ${status.color}`}>{status.label}</span></td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── TAB PHÂN CÔNG PHẢN BIỆN (TBM) ─────────────────────────────────────────────
function TabPhanCongPhanBien({toast}) {
  const [students, setStudents] = React.useState([]);
  const [initialStudents, setInitialStudents] = React.useState([]);
  const [teachers, setTeachers] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [isBatchSaving, setIsBatchSaving] = React.useState(false);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const kltnRows = await fetchSheetCSV(SHEET_KLTN_TAB);
      const kltnList = kltnRows.filter(r => r[11] === 'approved' || parseInt(r[14]) >= 1).map(r => ({ studentEmail: r[1], studentName: r[2], maSo: r[3], topic: r[5], gvhd: r[6], term: r[9] || 'Kỳ 2 - 24/25' }));
      let hdMap = {};
      try { const hdRows = await fetchSheetCSV(SHEET_HOIDONG_TAB); hdRows.forEach(r => { hdMap[r[0]] = { gvPhanBienEmail: r[4], gvPhanBienName: r[3] }; }); } catch(e) {}
      const formattedData = kltnList.map(sv => ({ ...sv, pbEmail: hdMap[sv.studentEmail]?.gvPhanBienEmail || '', pbName: hdMap[sv.studentEmail]?.gvPhanBienName || '' }));
      setStudents(formattedData);
      setInitialStudents(JSON.parse(JSON.stringify(formattedData)));
      const userRows = await fetchSheetCSV(SHEET_USERS_TAB);
      setTeachers(userRows.filter(r => r[2] === 'giangvien' || r[2] === 'truongbomon').map(r => ({ email: r[0], name: r[3] })));
    } catch(e) { toast.show('Lỗi tải dữ liệu!', 'error'); }
    setLoading(false);
  }

  async function handleBatchSave() {
    const changes = students.filter(s => { const init = initialStudents.find(i => i.maSo === s.maSo); return init && init.pbEmail !== s.pbEmail && s.pbEmail !== ''; });
    if (changes.length === 0) { toast.show('Không có thay đổi!', 'warn'); return; }
    setIsBatchSaving(true);
    let success = 0;
    for (const sv of changes) {
      try {
        const pbName = teachers.find(t => t.email === sv.pbEmail)?.name || '';
        const res = await apiPost({ action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName, gvPhanBienEmail: sv.pbEmail, gvPhanBienName: pbName });
        if (res.success) success++;
      } catch(e) {}
    }
    setIsBatchSaving(false);
    if (success > 0) { toast.show(`Đã phân công ${success} sinh viên!`, 'success'); setInitialStudents(JSON.parse(JSON.stringify(students))); }
  }

  if (loading) return <Spinner text="Đang tải dữ liệu..."/>;

  return (
    <div className="space-y-6 anim-fade">
      <div className="flex justify-between items-center">
        <div><h2 className="text-2xl font-display font-bold">Phân công Phản biện</h2><p className="text-text-muted">Phân công giảng viên phản biện cho KLTN</p></div>
        <button onClick={handleBatchSave} disabled={isBatchSaving} className="btn btn-primary">{isBatchSaving ? <span className="material-symbols-outlined anim-spin">refresh</span> : 'Lưu phân công'}</button>
      </div>
      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-left">
            <thead className="table-header"><tr><th className="px-4 py-3 text-xs">Sinh viên</th><th className="px-4 py-3 text-xs">MSSV</th><th className="px-4 py-3 text-xs">Đề tài</th><th className="px-4 py-3 text-xs">GV Hướng dẫn</th><th className="px-4 py-3 text-xs">Phân công Phản biện</th></tr></thead>
            <tbody>{students.map(sv => {
              const isChanged = initialStudents.find(i => i.maSo === sv.maSo)?.pbEmail !== sv.pbEmail;
              return (
                <tr key={sv.maSo} className="table-row">
                  <td className="px-4 py-3"><div className="flex items-center gap-2"><Av name={sv.studentName} cls="w-8 h-8"/><span className="font-medium">{sv.studentName}</span></div></td>
                  <td className="px-4 py-3 text-sm text-text-muted">{sv.maSo}</td>
                  <td className="px-4 py-3"><p className="text-sm line-clamp-1 max-w-[200px]">{sv.topic}</p></td>
                  <td className="px-4 py-3 text-sm text-text-muted">{sv.gvhd}</td>
                  <td className="px-4 py-3">
                    <select value={sv.pbEmail} onChange={e => setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, pbEmail: e.target.value} : s))} className={`form-select ${isChanged ? 'border-warning' : ''}`}>
                      <option value="">-- Chọn giảng viên --</option>
                      {teachers.filter(t => t.name !== sv.gvhd).map(t => <option key={t.email} value={t.email}>{t.name}</option>)}
                    </select>
                  </td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── TAB PHÂN CÔNG HỘI ĐỒNG (TBM) ─────────────────────────────────────────────
function TabPhanCongHoiDong({toast}) {
  const [students, setStudents] = React.useState([]);
  const [initialStudents, setInitialStudents] = React.useState([]);
  const [teachers, setTeachers] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [saving, setSaving] = React.useState({});
  const [isBatchSaving, setIsBatchSaving] = React.useState(false);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const kltnRows = await fetchSheetCSV(SHEET_KLTN_TAB);
      const kltnList = kltnRows.filter(r => r[11] === 'approved').map(r => ({ studentEmail: r[1], studentName: r[2], maSo: r[3], topic: r[5], gvhd: r[6] }));
      let hdMap = {};
      try { const hdRows = await fetchSheetCSV(SHEET_HOIDONG_TAB); hdRows.forEach(r => { hdMap[r[0]] = { truongHD: r[5], thanhVien1: r[6], thanhVien2: r[7], thuKy: r[9] }; }); } catch(e) {}
      const formattedData = kltnList.map(sv => ({ ...sv, truongHD: hdMap[sv.studentEmail]?.truongHD || '', thanhVien1: hdMap[sv.studentEmail]?.thanhVien1 || '', thanhVien2: hdMap[sv.studentEmail]?.thanhVien2 || '', thuKy: hdMap[sv.studentEmail]?.thuKy || '' }));
      setStudents(formattedData);
      setInitialStudents(JSON.parse(JSON.stringify(formattedData)));
      const userRows = await fetchSheetCSV(SHEET_USERS_TAB);
      setTeachers(userRows.filter(r => r[2] === 'giangvien' || r[2] === 'truongbomon').map(r => ({ email: r[0], name: r[3] })));
    } catch(e) { toast.show('Lỗi tải dữ liệu!', 'error'); }
    setLoading(false);
  }

  async function handleBatchSave() {
    const changes = students.filter(s => { const init = initialStudents.find(i => i.maSo === s.maSo); return init && (init.truongHD !== s.truongHD || init.thuKy !== s.thuKy || init.thanhVien1 !== s.thanhVien1 || init.thanhVien2 !== s.thanhVien2); });
    if (changes.length === 0) { toast.show('Không có thay đổi!', 'warn'); return; }
    setIsBatchSaving(true);
    let success = 0;
    for (const sv of changes) {
      try {
        const res = await apiPost({ action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName, truongHD: sv.truongHD, thanhVien1: sv.thanhVien1, thanhVien2: sv.thanhVien2, thuKy: sv.thuKy });
        if (res.success) success++;
      } catch(e) {}
    }
    setIsBatchSaving(false);
    if (success > 0) { toast.show(`Đã lưu ${success} hội đồng!`, 'success'); setInitialStudents(JSON.parse(JSON.stringify(students))); }
  }

  if (loading) return <Spinner text="Đang tải dữ liệu..."/>;

  return (
    <div className="space-y-6 anim-fade">
      <div className="flex justify-between items-center">
        <div><h2 className="text-2xl font-display font-bold">Phân công Hội đồng</h2><p className="text-text-muted">Thiết lập Chủ tịch, Thư ký, Ủy viên</p></div>
        <button onClick={handleBatchSave} disabled={isBatchSaving} className="btn btn-primary">{isBatchSaving ? <span className="material-symbols-outlined anim-spin">refresh</span> : 'Lưu phân công'}</button>
      </div>
      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-left">
            <thead className="table-header"><tr><th className="px-4 py-3 text-xs">Sinh viên</th><th className="px-4 py-3 text-xs">Đề tài</th><th className="px-4 py-3 text-xs">Chủ tịch</th><th className="px-4 py-3 text-xs">Thư ký</th><th className="px-4 py-3 text-xs">Ủy viên 1</th><th className="px-4 py-3 text-xs">Ủy viên 2</th></tr></thead>
            <tbody>{students.map(sv => (
              <tr key={sv.maSo} className="table-row">
                <td className="px-4 py-3"><div><p className="font-medium">{sv.studentName}</p><p className="text-xs text-text-muted">{sv.maSo}</p></div></td>
                <td className="px-4 py-3"><p className="text-sm line-clamp-1 max-w-[150px]">{sv.topic}</p></td>
                <td className="px-2 py-3"><select value={sv.truongHD} onChange={e => setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, truongHD: e.target.value} : s))} className="form-select text-sm"><option value="">--</option>{teachers.map(t => <option key={t.email} value={t.name}>{t.name}</option>)}</select></td>
                <td className="px-2 py-3"><select value={sv.thuKy} onChange={e => setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, thuKy: e.target.value} : s))} className="form-select text-sm"><option value="">--</option>{teachers.map(t => <option key={t.email} value={t.name}>{t.name}</option>)}</select></td>
                <td className="px-2 py-3"><select value={sv.thanhVien1} onChange={e => setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, thanhVien1: e.target.value} : s))} className="form-select text-sm"><option value="">--</option>{teachers.map(t => <option key={t.email} value={t.name}>{t.name}</option>)}</select></td>
                <td className="px-2 py-3"><select value={sv.thanhVien2} onChange={e => setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, thanhVien2: e.target.value} : s))} className="form-select text-sm"><option value="">--</option>{teachers.map(t => <option key={t.email} value={t.name}>{t.name}</option>)}</select></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── TAB THỐNG KÊ (TBM) ───────────────────────────────────────────────────────
function TabThongKe({toast}) {

    <div className="space-y-6 anim-fade">
      <div><h2 className="text-2xl font-display font-bold">Thống kê dữ liệu</h2><p className="text-text-muted mt-1">Theo dõi tiến độ và điểm số</p></div>
      <div className="card p-12 text-center text-text-muted"><span className="material-symbols-outlined text-5xl opacity-15 mb-3">bar_chart</span><p className="font-medium">Giao diện Thống kê</p><p className="text-sm mt-1">Đang chờ kết nối Google Apps Script...</p></div>

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  React.useEffect(() => {
    const role = localStorage.getItem('ute_role');
    const email = localStorage.getItem('ute_email');
    if (!role || !email) { window.location.href = 'login.html'; return; }
    if (role === 'sinhvien') { window.location.href = 'trangchusinhvien.html'; return; }
  }, []);
  const [tab, setTab] = React.useState('dashboard');
  const toast = useToast();
  const [notifications, setNotifications] = React.useState([]);

  React.useEffect(() => {
    (async () => {
      const notis = await fetchGVNotifications(SESSION.email);
      if (notis.length > 0) setNotifications(notis);
    })();
  }, []);

  const baseNavMobile = [
    {id:'dashboard', icon:'dashboard', l:'Tổng quan'}, {id:'sinhvien', icon:'group', l:'Hướng dẫn'}, {id:'phanbien', icon:'rate_review', l:'Phản biện'},
    {id:'hoidong', icon:'gavel', l:'Hội đồng'}, {id:'sau_bao_ve', icon:'task_alt', l:'Sau BV'},
  ];
  const tbmNavMobile = [
    {id:'phancong_pb', icon:'assignment_ind', l:'PC.PB'}, {id:'phancong_hd', icon:'manage_accounts', l:'PC.HĐ'}, {id:'thongke', icon:'bar_chart', l:'Thống kê'},
  ];
  const navMobile = SESSION.role === 'truongbomon' ? [...baseNavMobile, ...tbmNavMobile] : baseNavMobile;

  return (
    <div className="min-h-screen bg-background">
      {toast.toast && <Toast {...toast.toast} onClose={toast.hide}/>}
      <Sidebar tab={tab} setTab={setTab} role={SESSION.role} logout={() => { localStorage.clear(); window.location.href = 'login.html'; }}/>
      <Header notifications={notifications}/>
      <main className="pt-16 pb-20 md:pb-10 px-6 min-h-screen" style={{marginLeft:'16rem'}}>
        <div className="max-w-6xl mx-auto">
          {tab === 'dashboard' && <TabThongTinChung toast={toast}/>}
          {tab === 'sinhvien' && <TabSinhVienHuongDan toast={toast}/>}
          {tab === 'phanbien' && <TabPhanBien toast={toast}/>}
          {tab === 'hoidong' && <TabHoiDong toast={toast}/>}
          {tab === 'sau_bao_ve' && <TabSauBaoVe toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'phancong_pb' && <TabPhanCongPhanBien toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'phancong_hd' && <TabPhanCongHoiDong toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'thongke' && <TabThongKe toast={toast}/>}
        </div>
      </main>
      <nav className="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-4 pt-2 bg-white/95 backdrop-blur-sm border-t border-border">
        {navMobile.map(it => (
          <button key={it.id} onClick={() => setTab(it.id)} className={`flex flex-col items-center min-w-[70px] py-1 rounded-md ${tab===it.id?'text-primary':'text-text-muted'}`}>
            <span className="material-symbols-outlined text-2xl">{it.icon}</span>
            <span className="text-[10px] font-medium mt-0.5">{it.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
