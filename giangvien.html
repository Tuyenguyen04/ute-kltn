// ── HELPERS ───────────────────────────────────────────────────────────────────
async function apiGet(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  return r.json();
}
async function apiPost(body){
  const qs = new URLSearchParams(
    Object.fromEntries(Object.entries(body).map(([k,v])=>[k,String(v??'')]))
  ).toString();
  const r = await fetch(`${API_URL}?${qs}`, { method:'GET', redirect:'follow' });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('JSON parse error:', e); throw new Error('Response không phải JSON'); }
}
async function _gasPost(body){
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ console.error('GAS parse error:', e); throw new Error('Response không phải JSON'); }
}

// ── Chunked file upload ───────────────────────────────────────
const CHUNK_SIZE_BYTES = 3 * 1024 * 1024;

async function uploadFileInChunks(file, folderName, onProgress){
  const buffer = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });

  const bytes = new Uint8Array(buffer);
  const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE_BYTES);
  const uploadId = Date.now() + '_' + Math.random().toString(36).slice(2,8);

  for(let i=0; i<totalChunks; i++){
    const start = i * CHUNK_SIZE_BYTES;
    const end   = Math.min(start + CHUNK_SIZE_BYTES, bytes.length);
    const chunk = bytes.slice(start, end);
    let binary = '';
    chunk.forEach(b => binary += String.fromCharCode(b));
    const chunkBase64 = btoa(binary);

    let attempt = 0, ok = false;
    while(attempt < 3 && !ok){
      try{
        const res = await _gasPost({
          action:'uploadChunk',
          uploadId, chunkIndex:i, totalChunks,
          chunkData:chunkBase64,
          fileName:file.name, mimeType:file.type||'application/octet-stream',
          folderName,
        });
        if(!res.success) throw new Error(res.message||'Chunk failed');
        ok = true;
      }catch(err){
        attempt++;
        if(attempt>=3) throw new Error(`Upload thất bại chunk ${i}: ${err.message}`);
        await new Promise(r=>setTimeout(r, 1000*attempt));
      }
    }
    if(onProgress) onProgress(Math.round(((i+1)/totalChunks)*100));
  }

  const finalRes = await _gasPost({
    action:'finalizeUpload',
    uploadId, totalChunks,
    fileName:file.name, mimeType:file.type||'application/octet-stream',
    folderName,
  });
  if(!finalRes.success) throw new Error(finalRes.message||'Finalize thất bại');
  return finalRes.driveUrl;
}

const DIRECT_UPLOAD_LIMIT = 15 * 1024 * 1024;

async function apiPostFile(body, onProgress){
  const { _file, folderName, ...rest } = body;

  if(_file && _file instanceof File){
    if(_file.size <= DIRECT_UPLOAD_LIMIT){
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(_file);
      });
      if(onProgress) onProgress(50);
      const result = await _gasPost({ ...rest, folderName,
        fileBase64:b64, fileName:_file.name,
        mimeType:_file.type||'application/octet-stream',
      });
      if(onProgress) onProgress(100);
      return result;
    } else {
      const driveUrl = await uploadFileInChunks(_file, folderName||'Upload_UTE', onProgress);
      return await _gasPost({ ...rest, folderName, driveUrl,
        fileName:_file.name, mimeType:_file.type||'application/octet-stream',
      });
    }
  }

  return await _gasPost(body);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t)},[]);
  const bgColor = type==='error'?'#c41e3a':type==='warn'?'#e8a800':'#2e8b57';
  return(
    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-5 py-3 rounded-lg shadow-lg text-white font-medium text-sm anim-slide"
      style={{background:bgColor,minWidth:'280px',justifyContent:'center'}}>
      <span className="material-symbols-outlined text-base">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

function Av({name='',cls=''}){
  const parts=name.trim().split(' ').filter(Boolean);
  const ini=parts.length>=2
    ?( parts[parts.length-2][0]+parts[parts.length-1][0] ).toUpperCase()
    :( parts[0]?.[0]||'?' ).toUpperCase();
  const cols=['#1a3a5c','#5c3a1a','#1a5c3a','#8c5a2a'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full flex items-center justify-center text-white font-semibold text-sm flex-shrink-0 ${cls}`} style={{background:cols[idx]}}>{ini}</div>;
}

const SS_ID_CSV   = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';
const SHEET_DANGKY_TAB  = 'DangKy';
const SHEET_KLTN_TAB    = 'DangKyKLTN';
const SHEET_HOIDONG_TAB = 'HoiDongKLTN';
const SHEET_NOTIF_TAB   = 'Notifications';
const SHEET_USERS_TAB   = 'Users';

function parseCsvLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let j = 0; j < line.length; j++) {
    const c = line[j];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.replace(/^"|"$/g,'').trim());
  return cols;
}

async function fetchSheetCSV(sheetTab) {
  const url = `https://docs.google.com/spreadsheets/d/${SS_ID_CSV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetTab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Không tải được sheet: ' + sheetTab);
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(parseCsvLine);
}

async function fetchDangKyByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_DANGKY_TAB);
  const pendingList = [], approvedList = [];
  for (const r of rows) {
    if (!r[9] || r[9].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    const obj = {
      studentEmail    : r[1]  || '',
      studentName     : r[2]  || '',
      maSo            : r[3]  || '',
      nganh           : r[4]  || '',
      topic           : r[6]  || '',
      company         : r[7]  || '',
      term            : r[11] || '',
      note            : r[12] || '',
      status          : r[13] || 'pending',
      grade           : r[14] !== '' ? parseFloat(String(r[14]).replace(',', '.')) : null,
      position        : r[16] || '',
      internDuration  : r[17] || '',
      reportSubmitted : r[18]?.toString().toLowerCase() === 'true',
      reportDriveUrl  : r[19] || '',
      xnttDriveUrl    : r[20] || '',
    };
    if (obj.status === 'pending') pendingList.push(obj);
    else if (obj.status === 'approved' || obj.status === 'graded') approvedList.push(obj);
  }
  return { pendingList, approvedList };
}

async function fetchKLTNByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_KLTN_TAB);
  const pendingTopic = [];
  const activeList = [];

  for (const r of rows) {
    if (!r[7] || r[7].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    
    const step = (r[14] === '' || r[14] === null || r[14] === undefined) ? 0 : (parseInt(r[14]) || 0);
    
    const obj = {
      studentEmail : r[1]  || '',
      studentName  : r[2]  || '',
      maSo         : r[3]  || '',
      nganh        : r[4]  || '',
      topic        : r[5]  || '',
      term         : r[9]  || '',
      note         : r[10] || '',
      status       : r[11] || 'pending',
      grade        : r[12] !== '' ? parseFloat(String(r[12]).replace(',', '.')) : null,
      step, decuUrl: r[15] || '',
      type         : 'kltn',
      kltnUrl      : r[16] || '',
      daoVanUrl    : r[17] || '',
      daoVanPct    : r[18] || '',
      nhanXet      : r[19] || '',
    };

    if (step >= 1) {
      activeList.push(obj);
    } else if (obj.status === 'pending') {
      pendingTopic.push(obj);
    } else if (obj.status === 'approved') {
      activeList.push(obj);
    }
  }
  
  return { pendingTopic, pendingOutline: [], activeList };
}

async function fetchHoiDongByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
  const email = gvEmail.toLowerCase().trim();
  return rows.filter(r =>
    (r[4]||'').toLowerCase().trim() === email ||
    (r[5]||'').toLowerCase().includes(email)  ||
    (r[6]||'').toLowerCase().includes(email)  ||
    (r[7]||'').toLowerCase().includes(email)  ||
    (r[9]||'').toLowerCase().includes(email)
  ).map(r => ({
    studentEmail   : r[0] || '',
    maSo           : r[1] || '',
    studentName    : r[2] || '',
    gvPhanBienName : r[3] || '',
    gvPhanBienEmail: r[4] || '',
    truongHD       : r[5] || '',
    thanhVien1     : r[6] || '',
    thanhVien2     : r[7] || '',
    thuKy          : r[9] || '',
  }));
}

async function fetchGVNotifications(gvEmail) {
  try {
    const rows = await fetchSheetCSV(SHEET_NOTIF_TAB);
    const email = gvEmail.toLowerCase().trim();
    return rows
      .filter(r => (r[1]||'').toLowerCase().trim() === email)
      .slice(-10).reverse()
      .map(r => ({ time: r[0]||'', message: r[2]||'' }));
  } catch { return []; }
}

// ── TAB 1: THÔNG TIN CHUNG ────────────────────────────────────────────────────
function TabThongTinChung({toast}) {
  const [pendingList,  setPendingList]  = React.useState([]);
  const [approvedList, setApprovedList] = React.useState([]);
  const [loading,      setLoading]      = React.useState(true);
  const [processingId, setProcessingId] = React.useState(null);
  const [rejectTarget, setRejectTarget] = React.useState(null);
  const [editTopicTarget, setEditTopicTarget] = React.useState(null);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const [bcttData, kltnData] = await Promise.all([
        fetchDangKyByGV(SESSION.email),
        fetchKLTNByGV(SESSION.email)
      ]);
      
      const bcttPending = bcttData.pendingList.map(r => ({...r, type: 'bctt'}));
      setPendingList([...bcttPending, ...kltnData.pendingTopic]);
      setApprovedList(bcttData.approvedList);
    } catch(e) {
      toast.show('Không tải được dữ liệu từ Sheet.', 'error');
    }
    setLoading(false);
  }

  async function handleApprove(req) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') {
        res = await apiPost({ action: 'approveKLTNTopic', studentEmail: req.studentEmail });
      } else {
        res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'approved' });
      }

      if (res.success) {
        toast.show(`Đã duyệt đề tài của ${req.studentName}!`, 'success');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
        if (req.type === 'bctt') {
          setApprovedList(prev => [{ ...req, status: 'approved' }, ...prev]);
        }
      } else {
        toast.show(res.message || 'Duyệt thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
  }

  async function handleReject(req, reason) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') {
        res = await apiPost({ action: 'rejectKLTNTopic', studentEmail: req.studentEmail, reason: reason });
      } else {
        res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'rejected', reason: reason });
      }

      if (res.success) {
        toast.show(`Đã từ chối đề tài của ${req.studentName}.`, 'warn');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
      } else {
        toast.show(res.message || 'Từ chối thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
    setRejectTarget(null);
  }

  async function handleEditTopic(req, newTopic) {
    setProcessingId(req.studentEmail);
    try {
      const res = await apiPost({
        action: 'updateTopic',
        type: req.type,
        studentEmail: req.studentEmail,
        newTopic: newTopic
      });
      if (res.success) {
        toast.show('Đã cập nhật tên đề tài thành công!', 'success');
        setPendingList(prev => prev.map(r => r.studentEmail === req.studentEmail ? { ...r, topic: newTopic } : r));
      } else {
        toast.show(res.message || 'Cập nhật thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
    setEditTopicTarget(null);
  }

  const stats = [
    { label:'Sinh viên hướng dẫn', value: approvedList.length.toString(), icon:'school', color:'#1a3a5c' },
    { label:'Chờ duyệt', value: pendingList.length.toString(), icon:'pending_actions', color:'#e8a800' },
  ];

  return (
    <div className="space-y-6 anim-fade">
      {rejectTarget && <RejectModal request={rejectTarget} onConfirm={handleReject} onClose={() => setRejectTarget(null)}/>}
      {editTopicTarget && <EditTopicModal request={editTopicTarget} onConfirm={handleEditTopic} onClose={() => setEditTopicTarget(null)}/>}

      {/* Welcome Card */}
      <div className="card p-6 flex flex-col md:flex-row gap-6 items-center">
        <div className="w-20 h-20 rounded-xl bg-primary flex items-center justify-center text-white font-bold text-3xl shadow-sm">
          {SESSION.name.trim().split(' ').filter(Boolean).slice(-1)[0]?.[0]?.toUpperCase() || 'G'}
        </div>
        <div className="flex-1 text-center md:text-left">
          <div className="flex flex-col md:flex-row md:items-end gap-2 mb-1">
            <h2 className="text-xl font-display font-bold text-text-primary">{SESSION.name}</h2>
            <span className="badge bg-primary/10 text-primary">Giảng viên</span>
          </div>
          <p className="text-text-muted text-sm mb-3 flex items-center justify-center md:justify-start gap-2">
            <span className="material-symbols-outlined text-base">school</span>
            {SESSION.nganh || 'Khoa học máy tính'} • {SESSION.maGV}
          </p>
          <div className="flex flex-wrap justify-center md:justify-start gap-2">
            <span className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-surface-alt rounded-md text-sm">
              <span className="material-symbols-outlined text-base text-primary">calendar_today</span>
              HK2 - 2024-2025
            </span>
            <span className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-surface-alt rounded-md text-sm">
              <span className="material-symbols-outlined text-base text-primary">mail</span>
              {SESSION.email}
            </span>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {stats.map((s, i) => (
          <div key={i} className="stat-card flex justify-between items-center">
            <div>
              <p className="text-xs font-semibold text-text-muted uppercase tracking-wide">{s.label}</p>
              <h3 className="text-2xl font-display font-bold text-text-primary mt-1">{loading ? '...' : s.value}</h3>
            </div>
            <span className="material-symbols-outlined text-3xl opacity-15" style={{color:s.color}}>{s.icon}</span>
          </div>
        ))}
      </div>

      {/* Pending Requests */}
      <section>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-display font-semibold text-lg text-text-primary flex items-center gap-2">
            <span className="material-symbols-outlined text-warning">pending_actions</span>
            Yêu cầu chờ duyệt
            {!loading && pendingList.length > 0 && (
              <span className="badge bg-warning/10 text-warning">{pendingList.length}</span>
            )}
          </h3>
          <button onClick={loadData} className="p-2 hover:bg-surface-alt rounded-md transition-colors" title="Làm mới">
            <span className={`material-symbols-outlined text-text-muted text-base ${loading?'anim-spin':''}`}>refresh</span>
          </button>
        </div>

        {loading ? (
          <Spinner text="Đang tải dữ liệu..."/>
        ) : pendingList.length === 0 ? (
          <div className="card p-8 text-center text-text-muted">
            <span className="material-symbols-outlined text-4xl opacity-15 mb-2">inbox</span>
            <p>Không có yêu cầu nào đang chờ duyệt</p>
          </div>
        ) : (
          <div className="space-y-3">
            {pendingList.map((r) => {
              const isKltn = r.type === 'kltn';
              const badgeClass = isKltn ? 'bg-accent/10 text-accent' : 'bg-primary/10 text-primary';
              
              return (
                <div key={r.studentEmail} className="card p-5">
                  <div className="flex justify-between items-start mb-3">
                    <div className="flex-1 min-w-0">
                      <h4 className="font-semibold text-text-primary mb-1 line-clamp-1">{r.topic}</h4>
                      <p className="text-sm text-text-muted">

                    </div>
                    <span className={`badge ${badgeClass}`}>

      <section>

          Sinh viên BCTT đang hướng dẫn

        {!loading && approvedList.length === 0 ? (

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
