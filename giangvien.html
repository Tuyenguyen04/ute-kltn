// ── HELPERS ───────────────────────────────────────────────────────────────────
async function apiGet(params){
  const qs=new URLSearchParams(params).toString();
  const r=await fetch(`${API_URL}?${qs}`,{method:'GET',redirect:'follow'});
  return r.json();
}
async function apiPost(body){
  const qs = new URLSearchParams(
    Object.fromEntries(Object.entries(body).map(([k,v])=>[k,String(v??'')]))
  ).toString();
  const r = await fetch(`${API_URL}?${qs}`, { method:'GET', redirect:'follow' });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ throw new Error('Response không phải JSON: '+text.slice(0,300)); }
}
async function _gasPost(body){
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  const text = await r.text();
  try{ return JSON.parse(text); }
  catch(e){ throw new Error('Response không phải JSON'); }
}

// ── Chunked file upload ───────────────────────────────────────
const CHUNK_SIZE_BYTES = 3 * 1024 * 1024;
async function uploadFileInChunks(file, folderName, onProgress){
  const buffer = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });

  const bytes = new Uint8Array(buffer);
  const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE_BYTES);
  const uploadId = Date.now() + '_' + Math.random().toString(36).slice(2,8);

  for(let i=0; i<totalChunks; i++){
    const start = i * CHUNK_SIZE_BYTES;
    const end   = Math.min(start + CHUNK_SIZE_BYTES, bytes.length);
    const chunk = bytes.slice(start, end);
    let binary = '';
    chunk.forEach(b => binary += String.fromCharCode(b));
    const chunkBase64 = btoa(binary);

    let attempt = 0, ok = false;
    while(attempt < 3 && !ok){
      try{
        const res = await _gasPost({
          action:'uploadChunk',
          uploadId, chunkIndex:i, totalChunks,
          chunkData:chunkBase64,
          fileName:file.name, mimeType:file.type||'application/octet-stream',
          folderName,
        });
        if(!res.success) throw new Error(res.message||'Chunk failed');
        ok = true;
      }catch(err){
        attempt++;
        if(attempt>=3) throw new Error(`Upload thất bại chunk ${i}: ${err.message}`);
        await new Promise(r=>setTimeout(r, 1000*attempt));
      }
    }
    if(onProgress) onProgress(Math.round(((i+1)/totalChunks)*100));
  }

  const finalRes = await _gasPost({
    action:'finalizeUpload',
    uploadId, totalChunks,
    fileName:file.name, mimeType:file.type||'application/octet-stream',
    folderName,
  });
  if(!finalRes.success) throw new Error(finalRes.message||'Finalize thất bại');
  return finalRes.driveUrl;
}

const DIRECT_UPLOAD_LIMIT = 15 * 1024 * 1024;
async function apiPostFile(body, onProgress){
  const { _file, folderName, ...rest } = body;
  if(_file && _file instanceof File){
    if(_file.size <= DIRECT_UPLOAD_LIMIT){
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(_file);
      });
      if(onProgress) onProgress(50);
      const result = await _gasPost({ ...rest, folderName, fileBase64:b64, fileName:_file.name, mimeType:_file.type||'application/octet-stream' });
      if(onProgress) onProgress(100);
      return result;
    } else {
      const driveUrl = await uploadFileInChunks(_file, folderName||'Upload_UTE', onProgress);
      return await _gasPost({ ...rest, folderName, driveUrl, fileName:_file.name, mimeType:_file.type||'application/octet-stream' });
    }
  }
  return await _gasPost(body);
}

function Toast({message,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4500);return()=>clearTimeout(t)},[]);

    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[500] flex items-center gap-2 px-6 py-3 rounded-full shadow-2xl text-white font-bold text-sm anim-fade"

      <span className="material-symbols-outlined text-lg">{type==='error'?'error':type==='warn'?'warning':'check_circle'}</span>
      {message}
    </div>
  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

const SS_ID_CSV         = '1m5lMTtKUNAkCOK1fe5FitHMi3RBlGyd-Ko1n7F7RSFE';

const SHEET_KLTN_TAB    = 'DangKyKLTN';

const SHEET_NOTIF_TAB   = 'Notifications';
const SHEET_USERS_TAB   = 'Users';

function parseCsvLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let j = 0; j < line.length; j++) {
    const c = line[j];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.replace(/^"|"$/g,'').trim());
  return cols;
}

async function fetchSheetCSV(sheetTab) {
  const url = `https://docs.google.com/spreadsheets/d/${SS_ID_CSV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetTab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Không tải được sheet: ' + sheetTab);
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(parseCsvLine);
}

async function fetchDangKyByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_DANGKY_TAB);
  const pendingList = [], approvedList = [];
  for (const r of rows) {
    if (!r[9] || r[9].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    const obj = {
      studentEmail    : r[1]  || '', studentName     : r[2]  || '', maSo            : r[3]  || '',
      nganh           : r[4]  || '', topic           : r[6]  || '', company         : r[7]  || '',
      term            : r[11] || '', note            : r[12] || '', status          : r[13] || 'pending',
      grade           : r[14] !== '' ? parseFloat(String(r[14]).replace(',', '.')) : null,
      reportSubmitted : r[18]?.toString().toLowerCase() === 'true', reportDriveUrl  : r[19] || '', xnttDriveUrl    : r[20] || '',
    };
    if (obj.status === 'pending') pendingList.push(obj);
    else if (obj.status === 'approved' || obj.status === 'graded') approvedList.push(obj);
  }
  return { pendingList, approvedList };
}

async function fetchKLTNByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_KLTN_TAB);
  const pendingTopic = []; 
  const activeList = []; 
  for (const r of rows) {
    if (!r[7] || r[7].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    const step = (r[14] === '' || r[14] === null || r[14] === undefined) ? 0 : (parseInt(r[14]) || 0);
    const obj = {
      studentEmail : r[1]  || '', studentName  : r[2]  || '', maSo         : r[3]  || '',
      nganh        : r[4]  || '', topic        : r[5]  || '', term         : r[9]  || '',
      status       : r[11] || 'pending', grade : r[12] !== '' ? parseFloat(String(r[12]).replace(',', '.')) : null,
      step, kltnUrl: r[16] || '', daoVanUrl: r[17] || '', daoVanPct: r[18] || '', nhanXet: r[19] || '', type: 'kltn',
    };
    if (step >= 1 || obj.status === 'approved') activeList.push(obj);
    else if (obj.status === 'pending') pendingTopic.push(obj);
  }
  return { pendingTopic, activeList };
}

async function fetchGVNotifications(gvEmail) {
  try {
    const rows = await fetchSheetCSV(SHEET_NOTIF_TAB);
    const email = gvEmail.toLowerCase().trim();
    return rows.filter(r => (r[1]||'').toLowerCase().trim() === email).slice(-10).reverse().map(r => ({ time: r[0]||'', message: r[2]||'' }));
  } catch { return []; }
}

function RejectModal({request, onConfirm, onClose}) {
  const [reason, setReason] = React.useState('');
  const [submitting, setSubmitting] = React.useState(false);
  async function handleConfirm() {
    if (!reason.trim()) return;
    setSubmitting(true);
    await onConfirm(request, reason.trim());
    setSubmitting(false);
  }
  return (
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-on-surface/50 backdrop-blur-sm">
      <div className="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl anim-slide">

function EditOutlineModal({request, onConfirm, onClose}) {

  return (
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-on-surface/50 backdrop-blur-sm">

function TabThongTinChung({toast, addGVNotification}) {
  const [pendingList,  setPendingList]  = React.useState([]);
  const [approvedList, setApprovedList] = React.useState([]);
  const [loading,      setLoading]      = React.useState(true);
  const [processingId, setProcessingId] = React.useState(null);
  const [rejectTarget, setRejectTarget] = React.useState(null);
  const [editTopicTarget, setEditTopicTarget] = React.useState(null);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      const [bcttData, kltnData] = await Promise.all([fetchDangKyByGV(SESSION.email), fetchKLTNByGV(SESSION.email)]);
      const bcttPending = bcttData.pendingList.map(r => ({...r, type: 'bctt'}));
      setPendingList([...bcttPending, ...kltnData.pendingTopic]);
      setApprovedList(bcttData.approvedList);
    } catch(e) { toast.show('Không tải được dữ liệu từ Sheet.', 'error'); }
    setLoading(false);
  }

  async function handleApprove(req) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') res = await apiPost({ action: 'approveKLTNTopic', studentEmail: req.studentEmail });
      else res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'approved' });
      if (res.success) {
        toast.show(`✅ Đã duyệt đề tài của ${req.studentName}!`, 'success');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
        if (req.type === 'bctt') setApprovedList(prev => [{ ...req, status: 'approved' }, ...prev]);
      } else toast.show(res.message || 'Duyệt thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setProcessingId(null);
  }

  async function handleReject(req, reason) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') res = await apiPost({ action: 'rejectKLTNTopic', studentEmail: req.studentEmail, reason: reason });
      else res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'rejected', reason: reason });
      if (res.success) {
        toast.show(`Đã từ chối đề tài của ${req.studentName}.`, 'warn');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
      } else toast.show(res.message || 'Từ chối thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
    setRejectTarget(null);
  }

  async function handleEditTopic(req, newTopic) {
    setProcessingId(req.studentEmail);
    try {
      const res = await apiPost({ action: 'updateTopic', type: req.type, studentEmail: req.studentEmail, newTopic: newTopic });
      if (res.success) {
        toast.show('Cập nhật tên đề tài thành công!', 'success');
        setPendingList(prev => prev.map(r => r.studentEmail === req.studentEmail ? { ...r, topic: newTopic } : r));
      } else toast.show(res.message || 'Thất bại.', 'error');
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
    setEditTopicTarget(null);
  }

  const stats = [
    { label:'Sinh viên hướng dẫn', value: approvedList.length.toString(), icon:'school', color:'bg-primary text-on-primary', sub:'Đang hướng dẫn' },
    { label:'Chờ duyệt', value: pendingList.length.toString(), icon:'pending_actions', color:'bg-secondary-fixed text-on-secondary-fixed', sub:'Cần xử lý' },
    { label:'Buổi Hội đồng', value: '--', icon:'groups', color:'bg-tertiary-fixed text-on-tertiary-fixed', sub:'Xem tab Hội đồng' },
  ];

  return (
    <div className="space-y-6 anim-fade">
      {rejectTarget && <RejectModal request={rejectTarget} onConfirm={handleReject} onClose={() => setRejectTarget(null)}/>}
      {editTopicTarget && <EditOutlineModal request={editTopicTarget} onConfirm={handleEditTopic} onClose={() => setEditTopicTarget(null)}/>}

      <section className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="lg:col-span-2 p-6 bg-surface-container-lowest rounded-3xl shadow-sm flex flex-col md:flex-row gap-6 items-center">
          <div className="w-24 h-24 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white font-black text-4xl shadow-lg flex-shrink-0">
            {SESSION.name.trim().split(' ').filter(Boolean).slice(-1)[0]?.[0]?.toUpperCase() || 'G'}
          </div>
          <div className="flex-1 text-center md:text-left">
            <div className="flex flex-col md:flex-row md:items-end gap-2 mb-1">
              <h2 className="text-2xl font-black text-primary tracking-tight">{SESSION.name}</h2>
              <span className="px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed text-xs font-bold rounded-full mb-1 inline-block w-fit mx-auto md:mx-0">Giảng viên</span>
            </div>
            <p className="text-on-surface-variant font-medium mb-4 text-sm">{SESSION.nganh || 'Khoa học máy tính'} • {SESSION.maGV}</p>
          </div>
        </div>
        <div className="grid grid-cols-1 gap-3">
          {stats.map((s, i) => (
            <div key={i} className={`p-5 rounded-2xl flex justify-between items-center relative overflow-hidden group shadow-sm ${s.color}`}>
              <div className="relative z-10">
                <p className="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">{s.label}</p>
                <h3 className="text-3xl font-black">{loading ? '...' : s.value}</h3>
              </div>
              <span className="material-symbols-outlined text-5xl opacity-20 absolute -right-2 -bottom-2">{s.icon}</span>
            </div>
          ))}
        </div>
      </section>

      <section>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-lg font-bold text-on-surface flex items-center gap-2">
            <span className="material-symbols-outlined text-secondary">pending_actions</span>
            Yêu cầu chờ duyệt {pendingList.length > 0 && <span className="bg-error text-white text-[10px] font-black px-2 py-0.5 rounded-full">{pendingList.length}</span>}
          </h3>
          <button onClick={loadData} className="p-2 hover:bg-surface-container rounded-full" title="Làm mới"><span className={`material-symbols-outlined text-on-surface-variant ${loading?'anim-spin':''}`}>refresh</span></button>
        </div>

        {loading ? <div className="text-center py-10"><Spinner text="Đang tải..."/></div> : pendingList.length === 0 ? (
          <div className="flex flex-col items-center justify-center py-16 gap-3 bg-surface-container-lowest rounded-2xl border border-outline-variant/15">
            <span className="material-symbols-outlined text-5xl opacity-15">inbox</span>
            <p className="text-sm font-medium text-on-surface-variant">Không có yêu cầu nào</p>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {pendingList.map((r, i) => {
              const isKltn = r.type === 'kltn';
              return (
                <div key={i} className={`bg-surface-container-lowest p-5 rounded-2xl shadow-sm border-l-4 ${isKltn ? 'border-[#00593c]' : 'border-secondary'}`}>
                  <div className="flex justify-between items-start mb-3">
                    <div className="flex-1 pr-3">
                      <h4 className="font-bold text-sm mb-0.5 line-clamp-1">{r.topic}</h4>
                      <p className="text-xs text-on-surface-variant">{r.studentName} • {r.maSo}</p>
                    </div>
                    <span className={`text-[10px] px-2 py-1 rounded-full font-bold ${isKltn?'bg-tertiary-fixed text-on-tertiary-fixed':'bg-secondary-container/20 text-on-secondary-container'}`}>{isKltn ? 'KLTN' : 'BCTT'}</span>
                  </div>
                  <div className="flex gap-2 mt-4">
                    <button onClick={() => handleApprove(r)} disabled={processingId === r.studentEmail} className={`flex-1 py-2 rounded-xl text-xs font-bold text-white ${isKltn?'bg-[#00593c]':'bg-primary'}`}>Duyệt</button>
                    <button onClick={() => setEditTopicTarget(r)} disabled={processingId === r.studentEmail} className="flex-1 py-2 rounded-xl bg-primary-fixed text-primary text-xs font-bold">Sửa</button>
                    <button onClick={() => setRejectTarget(r)} disabled={processingId === r.studentEmail} className="flex-1 py-2 rounded-xl bg-surface-container text-on-surface-variant text-xs font-bold">Từ chối</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </section>
    </div>
  );
}

                    const handleUploadKLTN = async (e) => { /* logic upload */ };

                    return (
                      <tr key={i} className="hover:bg-surface-container-low transition-colors align-middle">
                        <td className="px-6 py-4">
                          <div className="flex items-center gap-3">
                            <Av name={sv.studentName} cls="w-10 h-10"/>
                            <div><p className="font-bold text-sm">{sv.studentName}</p><p className="text-xs text-on-surface-variant">{sv.maSo}</p></div>
                          </div>
                          <p className="text-xs mt-2 line-clamp-1 max-w-[200px]" title={sv.topic}>{sv.topic}</p>
                        </td>
                        <td className="px-4 py-4 text-center">
                          {sv.kltnUrl ? (
                             <button onClick={() => setViewerFile({ url: sv.kltnUrl, studentName: sv.studentName, fileName: 'KLTN' })} className="text-primary text-[10px] font-bold bg-primary-fixed px-3 py-1.5 rounded-lg">Xem bản in</button>
                          ) : (<span className="text-[10px] text-on-surface-variant/50">SV Chưa nộp</span>)}
                        </td>
                        <td className="px-4 py-4 text-center">
                          {sv.daoVanUrl ? (
                            <button onClick={() => setViewerFile({ url: sv.daoVanUrl, studentName: sv.studentName, fileName: 'Kết Quả Đạo Văn' })} className="text-tertiary text-[10px] font-bold bg-tertiary-fixed px-3 py-1.5 rounded-lg">Xem KQ</button>
                          ) : (<span className="text-[10px] text-on-surface-variant/50">Chưa upload</span>)}
                        </td>
                        <td className="px-4 py-4 text-center">
                           <div className="flex gap-2 justify-center">
                              <button onClick={() => setGradingKLTNTarget(sv)} className="text-[11px] font-bold px-3 py-1 bg-surface-container rounded-lg hover:bg-surface-container-high">{sv.grade!=null?sv.grade:'Chấm'}</button>
                              <button onClick={() => setFeedbackTarget(sv)} className="text-[11px] font-bold px-3 py-1 bg-surface-container rounded-lg hover:bg-surface-container-high">Nhận xét</button>
                           </div>
                        </td>
                        
                        {/* CỘT MỚI: NGHIỆM THU SAU BẢO VỆ */}
                        <td className="px-4 py-4 align-middle border-l-2 border-outline-variant/10">
                          {(sv.bienBanUrl || sv.kltnSauBvUrl) ? (
                            <div className="flex flex-col items-center gap-2">
                              {/* Xem File */}
                              <div className="flex gap-1.5 justify-center">
                                {sv.bienBanUrl && <button onClick={() => setViewerFile({ url: sv.bienBanUrl, studentName: sv.studentName, fileName: 'Biên Bản HĐ' })} title="Biên bản Hội đồng" className="w-8 h-8 rounded-lg bg-surface-container-high flex items-center justify-center"><span className="material-symbols-outlined text-[16px]">assignment</span></button>}
                                {sv.kltnSauBvUrl && <button onClick={() => setViewerFile({ url: sv.kltnSauBvUrl, studentName: sv.studentName, fileName: 'KLTN Chỉnh Sửa' })} title="KLTN Chỉnh sửa" className="w-8 h-8 rounded-lg bg-primary-fixed text-primary flex items-center justify-center"><span className="material-symbols-outlined text-[16px]">menu_book</span></button>}
                                {sv.giaiTrinhUrl && <button onClick={() => setViewerFile({ url: sv.giaiTrinhUrl, studentName: sv.studentName, fileName: 'Giải Trình' })} title="Giải trình chỉnh sửa" className="w-8 h-8 rounded-lg bg-tertiary-fixed text-tertiary flex items-center justify-center"><span className="material-symbols-outlined text-[16px]">fact_check</span></button>}
                              </div>
                              {/* Duyệt */}
                              <div className="w-full border-t border-outline-variant/20 pt-2 flex justify-center">
                                {sv.gvhdDuyetSauBv === 'Yes' ? (
                                  <span className="text-[10px] font-bold text-white bg-primary px-2 py-0.5 rounded-full flex items-center gap-1"><span className="material-symbols-outlined text-[12px]">verified</span> Đã duyệt</span>
                                ) : sv.kltnSauBvUrl ? (
                                  <div className="flex gap-1.5">
                                    <button onClick={() => handleGVHDDuyet(sv, true)} disabled={kltnProcessing === sv.studentEmail} className="px-2 py-1 bg-tertiary text-white text-[10px] font-bold rounded">Duyệt bài</button>
                                    <button onClick={() => handleGVHDDuyet(sv, false)} disabled={kltnProcessing === sv.studentEmail} className="px-2 py-1 bg-error text-white text-[10px] font-bold rounded">Từ chối</button>
                                  </div>
                                ) : (
                                  <span className="text-[9px] text-on-surface-variant italic">Chờ nộp bài sửa</span>
                                )}
                              </div>
                            </div>
                          ) : (
                            <span className="text-[10px] text-on-surface-variant/50 text-center block">Chưa bảo vệ</span>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </section>
      )}
    </div>
  );
}

// ── TAB 4: HỘI ĐỒNG (CHỦ TỊCH / THƯ KÝ) ──────────────────────────────────────
function TabHoiDong({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading,  setLoading]  = React.useState(true);
  const [search,   setSearch]   = React.useState('');
  const [viewerFile, setViewerFile] = React.useState(null);

  async function handleChuTichDuyet(sv, isApproved) {
    if(!window.confirm(`Xác nhận ${isApproved ? 'ĐỒNG Ý' : 'TỪ CHỐI'} bản chỉnh sửa của sinh viên?`)) return;
    const status = isApproved ? 'Yes' : 'No';
    try {
      const res = await apiPost({ action: 'presidentApprovePostDefense', studentEmail: sv.studentEmail, chuTichDuyetSauBv: status });
      if (res.success) {
        toast.show('Đã cập nhật trạng thái duyệt!', 'success');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, chuTichDuyetSauBv: status} : s));
      } else toast.show(res.message, 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
  }

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [hdRows, kltnRows] = await Promise.all([ fetchSheetCSV(SHEET_HOIDONG_TAB), fetchSheetCSV(SHEET_KLTN_TAB) ]);
        const kltnMap = {};
        kltnRows.forEach(r => { kltnMap[r[3]] = { topic: r[5]||'', kltnUrl: r[16]||'', daoVanUrl: r[17]||'' }; });

        const email = SESSION.email.toLowerCase().trim();
        const gvName = SESSION.name.toLowerCase().trim();
        
        const hdList = hdRows
          .filter(r => ((r[4]||'').toLowerCase().trim() === email || (r[5]||'').toLowerCase().includes(gvName) || (r[6]||'').toLowerCase().includes(gvName) || (r[7]||'').toLowerCase().includes(gvName) || (r[8]||'').toLowerCase().includes(gvName) || (r[9]||'').toLowerCase().includes(gvName)))
          .map(r => {
            const maSo = r[1] || '';
            const kData = kltnMap[maSo] || {};
            return {
              studentEmail : r[0] || '', maSo, studentName  : r[2] || '',
              truongHD : r[5] || '', thanhVien1 : r[6] || '', thanhVien2 : r[7] || '', thuKy : r[9] || '',
              bienBanUrl : r[17] || '',
              gvhdDuyetSauBv: r[21] || '',
              chuTichDuyetSauBv: r[22] || '',
              kltnSauBvUrl: r[23] || '', // Cột X
              giaiTrinhUrl: r[24] || '', // Cột Y
              ...kData
            };
          });
        setStudents(hdList);
      } catch(e) { toast.show('Lỗi tải dữ liệu hội đồng.', 'error'); }
      setLoading(false);
    })();
  }, []);

  const filtered = students.filter(s => s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search));

  if (loading) return <Spinner text="Đang tải dữ liệu hội đồng..."/>;

  return (
    <div className="space-y-6 anim-fade">
      {viewerFile && <FileViewerModal url={viewerFile.url} studentName={viewerFile.studentName} fileName={viewerFile.fileName} onClose={() => setViewerFile(null)} />}
      <div className="flex justify-between items-end"><h2 className="text-3xl font-black text-on-surface">Hội đồng KLTN</h2></div>

      {students.length === 0 ? (
        <div className="py-20 text-center"><p>Chưa tham gia Hội đồng nào</p></div>
      ) : (
        <div className="bg-surface-container-lowest rounded-3xl shadow-sm overflow-hidden">
          <table className="w-full text-left">
            <thead className="bg-surface-container-low text-[11px] uppercase text-on-surface-variant">
              <tr><th className="p-4">Sinh viên</th><th className="p-4 text-center">Vai trò của bạn</th><th className="p-4 text-center">Nghiệm thu sau BV (Chủ tịch)</th></tr>
            </thead>
            <tbody className="divide-y divide-outline-variant/10">
              {filtered.map(sv => {
                const isChuTich = (sv.truongHD||'').toLowerCase().includes(SESSION.name.toLowerCase().trim());
                return (
                  <tr key={sv.maSo} className="hover:bg-surface-container-low/30">
                    <td className="p-4">
                      <div className="font-bold text-sm">{sv.studentName}</div>
                      <div className="text-xs text-on-surface-variant">{sv.maSo}</div>
                    </td>
                    <td className="p-4 text-center">
                      <span className={`px-3 py-1 rounded text-xs font-bold ${isChuTich?'bg-primary text-white':'bg-surface-container'}`}>{isChuTich?'Chủ tịch':'Thành viên'}</span>
                    </td>
                    <td className="p-4 align-middle">
                      {isChuTich ? (
                        <div className="flex flex-col items-center">
                          {/* HIỂN THỊ FILE SAU BẢO VỆ CHO CHỦ TỊCH XEM */}
                          {(sv.kltnSauBvUrl || sv.giaiTrinhUrl) && (
                            <div className="flex gap-2 mb-2">
                              {sv.kltnSauBvUrl && <button onClick={() => setViewerFile({ url: sv.kltnSauBvUrl, studentName: sv.studentName, fileName: 'KLTN Chỉnh Sửa' })} className="px-2 py-1 bg-primary-fixed text-primary text-[10px] font-bold rounded flex items-center gap-1"><span className="material-symbols-outlined text-[12px]">menu_book</span> Bài sửa</button>}
                              {sv.giaiTrinhUrl && <button onClick={() => setViewerFile({ url: sv.giaiTrinhUrl, studentName: sv.studentName, fileName: 'Giải Trình' })} className="px-2 py-1 bg-tertiary-fixed text-tertiary text-[10px] font-bold rounded flex items-center gap-1"><span className="material-symbols-outlined text-[12px]">fact_check</span> Giải trình</button>}
                            </div>
                          )}

                          {/* LOGIC DUYỆT CỦA CHỦ TỊCH */}
                          {sv.gvhdDuyetSauBv !== 'Yes' ? (
                            <span className="text-[10px] text-on-surface-variant italic">Chờ GVHD duyệt chỉnh sửa...</span>
                          ) : sv.chuTichDuyetSauBv === 'Yes' ? (
                            <span className="text-[10px] font-bold text-white bg-primary px-3 py-1 rounded-full flex items-center gap-1"><span className="material-symbols-outlined text-[12px]">verified</span> CT Đã duyệt</span>
                          ) : (
                            <div className="flex gap-2">
                              <button onClick={() => handleChuTichDuyet(sv, true)} className="px-2 py-1 bg-[#00593c] text-white text-[10px] font-bold rounded">Duyệt sửa</button>
                              <button onClick={() => handleChuTichDuyet(sv, false)} className="px-2 py-1 bg-error text-white text-[10px] font-bold rounded">Từ chối</button>
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="text-center text-[10px] text-outline">Chỉ Chủ tịch HĐ</div>
                      )}
                    </td>
                  </tr>
                )
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  React.useEffect(() => {
    if (!localStorage.getItem('ute_role')) window.location.href = 'login.html';
  }, []);
  const [tab, setTab] = React.useState('dashboard');
  const toast = useToast();

  return (
    <div className="min-h-screen bg-background">
      {toast.toast && <Toast {...toast.toast} onClose={toast.hide}/>}
      <Sidebar tab={tab} setTab={setTab} role={SESSION.role} logout={() => { localStorage.clear(); window.location.href = 'login.html'; }}/>
      <Header />
      <main className="pt-24 pb-20 md:pb-10 px-6 min-h-screen" style={{marginLeft:'18rem'}}>
        <div className="max-w-7xl mx-auto">
          {tab === 'dashboard'   && <TabThongTinChung toast={toast} />}
          {tab === 'sinhvien'    && <TabSinhVienHuongDan toast={toast}/>}
          {tab === 'hoidong'     && <TabHoiDong toast={toast}/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
