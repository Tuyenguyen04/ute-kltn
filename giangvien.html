async function _gasPost(body){

}

// ── Chunked file upload ───────────────────────────────────────
const CHUNK_SIZE_BYTES = 3 * 1024 * 1024;

async function uploadFileInChunks(file, folderName, onProgress){
  const buffer = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsArrayBuffer(file);
  });

  const bytes = new Uint8Array(buffer);
  const totalChunks = Math.ceil(bytes.length / CHUNK_SIZE_BYTES);
  const uploadId = Date.now() + '_' + Math.random().toString(36).slice(2,8);

  for(let i=0; i<totalChunks; i++){
    const start = i * CHUNK_SIZE_BYTES;
    const end   = Math.min(start + CHUNK_SIZE_BYTES, bytes.length);
    const chunk = bytes.slice(start, end);
    let binary = '';
    chunk.forEach(b => binary += String.fromCharCode(b));
    const chunkBase64 = btoa(binary);

    let attempt = 0, ok = false;
    while(attempt < 3 && !ok){
      try{
        const res = await _gasPost({
          action:'uploadChunk',
          uploadId, chunkIndex:i, totalChunks,
          chunkData:chunkBase64,
          fileName:file.name, mimeType:file.type||'application/octet-stream',
          folderName,
        });
        if(!res.success) throw new Error(res.message||'Chunk failed');
        ok = true;
      }catch(err){
        attempt++;
        if(attempt>=3) throw new Error(`Upload thất bại chunk ${i}: ${err.message}`);
        await new Promise(r=>setTimeout(r, 1000*attempt));
      }
    }
    if(onProgress) onProgress(Math.round(((i+1)/totalChunks)*100));
  }

  const finalRes = await _gasPost({
    action:'finalizeUpload',
    uploadId, totalChunks,
    fileName:file.name, mimeType:file.type||'application/octet-stream',
    folderName,
  });
  if(!finalRes.success) throw new Error(finalRes.message||'Finalize thất bại');
  return finalRes.driveUrl;
}

const DIRECT_UPLOAD_LIMIT = 15 * 1024 * 1024;

async function apiPostFile(body, onProgress){
  const { _file, folderName, ...rest } = body;

  if(_file && _file instanceof File){
    if(_file.size <= DIRECT_UPLOAD_LIMIT){
      const b64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);
        r.onerror=rej;
        r.readAsDataURL(_file);
      });
      if(onProgress) onProgress(50);
      const result = await _gasPost({ ...rest, folderName,
        fileBase64:b64, fileName:_file.name,
        mimeType:_file.type||'application/octet-stream',
      });
      if(onProgress) onProgress(100);
      return result;
    } else {
      const driveUrl = await uploadFileInChunks(_file, folderName||'Upload_UTE', onProgress);
      return await _gasPost({ ...rest, folderName, driveUrl,
        fileName:_file.name, mimeType:_file.type||'application/octet-stream',
      });
    }
  }

  return await _gasPost(body);
}

      {message}

  );
}
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,tp='success')=>setT({message:msg,type:tp,k:Date.now()}),[]);
  return{toast:t,show,hide:()=>setT(null)};
}

function Av({name='',cls=''}){

  const ini=parts.length>=2
    ?( parts[parts.length-2][0]+parts[parts.length-1][0] ).toUpperCase()
    :( parts[0]?.[0]||'?' ).toUpperCase();
  const cols=['from-blue-500 to-blue-700','from-emerald-500 to-teal-600','from-violet-500 to-purple-700','from-orange-400 to-red-500'];
  const idx=name.charCodeAt(0)%4||0;
  return <div className={`rounded-full bg-gradient-to-br ${cols[idx]} flex items-center justify-center text-white font-black text-sm flex-shrink-0 ${cls}`}>{ini}</div>;
}

function parseCsvLine(line) {
  const cols = []; let cur = '', inQ = false;
  for (let j = 0; j < line.length; j++) {
    const c = line[j];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.replace(/^"|"$/g,'').trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.replace(/^"|"$/g,'').trim());
  return cols;
}

async function fetchSheetCSV(sheetTab) {
  const url = `https://docs.google.com/spreadsheets/d/${SS_ID_CSV}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetTab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Không tải được sheet: ' + sheetTab);
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(parseCsvLine);
}

async function fetchDangKyByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_DANGKY_TAB);
  const pendingList = [], approvedList = [];
  for (const r of rows) {
    if (!r[9] || r[9].toLowerCase().trim() !== gvEmail.toLowerCase().trim()) continue;
    const obj = {
      studentEmail    : r[1]  || '',
      studentName     : r[2]  || '',
      maSo            : r[3]  || '',
      nganh           : r[4]  || '',
      topic           : r[6]  || '',
      company         : r[7]  || '',
      term            : r[11] || '',
      note            : r[12] || '',
      status          : r[13] || 'pending',
      grade           : r[14] !== '' ? parseFloat(String(r[14]).replace(',', '.')) : null,
      position        : r[16] || '',
      internDuration  : r[17] || '',
      reportSubmitted : r[18]?.toString().toLowerCase() === 'true',
      reportDriveUrl  : r[19] || '',
      xnttDriveUrl    : r[20] || '',
    };
    if (obj.status === 'pending') pendingList.push(obj);
    else if (obj.status === 'approved' || obj.status === 'graded') approvedList.push(obj);
  }
  return { pendingList, approvedList };
}

  for (const r of rows) {

    const step = (r[14] === '' || r[14] === null || r[14] === undefined) ? 0 : (parseInt(r[14]) || 0);

    const obj = {

      nganh        : r[4]  || '',
      topic        : r[5]  || '',
      term         : r[9]  || '',

      status       : r[11] || 'pending',
      grade        : r[12] !== '' ? parseFloat(String(r[12]).replace(',', '.')) : null,
      step, decuUrl,

      kltnUrl      : r[16] || '', // Cột Q: Link KLTN SV nộp
      daoVanUrl    : r[17] || '', // Cột R: File check đạo văn  ← FIX (trước đọc nhầm là daoVanPct)
      daoVanPct    : r[18] || '', // Cột S: % Đạo văn            ← FIX (cột mới T)
      nhanXet      : r[19] || '', // Cột T: Nhận xét GVHD       ← FIX (index đúng)
    };

    // FIX: Ưu tiên step >= 1 TRƯỚC — SV đã nộp KLTN phải vào activeList
    // dù status trong sheet là gì (tránh bị hiện lại ở "chờ duyệt đề tài")
    if (step >= 1) {
      activeList.push(obj);
    } else if (obj.status === 'pending') {
      // Chưa nộp KLTN, đề tài chờ GV duyệt
      pendingTopic.push(obj);
    } else if (obj.status === 'approved') {
      // GV đã duyệt đề tài, SV chưa nộp KLTN → hiện trong bảng KLTN đang làm
      activeList.push(obj);
    }
  }
  
  return { pendingTopic, pendingOutline, activeList };
}
async function fetchHoiDongByGV(gvEmail) {
  const rows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
  const email = gvEmail.toLowerCase().trim();
  return rows.filter(r =>
    (r[4]||'').toLowerCase().trim() === email ||
    (r[5]||'').toLowerCase().includes(email)  ||
    (r[6]||'').toLowerCase().includes(email)  ||
    (r[7]||'').toLowerCase().includes(email)  ||
    (r[8]||'').toLowerCase().includes(email)
  ).map(r => ({
    studentEmail   : r[0] || '',
    maSo           : r[1] || '',
    studentName    : r[2] || '',
    gvPhanBienName : r[3] || '',
    gvPhanBienEmail: r[4] || '',
    truongHD       : r[5] || '',
    thanhVien1     : r[6] || '',
    thanhVien2     : r[7] || '',
    thuKy          : r[8] || '',
  }));
}

async function fetchGVNotifications(gvEmail) {
  try {
    const rows = await fetchSheetCSV(SHEET_NOTIF_TAB);
    const email = gvEmail.toLowerCase().trim();
    return rows
      .filter(r => (r[1]||'').toLowerCase().trim() === email)
      .slice(-10).reverse()
      .map(r => ({ time: r[0]||'', message: r[2]||'' }));
  } catch { return []; }
}

function TabThongTinChung({toast, addGVNotification}) {
  const [pendingList,  setPendingList]  = React.useState([]);
  const [approvedList, setApprovedList] = React.useState([]);
  const [loading,      setLoading]      = React.useState(true);
  const [processingId, setProcessingId] = React.useState(null);
  const [rejectTarget, setRejectTarget] = React.useState(null);
  const [editTopicTarget, setEditTopicTarget] = React.useState(null); // Thêm state cho Chỉnh sửa

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      // Tải đồng thời dữ liệu BCTT và KLTN
      const [bcttData, kltnData] = await Promise.all([
        fetchDangKyByGV(SESSION.email),
        fetchKLTNByGV(SESSION.email)
      ]);
      
      const bcttPending = bcttData.pendingList.map(r => ({...r, type: 'bctt'}));
      // Gộp Đăng ký BCTT và Đăng ký Đề tài KLTN vào chung 1 mảng
      setPendingList([...bcttPending, ...kltnData.pendingTopic]);
      setApprovedList(bcttData.approvedList);
    } catch(e) {
      toast.show('Không tải được dữ liệu từ Sheet.', 'error');
    }
    setLoading(false);
  }

  async function handleApprove(req) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      // Phân nhánh API tùy theo KLTN hay BCTT
      if (req.type === 'kltn') {
        res = await apiPost({ action: 'approveKLTNTopic', studentEmail: req.studentEmail });
      } else {
        res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'approved' });
      }

      if (res.success) {
        toast.show(`✅ Đã duyệt đề tài của ${req.studentName}!`, 'success');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
        if (req.type === 'bctt') {
          setApprovedList(prev => [{ ...req, status: 'approved' }, ...prev]);
        }
      } else {
        toast.show(res.message || 'Duyệt thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setProcessingId(null);
  }

  async function handleReject(req, reason) {
    setProcessingId(req.studentEmail);
    try {
      let res;
      if (req.type === 'kltn') {
        res = await apiPost({ action: 'rejectKLTNTopic', studentEmail: req.studentEmail, reason: reason });
      } else {
        res = await apiPost({ action: 'updateStatus', studentEmail: req.studentEmail, status: 'rejected', reason: reason });
      }

      if (res.success) {
        toast.show(`Đã từ chối đề tài của ${req.studentName}.`, 'warn');
        setPendingList(prev => prev.filter(r => r.studentEmail !== req.studentEmail));
      } else {
        toast.show(res.message || 'Từ chối thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);
    setRejectTarget(null);
  }

  async function handleEditTopic(req, newTopic) {
    setProcessingId(req.studentEmail);
    try {
      const res = await apiPost({
        action: 'updateTopic',
        type: req.type, // Tự động nhận diện 'bctt' hay 'kltn'
        studentEmail: req.studentEmail,
        newTopic: newTopic
      });
      if (res.success) {
        toast.show('Đã cập nhật tên đề tài thành công!', 'success');
        setPendingList(prev => prev.map(r => r.studentEmail === req.studentEmail ? { ...r, topic: newTopic } : r));
      } else {
        toast.show(res.message || 'Cập nhật thất bại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối.', 'error'); }
    setProcessingId(null);

    { label:'Chờ duyệt', value: pendingList.length.toString(), icon:'pending_actions', color:'bg-secondary-fixed text-on-secondary-fixed', sub:'Cần xử lý' },
    { label:'Buổi Hội đồng', value: '--', icon:'groups', color:'bg-tertiary-fixed text-on-tertiary-fixed', sub:'Xem tab Hội đồng' },
  ];

  return (
    <div className="space-y-6 anim-fade">
      {rejectTarget && <RejectModal request={rejectTarget} onConfirm={handleReject} onClose={() => setRejectTarget(null)}/>}

function FileViewerModal({ url, studentName, fileName, isPlagiarism, isXNTT, onClose }) {
  function getDriveId(u) {
    const m = u.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
    return m ? m[1] : null;
  }
  const fileId      = getDriveId(url);
  const embedUrl    = fileId ? `https://drive.google.com/file/d/${fileId}/preview` : null;
  const downloadUrl = fileId ? `https://drive.google.com/uc?export=download&id=${fileId}` : null;
  const [iframeLoaded, setIframeLoaded] = React.useState(false);

  function onBackdrop(e){ if(e.target===e.currentTarget) onClose(); }

  return (
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-4"
      style={{background:'rgba(25,27,34,0.75)',backdropFilter:'blur(8px)'}}
      onClick={onBackdrop}>

        style={{width:'min(960px,96vw)',height:'min(90vh,800px)'}}>

        <div className="flex items-center justify-between px-6 py-4 border-b border-outline-variant/20 flex-shrink-0">

            <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${isPlagiarism ? 'bg-tertiary-fixed' : isXNTT ? 'bg-tertiary-fixed' : 'bg-primary-fixed'}`}>
              <span className={`material-symbols-outlined fill-icon text-xl`}
                style={isPlagiarism || isXNTT ? {color:'#003f29'} : {color:'#0046ad'}}>
                {isPlagiarism ? 'policy' : isXNTT ? 'verified' : 'description'}
              </span>
            </div>
            <div className="min-w-0">
              <p className="text-[11px] font-bold text-on-surface-variant uppercase tracking-widest leading-none mb-0.5">
                {isPlagiarism ? 'Kết quả kiểm tra đạo văn' : fileName ? fileName : 'Báo cáo thực tập'}

              <h3 className="font-black text-on-surface text-sm truncate leading-snug">{studentName}</h3>
              {fileName && (
                <p className="text-[11px] text-outline truncate mt-0.5">{fileName}</p>

            {downloadUrl && (
              <a href={downloadUrl}

                <span className="material-symbols-outlined text-[17px]">download</span>

            <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 text-on-surface-variant z-10 bg-surface-container-low">
              <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>
              <p className="text-sm font-medium">Đang tải file...</p>

function KLTNGradingModal({ student, onSave, onClose, processing }) {
  const [scores, setScores] = React.useState({ nd: '', td: '', cv: '', th: '' });
  const [baoVe, setBaoVe] = React.useState(true);

  // Tính tổng điểm realtime
  const totalScore = (parseFloat(scores.nd)||0) + (parseFloat(scores.td)||0) + (parseFloat(scores.cv)||0) + (parseFloat(scores.th)||0);

  const handleComplete = () => {
    if (scores.nd === '' || scores.td === '' || scores.cv === '' || scores.th === '') {
      alert("Vui lòng nhập đầy đủ điểm cho cả 4 tiêu chí!");
      return;
    }
    if (totalScore > 10 || totalScore < 0) {
      alert("Tổng điểm bị sai lệch, vui lòng kiểm tra lại!");
      return;
    }
    const nhanXet = baoVe ? "Kết luận: Cho phép SV bảo vệ trước hội đồng" : "Kết luận: KHÔNG cho SV bảo vệ trước hội đồng";
    onSave(totalScore, nhanXet);
  };

  const handleInput = (key, val, max) => {
    let num = parseFloat(val);
    if (val !== '' && (num < 0 || num > max)) return; // Chặn nhập lố max
    setScores(prev => ({ ...prev, [key]: val }));
  };

  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-on-surface/60 backdrop-blur-sm">

function FeedbackModal({ student, onSave, onClose, processing }) {
 // Chỉ lấy phần của GV Phản biện
  let initYeuCau = '';
  let initCauHoi = '';
  const pbMatch = (student.nhanXet || '').match(/\[GV PHẢN BIỆN\]\n([\s\S]*?)(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[HỘI ĐỒNG\]|$)/);
  const pbText = pbMatch ? pbMatch[1] : (student.nhanXet?.includes('[CÂU HỎI]') && !student.nhanXet.includes('[GV PHẢN BIỆN]') ? student.nhanXet : '');

  if (pbText) {
    if (pbText.includes('[CÂU HỎI]')) {
      const parts = pbText.split('[CÂU HỎI]');
      initYeuCau = parts[0].replace('[YÊU CẦU CHỈNH SỬA]\n', '').trim();
      initCauHoi = parts[1] ? parts[1].trim() : '';
    } else {
      initYeuCau = pbText;
    }
  }

  const [yeuCau, setYeuCau] = React.useState(initYeuCau);
  const [cauHoi, setCauHoi] = React.useState(initCauHoi);

  const handleSave = () => {
    const pbCombined = `[GV PHẢN BIỆN]\n[YÊU CẦU CHỈNH SỬA]\n${yeuCau.trim()}\n\n[CÂU HỎI]\n${cauHoi.trim()}`;
    let full = student.nhanXet || '';
    
    // Dọn dẹp dữ liệu cũ bị sai format (nếu có)
    if (!full.includes('[GV PHẢN BIỆN]') && full.includes('[CÂU HỎI]')) {
       full = full.replace(/\[YÊU CẦU CHỈNH SỬA\][\s\S]*?\[CÂU HỎI\][\s\S]*?(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[HỘI ĐỒNG\]|$)/, '');
    }

    // Nối hoặc thay thế đúng khối của Phản Biện
    if (full.includes('[GV PHẢN BIỆN]')) {
       full = full.replace(/\[GV PHẢN BIỆN\]\n([\s\S]*?)(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[HỘI ĐỒNG\]|$)/, pbCombined);
    } else {
       full = full ? `${full.trim()}\n\n${pbCombined}` : pbCombined;
    }
    onSave(full);
  };
  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-on-surface/60 backdrop-blur-sm">
      <div className="bg-white w-full max-w-2xl rounded-[2rem] shadow-2xl anim-slide flex flex-col max-h-[95vh]">
        
        {/* Header */}

          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-primary">
              <span className="material-symbols-outlined">assignment_add</span>
            </div>
            <div>
              <h2 className="font-headline font-extrabold text-lg text-on-surface leading-tight">Yêu cầu chỉnh sửa & Đặt câu hỏi</h2>
              <p className="text-xs text-on-surface-variant">{student.studentName} • {student.maSo}</p>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>
        
        {/* Body */}
        <div className="p-6 overflow-y-auto space-y-6 bg-surface-container-lowest">
          
          {/* Phần 1: Yêu cầu chỉnh sửa */}
          <div>
            <label className="text-base font-bold text-on-surface block mb-2 flex items-center gap-2">
              <span className="material-symbols-outlined text-primary text-[20px]">edit_note</span>

              value={yeuCau} onChange={e => setYeuCau(e.target.value)}

              className="w-full bg-white border border-outline-variant/50 rounded-xl p-4 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm resize-none shadow-inner"
              style={{
                lineHeight: '28px',
                backgroundImage: 'linear-gradient(transparent, transparent 27px, #e2e2eb 28px)',
                backgroundSize: '100% 28px',
                backgroundAttachment: 'local'

// ── TAB 2: SINH VIÊN HƯỚNG DẪN ───────────────────────────────────────────────
// ── MODAL NHẬN XÉT CỦA GVHD (CHỈ DÀNH CHO TAB HƯỚNG DẪN KLTN) ─────────────────
function GVHDFeedbackModal({ student, onSave, onClose, processing }) {
const getOld = () => {
    const m = (student.nhanXet || '').match(/\[GV HƯỚNG DẪN\]\n([\s\S]*?)(?=\n\s*\[GV PHẢN BIỆN\]|\n\s*\[HỘI ĐỒNG\]|$)/);
    // Nếu chưa có format mới, nhưng ô trống hoặc chưa bị chiếm bởi GVPB thì giữ nguyên
    return m ? m[1] : (student.nhanXet?.includes('[GV PHẢN BIỆN]') || student.nhanXet?.includes('[CÂU HỎI]') ? '' : student.nhanXet || '');
  };
  const [text, setText] = React.useState(getOld());

  const handleSave = () => {
    let full = student.nhanXet || '';
    const newBlock = `[GV HƯỚNG DẪN]\n${text.trim()}`;
    // Cập nhật lại chuỗi tổng
    if (full.includes('[GV HƯỚNG DẪN]')) {
       full = full.replace(/\[GV HƯỚNG DẪN\]\n([\s\S]*?)(?=\n\s*\[GV PHẢN BIỆN\]|\n\s*\[HỘI ĐỒNG\]|$)/, newBlock);
    } else {
       full = full ? `${newBlock}\n\n${full.trim()}` : newBlock; // GVHD thường đưa lên đầu
    }
    onSave(full);
  };

  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-on-surface/60 backdrop-blur-sm">
      <div className="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl anim-slide flex flex-col max-h-[90vh]">
        <div className="px-6 py-5 border-b border-outline-variant/20 flex justify-between items-center bg-surface-container-low rounded-t-[2rem]">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-primary">
              <span className="material-symbols-outlined">rate_review</span>
            </div>
            <div>
              <h2 className="font-headline font-extrabold text-lg text-on-surface leading-tight">Nhận xét của GV Hướng Dẫn</h2>
              <p className="text-xs text-on-surface-variant">{student.studentName} • {student.maSo}</p>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>
        
        <div className="p-6 overflow-y-auto bg-surface-container-lowest">
          <label className="text-sm font-bold text-on-surface block mb-3">
            Đánh giá / Nhận xét quá trình làm KLTN của sinh viên:
          </label>
          <textarea
            value={text} onChange={e => setText(e.target.value)}
            rows={6} autoFocus
            placeholder="VD: Sinh viên có thái độ tốt, nộp bài đúng hạn, hoàn thành xuất sắc các mục tiêu đề ra..."
            className="w-full bg-white border border-outline-variant/50 rounded-xl p-4 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm resize-none shadow-inner"
          />
        </div>

        <div className="p-5 border-t border-outline-variant/10 flex justify-end gap-3 bg-surface-container-low rounded-b-[2rem]">
          <button onClick={onClose} disabled={processing} className="px-6 py-2.5 rounded-xl font-bold text-on-surface-variant hover:bg-surface-container transition-colors text-sm">
            Hủy
          </button>
          <button onClick={() => onSave(text)} disabled={processing} className="px-6 py-2.5 rounded-xl bg-primary text-white font-bold hover:opacity-90 transition-colors flex items-center gap-2 text-sm shadow-md">
            {processing ? <span className="material-symbols-outlined anim-spin text-[18px]">refresh</span> : <span className="material-symbols-outlined text-[18px]">save</span>}
            Lưu nhận xét
          </button>
        </div>
      </div>
    </div>
  );
}
function TabSinhVienHuongDan({toast}) {

  const [kltnActive,   setKltnActive]   = React.useState([]);
  const [kltnLoading,  setKltnLoading]  = React.useState(true);
  const [kltnProcessing, setKltnProcessing] = React.useState(null);
  const [rejectOutlineTarget, setRejectOutlineTarget] = React.useState(null);
  const [editOutlineTarget, setEditOutlineTarget] = React.useState(null);
  const [gradingKLTNTarget, setGradingKLTNTarget] = React.useState(null); 
  const [feedbackTarget, setFeedbackTarget] = React.useState(null); // MỚI: State cho Modal Chat

  async function handleEditOutlineTopic(sv, newTopic) {
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'updateTopic', type: 'kltn', studentEmail: sv.studentEmail, newTopic: newTopic });
      if (res.success) {
        toast.show(`Đã cập nhật tên đề tài thành công!`, 'success');
        setKltnPending(prev => prev.map(r => r.studentEmail === sv.studentEmail ? { ...r, topic: newTopic } : r));
      } else {
        toast.show(res.message || 'Cập nhật thất bại. Thử lại.', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối. Thử lại sau.', 'error'); }
    setKltnProcessing(null);
    setEditOutlineTarget(null);
  }

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      setKltnLoading(true);
      try {
        const [{ approvedList }, { pendingTopic, activeList }] = await Promise.all([
          fetchDangKyByGV(SESSION.email),
          fetchKLTNByGV(SESSION.email),

        setStudents(approvedList);
        const init = {};
        approvedList.forEach(sv => { init[sv.maSo] = sv.grade != null ? String(sv.grade) : ''; });
        setGrades(init);
        setKltnPending(pendingTopic); 
        setKltnActive(activeList);
      } catch(e) { toast.show('Không tải được danh sách sinh viên.', 'error'); }
      setLoading(false);
      setKltnLoading(false);
    })();
  }, []);

  async function handleSaveKLTNFromModal(totalGrade, nhanXetStr) {
    const sv = gradingKLTNTarget;
    setKltnProcessing(sv.studentEmail);
    try {
      const pct = kltnInput[sv.maSo]?.daoVanPct !== undefined ? kltnInput[sv.maSo].daoVanPct : sv.daoVanPct;
      let res = await apiPost({ action: 'saveKLTNGrade', studentEmail: sv.studentEmail, grade: totalGrade, nhanXet: nhanXetStr, daoVanPct: pct });
      if (!res.success && (res.message || '').toLowerCase().includes('unknown')) {
        res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'graded', note: nhanXetStr, grade: totalGrade });
      }

      } else { toast.show(res.message || 'Lưu điểm thất bại!', 'error'); }

  // MỚI: Hàm lưu nhận xét Chat
  async function handleSaveFeedback(text) {
    const sv = feedbackTarget;
    setKltnProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: text });
      if (res.success) {
        toast.show('Đã lưu nhận xét thành công!', 'success');
        setKltnActive(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXet: text} : s));
        setFeedbackTarget(null);
      } else { toast.show(res.message || 'Lỗi lưu nhận xét.', 'error'); }

    setKltnProcessing(null);
  }

  async function handleApproveOutline(sv) {

    try {
      const res = await apiPost({ action: 'updateKLTNStatus', studentEmail: sv.studentEmail, status: 'approved', step: 2 });

    setKltnProcessing(null);

      {gradingKLTNTarget && <KLTNGradingModal student={gradingKLTNTarget} processing={kltnProcessing === gradingKLTNTarget.studentEmail} onSave={handleSaveKLTNFromModal} onClose={() => setGradingKLTNTarget(null)} />}
      
{/* Đã sửa: Gọi GVHD Feedback Modal dành riêng cho tab này */}

              truongHD     : r[5] || '',
              thanhVien1   : r[6] || '',
              thanhVien2   : r[7] || '',
              thuKy        : r[8] || '',

              kltnUrl      : kData.kltnUrl,

            };
          });
        setStudents(pbList);
      } catch(e) { toast.show('Không tải được dữ liệu.', 'error'); }
      setLoading(false);
    })();
  }, []);

  const filtered = students.filter(s =>

      </div>

  );
}
// ── MODAL NHẬN XÉT CỦA HỘI ĐỒNG (DẠNG 1 Ô TEXT NHƯ GVHD) ───────────────────
function HoiDongFeedbackModal({ student, onSave, onClose, processing }) {
const getOld = () => {
    const m = (student.nhanXet || '').match(/\[HỘI ĐỒNG\]\n([\s\S]*?)(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[GV PHẢN BIỆN\]|$)/);
    return m ? m[1] : '';
  };
  const [text, setText] = React.useState(getOld());

  const handleSave = () => {
    let full = student.nhanXet || '';
    const newBlock = `[HỘI ĐỒNG]\n${text.trim()}`;
    // Cập nhật lại chuỗi tổng
    if (full.includes('[HỘI ĐỒNG]')) {
       full = full.replace(/\[HỘI ĐỒNG\]\n([\s\S]*?)(?=\n\s*\[GV HƯỚNG DẪN\]|\n\s*\[GV PHẢN BIỆN\]|$)/, newBlock);
    } else {
       full = full ? `${full.trim()}\n\n${newBlock}` : newBlock;
    }
    onSave(full);
  };

  return (
    <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-on-surface/60 backdrop-blur-sm">
      <div className="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl anim-slide flex flex-col max-h-[90vh]">
        <div className="px-6 py-5 border-b border-outline-variant/20 flex justify-between items-center bg-surface-container-low rounded-t-[2rem]">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-primary">
              <span className="material-symbols-outlined">chat_bubble</span>
            </div>
            <div>
              <h2 className="font-headline font-extrabold text-lg text-on-surface leading-tight">Nhận xét của Hội đồng</h2>
              <p className="text-xs text-on-surface-variant">{student.studentName} • {student.maSo}</p>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
            <span className="material-symbols-outlined text-on-surface-variant">close</span>
          </button>
        </div>
        
        <div className="p-6 overflow-y-auto bg-surface-container-lowest">
          <label className="text-sm font-bold text-on-surface block mb-3">
            Đánh giá / Nhận xét quá trình làm KLTN của sinh viên:
          </label>
          <textarea
            value={text} onChange={e => setText(e.target.value)}
            rows={6} autoFocus
            placeholder="Nhập nhận xét của Hội đồng..."
            className="w-full bg-white border border-outline-variant/50 rounded-xl p-4 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm resize-none shadow-inner"
          />
        </div>

        <div className="p-5 border-t border-outline-variant/10 flex justify-end gap-3 bg-surface-container-low rounded-b-[2rem]">
          <button onClick={onClose} disabled={processing} className="px-6 py-2.5 rounded-xl font-bold text-on-surface-variant hover:bg-surface-container transition-colors text-sm">
            Hủy
          </button>
          <button onClick={handleSave} disabled={processing} className="px-6 py-2.5 rounded-xl bg-primary text-white font-bold hover:opacity-90 transition-colors flex items-center gap-2 text-sm shadow-md">
            {processing ? <span className="material-symbols-outlined anim-spin text-[18px]">refresh</span> : <span className="material-symbols-outlined text-[18px]">save</span>}
            Lưu nhận xét
          </button>
        </div>
      </div>
    </div>
  );
}
function TabHoiDong({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading,  setLoading]  = React.useState(true);
  const [search,   setSearch]   = React.useState('');

  const [viewerFile, setViewerFile] = React.useState(null);
  const [feedbackTarget, setFeedbackTarget] = React.useState(null);
  const [hdProcessing, setHdProcessing] = React.useState(null);
  const [gradingHDTarget, setGradingHDTarget] = React.useState(null);
  
  // State mới cho Thư ký và Chủ tịch
  const [bienBanTarget, setBienBanTarget] = React.useState(null);
  const [scoreDetailTarget, setScoreDetailTarget] = React.useState(null);

  // Xử lý lưu Biên bản Hội đồng (Thư ký)
  async function handleSaveBienBan(sv, nhanXetHD, fileBB) {
    setHdProcessing(sv.studentEmail);
    try {
      let driveUrl = sv.bienBanUrl;
      if (fileBB) {
        toast.show('Đang tải file lên Drive...', 'success');
        const resFile = await apiPostFile({ action: 'uploadCouncilMinutes', studentEmail: sv.studentEmail, _file: fileBB, folderName: 'BienBanHoiDong_UTE' });
        if (resFile.success) driveUrl = resFile.driveUrl;
        else throw new Error(resFile.message);
      }
      
      const res = await apiPost({ action: 'updateCouncilMinutes', studentEmail: sv.studentEmail, nhanXetHD: nhanXetHD, bienBanUrl: driveUrl });
      if (res.success) {
        toast.show('Đã cập nhật Biên bản thành công!', 'success');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXetHD, bienBanUrl: driveUrl} : s));
        setBienBanTarget(null);
      } else toast.show(res.message || 'Lỗi cập nhật', 'error');
    } catch(e) { toast.show(e.message || 'Lỗi kết nối', 'error'); }
    setHdProcessing(null);
  }

  // Xử lý Chủ tịch duyệt chỉnh sửa sau bảo vệ
  async function handleChuTichDuyet(sv, isApproved) {
    if(!window.confirm(`Xác nhận ${isApproved ? 'ĐỒNG Ý' : 'TỪ CHỐI'} bản chỉnh sửa của sinh viên?`)) return;
    setHdProcessing(sv.studentEmail);
    const status = isApproved ? 'Yes' : 'No';
    try {
      const res = await apiPost({ action: 'presidentApprovePostDefense', studentEmail: sv.studentEmail, chuTichDuyetSauBv: status });
      if (res.success) {
        toast.show('Đã cập nhật trạng thái duyệt!', 'success');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, chuTichDuyetSauBv: status} : s));
      } else toast.show(res.message || 'Lỗi cập nhật', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setHdProcessing(null);
  }

  async function handleSaveHdFromModal(totalGrade, nhanXetStr) {
    const sv = gradingHDTarget;
    setHdProcessing(sv.studentEmail); 
    try {
      const res = await apiPost({ action:'saveGrade', type:'hd', studentEmail: sv.studentEmail, grade: totalGrade });
      if (res.success) {
        toast.show('Đã cập nhật điểm Hội đồng thành công!', 'success');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, diemHD: totalGrade} : s));
        setGradingHDTarget(null);
      } else {
        toast.show(res.message || 'Lưu điểm thất bại!', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối tới Google Sheet.', 'error'); }
    setHdProcessing(null);
  }
// THÊM HÀM NÀY: Thư ký lưu điểm tổng hợp
  async function handleSaveFinalScore(sv, finalScore) {
    setHdProcessing(sv.studentEmail); 
    try {
      const res = await apiPost({ action:'saveGrade', type:'hd', studentEmail: sv.studentEmail, grade: finalScore });
      if (res.success) {
        toast.show('Đã chốt điểm tổng hợp Hội đồng thành công!', 'success');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, diemHD: parseFloat(finalScore)} : s));
        setScoreDetailTarget(null);
      } else {
        toast.show(res.message || 'Lưu điểm thất bại!', 'error');
      }
    } catch(e) { toast.show('Lỗi kết nối tới Google Sheet.', 'error'); }
    setHdProcessing(null);
  }
  async function handleSaveFeedback(text) {
    const sv = feedbackTarget;
    setHdProcessing(sv.studentEmail);
    try {
      const res = await apiPost({ action: 'teacherUpdateKLTN', studentEmail: sv.studentEmail, nhanXet: text });
      if (res.success) {
        toast.show('Đã lưu nhận xét Hội đồng thành công!', 'success');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, nhanXet: text} : s));
        setFeedbackTarget(null);
      } else { toast.show(res.message || 'Lỗi lưu nhận xét.', 'error'); }
    } catch(e) { toast.show('Lỗi kết nối mạng.', 'error'); }
    setHdProcessing(null);
  }

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [hdRows, kltnRows] = await Promise.all([
          fetchSheetCSV(SHEET_HOIDONG_TAB),
          fetchSheetCSV(SHEET_KLTN_TAB)
        ]);
        
        const kltnMap = {};
        kltnRows.forEach(r => {
           kltnMap[r[3]] = { 
             topic: r[5] || '',
             kltnUrl: r[16] || '',
             daoVanUrl: r[17] || '',
             nhanXet: r[19] || ''
           };
        });

const email = SESSION.email.toLowerCase().trim();
        const gvName = SESSION.name.toLowerCase().trim();
        
        const hdList = hdRows
          .filter(r => (
            (r[4]||'').toLowerCase().trim() === email || 
            (r[5]||'').toLowerCase().includes(gvName) || 
            (r[6]||'').toLowerCase().includes(gvName) || 
            (r[7]||'').toLowerCase().includes(gvName) || 
            (r[8]||'').toLowerCase().includes(gvName) || // Cột Ủy viên 3
            (r[9]||'').toLowerCase().includes(gvName)    // Cột Thư ký (THÊM DÒNG NÀY ĐỂ NHẬN DIỆN THƯ KÝ)
          ))
          .map(r => {
            const maSo = r[1] || '';
            const kData = kltnMap[maSo] || {};
            return {
              studentEmail : r[0] || '',
              maSo         : maSo,
              studentName  : r[2] || '',
              gvPhanBienName: r[3] || '',
              gvPhanBienEmail: r[4] || '',
              truongHD     : r[5] || '',
              thanhVien1   : r[6] || '',
              thanhVien2   : r[7] || '',
              thanhVien3   : r[8] || '', // Ủy viên 3
              thuKy        : r[9] || '', // ĐÃ SỬA THÀNH r[9] (THƯ KÝ CHUẨN)
              
              // Sẵn tiện sửa luôn cho đúng thứ tự Phòng, Ngày, Giờ theo Code.gs v3.3
              phongBaoVe   : r[12] || '', 
              ngayBaoVe    : r[13] || '', 
              gioBaoVe     : r[14] || '',
              
              diemHD       : (r[11] !== '' && !isNaN(parseFloat(String(r[11]).replace(',', '.')))) ? parseFloat(String(r[11]).replace(',', '.')) : null,
              nhanXetPB    : r[15] || kData.nhanXet || '', 
              nhanXetHD    : r[16] || '',
              bienBanUrl   : r[17] || '',
              diemCT       : (r[18] !== '') ? parseFloat(String(r[18]).replace(',', '.')) : null,
              diemTK       : (r[19] !== '') ? parseFloat(String(r[19]).replace(',', '.')) : null,
              diemTV       : (r[20] !== '') ? parseFloat(String(r[20]).replace(',', '.')) : null,
              bienBanGiaiTrinhUrl: r[21] || '',  // Cột V — Biên bản giải trình
              baiChinhSuaUrl: r[22] || '',        // Cột W — KLTN sau chỉnh sửa
              gvhdDuyetSauBv: r[23] || '',        // Cột X — GVHD duyệt
              chuTichDuyetSauBv: r[24] || '',     // Cột Y — CTHD duyệt
              ...kData
            };
          });
        setStudents(hdList);
      } catch(e) { toast.show('Không tải được dữ liệu.', 'error'); }
      setLoading(false);
    })();
  }, []);

  const filtered = students.filter(s =>
    s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search)
  );

function getRoleInfo(sv) {
    const email = SESSION.email.toLowerCase().trim();
    const gvName = SESSION.name.toLowerCase().trim(); // Lấy tên GV đang đăng nhập
    
    let badges = [];
    let isCouncilMember = false;
    
    // Nếu email khớp với Email Phản biện
    if ((sv.gvPhanBienEmail||'').toLowerCase().trim() === email) {
        badges.push({ label:'Phản biện', color:'bg-secondary-container text-on-secondary-container' });
    }
    
    // So sánh TÊN của GV với TÊN trong các chức danh Hội đồng
    if ((sv.truongHD||'').toLowerCase().includes(gvName)) {
        badges.push({ label:'Chủ tịch', color:'bg-primary text-white' });
        isCouncilMember = true;
    }
    if ((sv.thuKy||'').toLowerCase().includes(gvName)) {
        badges.push({ label:'Thư ký', color:'bg-tertiary-fixed text-on-tertiary-fixed' });
        isCouncilMember = true;
    }
    if ((sv.thanhVien1||'').toLowerCase().includes(gvName) || (sv.thanhVien2||'').toLowerCase().includes(gvName)) {
        badges.push({ label:'Ủy viên', color:'bg-surface-container-highest text-on-surface-variant' });
        isCouncilMember = true;
    }
    
    return { badges, isCouncilMember };
  }

  if (loading) return (
    <div className="flex flex-col items-center justify-center py-32 gap-4 text-on-surface-variant">
      <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>

    </div>
  );

  return (
    <div className="space-y-6 anim-fade">
      {viewerFile && <FileViewerModal url={viewerFile.url} studentName={viewerFile.studentName} fileName={viewerFile.fileName} isPlagiarism={viewerFile.isPlagiarism} isXNTT={viewerFile.isXNTT} onClose={() => setViewerFile(null)} />}
      
{feedbackTarget && (
        <HoiDongFeedbackModal student={feedbackTarget} processing={hdProcessing === feedbackTarget.studentEmail} onSave={handleSaveFeedback} onClose={() => setFeedbackTarget(null)} />

{gradingHDTarget && (
        <HDGradingModal student={gradingHDTarget} processing={hdProcessing === gradingHDTarget.studentEmail} onSave={handleSaveHdFromModal} onClose={() => setGradingHDTarget(null)} />

      )}
{scoreDetailTarget && (

          student={scoreDetailTarget}

          onCalculateAndSave={(score) => handleSaveFinalScore(scoreDetailTarget, score)}

      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">

          <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
          <input value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none" placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>

      {students.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-32 gap-5 bg-surface-container-lowest rounded-3xl shadow-sm">
          <span className="material-symbols-outlined text-7xl opacity-10">gavel</span>

                  <th className="px-4 py-4">Hội đồng & Lịch bảo vệ</th>

                  <th className="px-4 py-4 text-center">Biên bản & Đạo văn</th>

                               </button>
                            ) : (<span className="text-[9px] text-on-surface-variant/40">Chưa nộp</span>)}
                          </td>

{/* Biên bản & Đạo văn */}
                          <td className="px-4 py-5 text-center align-middle">
                            <div className="flex justify-center gap-3">

function TabPhanCongPhanBien({toast}) {
  const [students, setStudents] = React.useState([]);
  const [initialStudents, setInitialStudents] = React.useState([]); // Dùng để so sánh xem dòng nào có thay đổi
  const [teachers, setTeachers] = React.useState([]);
  const [loading, setLoading]   = React.useState(true);
  const [isBatchSaving, setIsBatchSaving] = React.useState(false);

  React.useEffect(() => { loadData(); }, []);

  async function loadData() {
    setLoading(true);
    try {
      // Tải DS Sinh viên KLTN đã duyệt
      const kltnRows = await fetchSheetCSV(SHEET_KLTN_TAB);
      const kltnList = kltnRows
        .filter(r => r[11] === 'approved' || parseInt(r[14]) >= 1)
        .map(r => ({
        studentEmail: r[1], studentName: r[2], maSo: r[3], topic: r[5], gvhd: r[6], term: r[9] || 'Kỳ 2 - 24/25'
      }));

      // Tải DS phân công hiện tại từ Hội Đồng
      let hdMap = {};
      try {
        const hdRows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
        hdRows.forEach(r => { hdMap[r[0]] = { gvPhanBienEmail: r[4], gvPhanBienName: r[3] }; });
      } catch(e) {}

      // Gộp data
      const formattedData = kltnList.map(sv => ({
        ...sv,
        pbEmail: hdMap[sv.studentEmail]?.gvPhanBienEmail || '',
        pbName: hdMap[sv.studentEmail]?.gvPhanBienName || ''
      }));

      setStudents(formattedData);
      setInitialStudents(JSON.parse(JSON.stringify(formattedData))); // Lưu bản sao để so sánh

      // Tải DS Giảng viên
      const userRows = await fetchSheetCSV(SHEET_USERS_TAB);
      const gvList = userRows.filter(r => r[2] === 'giangvien' || r[2] === 'truongbomon').map(r => ({
        email: r[0], name: r[3]
      }));
      setTeachers(gvList);

    } catch(e) { toast.show('Lỗi tải dữ liệu!', 'error'); }
    setLoading(false);
  }

  // Hàm Lưu Hàng Loạt (Chỉ lưu những sinh viên có thay đổi GV Phản biện)
  async function handleBatchSave() {
    const changes = students.filter(s => {
      const init = initialStudents.find(i => i.maSo === s.maSo);
      return init && init.pbEmail !== s.pbEmail && s.pbEmail !== '';
    });

    if (changes.length === 0) {
      toast.show('Không có sự thay đổi nào cần lưu!', 'warn');
      return;
    }

    setIsBatchSaving(true);
    let successCount = 0;
    let errorCount = 0;

    // Gửi API lần lượt để không làm nghẽn Google Apps Script
    for (const sv of changes) {
      try {
        const pbName = teachers.find(t => t.email === sv.pbEmail)?.name || '';
        const res = await apiPost({
          action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName,
          gvPhanBienEmail: sv.pbEmail, gvPhanBienName: pbName
        });
        if (res.success) successCount++;
        else errorCount++;
      } catch (e) { errorCount++; }
    }

    setIsBatchSaving(false);

    if (successCount > 0) {
      toast.show(`✅ Đã phân công thành công cho ${successCount} sinh viên!`, 'success');
      setInitialStudents(JSON.parse(JSON.stringify(students))); // Cập nhật lại mốc so sánh
    }
    if (errorCount > 0) {
      toast.show(`❌ Có ${errorCount} sinh viên phân công thất bại.`, 'error');
    }
  }

  // Tính toán số liệu thống kê
  const totalStudents = students.length;
  const assignedStudents = students.filter(s => s.pbEmail).length;
  const pendingStudents = totalStudents - assignedStudents;
  const progressPercent = totalStudents > 0 ? Math.round((assignedStudents / totalStudents) * 100) : 0;
  const dashOffset = 220 - (220 * progressPercent) / 100;

  return (
    <div className="space-y-6 anim-fade max-w-6xl mx-auto">
      
      {/* Header Section */}
      <div className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h1 className="text-3xl font-extrabold text-on-surface tracking-tight mb-2">Phân công Phản biện</h1>
          <p className="text-on-surface-variant text-sm flex items-center gap-2">
            <span className="material-symbols-outlined text-sm">location_on</span>
            Hệ thống phân phối giảng viên đánh giá độc lập
          </p>
        </div>
        <div className="flex flex-wrap gap-3">
          <div className="bg-surface-container-lowest px-4 py-2 rounded-xl shadow-sm flex items-center gap-3 border border-outline-variant/15">
            <span className="material-symbols-outlined text-secondary">filter_list</span>
            <select className="bg-transparent text-sm font-medium focus:outline-none border-none p-0 pr-8">
              <option>Tất cả các đợt</option>
              <option>Học kỳ 1 - 2024-2025</option>
              <option>Học kỳ 2 - 2024-2025</option>
            </select>
          </div>
          
          {/* Nút Xác nhận phân công dùng để lưu hàng loạt */}
          <button 
            onClick={handleBatchSave} 
            disabled={isBatchSaving}
            className="bg-gradient-to-br from-primary to-primary-container text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:shadow-primary/20 transition-all active:scale-95 flex items-center gap-2 disabled:opacity-50">
            {isBatchSaving ? (
              <span className="material-symbols-outlined text-[18px] anim-spin">refresh</span>
            ) : (
              <span className="material-symbols-outlined text-[18px]">task_alt</span>
            )}
            {isBatchSaving ? 'Đang lưu...' : 'Xác nhận phân công'}
          </button>
        </div>
      </div>

      {loading ? <Spinner text="Đang tải dữ liệu sinh viên và giảng viên..."/> : (
        <>
          {/* Stats Overview - Trải ngang toàn màn hình (Đã xóa cột Deadline) */}
          <div className="mb-8 bg-surface-container-lowest p-6 md:px-12 rounded-3xl shadow-sm border border-outline-variant/10 flex items-center justify-between">
            <div className="flex gap-6 md:gap-16 overflow-x-auto w-full justify-start items-center">
              <div>
                <p className="text-on-surface-variant text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">Tổng sinh viên</p>
                <p className="text-3xl md:text-4xl font-black text-primary">{totalStudents}</p>
              </div>
              <div className="w-px h-16 bg-surface-container hidden sm:block"></div>
              <div>
                <p className="text-on-surface-variant text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">Đã phân công</p>
                <p className="text-3xl md:text-4xl font-black text-tertiary-fixed-dim">{assignedStudents}</p>
              </div>
              <div className="w-px h-16 bg-surface-container hidden sm:block"></div>
              <div>
                <p className="text-on-surface-variant text-[10px] md:text-xs uppercase tracking-widest font-bold mb-1">Chờ xử lý</p>
                <p className="text-3xl md:text-4xl font-black text-secondary">{pendingStudents}</p>
              </div>
            </div>
            
            <div className="hidden lg:flex items-center gap-5 flex-shrink-0 ml-8 pl-8 border-l border-outline-variant/10">
              <div className="text-right">
                <p className="text-sm font-bold text-on-surface">Tiến độ đợt này</p>

              <div className="relative h-20 w-20">
                <svg className="h-20 w-20 -rotate-90">
                  <circle cx="40" cy="40" fill="transparent" r="35" stroke="#ededf6" strokeWidth="8"></circle>

                </svg>
                <div className="absolute inset-0 flex items-center justify-center text-sm font-black text-primary">{progressPercent}%</div>

          {/* Assignment Table Area - Giao diện sạch sẽ không có nút lưu rườm rà */}
          <div className="bg-surface-container-lowest rounded-3xl shadow-sm border border-outline-variant/10 overflow-hidden">

                  {students.length === 0 ? (

      try {
        const hdRows = await fetchSheetCSV(SHEET_HOIDONG_TAB);
hdRows.forEach(r => { 
          hdMap[r[0]] = { 
            truongHD: r[5], 
            thanhVien1: r[6], 
            thanhVien2: r[7], 
            thanhVien3: r[8], 
            thuKy: r[9] // Sửa thành r[9]
          }; 
        });
      } catch(e) {}

      const formattedData = kltnList.map(sv => ({
        ...sv,
        truongHD: hdMap[sv.studentEmail]?.truongHD || '',
        thanhVien1: hdMap[sv.studentEmail]?.thanhVien1 || '',
        thanhVien2: hdMap[sv.studentEmail]?.thanhVien2 || '',
        thuKy: hdMap[sv.studentEmail]?.thuKy || ''
      }));

      setStudents(formattedData);
      setInitialStudents(JSON.parse(JSON.stringify(formattedData)));

      const userRows = await fetchSheetCSV(SHEET_USERS_TAB);
      const gvList = userRows.filter(r => r[2] === 'giangvien' || r[2] === 'truongbomon').map(r => ({
        email: r[0], name: r[3]
      }));
      setTeachers(gvList);

    } catch(e) { toast.show('Lỗi tải dữ liệu!', 'error'); }
    setLoading(false);
  }

  // Lưu 1 dòng
  async function handleSingleSave(sv) {
    setSaving(prev => ({...prev, [sv.maSo]: true}));
    try {
      const res = await apiPost({
        action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName,
        truongHD: sv.truongHD, thanhVien1: sv.thanhVien1, thanhVien2: sv.thanhVien2, thuKy: sv.thuKy
      });
      if(res.success) {
        toast.show('Đã cập nhật Hội đồng!', 'success');
        setInitialStudents(prev => prev.map(i => i.maSo === sv.maSo ? {...sv} : i));
      }
      else toast.show('Cập nhật thất bại', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setSaving(prev => ({...prev, [sv.maSo]: false}));
  }

  // Lưu hàng loạt
  async function handleBatchSave() {
    const changes = students.filter(s => {
      const init = initialStudents.find(i => i.maSo === s.maSo);
      return init && (init.truongHD !== s.truongHD || init.thuKy !== s.thuKy || init.thanhVien1 !== s.thanhVien1 || init.thanhVien2 !== s.thanhVien2);
    });

    if (changes.length === 0) {
      toast.show('Không có sự thay đổi nào cần lưu!', 'warn');
      return;
    }

    setIsBatchSaving(true);
    let successCount = 0;
    for (const sv of changes) {
      try {
        const res = await apiPost({
          action: 'assignCouncil', studentEmail: sv.studentEmail, maSo: sv.maSo, studentName: sv.studentName,
          truongHD: sv.truongHD, thanhVien1: sv.thanhVien1, thanhVien2: sv.thanhVien2, thuKy: sv.thuKy
        });
        if (res.success) successCount++;
      } catch (e) {}
    }
    setIsBatchSaving(false);

    if (successCount > 0) {
      toast.show(`✅ Đã lưu Hội đồng cho ${successCount} sinh viên!`, 'success');
      setInitialStudents(JSON.parse(JSON.stringify(students)));
    } else {
      toast.show('Lưu thất bại, vui lòng thử lại!', 'error');
    }
  }

  const updateField = (maSo, field, val) => {
    setStudents(prev => prev.map(s => s.maSo === maSo ? {...s, [field]: val} : s));
  };

  // Tính toán khối lượng hội đồng của từng giảng viên để hiển thị Card
  const getTeacherWorkload = () => {
    const workload = {};
    teachers.forEach(t => workload[t.name] = { count: 0, roles: { truongHD: 0, thuKy: 0, tv: 0 } });
    
    students.forEach(sv => {
      if (sv.truongHD && workload[sv.truongHD]) { workload[sv.truongHD].count++; workload[sv.truongHD].roles.truongHD++; }
      if (sv.thuKy && workload[sv.thuKy]) { workload[sv.thuKy].count++; workload[sv.thuKy].roles.thuKy++; }
      if (sv.thanhVien1 && workload[sv.thanhVien1]) { workload[sv.thanhVien1].count++; workload[sv.thanhVien1].roles.tv++; }
      if (sv.thanhVien2 && workload[sv.thanhVien2]) { workload[sv.thanhVien2].count++; workload[sv.thanhVien2].roles.tv++; }
    });

    return Object.entries(workload)
      .filter(([_, data]) => data.count > 0)
      .sort((a, b) => b[1].count - a[1].count)
      .slice(0, 3); // Lấy top 3 GV có nhiều hội đồng nhất để hiển thị mẫu
  };

  const topTeachers = getTeacherWorkload();
  const fullyAssigned = students.filter(s => s.truongHD && s.thuKy && s.thanhVien1 && s.thanhVien2).length;

  return (
    <div className="space-y-8 anim-fade max-w-[1400px] mx-auto">
      
      {/* Header Section */}
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h1 className="text-3xl font-extrabold text-on-surface tracking-tight mb-2">Phân công Hội đồng</h1>
          <p className="text-on-surface-variant text-sm flex items-center gap-2">
            <span className="material-symbols-outlined text-sm">groups</span>
            Thiết lập Chủ tịch, Thư ký, Ủy viên cho sinh viên bảo vệ KLTN
          </p>
        </div>
        <div className="flex items-center gap-3">
          <button 
            onClick={handleBatchSave} 
            disabled={isBatchSaving}
            className="bg-gradient-to-br from-primary to-primary-container text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:shadow-primary/20 transition-all active:scale-95 flex items-center gap-2 disabled:opacity-50">
            {isBatchSaving ? <span className="material-symbols-outlined text-[18px] anim-spin">refresh</span> : <span className="material-symbols-outlined text-[18px]">task_alt</span>}
            {isBatchSaving ? 'Đang lưu...' : 'Xác nhận phân công'}
          </button>
        </div>
      </div>

      {loading ? <Spinner text="Đang tải dữ liệu hội đồng..."/> : (
        <>
          {/* Section 1: Thống kê Khối lượng Giảng viên (Cards) */}
          {topTeachers.length > 0 && (
            <section>
              <h2 className="text-lg font-extrabold text-on-surface mb-4 flex items-center gap-2">
                <span className="material-symbols-outlined text-primary">analytics</span>
                Giảng viên tham gia nhiều Hội đồng nhất
              </h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {topTeachers.map(([name, data], idx) => (
                  <div key={idx} className="bg-surface-container-lowest p-5 rounded-2xl flex flex-col gap-4 border border-outline-variant/15 hover:shadow-md transition-shadow">
                    <div className="flex items-center gap-3">
                      <Av name={name} cls="w-12 h-12 !rounded-xl text-lg shadow-sm" />
                      <div>
                        <h3 className="font-bold text-on-surface text-sm line-clamp-1">{name}</h3>
                        <p className="text-xs text-on-surface-variant">Thành viên Bộ môn</p>
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center bg-surface-container-low p-3 rounded-xl">
                      <div>
                        <p className="text-[10px] font-bold uppercase text-primary">Chủ tịch</p>
                        <p className="font-black text-on-surface">{data.roles.truongHD}</p>
                      </div>
                      <div className="border-x border-outline-variant/10">
                        <p className="text-[10px] font-bold uppercase text-secondary">Thư ký</p>
                        <p className="font-black text-on-surface">{data.roles.thuKy}</p>
                      </div>
                      <div>
                        <p className="text-[10px] font-bold uppercase text-tertiary-fixed-dim">Ủy viên</p>
                        <p className="font-black text-on-surface">{data.roles.tv}</p>
                      </div>
                    </div>
                    <div className="pt-1 flex justify-between items-center">
                      <span className="text-xs font-semibold text-on-surface-variant flex items-center gap-1">
                        <span className="material-symbols-outlined text-[16px]">schedule</span> Tổng tham gia: {data.count}
                      </span>
                      {data.count > 5 && (
                        <span className="text-[10px] font-bold bg-error-container text-on-error-container px-2 py-0.5 rounded-full">Cao</span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </section>
          )}

          {/* Section 2: Phân bổ Sinh viên (Main Table) */}
          <section className="space-y-4">
            <div className="flex justify-between items-center">
              <h2 className="text-lg font-extrabold text-on-surface flex items-center gap-2">
                <span className="material-symbols-outlined text-primary">assignment_ind</span>
                Phân bổ Sinh viên
                <span className="ml-2 text-xs font-medium text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded-full">
                  Đã hoàn tất {fullyAssigned}/{students.length}
                </span>
              </h2>
            </div>
            
            <div className="bg-surface-container-lowest rounded-3xl shadow-sm border border-outline-variant/15 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse" style={{minWidth:'1000px'}}>
                  <thead>
                    <tr className="bg-surface-container-low border-b border-outline-variant/10">
                      <th className="px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-on-surface-variant w-1/4">Sinh viên & Đề tài</th>
                      <th className="px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-on-surface-variant w-1/4">Hướng dẫn / Phản biện</th>
                      <th className="px-6 py-4 text-[11px] font-bold uppercase tracking-widest text-on-surface-variant w-2/4">Thành phần Hội đồng</th>
                      <th className="px-4 py-4 w-16"></th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-surface-container">
                    {students.map(sv => {
                      const initSv = initialStudents.find(i => i.maSo === sv.maSo);
                      const isChanged = initSv && (initSv.truongHD !== sv.truongHD || initSv.thuKy !== sv.thuKy || initSv.thanhVien1 !== sv.thanhVien1 || initSv.thanhVien2 !== sv.thanhVien2);
                      const isComplete = sv.truongHD && sv.thuKy && sv.thanhVien1 && sv.thanhVien2;

                      return (
                        <tr key={sv.maSo} className="hover:bg-surface-container-low/30 transition-colors">
                          <td className="px-6 py-5 align-top">
                            <div className="flex flex-col gap-1.5">
                              <span className="font-bold text-sm text-on-surface">{sv.studentName} <span className="text-xs font-normal text-on-surface-variant ml-1">({sv.maSo})</span></span>
                              <span className="text-xs text-on-surface-variant line-clamp-2 leading-relaxed" title={sv.topic}>{sv.topic}</span>
                            </div>
                          </td>
                          <td className="px-6 py-5 align-top">
                            <div className="flex flex-col text-[11px] gap-2">
                              <div className="flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-primary-container"></span>
                                <span className="text-on-surface-variant font-medium">HD: {sv.gvhd || 'Chưa rõ'}</span>
                              </div>
                              <div className="flex items-center gap-2">
                                <span className="w-2 h-2 rounded-full bg-secondary"></span>
                                <span className="text-on-surface-variant font-medium">PB: {sv.pbName || 'Chưa phân công'}</span>
                              </div>
                            </div>
                          </td>
                          <td className="px-6 py-4">
                            {/* Grid 4 Dropdowns cho Hội Đồng */}
                            <div className="grid grid-cols-2 gap-x-4 gap-y-3 relative">
                              {[ 
                                {label:'Chủ tịch HĐ', key:'truongHD', color:'text-primary'}, 
                                {label:'Thư ký', key:'thuKy', color:'text-secondary'},
                                {label:'Ủy viên 1', key:'thanhVien1', color:'text-tertiary-fixed-dim'}, 
                                {label:'Ủy viên 2', key:'thanhVien2', color:'text-tertiary-fixed-dim'} 
                              ].map(field => (
                                <div key={field.key} className="flex flex-col gap-1 relative">
                                  <span className={`text-[9px] font-black uppercase tracking-wider ${field.color}`}>{field.label}</span>
                                  <select 
                                    value={sv[field.key]} 
                                    onChange={(e) => updateField(sv.maSo, field.key, e.target.value)}
                                    className={`w-full text-xs font-semibold bg-surface-container-low border rounded-lg py-2 px-2 outline-none focus:bg-white focus:ring-2 focus:ring-primary/20 appearance-none transition-colors cursor-pointer ${isChanged && sv[field.key] !== initSv[field.key] ? 'border-secondary text-secondary' : 'border-transparent text-on-surface hover:border-outline-variant/50'}`}
                                    style={{ backgroundImage: `url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%23434653' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E")`, backgroundSize: '16px 16px', backgroundPosition: 'right 4px center', backgroundRepeat: 'no-repeat' }}>
                                    <option value="">-- Trống --</option>
                                    {teachers.map(t => <option key={t.email} value={t.name}>{t.name}</option>)}
                                  </select>
                                </div>
                              ))}
                              {isChanged && <span className="absolute -left-3 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-secondary"></span>}
                            </div>
                          </td>
                          <td className="px-4 py-5 align-middle text-center">
                            <button 
                              onClick={() => handleSingleSave(sv)} 
                              disabled={saving[sv.maSo]}
                              title="Lưu dòng này"
                              className={`w-9 h-9 rounded-xl flex items-center justify-center transition-all ${saving[sv.maSo] ? 'bg-surface-container text-on-surface-variant' : isComplete && !isChanged ? 'bg-tertiary-fixed text-tertiary hover:bg-tertiary-fixed-dim' : 'bg-primary-container text-white hover:bg-primary shadow-sm'}`}>
                              {saving[sv.maSo] ? <span className="material-symbols-outlined text-[18px] anim-spin">refresh</span> : 
                               isComplete && !isChanged ? <span className="material-symbols-outlined text-[18px]" style={{fontVariationSettings: "'FILL' 1"}}>check</span> :
                               <span className="material-symbols-outlined text-[18px]">save</span>}
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div className="px-6 py-4 bg-surface-container-low border-t border-outline-variant/10 flex justify-between items-center">
                <p className="text-xs text-on-surface-variant font-medium">Đang hiển thị {students.length} sinh viên</p>
              </div>
            </div>
          </section>

        </>
      )}
    </div>
  );
}
