function GVHDApproveModal({ student, onConfirm, onClose }) {
  const [decision, setDecision] = React.useState('');
  const [note, setNote] = React.useState('');
  const [submitting, setSubmitting] = React.useState(false);

  async function handleSubmit() {
    if (!decision) return;
    setSubmitting(true);
    await onConfirm(student, decision === 'yes', note.trim());
    setSubmitting(false);
  }

  return (
    <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-on-surface/50 backdrop-blur-sm">
      <div className="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl anim-slide">
        <div className="flex items-center gap-3 mb-5">
          <div className="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0">
            <span className="material-symbols-outlined text-primary">how_to_reg</span>
          </div>
          <div>
            <h2 className="font-headline font-extrabold text-lg text-on-surface">Duyệt bản chỉnh sửa</h2>
            <p className="text-xs text-on-surface-variant">Xem xét bài chỉnh sửa sau bảo vệ của sinh viên</p>
          </div>
        </div>

        <div className="bg-surface-container-low rounded-2xl p-4 mb-5">
          <p className="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Sinh viên</p>
          <p className="font-bold text-on-surface text-sm">{student.studentName}</p>
          <p className="text-xs text-on-surface-variant mt-0.5">{student.maSo} • {student.topic || '--'}</p>
          {student.baiChinhSuaUrl && (
            <a href={student.baiChinhSuaUrl} target="_blank" rel="noreferrer"
              className="inline-flex items-center gap-1.5 mt-2 text-[11px] font-bold text-primary hover:underline">
              <span className="material-symbols-outlined text-sm">open_in_new</span>
              Xem bài chỉnh sửa
            </a>
          )}
        </div>

        <div className="mb-5">
          <p className="text-sm font-semibold text-on-surface-variant mb-3">Quyết định của bạn <span className="text-error">*</span></p>
          <div className="flex gap-3">
            <button onClick={() => setDecision('yes')}
              className={`flex-1 py-3 rounded-xl border-2 font-bold text-sm flex items-center justify-center gap-2 transition-all
                ${decision === 'yes' ? 'border-[#00593c] bg-tertiary-fixed text-on-tertiary-fixed' : 'border-outline-variant text-on-surface hover:border-[#00593c]/40'}`}>
              <span className="material-symbols-outlined text-base" style={decision==='yes'?{color:'#003f29'}:{}}>check_circle</span>
              Đồng ý duyệt
            </button>
            <button onClick={() => setDecision('no')}
              className={`flex-1 py-3 rounded-xl border-2 font-bold text-sm flex items-center justify-center gap-2 transition-all
                ${decision === 'no' ? 'border-error bg-error-container text-on-error-container' : 'border-outline-variant text-on-surface hover:border-error/40'}`}>
              <span className="material-symbols-outlined text-base">cancel</span>
              Không đồng ý
            </button>
          </div>
        </div>

        {decision === 'no' && (
          <div className="mb-5">
            <label className="text-sm font-semibold text-on-surface-variant block mb-2">
              Lý do không đồng ý <span className="text-error">*</span>
            </label>
            <textarea value={note} onChange={e => setNote(e.target.value)} rows={3} autoFocus
              className="w-full bg-surface-container-low rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-error/20 text-on-surface placeholder:text-outline/50 resize-none text-sm"
              placeholder="VD: Bài chỉnh sửa chưa đáp ứng yêu cầu hội đồng, cần sửa thêm phần..."/>
          </div>
        )}

        <div className="flex gap-3">
          <button onClick={onClose} disabled={submitting}
            className="flex-1 py-3 rounded-xl border-2 border-outline-variant text-on-surface font-bold hover:bg-surface-container transition-all text-sm disabled:opacity-50">
            Hủy
          </button>
          <button onClick={handleSubmit}
            disabled={!decision || (decision === 'no' && !note.trim()) || submitting}
            className={`flex-1 py-3 rounded-xl text-white font-bold shadow-lg hover:opacity-90 transition-all disabled:opacity-40 disabled:cursor-not-allowed text-sm flex items-center justify-center gap-2
              ${decision === 'no' ? 'bg-error' : 'bg-[#00593c]'}`}>
            {submitting
              ? <><span className="material-symbols-outlined anim-spin text-sm">refresh</span>Đang lưu...</>
              : <><span className="material-symbols-outlined text-sm">{decision === 'no' ? 'send' : 'task_alt'}</span>Xác nhận</>}
          </button>
        </div>
      </div>
    </div>
  );
}

function TabSauBaoVe({toast}) {
  const [students, setStudents] = React.useState([]);
  const [loading,  setLoading]  = React.useState(true);
  const [search,   setSearch]   = React.useState('');
  const [processing, setProcessing] = React.useState(null);
  const [viewerFile, setViewerFile] = React.useState(null);
  // Modal duyệt GVHD
  const [approveTarget, setApproveTarget] = React.useState(null);

  React.useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        // Đọc cả 2 sheet song song
        const [kltnRows, hdRows] = await Promise.all([
          fetchSheetCSV(SHEET_KLTN_TAB),
          fetchSheetCSV(SHEET_HOIDONG_TAB)
        ]);

        const email   = SESSION.email.toLowerCase().trim();
        const gvName  = SESSION.name.toLowerCase().trim();

        // ── Map HoiDongKLTN theo studentEmail ──
        // Cấu trúc HoiDongKLTN: A=studentEmail, B=maSo, C=studentName,
        // D=gvPBName, E=gvPBEmail, F=truongHD, G-I=TV1-3, J=thuKy,
        // K=diemPB(10), L=diemHD(11), ...U=bienBanHD(20)
        const hdMap = {};
        hdRows.forEach(r => {
          const sEmail = (r[0] || '').toLowerCase().trim();
          hdMap[sEmail] = {
            truongHD : r[5] || '',
            diemHD   : (r[11] !== '' && !isNaN(parseFloat(String(r[11]).replace(',','.')))) ? parseFloat(String(r[11]).replace(',','.')) : null,
          };
        });

        // ĐÃ SỬA: Biên bản HĐ đọc từ DangKyKLTN cột U (r[20]) thay vì HoiDongKLTN
        const kltnMap = {};
        kltnRows.forEach(r => {
          const sEmail = (r[1] || '').toLowerCase().trim();
          kltnMap[sEmail] = {
            bienBanUrl          : r[20] || '',  // Cột U — Biên bản HĐ
            bienBanGiaiTrinhUrl : r[21] || '',  // Cột V — Biên bản giải trình
            baiChinhSuaUrl      : r[22] || '',  // Cột W — KLTN sau chỉnh sửa
            gvhdDuyetSauBv      : r[23] || '',  // Cột X — GVHD duyệt
            chuTichDuyetSauBv   : r[24] || '',  // Cột Y — CTHD duyệt
          };
        });
        // ── Lọc từ DangKyKLTN: SV mà GV là GVHD HOẶC Chủ tịch HĐ ──
        // Hiện ngay khi GV liên quan, không cần chờ SV upload file
        // Cột H(7)=emailGVHD, U(20)=bienBanHD, V(21)=bienBanGiaiTrinh, W(22)=baiChinhSua, X(23)=gvhdDuyet, Y(24)=chuTichDuyet
        const list = kltnRows
          .filter(r => {
            const gvhdEmail    = (r[7] || '').toLowerCase().trim();
            const isGVHD       = gvhdEmail === email;
            const sEmail       = (r[1] || '').toLowerCase().trim();
            const truongHDName = (hdMap[sEmail]?.truongHD || '').toLowerCase();
            const isChuTich    = truongHDName.includes(gvName);
            // Hiện ngay khi GV là GVHD hoặc Chủ tịch HĐ — không lọc theo step hay file
            return isGVHD || isChuTich;
          })
          .map(r => {
            const sEmail       = (r[1] || '').toLowerCase().trim();
            const hd           = hdMap[sEmail] || {};
            const kl           = kltnMap[sEmail] || {};
            const truongHDName = hd.truongHD || '';
            const isGVHD       = (r[7] || '').toLowerCase().trim() === email;
            const isChuTich    = truongHDName.toLowerCase().includes(gvName);
            return {
              studentEmail        : r[1] || '',
              maSo                : r[3] || '',
              studentName         : r[2] || '',
              topic               : r[5] || '',
              isGVHD,
              isChuTich,
              truongHD            : truongHDName,
              // Tất cả đọc từ DangKyKLTN qua kltnMap
              bienBanUrl          : kl.bienBanUrl || '',           // Cột U
              bienBanGiaiTrinhUrl : kl.bienBanGiaiTrinhUrl || '',  // Cột V
              baiChinhSuaUrl      : kl.baiChinhSuaUrl || '',       // Cột W
              gvhdDuyetSauBv      : kl.gvhdDuyetSauBv || '',       // Cột X
              chuTichDuyetSauBv   : kl.chuTichDuyetSauBv || '',    // Cột Y
            };
          });
        setStudents(list);
      } catch(e) { toast.show('Không tải được dữ liệu.', 'error'); }
      setLoading(false);
    })();
  }, []);

  // GVHD duyệt chỉnh sửa — gọi từ GVHDApproveModal
  async function handleGVHDDuyet(sv, isApproved, note) {
    setProcessing(sv.studentEmail);
    const status = isApproved ? 'Yes' : 'No';
    try {
      const res = await apiPost({
        action: 'gvhdApprovePostDefense',
        studentEmail: sv.studentEmail,
        gvhdDuyetSauBv: status,
        ...(note ? { note } : {})
      });
      if (res.success) {
        toast.show(`GVHD đã ${isApproved ? 'đồng ý' : 'không đồng ý'} bản chỉnh sửa!`, isApproved ? 'success' : 'warn');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, gvhdDuyetSauBv: status} : s));
      } else toast.show(res.message || 'Lỗi cập nhật', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setProcessing(null);
    setApproveTarget(null);
  }

  // Chủ tịch HĐ duyệt chỉnh sửa — chỉ hiện khi GVHD đã đồng ý
  async function handleChuTichDuyet(sv, isApproved) {
    if (!sv.isChuTich) { toast.show('Bạn không có quyền Chủ tịch HĐ cho sinh viên này!', 'error'); return; }
    if (sv.gvhdDuyetSauBv !== 'Yes') { toast.show('GVHD phải đồng ý trước khi Chủ tịch duyệt!', 'warn'); return; }
    setProcessing(sv.studentEmail);
    const status = isApproved ? 'Yes' : 'No';
    try {
      const res = await apiPost({ action: 'presidentApprovePostDefense', studentEmail: sv.studentEmail, chuTichDuyetSauBv: status });
      if (res.success) {
        toast.show(`Chủ tịch đã ${isApproved ? 'duyệt' : 'từ chối'} bản chỉnh sửa!`, isApproved ? 'success' : 'warn');
        setStudents(prev => prev.map(s => s.maSo === sv.maSo ? {...s, chuTichDuyetSauBv: status} : s));
      } else toast.show(res.message || 'Lỗi cập nhật', 'error');
    } catch(e) { toast.show('Lỗi kết nối', 'error'); }
    setProcessing(null);
  }

  const filtered = students.filter(s =>
    s.studentName.toLowerCase().includes(search.toLowerCase()) || s.maSo.includes(search)
  );

  if (loading) return (
    <div className="flex flex-col items-center justify-center py-32 gap-4 text-on-surface-variant">
      <span className="material-symbols-outlined anim-spin text-4xl text-primary">refresh</span>
      <p className="text-sm font-medium">Đang tải dữ liệu sau bảo vệ...</p>
    </div>
  );

  return (
    <div className="space-y-6 anim-fade">
      {viewerFile && (
        <FileViewerModal url={viewerFile.url} studentName={viewerFile.studentName} fileName={viewerFile.fileName} onClose={() => setViewerFile(null)} />
      )}
      {approveTarget && (
        <GVHDApproveModal
          student={approveTarget}
          onConfirm={handleGVHDDuyet}
          onClose={() => setApproveTarget(null)}
        />
      )}

      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-3xl font-black text-on-surface tracking-tight">Sau Bảo Vệ</h2>
          <p className="text-on-surface-variant mt-1 text-sm">Xem xét và duyệt bản chỉnh sửa sau khi hội đồng bảo vệ</p>
        </div>
        <div className="relative w-full md:w-80">
          <span className="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
          <input value={search} onChange={e => setSearch(e.target.value)}
            className="w-full pl-12 pr-4 py-3 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary/20 text-sm outline-none"
            placeholder="Tìm tên hoặc MSSV..."/>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="flex flex-col items-center justify-center py-32 gap-5 bg-surface-container-lowest rounded-3xl shadow-sm">
          <span className="material-symbols-outlined text-7xl opacity-10">task_alt</span>
          <p className="text-base font-bold text-on-surface-variant">Chưa có sinh viên cần duyệt sau bảo vệ</p>
          <p className="text-sm text-on-surface-variant/60 text-center max-w-xs">Sinh viên hướng dẫn sẽ xuất hiện ở đây sau khi hội đồng đã hoàn thành bảo vệ</p>
        </div>
      ) : (
        <div className="bg-surface-container-lowest rounded-3xl shadow-sm overflow-hidden border border-outline-variant/10">
          <div className="overflow-x-auto">
            <table className="w-full text-left border-collapse" style={{minWidth:'1000px'}}>
              <thead>
                <tr className="bg-surface-container-low text-on-surface-variant text-[11px] font-black uppercase tracking-widest">
                  <th className="px-6 py-4">Sinh viên & Đề tài</th>
                  <th className="px-4 py-4 text-center">Biên bản HĐ</th>
                  <th className="px-4 py-4 text-center">Bài chỉnh sửa SV</th>
                  <th className="px-4 py-4 text-center">Biên bản giải trình</th>
                  <th className="px-4 py-4 text-center">GVHD duyệt</th>
                  <th className="px-4 py-4 text-center">Chủ tịch HĐ duyệt</th>
                  <th className="px-4 py-4 text-center">Trạng thái</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-outline-variant/10">
                {filtered.map(sv => {
                  const isProc = processing === sv.studentEmail;
                  const gvhdOk = sv.gvhdDuyetSauBv === 'Yes';
                  const gvhdNo = sv.gvhdDuyetSauBv === 'No';
                  const ctOk   = sv.chuTichDuyetSauBv === 'Yes';
                  const ctNo   = sv.chuTichDuyetSauBv === 'No';
                  const hasBaiChinhSua = !!sv.baiChinhSuaUrl;

                  let overallStatus;
                  if (ctOk) overallStatus = { label: 'Hoàn thành', color: 'bg-[#00593c] text-white', icon: 'verified' };
                  else if (ctNo) overallStatus = { label: 'CT Từ chối', color: 'bg-error text-white', icon: 'cancel' };
                  else if (gvhdNo) overallStatus = { label: 'GVHD Từ chối', color: 'bg-error-container text-on-error-container', icon: 'cancel' };
                  else if (gvhdOk) overallStatus = { label: 'Chờ CT duyệt', color: 'bg-secondary-container text-on-secondary-container', icon: 'hourglass_top' };
                  else overallStatus = { label: 'Chờ GVHD duyệt', color: 'bg-surface-container-high text-on-surface-variant', icon: 'pending' };

                  return (
                    <tr key={sv.maSo} className="hover:bg-surface-container-low/40 transition-colors align-middle">
                      {/* Sinh viên */}
                      <td className="px-6 py-5">
                        <div className="flex gap-3 items-start">
                          <Av name={sv.studentName} cls="w-10 h-10 flex-shrink-0 mt-0.5"/>
                          <div>
                            <p className="font-bold text-sm text-on-surface">{sv.studentName}</p>
                            <p className="text-xs text-on-surface-variant">{sv.maSo}</p>
                            <div className="flex gap-1 mt-1 flex-wrap">
                              {sv.isGVHD    && <span className="text-[9px] font-bold px-2 py-0.5 rounded-md bg-primary text-white">GVHD</span>}
                              {sv.isChuTich && <span className="text-[9px] font-bold px-2 py-0.5 rounded-md bg-secondary-container text-on-secondary-container">Chủ tịch HĐ</span>}
                            </div>
                            <p className="text-xs font-medium text-on-surface-variant mt-1 max-w-[220px] line-clamp-2">{sv.topic || '--'}</p>
                          </div>
                        </div>
                      </td>

                      {/* Biên bản HĐ */}
                      <td className="px-4 py-5 text-center align-middle">
                        {sv.bienBanUrl ? (
                          <button onClick={() => setViewerFile({ url: sv.bienBanUrl, studentName: sv.studentName, fileName: 'Biên Bản Hội Đồng' })}
                            className="inline-flex flex-col items-center gap-0.5 group">
                            <span className="w-10 h-10 flex items-center justify-center rounded-xl bg-secondary-container group-hover:bg-secondary transition-colors">
                              <span className="material-symbols-outlined fill-icon text-[20px] text-on-secondary-container group-hover:text-white">assignment</span>
                            </span>
                            <span className="text-[9px] font-bold text-on-secondary-container">Xem</span>
                          </button>
                        ) : (<span className="text-[9px] text-on-surface-variant/40">Chưa có</span>)}
                      </td>

                      {/* Bài chỉnh sửa SV */}
                      <td className="px-4 py-5 text-center align-middle">
                        {sv.baiChinhSuaUrl ? (
                          <button onClick={() => setViewerFile({ url: sv.baiChinhSuaUrl, studentName: sv.studentName, fileName: 'Bài Chỉnh Sửa Sau Bảo Vệ' })}
                            className="inline-flex flex-col items-center gap-0.5 group">
                            <span className="w-10 h-10 flex items-center justify-center rounded-xl bg-primary-fixed group-hover:bg-primary-fixed-dim transition-colors">
                              <span className="material-symbols-outlined fill-icon text-[20px] text-primary">edit_document</span>
                            </span>
                            <span className="text-[9px] font-bold text-primary">Xem</span>
                          </button>
                        ) : (<span className="text-[9px] text-on-surface-variant/40">Chưa nộp</span>)}
                      </td>

                      {/* Biên bản giải trình */}
                      <td className="px-4 py-5 text-center align-middle">
                        {sv.bienBanGiaiTrinhUrl ? (
                          <button onClick={() => setViewerFile({ url: sv.bienBanGiaiTrinhUrl, studentName: sv.studentName, fileName: 'Biên Bản Giải Trình Chỉnh Sửa' })}
                            className="inline-flex flex-col items-center gap-0.5 group">
                            <span className="w-10 h-10 flex items-center justify-center rounded-xl bg-tertiary-fixed group-hover:bg-tertiary-fixed-dim transition-colors">
                              <span className="material-symbols-outlined fill-icon text-[20px] text-tertiary">description</span>
                            </span>
                            <span className="text-[9px] font-bold text-tertiary">Xem</span>
                          </button>
                        ) : (<span className="text-[9px] text-on-surface-variant/40">Chưa có</span>)}
                      </td>

                      {/* ── CỘT GVHD DUYỆT (X) ── chỉ GVHD mới thao tác được */}
                      <td className="px-4 py-5 text-center align-middle">
                        {gvhdOk ? (
                          <span className="inline-flex items-center gap-1 text-[10px] font-bold text-white bg-[#00593c] px-3 py-1.5 rounded-full">
                            <span className="material-symbols-outlined text-[13px]" style={{fontVariationSettings:"'FILL' 1"}}>check_circle</span>
                            Đã đồng ý
                          </span>
                        ) : gvhdNo ? (
                          <span className="inline-flex items-center gap-1 text-[10px] font-bold text-white bg-error px-3 py-1.5 rounded-full">
                            <span className="material-symbols-outlined text-[13px]">cancel</span>
                            Không đồng ý
                          </span>
                        ) : sv.isGVHD && hasBaiChinhSua ? (
                          // GVHD và SV đã nộp bài → hiện nút mở modal
                          <button onClick={() => setApproveTarget(sv)} disabled={isProc}
                            className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-primary text-white text-[10px] font-bold rounded-lg hover:opacity-90 disabled:opacity-50 transition-opacity shadow-sm">
                            {isProc
                              ? <span className="material-symbols-outlined anim-spin text-[12px]">refresh</span>
                              : <span className="material-symbols-outlined text-[12px]">how_to_reg</span>}
                            Xét duyệt
                          </button>
                        ) : sv.isGVHD && !hasBaiChinhSua ? (
                          <span className="text-[10px] text-on-surface-variant italic">Chờ SV nộp bài</span>
                        ) : (
                          // Không phải GVHD → ô bị vô hiệu hóa (chỉ hiện trạng thái)
                          <span className="text-[10px] text-on-surface-variant/40 italic">—</span>
                        )}
                      </td>

                      {/* ── CỘT CTHD DUYỆT (Y) ── chỉ Chủ tịch HĐ mới thao tác, phải sau khi GVHD ok */}
                      <td className="px-4 py-5 text-center align-middle">
                        {ctOk ? (
                          <span className="inline-flex items-center gap-1 text-[10px] font-bold text-white bg-primary px-3 py-1.5 rounded-full">
                            <span className="material-symbols-outlined text-[13px]" style={{fontVariationSettings:"'FILL' 1"}}>verified</span>
                            Đã duyệt
                          </span>
                        ) : ctNo ? (
                          <span className="inline-flex items-center gap-1 text-[10px] font-bold text-white bg-error px-3 py-1.5 rounded-full">
                            <span className="material-symbols-outlined text-[13px]">cancel</span>
                            Từ chối
                          </span>
                        ) : !gvhdOk ? (
                          // GVHD chưa duyệt → ô CTHD bị vô hiệu hóa với tooltip
                          <span className="inline-flex items-center gap-1 text-[10px] text-on-surface-variant/40 italic px-2 py-1 rounded-lg bg-surface-container-high/50" title="GVHD cần duyệt trước">
                            <span className="material-symbols-outlined text-[12px]">lock</span>
                            Chờ GVHD
                          </span>
                        ) : sv.isChuTich ? (
                          // Chủ tịch HĐ và GVHD đã ok → hiện nút duyệt/từ chối
                          <div className="flex flex-col items-center gap-1.5">
                            <button onClick={() => handleChuTichDuyet(sv, true)} disabled={isProc}
                              className="flex items-center gap-1 px-3 py-1.5 bg-primary text-white text-[10px] font-bold rounded-lg hover:opacity-90 disabled:opacity-50 transition-opacity shadow-sm">
                              {isProc ? <span className="material-symbols-outlined anim-spin text-[12px]">refresh</span> : <span className="material-symbols-outlined text-[12px]">check</span>}
                              Duyệt
                            </button>
                            <button onClick={() => handleChuTichDuyet(sv, false)} disabled={isProc}
                              className="flex items-center gap-1 px-3 py-1.5 bg-error text-white text-[10px] font-bold rounded-lg hover:opacity-90 disabled:opacity-50 transition-opacity">
                              <span className="material-symbols-outlined text-[12px]">close</span>
                              Từ chối
                            </button>
                          </div>
                        ) : (
                          // Không phải CT HĐ → ô bị vô hiệu hóa
                          <span className="text-[10px] text-on-surface-variant/40 italic">—</span>
                        )}
                      </td>

                      {/* Trạng thái tổng */}
                      <td className="px-4 py-5 text-center align-middle">
                        <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-3 py-1.5 rounded-full ${overallStatus.color}`}>
                          <span className="material-symbols-outlined text-[13px]">{overallStatus.icon}</span>
                          {overallStatus.label}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="px-6 py-4 bg-surface-container-low border-t border-outline-variant/10">
            <p className="text-xs text-on-surface-variant font-medium">Đang hiển thị {filtered.length} sinh viên hướng dẫn</p>
          </div>
        </div>
      )}
    </div>
  );
}

function TabThongKe({toast}) {
  return (
    <div className="space-y-6 anim-fade">
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 className="text-3xl font-black text-on-surface tracking-tight">Thống kê dữ liệu</h2>
          <p className="text-on-surface-variant mt-1 text-sm">Theo dõi tiến độ và điểm số tổng hợp</p>
        </div>
      </div>
      <div className="flex flex-col items-center justify-center py-32 gap-5 bg-surface-container-lowest rounded-3xl shadow-sm">
        <span className="material-symbols-outlined text-7xl opacity-10">bar_chart</span>
        <p className="text-base font-bold text-on-surface-variant">Giao diện Thống kê</p>
        <p className="text-sm text-on-surface-variant/60 text-center">Đang chờ kết nối Google Apps Script...</p>
      </div>
    </div>
  );
}
// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  React.useEffect(() => {
    const role  = localStorage.getItem('ute_role');
    const email = localStorage.getItem('ute_email');
    if (!role || !email) { window.location.href = 'login.html'; return; }
    if (role === 'sinhvien') { window.location.href = 'trangchusinhvien.html'; return; } 
  }, []);
  const [tab,  setTab]  = React.useState('dashboard');
  const toast            = useToast();

  const [notifications, setNotifications] = React.useState([]);

  React.useEffect(() => {
    (async () => {
      const notis = await fetchGVNotifications(SESSION.email);
      if (notis.length > 0) setNotifications(notis);
    })();
  }, []);

  function addGVNotification(noti) {
    setNotifications(prev => [noti, ...prev].slice(0, 20));
  }

  const baseNavMobile = [
    {id:'dashboard', icon:'dashboard',   l:'Tổng quan'},
    {id:'sinhvien',  icon:'group',        l:'Hướng dẫn'},
    {id:'phanbien',  icon:'rate_review',  l:'Phản biện'},
    {id:'hoidong',   icon:'gavel',        l:'Hội đồng'},
    {id:'sau_bao_ve',icon:'task_alt',     l:'Sau BV'},
  ];
  const tbmNavMobile = [
    {id:'phancong_pb', icon:'assignment_ind',  l:'PC.PB'},
    {id:'phancong_hd', icon:'manage_accounts', l:'PC.HĐ'},
    {id:'thongke',     icon:'bar_chart',       l:'Thống kê'},
  ];
  const navMobile = SESSION.role === 'truongbomon' ? [...baseNavMobile, ...tbmNavMobile] : baseNavMobile;

  return (
    <div className="min-h-screen bg-background">
      {toast.toast && <Toast {...toast.toast} onClose={toast.hide}/>}

      <Sidebar tab={tab} setTab={setTab} role={SESSION.role}
        logout={() => { localStorage.clear(); window.location.href = 'login.html'; }}/>

      <Header notifications={notifications}/>

      <main className="pt-24 pb-20 md:pb-10 px-6 min-h-screen" style={{marginLeft:'18rem'}}>
        <div className="max-w-7xl mx-auto">
          {tab === 'dashboard'   && <TabThongTinChung toast={toast} addGVNotification={addGVNotification}/>}
          {tab === 'sinhvien'    && <TabSinhVienHuongDan toast={toast}/>}
          {tab === 'phanbien'    && <TabPhanBien toast={toast}/>}
          {tab === 'hoidong'     && <TabHoiDong toast={toast}/>}
          {tab === 'sau_bao_ve'  && <TabSauBaoVe toast={toast}/>}
          
          {SESSION.role === 'truongbomon' && tab === 'phancong_pb' && <TabPhanCongPhanBien toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'phancong_hd' && <TabPhanCongHoiDong toast={toast}/>}
          {SESSION.role === 'truongbomon' && tab === 'thongke'     && <TabThongKe toast={toast}/>}
        </div>
      </main>

      <nav className="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-start sm:justify-around items-center px-2 pb-4 pt-2 bg-white/90 backdrop-blur-lg rounded-t-3xl shadow-2xl overflow-x-auto" style={{ scrollbarWidth: 'none' }}>
        {navMobile.map(it => (
          <button key={it.id} onClick={() => setTab(it.id)}
            className={`flex flex-col items-center justify-center min-w-[70px] px-2 py-2 rounded-2xl transition-all ${tab===it.id?'bg-blue-50 text-blue-800':'text-slate-400'}`}>
            <span className="material-symbols-outlined text-2xl">{it.icon}</span>
            <span className="text-[10px] font-semibold mt-1 whitespace-nowrap">{it.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
